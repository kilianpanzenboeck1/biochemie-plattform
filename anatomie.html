<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anatomie 1 – DPU Lernplattform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #e11d48;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #1a2233;
      --muted: #6b7280;
      --border: #e2e8f0;
      --radius: 12px;
      --sidebar-w: 260px;
      --header-h: 56px;
    }

    body.dark {
      --bg:     #0f172a;
      --card:   #1e293b;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --border: #334155;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ── */
    #hdr {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      gap: 12px;
    }
    .hdr-logo {
      font-weight: 700;
      font-size: 1.1rem;
      text-decoration: none;
      color: var(--text);
      white-space: nowrap;
    }
    #dark-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text);
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text);
      padding: 4px 8px;
    }

    /* ── Layout ── */
    .shell {
      display: flex;
      height: calc(100vh - var(--header-h));
    }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }
    .nav-section-links {
      padding: 4px 12px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      transition: background 0.15s;
    }
    .nav-link:hover { background: var(--bg); }
    .nav-link.active { background: var(--accent); color: #fff; }
    .nav-link.active .nav-dot { border-color: rgba(255,255,255,0.6); }
    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 12px;
    }
    .nav-group-label {
      padding: 8px 24px 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .nav-code {
      font-size: 0.7rem;
      font-weight: 600;
      background: var(--bg);
      border-radius: 4px;
      padding: 1px 5px;
      color: var(--muted);
      flex-shrink: 0;
    }
    .nav-link.active .nav-code { background: rgba(255,255,255,0.2); color: #fff; }
    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .nav-dot.visited { border-color: var(--muted); background: var(--muted); }
    .nav-dot.done    { border-color: #22c55e; background: #22c55e; }

    /* ── Main ── */
    #view {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
    }

    /* ── Home ── */
    .hero-box {
      background: linear-gradient(135deg, #e11d48 0%, #9f1239 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 28px;
    }
    .hero-box h1 { font-size: 1.6rem; margin-bottom: 4px; }
    .hero-box p  { opacity: 0.85; margin-bottom: 16px; }
    .hero-stats  { display: flex; gap: 24px; flex-wrap: wrap; }
    .hero-stat   { text-align: center; }
    .hero-stat strong { display: block; font-size: 1.8rem; font-weight: 800; }
    .hero-stat span   { font-size: 0.8rem; opacity: 0.8; }

    .block-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .block-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      text-decoration: none;
      color: var(--text);
      display: block;
    }
    .block-card:hover {
      border-color: var(--card-accent, var(--accent));
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }
    .block-card-emoji { font-size: 2rem; margin-bottom: 8px; }
    .block-card-code  { font-size: 0.7rem; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .block-card-title { font-size: 0.95rem; font-weight: 600; margin: 2px 0 6px; }
    .progress-wrap { background: var(--border); border-radius: 99px; height: 5px; margin-top: 12px; }
    .progress-bar  { height: 5px; border-radius: 99px; background: var(--card-accent, var(--accent)); transition: width 0.3s; }

    /* ── Block-View ── */
    .block-header {
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 24px;
      color: #fff;
    }
    .block-header-emoji { font-size: 2.4rem; margin-bottom: 8px; }
    .block-header h2    { font-size: 1.4rem; font-weight: 700; }
    .block-header-code  { font-size: 0.75rem; font-weight: 700; letter-spacing: .08em;
                          text-transform: uppercase; opacity: .75; margin-bottom: 4px; }

    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 10px 18px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      border-radius: 8px 8px 0 0;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--block-accent, var(--accent)); border-bottom-color: var(--block-accent, var(--accent)); }

    /* ── Übersicht-Tab ── */
    .uebersicht-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .uebersicht-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .uebersicht-card h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .uebersicht-card ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .uebersicht-card li {
      font-size: 0.85rem;
      color: var(--muted);
      padding-left: 14px;
      position: relative;
      line-height: 1.4;
    }
    .uebersicht-card li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--block-accent, var(--accent));
      font-weight: 700;
    }

    .lernziele-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .lernziele-box h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .lernziele-box ol {
      padding-left: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .lernziele-box li { font-size: 0.875rem; line-height: 1.5; }

    .mnemonic-box {
      background: #fefce8;
      border: 1px solid #fde047;
      border-radius: var(--radius);
      padding: 16px 20px;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    body.dark .mnemonic-box { background: #422006; border-color: #a16207; }

    /* ── Karteikarten-Tab ── */
    .karten-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .flip-card {
      width: 100%;
      max-width: 620px;
      cursor: pointer;
      perspective: 1000px;
    }
    .flip-card-inner {
      display: grid;
      transform-style: preserve-3d;
      transition: transform 0.45s ease;
      border-radius: var(--radius);
      min-height: 220px;
    }
    .flip-card-inner.flipped { transform: rotateY(180deg); }
    .flip-card-front,
    .flip-card-back {
      grid-area: 1 / 1;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .flip-card-back { transform: rotateY(180deg); }
    .karte-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--block-accent, var(--accent));
      margin-bottom: 12px;
    }
    .karte-text {
      font-size: 1.05rem;
      line-height: 1.65;
      white-space: pre-wrap;
    }
    .karte-cat {
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .karten-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .karten-controls button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--text);
      transition: background 0.15s;
    }
    .karten-controls button:hover { background: var(--bg); }
    .karten-counter { font-size: 0.875rem; color: var(--muted); min-width: 60px; text-align: center; }

    .karten-dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 620px;
    }
    .karten-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .karten-dot.current { background: var(--block-accent, var(--accent)); }
    .karten-dot.seen    { background: var(--muted); }

    .flip-hint {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Quiz-Tab ── */
    .quiz-score-box {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      flex-wrap: wrap;
      gap: 10px;
    }
    .quiz-score-num { font-size: 1.4rem; font-weight: 800; }
    .quiz-score-label { font-size: 0.85rem; color: var(--muted); }
    .quiz-reset-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--text);
    }
    .quiz-reset-btn:hover { background: var(--border); }

    .quiz-question {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .quiz-q-text {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .quiz-q-num {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 8px; }
    .quiz-opt-btn {
      text-align: left;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      cursor: pointer;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
      line-height: 1.4;
    }
    .quiz-opt-btn:hover:not(:disabled) { border-color: var(--block-accent, var(--accent)); }
    .quiz-opt-btn:disabled { cursor: default; }
    .quiz-opt-btn.correct  { border-color: #22c55e; background: #f0fdf4; color: #166534; font-weight: 600; }
    .quiz-opt-btn.wrong    { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    body.dark .quiz-opt-btn.correct { background: #14532d; color: #bbf7d0; }
    body.dark .quiz-opt-btn.wrong   { background: #450a0a; color: #fecaca; }

    .quiz-explanation {
      margin-top: 12px;
      padding: 10px 14px;
      background: #f8fafc;
      border-left: 3px solid var(--block-accent, var(--accent));
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      line-height: 1.5;
      color: var(--muted);
    }
    body.dark .quiz-explanation { background: #1e293b; }

    /* ── Tabellen-Tab ── */
    .tabellen-wrap { display: flex; flex-direction: column; gap: 24px; }
    .tabellen-block h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .table-scroll { overflow-x: auto; border-radius: var(--radius); }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      font-size: 0.875rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      min-width: 400px;
    }
    thead { background: var(--block-accent, var(--accent)); color: #fff; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: .03em;
    }
    td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.45; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--bg); }

    /* ── Terminologie-View ── */
    .termin-header {
      margin-bottom: 20px;
    }
    .termin-header h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .termin-header p  { color: var(--muted); font-size: 0.875rem; }

    .termin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }
    .termin-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .termin-card strong { display: block; font-size: 0.9rem; margin-bottom: 4px; }
    .termin-card span   { font-size: 0.8rem; color: var(--muted); line-height: 1.4; display: block; }
    .termin-card .lat   { color: #2563eb; }
    body.dark .termin-card .lat { color: #60a5fa; }

    /* ── Prüfungsmodus ── */
    .pruef-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 640px;
      margin: 0 auto;
    }
    .pruef-progress-wrap {
      width: 100%;
      background: var(--border);
      border-radius: 99px;
      height: 8px;
    }
    .pruef-progress-bar {
      height: 8px;
      border-radius: 99px;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      transition: width 0.4s;
    }
    .pruef-progress-label {
      width: 100%;
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .pruef-card {
      width: 100%;
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px 36px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      min-height: 200px;
    }
    .pruef-quelle {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .pruef-question {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .pruef-answer {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 16px;
      white-space: pre-wrap;
    }
    .pruef-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .pruef-btn {
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .pruef-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .pruef-btn-show   { background: var(--accent); color: #fff; padding: 12px 32px; font-size: 1rem; }
    .pruef-btn-wieder { background: #fee2e2; color: #991b1b; }
    .pruef-btn-gut    { background: #dbeafe; color: #1e40af; }
    .pruef-btn-perfekt{ background: #dcfce7; color: #166534; }
    body.dark .pruef-btn-wieder  { background: #450a0a; color: #fca5a5; }
    body.dark .pruef-btn-gut     { background: #1e3a5f; color: #93c5fd; }
    body.dark .pruef-btn-perfekt { background: #14532d; color: #86efac; }

    .pruef-done {
      text-align: center;
      padding: 48px 32px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px rgba(0,0,0,0.09);
    }
    .pruef-done h2 { font-size: 1.5rem; margin-bottom: 8px; }
    .pruef-done p  { color: var(--muted); margin-bottom: 20px; }

    /* ── Suche ── */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 380px;
    }
    .search-wrap input {
      width: 100%;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.875rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-drop {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 200;
      overflow: hidden;
    }
    .search-drop.hidden { display: none; }
    .search-result {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .search-result:last-child { border-bottom: none; }
    .search-result:hover { background: var(--bg); }
    .search-result-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .search-result-text { font-size: 0.825rem; line-height: 1.4; }
    .search-result-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .search-no-result   { padding: 12px 14px; font-size: 0.85rem; color: var(--muted); }

    /* ── Dark Mode Overrides ── */
    body.dark #hdr,
    body.dark #sidebar          { background: var(--card); }
    body.dark .search-wrap input { background: #0f172a; }
    body.dark .flip-card-front,
    body.dark .flip-card-back    { background: #253347; }
    body.dark .uebersicht-card   { background: #253347; }
    body.dark .lernziele-box     { background: #253347; }
    body.dark .quiz-question     { background: #253347; }
    body.dark .quiz-opt-btn      { background: #1e293b; border-color: #334155; }
    body.dark .quiz-score-box    { background: #253347; }
    body.dark .quiz-reset-btn    { background: #334155; border-color: #475569; }
    body.dark tbody tr:nth-child(even) { background: #253347; }
    body.dark .pruef-card        { background: #253347; }
    body.dark .pruef-done        { background: #253347; }
    body.dark .termin-card       { background: #253347; }
    body.dark .block-card        { background: #1e293b; }
    body.dark .block-card:hover  { box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    body.dark .karten-controls button { background: #253347; border-color: #334155; }
    body.dark .karten-controls button:hover { background: #334155; }
    body.dark .hero-box          { background: linear-gradient(135deg,#9f1239,#7f1d1d); }

    /* ── Keyboard-Taste ── */
    kbd {
      display: inline-block;
      padding: 1px 6px;
      background: var(--border);
      border: 1px solid var(--muted);
      border-radius: 4px;
      font-size: 0.75rem;
      font-family: inherit;
      line-height: 1.6;
    }

    /* ── Scrollbar (Webkit) ── */
    ::-webkit-scrollbar       { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Fokus-Ring ── */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .hamburger { display: block; }
      #sidebar {
        position: fixed;
        top: var(--header-h);
        left: 0;
        height: calc(100vh - var(--header-h));
        z-index: 99;
        transform: translateX(-100%);
        transition: transform 0.25s;
        box-shadow: 4px 0 16px rgba(0,0,0,0.1);
      }
      #sidebar.open { transform: translateX(0); }
      #view { padding: 16px; }
    }
  </style>
</head>
<body>

  <script>
    var MNEMONICS = {};
    var LERNZIELE = {};
    var VL_META   = {};
    var OVERVIEW_DATA = {};
    var ALL_CARDS = [];
    var ALL_QUIZ  = [];
    var TABLES    = {};
    var SUBJECTS  = {};
  </script>
  <script src="anatomie_data.js"></script>
  <script src="terminologie_data.js"></script>

  <header id="hdr"></header>
  <div class="shell">
    <nav id="sidebar"></nav>
    <main id="view"></main>
  </div>

  <script>
    // ── Store ──────────────────────────────────────────────────
    const STORE = {
      get: () => JSON.parse(localStorage.getItem('anat_progress') || '{}'),
      set: (d) => localStorage.setItem('anat_progress', JSON.stringify(d)),
    };

    // ── Shell ──────────────────────────────────────────────────
    function renderHeader() {
      document.getElementById('hdr').innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <a href="#home" class="hdr-logo">🫀 Anatomie 1</a>
        </div>
        <div class="search-wrap">
          <input type="search" id="search-input" placeholder="Suchen…"
            oninput="handleSearch(this.value)"
            onkeydown="handleSearchKey(event)"
            autocomplete="off">
          <div id="search-drop" class="search-drop hidden"></div>
        </div>
        <button id="dark-btn" onclick="toggleDark()">🌙</button>
      `;
    }

    function renderSidebar() {
      const progress = STORE.get();
      const groups = (SUBJECTS.anatomie1 || {}).sidebarGroups || [];

      let html = `
        <div class="nav-section-links">
          <a href="#home"  class="nav-link" data-route="home">🏠 Übersicht</a>
          <a href="#termin" class="nav-link" data-route="termin">📐 Terminologie</a>
          <a href="#pruef"  class="nav-link" data-route="pruef">🎯 Prüfungsmodus</a>
        </div>
        <div class="nav-divider"></div>
      `;

      for (const group of groups) {
        html += `<div class="nav-group-label" style="color:${group.color}">${group.label}</div>`;
        for (const item of group.items) {
          const p = progress[item.vl] || {};
          const dotClass = p.quizDone ? 'done' : p.visited ? 'visited' : '';
          html += `
            <div style="padding:0 12px">
              <a href="#block/${item.vl}" class="nav-link" data-route="block/${item.vl}">
                <span class="nav-dot ${dotClass}" data-dot="${item.vl}"></span>
                <span class="nav-code">${item.code}</span>
                ${item.title}
              </a>
            </div>
          `;
        }
      }

      document.getElementById('sidebar').innerHTML = html;
    }

    function updateActiveLink() {
      const hash = location.hash.replace('#', '') || 'home';
      document.querySelectorAll('.nav-link').forEach(a => {
        const route = a.dataset.route || '';
        a.classList.toggle('active', hash === route || (hash.startsWith('block/') && route === hash));
      });
    }

    // ── Router ─────────────────────────────────────────────────
    function route() {
      const hash = location.hash || '#home';
      removeKarteKeyboard();
      updateActiveLink();
      if (hash === '#home')              renderHome();
      else if (hash === '#termin')       renderTermin();
      else if (hash === '#pruef')        renderPruef();
      else if (hash.startsWith('#block/')) renderBlock(hash.split('/')[1]);
      else                               renderHome();
    }

    // ── Hilfsfunktionen ────────────────────────────────────────
    function vlEmoji(vlId) {
      const themes = (AN_OVERVIEW[vlId] || {}).themes || [];
      return themes[0] ? themes[0].icon : '📚';
    }

    function vlProgress(vlId) {
      const p = STORE.get()[vlId] || {};
      if (p.quizDone)  return 100;
      if (p.visited)   return 33;
      return 0;
    }

    // Gruppenfarbe anhand der Sidebar-Gruppen ermitteln
    function groupColor(vlId) {
      const groups = (SUBJECTS.anatomie1 || {}).sidebarGroups || [];
      for (const g of groups) {
        if (g.items.some(i => i.vl === vlId)) return g.color;
      }
      return '#6b7280';
    }

    // ── Home-View ──────────────────────────────────────────────
    function renderHome() {
      const groups  = (SUBJECTS.anatomie1 || {}).sidebarGroups || [];
      const allVLs  = groups.flatMap(g => g.items);
      const totalCards = AN_CARDS.length + terminologieData.karteikarten.length;
      const totalQuiz  = AN_QUIZ.length  + terminologieData.quiz.length;

      let html = `
        <div class="hero-box">
          <h1>🫀 Anatomie 1 – Skelettanatomie</h1>
          <p>DPU Med · Modul Bewegungsapparat &amp; Topographische Anatomie</p>
          <div class="hero-stats">
            <div class="hero-stat"><strong>${allVLs.length}</strong><span>Vorlesungen</span></div>
            <div class="hero-stat"><strong>${totalCards}</strong><span>Karteikarten</span></div>
            <div class="hero-stat"><strong>${totalQuiz}</strong><span>Quiz-Fragen</span></div>
          </div>
        </div>
      `;

      for (const group of groups) {
        html += `<h2 style="font-size:0.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${group.color};margin:20px 0 10px">${group.label}</h2>`;
        html += '<div class="block-grid">';
        for (const item of group.items) {
          const pct   = vlProgress(item.vl);
          const color = groupColor(item.vl);
          const cards = AN_CARDS.filter(c => c.vl === item.vl).length;
          const quiz  = AN_QUIZ.filter(q => q.vl === item.vl).length;
          html += `
            <a href="#block/${item.vl}" class="block-card" style="--card-accent:${color}">
              <div class="block-card-emoji">${vlEmoji(item.vl)}</div>
              <div class="block-card-code">${item.code}</div>
              <div class="block-card-title">${item.title}</div>
              <div style="font-size:0.75rem;color:var(--muted)">${cards} Karten · ${quiz} Fragen</div>
              <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
            </a>
          `;
        }
        html += '</div>';
      }

      document.getElementById('view').innerHTML = html;
    }
    // ── Terminologie-View ──────────────────────────────────────
    let terminTab = 'lage';

    function switchTerminTab(tab) {
      terminTab = tab;
      document.querySelectorAll('.termin-tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === tab)
      );
      renderTerminContent(tab);
    }

    function renderTerminContent(tab) {
      const area = document.getElementById('termin-content');
      if (tab === 'lage') {
        const cards = terminologieData.lagebezeichnungen.map(e => `
          <div class="termin-card">
            <strong>${e.term}</strong>
            <span>${e.bedeutung}</span>
          </div>
        `).join('');
        area.innerHTML = `<div class="termin-grid">${cards}</div>`;

      } else if (tab === 'bewegung') {
        const headers = '<tr><th>Bewegung</th><th>Erklärung</th></tr>';
        const rows = terminologieData.bewegungsrichtungen.map(e =>
          `<tr><td><strong>${e.bewegung}</strong></td><td>${e.erklaerung}</td></tr>`
        ).join('');
        area.innerHTML = `
          <div class="table-scroll" style="--block-accent:#6366f1">
            <table>
              <thead>${headers}</thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;

      } else if (tab === 'glossar') {
        const cards = terminologieData.glossar.map(e => `
          <div class="termin-card">
            <strong class="lat">${e.lat}</strong>
            <span>${e.de}</span>
          </div>
        `).join('');
        area.innerHTML = `<div class="termin-grid">${cards}</div>`;
      }
    }

    function renderTermin() {
      terminTab = 'lage';
      document.getElementById('view').innerHTML = `
        <div class="termin-header">
          <h2>📐 Terminologie</h2>
          <p>Anatomische Lage- und Bewegungsbezeichnungen sowie Latein-Glossar</p>
        </div>
        <div class="tabs" style="--block-accent:#6366f1">
          <button class="tab-btn termin-tab-btn active" data-tab="lage"     onclick="switchTerminTab('lage')">📍 Lagebezeichnungen</button>
          <button class="tab-btn termin-tab-btn"        data-tab="bewegung" onclick="switchTerminTab('bewegung')">🔄 Bewegungsrichtungen</button>
          <button class="tab-btn termin-tab-btn"        data-tab="glossar"  onclick="switchTerminTab('glossar')">🔤 Latein-Glossar</button>
        </div>
        <div id="termin-content"></div>
      `;
      renderTerminContent('lage');
    }
    // ── Prüfungsmodus ──────────────────────────────────────────
    let pruefQueue       = [];
    let pruefStartLength = 0;
    let pruefShowAnswer  = false;

    function buildPruefQueue() {
      const q = [];
      AN_CARDS.forEach(c => {
        const src = AN_OVERVIEW[c.vl] ? AN_OVERVIEW[c.vl].title : c.vl;
        q.push({ q: c.q, a: c.a, quelle: src });
      });
      terminologieData.karteikarten.forEach(c =>
        q.push({ q: c.q, a: c.a, quelle: 'Terminologie' })
      );
      for (let i = q.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [q[i], q[j]] = [q[j], q[i]];
      }
      return q;
    }

    function showPruefCard() {
      if (!pruefQueue.length) { showPruefDone(); return; }
      pruefShowAnswer = false;
      const card = pruefQueue[0];
      const done = pruefStartLength - pruefQueue.length;
      const pct  = Math.round(done / pruefStartLength * 100);

      document.getElementById('pruef-area').innerHTML = `
        <div class="pruef-wrap">
          <div style="width:100%">
            <div class="pruef-progress-label">
              <span>${done} erledigt</span>
              <span>${pruefQueue.length} verbleibend</span>
            </div>
            <div class="pruef-progress-wrap" style="margin-top:6px">
              <div class="pruef-progress-bar" style="width:${pct}%"></div>
            </div>
          </div>

          <div class="pruef-card">
            <div class="pruef-quelle">${card.quelle}</div>
            <div class="pruef-question">${card.q}</div>
            <div class="pruef-answer" id="pruef-answer" hidden>${card.a}</div>
          </div>

          <div class="pruef-btns" id="pruef-btns">
            <button class="pruef-btn pruef-btn-show" onclick="pruefReveal()">Antwort zeigen</button>
          </div>
        </div>
      `;
    }

    function pruefReveal() {
      pruefShowAnswer = true;
      document.getElementById('pruef-answer').hidden = false;
      document.getElementById('pruef-btns').innerHTML = `
        <button class="pruef-btn pruef-btn-wieder"  onclick="pruefWieder()">🔁 Wieder</button>
        <button class="pruef-btn pruef-btn-gut"     onclick="pruefWeiter()">👍 Gut</button>
        <button class="pruef-btn pruef-btn-perfekt" onclick="pruefWeiter()">⭐ Perfekt</button>
      `;
    }

    function pruefWieder() {
      const card = pruefQueue.shift();
      const insertAt = Math.min(4, pruefQueue.length);
      pruefQueue.splice(insertAt, 0, card);
      showPruefCard();
    }

    function pruefWeiter() {
      pruefQueue.shift();
      showPruefCard();
    }

    function showPruefDone() {
      document.getElementById('pruef-area').innerHTML = `
        <div class="pruef-wrap">
          <div class="pruef-done">
            <div style="font-size:3rem;margin-bottom:12px">🎉</div>
            <h2>Alle Karten geschafft!</h2>
            <p>Du hast alle ${pruefStartLength} Karten erfolgreich gelernt.</p>
            <button class="pruef-btn pruef-btn-show" onclick="renderPruef()">↺ Nochmal starten</button>
          </div>
        </div>
      `;
    }

    function renderPruef() {
      pruefQueue       = buildPruefQueue();
      pruefStartLength = pruefQueue.length;
      document.getElementById('view').innerHTML = `
        <h2 style="margin-bottom:20px">🎯 Prüfungsmodus</h2>
        <div id="pruef-area"></div>
      `;
      showPruefCard();
    }

    // ── Block-Hilfsfunktionen ──────────────────────────────────
    let currentVL  = null;
    let currentTab = 'uebersicht';

    function getBlock(vlId) {
      const groups = (SUBJECTS.anatomie1 || {}).sidebarGroups || [];
      let code = vlId.toUpperCase();
      for (const g of groups) {
        const item = g.items.find(i => i.vl === vlId);
        if (item) { code = item.code; break; }
      }
      return {
        vlId,
        code,
        titel:       (AN_OVERVIEW[vlId] || {}).title  || (AN_META[vlId] || {}).label || vlId,
        emoji:       vlEmoji(vlId),
        farbe:       groupColor(vlId),
        uebersicht:  (AN_OVERVIEW[vlId] || {}).themes  || [],
        lernziele:   LERNZIELE[vlId]  || [],
        mnemonic:    MNEMONICS[vlId]  || null,
        karteikarten: AN_CARDS.filter(c => c.vl === vlId),
        quiz:         AN_QUIZ.filter(q  => q.vl === vlId),
        tabellen:    AN_TABLES[vlId]  || [],
      };
    }

    function markVisited(vlId) {
      const d = STORE.get();
      d[vlId] = d[vlId] || {};
      d[vlId].visited = true;
      STORE.set(d);
      const dot = document.querySelector(`[data-dot="${vlId}"]`);
      if (dot && !dot.classList.contains('done')) dot.classList.add('visited');
    }

    function markQuizDone(vlId) {
      const d = STORE.get();
      d[vlId] = d[vlId] || {};
      d[vlId].quizDone = true;
      STORE.set(d);
      const dot = document.querySelector(`[data-dot="${vlId}"]`);
      if (dot) { dot.classList.remove('visited'); dot.classList.add('done'); }
    }

    function switchTab(vlId, tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === tab)
      );
      document.getElementById('tab-content').innerHTML = '';
      const block = getBlock(vlId);
      if (tab === 'uebersicht')    renderUebersicht(block);
      else if (tab === 'karten')   renderKarten(block);
      else if (tab === 'quiz')     renderQuiz(block);
      else if (tab === 'tabellen') renderTabellen(block);
    }

    // ── Block-View ─────────────────────────────────────────────
    function renderBlock(vlId) {
      currentVL  = vlId;
      currentTab = 'uebersicht';
      markVisited(vlId);

      const block = getBlock(vlId);
      const hasTables = block.tabellen.length > 0;

      const tabsHTML = `
        <div class="tabs">
          <button class="tab-btn active" data-tab="uebersicht"  onclick="switchTab('${vlId}','uebersicht')">📋 Übersicht</button>
          <button class="tab-btn"        data-tab="karten"      onclick="switchTab('${vlId}','karten')">🃏 Karteikarten</button>
          <button class="tab-btn"        data-tab="quiz"        onclick="switchTab('${vlId}','quiz')">❓ Quiz</button>
          ${hasTables ? `<button class="tab-btn" data-tab="tabellen" onclick="switchTab('${vlId}','tabellen')">📊 Tabellen</button>` : ''}
        </div>
        <div id="tab-content"></div>
      `;

      document.getElementById('view').innerHTML = `
        <div class="block-header" style="background:linear-gradient(135deg,${block.farbe},${block.farbe}cc)">
          <div class="block-header-emoji">${block.emoji}</div>
          <div class="block-header-code">${block.code}</div>
          <h2>${block.titel}</h2>
        </div>
        <div style="--block-accent:${block.farbe}">
          ${tabsHTML}
        </div>
      `;

      renderUebersicht(block);
    }

    // ── Tab: Übersicht ─────────────────────────────────────────
    function renderUebersicht(block) {
      const themeCards = block.uebersicht.map(t => `
        <div class="uebersicht-card">
          <h3>${t.icon || ''} ${t.title}</h3>
          <ul>${t.points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
      `).join('');

      const lernziele = block.lernziele.length
        ? `<div class="lernziele-box">
             <h3>🎯 Lernziele</h3>
             <ol>${block.lernziele.map(z => `<li>${z}</li>`).join('')}</ol>
           </div>`
        : '';

      const mnemonic = block.mnemonic
        ? `<div class="mnemonic-box">💡 <strong>Merkhilfe:</strong> ${block.mnemonic.text}</div>`
        : '';

      document.getElementById('tab-content').innerHTML = `
        <div class="uebersicht-grid">${themeCards}</div>
        ${lernziele}
        ${mnemonic}
      `;
    }
    // ── Tab: Karteikarten ──────────────────────────────────────
    let karteIdx     = 0;
    let karteOrder   = [];
    let karteFlipped = false;
    let karteKeyHandler = null;
    let karteBlock   = null;

    function removeKarteKeyboard() {
      if (karteKeyHandler) {
        document.removeEventListener('keydown', karteKeyHandler);
        karteKeyHandler = null;
      }
    }

    function addKarteKeyboard() {
      removeKarteKeyboard();
      karteKeyHandler = (e) => {
        if (['Space','ArrowUp','ArrowDown'].includes(e.code)) { e.preventDefault(); flipKarte(); }
        else if (e.code === 'ArrowLeft')  { e.preventDefault(); prevKarte(); }
        else if (e.code === 'ArrowRight') { e.preventDefault(); nextKarte(); }
      };
      document.addEventListener('keydown', karteKeyHandler);
    }

    function flipKarte() {
      karteFlipped = !karteFlipped;
      document.querySelector('.flip-card-inner')?.classList.toggle('flipped', karteFlipped);
    }

    function updateKarteView() {
      const cards = karteBlock.karteikarten;
      const idx   = karteOrder[karteIdx];
      const card  = cards[idx];
      karteFlipped = false;

      const inner = document.querySelector('.flip-card-inner');
      if (inner) {
        inner.classList.remove('flipped');
        inner.querySelector('.flip-card-front .karte-text').textContent = card.q;
        inner.querySelector('.flip-card-back  .karte-text').textContent = card.a;
        inner.querySelector('.flip-card-back  .karte-cat').textContent  = card.cat || '';
      }

      const counter = document.querySelector('.karten-counter');
      if (counter) counter.textContent = `${karteIdx + 1} / ${cards.length}`;

      document.querySelectorAll('.karten-dot').forEach((d, i) => {
        d.classList.toggle('current', i === karteIdx);
        d.classList.toggle('seen',    i < karteIdx);
      });
    }

    function nextKarte() {
      if (karteIdx < karteBlock.karteikarten.length - 1) { karteIdx++; updateKarteView(); }
    }
    function prevKarte() {
      if (karteIdx > 0) { karteIdx--; updateKarteView(); }
    }
    function shuffleKarten() {
      for (let i = karteOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [karteOrder[i], karteOrder[j]] = [karteOrder[j], karteOrder[i]];
      }
      karteIdx = 0;
      updateKarteView();
    }

    function renderKarten(block) {
      karteBlock   = block;
      karteIdx     = 0;
      karteFlipped = false;
      karteOrder   = block.karteikarten.map((_, i) => i);

      if (!block.karteikarten.length) {
        document.getElementById('tab-content').innerHTML =
          '<p style="color:var(--muted)">Keine Karteikarten für diese VL.</p>';
        return;
      }

      const first = block.karteikarten[0];
      const dots  = block.karteikarten.map((_, i) =>
        `<div class="karten-dot${i === 0 ? ' current' : ''}"></div>`
      ).join('');

      document.getElementById('tab-content').innerHTML = `
        <div class="karten-wrap" style="--block-accent:${block.farbe}">
          <div class="flip-card" onclick="flipKarte()">
            <div class="flip-card-inner">
              <div class="flip-card-front">
                <div class="karte-label">Frage</div>
                <div class="karte-text">${first.q}</div>
              </div>
              <div class="flip-card-back">
                <div class="karte-label">Antwort</div>
                <div class="karte-text">${first.a}</div>
                <div class="karte-cat">${first.cat || ''}</div>
              </div>
            </div>
          </div>

          <div class="flip-hint">Klick auf Karte oder <kbd>Space</kbd> zum Umdrehen · <kbd>←</kbd><kbd>→</kbd> navigieren</div>

          <div class="karten-controls">
            <button onclick="prevKarte()">← Zurück</button>
            <span class="karten-counter">1 / ${block.karteikarten.length}</span>
            <button onclick="nextKarte()">Weiter →</button>
            <button onclick="shuffleKarten()">🔀 Shuffle</button>
          </div>

          <div class="karten-dots">${dots}</div>
        </div>
      `;

      addKarteKeyboard();
    }
    // ── Tab: Quiz ──────────────────────────────────────────────
    let quizAnswers = {};
    let quizBlock   = null;

    function calcQuizScore() {
      let correct = 0;
      Object.entries(quizAnswers).forEach(([qi, chosen]) => {
        if (quizBlock && quizBlock.quiz[+qi] && quizBlock.quiz[+qi].correct === chosen) correct++;
      });
      return correct;
    }

    function updateQuizScore() {
      const answered = Object.keys(quizAnswers).length;
      const correct  = calcQuizScore();
      const total    = quizBlock ? quizBlock.quiz.length : 0;
      const scoreEl  = document.getElementById('quiz-score-num');
      if (scoreEl) scoreEl.textContent = `${correct} / ${total}`;
      if (answered === total && total > 0 && correct / total >= 0.8) {
        markQuizDone(quizBlock.vlId);
      }
    }

    function answerQuiz(qi, chosen) {
      if (quizAnswers[qi] !== undefined) return;
      quizAnswers[qi] = chosen;

      const btns = document.querySelectorAll(`.quiz-question[data-qi="${qi}"] .quiz-opt-btn`);
      const correct = quizBlock.quiz[qi].correct;
      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === correct) btn.classList.add('correct');
        else if (i === chosen) btn.classList.add('wrong');
      });

      const expEl = document.querySelector(`.quiz-question[data-qi="${qi}"] .quiz-explanation`);
      if (expEl) expEl.hidden = false;

      updateQuizScore();
    }

    function renderQuiz(block) {
      quizBlock   = block;
      quizAnswers = {};

      if (!block.quiz.length) {
        document.getElementById('tab-content').innerHTML =
          '<p style="color:var(--muted)">Keine Quiz-Fragen für diese VL.</p>';
        return;
      }

      const questions = block.quiz.map((q, qi) => {
        const opts = q.opts.map((o, oi) => `
          <button class="quiz-opt-btn" onclick="answerQuiz(${qi},${oi})">${o}</button>
        `).join('');
        return `
          <div class="quiz-question" data-qi="${qi}" style="--block-accent:${block.farbe}">
            <div class="quiz-q-num">Frage ${qi + 1} von ${block.quiz.length}</div>
            <div class="quiz-q-text">${q.q}</div>
            <div class="quiz-opts">${opts}</div>
            <div class="quiz-explanation" hidden>${q.exp}</div>
          </div>
        `;
      }).join('');

      document.getElementById('tab-content').innerHTML = `
        <div style="--block-accent:${block.farbe}">
          <div class="quiz-score-box">
            <div>
              <div class="quiz-score-num" id="quiz-score-num">0 / ${block.quiz.length}</div>
              <div class="quiz-score-label">richtige Antworten</div>
            </div>
            <button class="quiz-reset-btn" onclick="resetQuiz()">↺ Nochmal</button>
          </div>
          ${questions}
        </div>
      `;
    }

    function resetQuiz() {
      if (quizBlock) renderQuiz(quizBlock);
    }
    // ── Tab: Tabellen ──────────────────────────────────────────
    function renderTabellen(block) {
      if (!block.tabellen.length) {
        document.getElementById('tab-content').innerHTML =
          '<p style="color:var(--muted)">Keine Tabellen für diese VL.</p>';
        return;
      }

      const html = block.tabellen.map(t => {
        const headers = t.headers.map(h => `<th>${h}</th>`).join('');
        const rows    = t.rows.map(r =>
          `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`
        ).join('');
        return `
          <div class="tabellen-block" style="--block-accent:${block.farbe}">
            <h3>${t.title}</h3>
            <div class="table-scroll">
              <table>
                <thead><tr>${headers}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('tab-content').innerHTML =
        `<div class="tabellen-wrap">${html}</div>`;
    }

    // ── Suche ──────────────────────────────────────────────────
    function truncate(str, n) {
      return str.length > n ? str.slice(0, n) + '…' : str;
    }

    function vlTitle(vlId) {
      return (AN_OVERVIEW[vlId] || {}).title || vlId;
    }

    function handleSearch(val) {
      const drop = document.getElementById('search-drop');
      if (!drop) return;
      if (val.length < 2) { drop.classList.add('hidden'); return; }

      const q = val.toLowerCase();
      const results = [];

      // Karteikarten (Frage + Antwort)
      for (const c of AN_CARDS) {
        if (results.length >= 10) break;
        if (c.q.toLowerCase().includes(q) || c.a.toLowerCase().includes(q)) {
          results.push({
            icon: '🃏',
            text: truncate(c.q, 80),
            sub:  vlTitle(c.vl),
            href: `#block/${c.vl}`,
          });
        }
      }

      // Übersicht-Punkte
      for (const [vlId, ov] of Object.entries(AN_OVERVIEW)) {
        if (results.length >= 10) break;
        for (const theme of (ov.themes || [])) {
          for (const pt of (theme.points || [])) {
            if (pt.toLowerCase().includes(q)) {
              results.push({
                icon: '📋',
                text: truncate(pt, 80),
                sub:  vlTitle(vlId),
                href: `#block/${vlId}`,
              });
              if (results.length >= 10) break;
            }
          }
          if (results.length >= 10) break;
        }
      }

      // Latein-Glossar
      for (const e of terminologieData.glossar) {
        if (results.length >= 10) break;
        if (e.lat.toLowerCase().includes(q) || e.de.toLowerCase().includes(q)) {
          results.push({
            icon: '🔤',
            text: `${e.lat} – ${e.de}`,
            sub:  'Latein-Glossar',
            href: '#termin',
          });
        }
      }

      if (!results.length) {
        drop.innerHTML = `<div class="search-no-result">Keine Treffer für „${val}"</div>`;
      } else {
        drop.innerHTML = results.map(r => `
          <div class="search-result" onclick="searchGo('${r.href}')">
            <span class="search-result-icon">${r.icon}</span>
            <div>
              <div class="search-result-text">${r.text}</div>
              <div class="search-result-sub">${r.sub}</div>
            </div>
          </div>
        `).join('');
      }
      drop.classList.remove('hidden');
    }

    function searchGo(href) {
      document.getElementById('search-drop')?.classList.add('hidden');
      const input = document.getElementById('search-input');
      if (input) input.value = '';
      location.hash = href;
    }

    function handleSearchKey(e) {
      if (e.key === 'Escape') {
        document.getElementById('search-drop')?.classList.add('hidden');
      }
    }

    // Dropdown schließen bei Klick außerhalb
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) {
        document.getElementById('search-drop')?.classList.add('hidden');
      }
    });

    // ── Utils ──────────────────────────────────────────────────
    function toggleDark() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('anat_dark', isDark ? '1' : '');
    }

    function applyDarkPref() {
      if (localStorage.getItem('anat_dark')) {
        document.body.classList.add('dark');
      }
    }
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // ── Init ───────────────────────────────────────────────────
    applyDarkPref();
    window.addEventListener('hashchange', route);
    renderHeader();
    // Dark-Button-Icon nach renderHeader setzen (Button existiert erst jetzt)
    if (document.body.classList.contains('dark')) {
      const btn = document.getElementById('dark-btn');
      if (btn) btn.textContent = '☀️';
    }
    renderSidebar();
    route();
  </script>

</body>
</html>
