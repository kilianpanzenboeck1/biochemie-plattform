  { id:'anki_s02_838', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Proteinkinase A (PKA) und welche Funktion hat sie?`, a:`Die Proteinkinase A (PKA) ist eine cAMP-abhängige Proteinkinase, die durch den Second Messenger cAMP aktiviert wird.Nach der Bindung von cAMP werden die katalytischen Untereinheiten der PKA freigesetzt und können Zielproteine phosphorylieren.Dadurch reguliert PKA zahlreiche zelluläre Prozesse, insbesondere den Stoffwechsel, die Genexpression sowie verschiedene Signaltransduktionswege.` },
  { id:'anki_s02_839', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Proteinkinase B (PKB/Akt) und welche Funktion hat sie?`, a:`Die Proteinkinase B (PKB), auch Akt genannt, ist eine zentrale Serin/Threonin-Kinase in der Signaltransduktion, die vor allem durch den PI3K-Signalweg aktiviert wird.Nach ihrer Aktivierung phosphoryliert PKB zahlreiche Zielproteine und reguliert dadurch wichtige zelluläre Prozesse, insbesondere Zellwachstum, Zellzyklus, Stoffwechsel und Überleben der Zelle (Anti-Apoptose).Damit spielt PKB/Akt eine entscheidende Rolle bei der Kontrolle von Wachstum und Energiehaushalt der Zelle.` },
  { id:'anki_s02_840', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Proteinkinase C (PKC) und welche Funktion hat sie?`, a:`Die Proteinkinase C (PKC) ist eine Serin/Threonin-Kinase, die durch die Second Messenger Ca²⁺ und Diacylglycerol (DAG) aktiviert wird.Nach ihrer Aktivierung phosphoryliert PKC verschiedene Zielproteine und reguliert dadurch zahlreiche zelluläre Prozesse, insbesondere Signaltransduktion, Genexpression, Zellwachstum und Differenzierung.Damit ist PKC ein wichtiger Bestandteil von Signalwegen, die durch Membranrezeptoren aktiviert werden.` },
  { id:'anki_s02_841', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Proteinkinase G (PKG) und welche Funktion hat sie?`, a:`Die Proteinkinase G (PKG) ist eine cGMP-abhängige Serin/Threonin-Kinase, die durch den Second Messenger cGMP aktiviert wird.Nach ihrer Aktivierung phosphoryliert PKG verschiedene Zielproteine und reguliert dadurch wichtige Prozesse, insbesondere die Relaxation glatter Muskulatur (z. B. in Blutgefäßen), sowie Signalwege im Stoffwechsel und in der Zellfunktion.Damit spielt PKG eine zentrale Rolle bei der Regulation des Gefäßtonus und anderer cGMP-vermittelter Signalprozesse.` },
  { id:'anki_s02_842', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Proteinkinase R (PKR) und welche Funktion hat sie?`, a:`Die Proteinkinase R (PKR) ist eine virusinduzierte Serin/Threonin-Kinase, die vor allem durch doppelsträngige RNA (dsRNA) aktiviert wird, wie sie bei Virusinfektionen entsteht.Nach ihrer Aktivierung phosphoryliert PKR den Initiationsfaktor eIF2α, wodurch die Proteinsynthese (Translation) gehemmt wird.Dadurch verhindert die Zelle die Vermehrung von Viren und trägt zur antiviralen Abwehr bei.` },
  { id:'anki_s02_843', vl:'s02', cat:'Anki', source:'anki', q:`Was ist AMPK und welche Funktion hat sie?`, a:`Die AMP-aktivierte Proteinkinase (AMPK) ist ein zentraler Energiesensor der Zelle, der den energetischen Zustand überwacht.Sie wird aktiviert, wenn der AMP/ATP-Quotient steigt, also bei Energiemangel.Nach ihrer Aktivierung fördert AMPK energiegewinnende Prozesse (z. B. Glukoseaufnahme, Fettsäureabbau) und hemmt gleichzeitig energieverbrauchende Prozesse (z. B. Fettsäuresynthese, Proteinsynthese).Damit sorgt AMPK dafür, dass die Zelle ihren Energiehaushalt stabil hält.` },
  { id:'anki_s02_844', vl:'s02', cat:'Anki', source:'anki', q:`Was sind CaM-Kinasen und welche Funktion haben sie?`, a:`CaM-Kinasen (Calmodulin-abhängige Kinasen) sind Proteinkinasen, die durch den Ca²⁺-Calmodulin-Komplex aktiviert werden.Steigt die Ca²⁺-Konzentration in der Zelle, bindet Ca²⁺ an Calmodulin, wodurch dieses aktiviert wird. Der Ca²⁺-Calmodulin-Komplex kann anschließend CaM-Kinasen aktivieren.Diese phosphorylieren verschiedene Zielproteine und regulieren dadurch Prozesse wie Signaltransduktion, Genexpression, Stoffwechsel und neuronale Funktionen (z. B. Lernen und Gedächtnis).` },
  { id:'anki_s02_845', vl:'s02', cat:'Anki', source:'anki', q:`Welche Effektoren besitzen G-Protein-gekoppelte Rezeptoren (GPCR)?`, a:`G-Protein-gekoppelte Rezeptoren (GPCR) wirken über heterotrimere G-Proteine, die nach Aktivierung verschiedene Effektorproteine regulieren.Zu den wichtigsten Effektoren gehören:• Adenylatzyklase → bildet cAMP aus ATP• Guanylatzyklase → bildet cGMP aus GTP• Phospholipase C (PLC) → spaltet PIP₂ zu IP₃ und DAG• Ionenkanäle → verändern den Ionentransport und das MembranpotenzialDiese Effektoren erzeugen Second Messenger oder verändern direkt die Zellaktivität und leiten so das Signal in der Zelle weiter.` },
  { id:'anki_s02_846', vl:'s02', cat:'Anki', source:'anki', q:`Was macht die Adenylatzyklase und welche Funktion hat sie?`, a:`Die Adenylatzyklase ist ein membrangebundenes Enzym, das ATP zu cyclischem AMP (cAMP) umwandelt.Sie wird über G-Proteine (z. B. Gs oder Gi) reguliert und spielt eine zentrale Rolle in der Signaltransduktion von GPCRs.Das gebildete cAMP wirkt als Second Messenger und aktiviert unter anderem die Proteinkinase A (PKA), wodurch verschiedene zelluläre Prozesse wie Stoffwechsel und Genexpression reguliert werden.` },
  { id:'anki_s02_847', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die Phospholipase C und welche Funktion hat sie?`, a:`Die Phospholipase C (PLC) ist ein Enzym, das nach Aktivierung durch bestimmte Rezeptoren (z. B. GPCR oder Rezeptor-Tyrosinkinasen) ein Membranlipid spaltet.Dabei wird PIP₂ (Phosphatidylinositol-4,5-bisphosphat) in die beiden Second Messenger IP₃ und DAG gespalten.IP₃ diffundiert ins Cytosol und bewirkt die Freisetzung von Ca²⁺ aus dem endoplasmatischen Retikulum, während DAG in der Membran verbleibt und zusammen mit Ca²⁺ die Proteinkinase C (PKC) aktiviert.Damit ist PLC ein zentrales Enzym in der Signalweiterleitung und -verstärkung.` },
  { id:'anki_s02_848', vl:'s02', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Gs- und Gi-Proteinen?`, a:`Gs-Proteine (stimulierend) aktivieren nach Rezeptorbindung die Adenylatzyklase, wodurch die Bildung von cAMP aus ATP erhöht wird.Gi-Proteine (inhibierend) hemmen die Adenylatzyklase und führen dadurch zu einer Verringerung der cAMP-Produktion.Damit haben Gs und Gi gegensätzliche Effekte auf den cAMP-Spiegel und die nachgeschaltete Signalweiterleitung in der Zelle.` },
  { id:'anki_s02_849', vl:'s02', cat:'Anki', source:'anki', q:`Welche Funktion hat das Gq-Protein?`, a:`Das Gq-Protein ist ein G-Protein, das nach Aktivierung durch einen Rezeptor die Phospholipase C (PLC) aktiviert.Die aktivierte PLC spaltet das Membranlipid PIP₂ in die beiden Second Messenger IP₃ und DAG.Dabei bewirkt IP₃ die Freisetzung von Ca²⁺ aus dem endoplasmatischen Retikulum, während DAG zusammen mit Ca²⁺ die Proteinkinase C (PKC) aktiviert.Damit vermittelt Gq-Signale über den IP₃/DAG/Ca²⁺-Signalweg.` },
  { id:'anki_s02_850', vl:'s02', cat:'Anki', source:'anki', q:`Welche Effektoren werden durch Rezeptor-Tyrosinkinasen (RTKs) aktiviert?`, a:`Rezeptor-Tyrosinkinasen (RTKs) aktivieren nach Ligandenbindung und Autophosphorylierung verschiedene intrazelluläre Signalproteine (Effektoren).Zu den wichtigsten Effektoren gehören:• PI3K (Phosphoinositid-3-Kinase) → aktiviert den Akt/PKB-Signalweg und reguliert Zellwachstum und Überleben• PLCγ (Phospholipase C gamma) → spaltet PIP₂ zu IP₃ und DAG und aktiviert Ca²⁺-abhängige Signalwege• Ras → kleines GTP-bindendes Protein, das die MAP-Kinase-Kaskade aktiviert und Zellwachstum sowie Differenzierung steuertDiese Signalwege vermitteln zentrale Prozesse wie Zellproliferation, Differenzierung, Stoffwechsel und Überleben.` },
  { id:'anki_s02_851', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die PI3K und welche Funktion hat sie?`, a:`Die Phosphoinositid-3-Kinase (PI3K) ist ein Enzym, das nach Aktivierung durch Rezeptoren (z. B. RTKs) ein Membranlipid verändert.Sie phosphoryliert PIP₂ zu PIP₃, wodurch eine neue Andockstelle für Signalproteine entsteht.Das gebildete PIP₃ rekrutiert und aktiviert unter anderem die Proteinkinase B (PKB/Akt), die wichtige Prozesse wie Zellwachstum, Stoffwechsel und Zellüberleben reguliert.` },
  { id:'anki_s02_852', vl:'s02', cat:'Anki', source:'anki', q:`Was ist Ras und welche Funktion hat es?`, a:`Ras ist ein kleines GTP-bindendes Protein, das als molekularer Schalter in der Signaltransduktion wirkt.Nach Aktivierung durch Rezeptor-Tyrosinkinasen (RTKs) bindet Ras GTP und wird dadurch aktiv.Das aktive Ras initiiert die MAP-Kinase-Kaskade, eine Signalkette aus mehreren Kinasen, die schließlich zur Regulation von Genexpression, Zellwachstum und Zelldifferenzierung führt.` },
  { id:'anki_s02_853', vl:'s02', cat:'Anki', source:'anki', q:`Was ist die MAP-Kinase-Kaskade und welche Funktion hat sie?`, a:`Die MAP-Kinase-Kaskade ist eine mehrstufige Signalkaskade aus aufeinanderfolgenden Proteinkinasen, die ein Signal vom Rezeptor bis in den Zellkern weiterleitet.Dabei aktiviert eine Kinase jeweils die nächste (z. B. Raf → MEK → ERK), wodurch das Signal verstärkt wird.Die aktivierten MAP-Kinasen gelangen schließlich in den Zellkern und regulieren dort die Genexpression, wodurch Prozesse wie Zellwachstum, Differenzierung und Zellteilung gesteuert werden.` },
  { id:'anki_s02_854', vl:'s02', cat:'Anki', source:'anki', q:`Was ist der JAK/STAT-Signalweg und welche Funktion hat er?`, a:`Der JAK/STAT-Signalweg ist ein Signalweg, der vor allem durch Zytokine und Wachstumsfaktoren aktiviert wird und direkt zur Regulation der Genexpression führt.Nach Ligandenbindung an den Rezeptor werden Janus-Kinasen (JAK) aktiviert, die den Rezeptor und die Transkriptionsfaktoren STAT phosphorylieren.Die phosphorylierten STAT-Proteine dimerisieren, wandern in den Zellkern und wirken dort als Transkriptionsfaktoren, die die Expression spezifischer Gene steuern.Damit vermittelt der JAK/STAT-Weg eine schnelle und direkte Signalübertragung vom Rezeptor zum Zellkern.` },
  { id:'anki_s02_855', vl:'s02', cat:'Anki', source:'anki', q:`Wie funktioniert der JAK/STAT-Signalweg?`, a:`Nach Bindung eines Liganden (z. B. Zytokin) an den Rezeptor kommt es zur Aktivierung der JAK-Kinasen, die an den Rezeptor gebunden sind.Diese phosphorylieren den Rezeptor sowie die STAT-Proteine, die daraufhin dimerisieren.Die STAT-Dimere wandern anschließend in den Zellkern und wirken dort als Transkriptionsfaktoren, die die Expression spezifischer Gene regulieren.Damit ermöglicht der JAK/STAT-Signalweg eine direkte Weiterleitung des Signals vom Rezeptor zum Zellkern.` },
  { id:'anki_s02_856', vl:'s02', cat:'Anki', source:'anki', q:`Was sind Rezeptor-Serin/Threonin-Kinasen und welche Funktion haben sie?`, a:`Rezeptor-Serin/Threonin-Kinasen sind Transmembranrezeptoren, die vor allem Liganden der TGF-β-Familie binden.Nach Ligandenbindung kommt es zur Aktivierung des Rezeptors, der anschließend Serin/Threoninreste von intrazellulären Signalproteinen (z. B. SMAD-Proteine) phosphoryliert.Die aktivierten SMAD-Proteine wandern in den Zellkern und regulieren dort die Genexpression.Damit steuern diese Rezeptoren wichtige Prozesse wie Zellwachstum, Differenzierung und Entwicklung.` },
  { id:'anki_s02_857', vl:'s02', cat:'Anki', source:'anki', q:`Was sind Smad-Proteine und welche Funktion haben sie?`, a:`Smad-Proteine sind intrazelluläre Signalproteine und Transkriptionsfaktoren, die im TGF-β-Signalweg eine zentrale Rolle spielen.Nach Aktivierung von Rezeptor-Serin/Threonin-Kinasen werden Smad-Proteine phosphoryliert, dimerisieren bzw. bilden Komplexe und wandern anschließend in den Zellkern.Dort regulieren sie die Expression spezifischer Gene und steuern Prozesse wie Zellwachstum, Differenzierung und Entwicklung.` },
  { id:'anki_s02_858', vl:'s02', cat:'Anki', source:'anki', q:`Was sind Kernrezeptoren und welche Funktion haben sie?`, a:`Kernrezeptoren sind ligandenaktivierte Transkriptionsfaktoren, die sich im Cytoplasma oder direkt im Zellkern befinden.Nach Bindung eines lipophilen Liganden (z. B. Steroidhormon) verändert der Rezeptor seine Struktur, bindet an die DNA und reguliert die Transkription spezifischer Gene.Damit steuern Kernrezeptoren langfristige Prozesse wie Stoffwechsel, Wachstum und Differenzierung.` },
  { id:'anki_s02_859', vl:'s02', cat:'Anki', source:'anki', q:`Welche Liganden binden an Kernrezeptoren?`, a:`Kernrezeptoren binden vor allem lipophile Signalmoleküle, die die Zellmembran passieren können.Dazu gehören insbesondere Steroidhormone, Schilddrüsenhormone, Vitamin D und Retinsäure.Nach Bindung dieser Liganden werden die Rezeptoren aktiviert und regulieren als Transkriptionsfaktoren die Genexpression.` },
  { id:'anki_s02_860', vl:'s02', cat:'Anki', source:'anki', q:`Wie wirken Kernrezeptoren auf molekularer Ebene?`, a:`Nach Bindung eines lipophilen Liganden werden Kernrezeptoren aktiviert und bilden häufig Dimere.Diese binden an spezifische DNA-Sequenzen (Hormon-Response-Elemente) und regulieren dort die Transkription von Zielgenen.Dadurch steuern sie langfristige Prozesse wie Stoffwechsel, Wachstum und Differenzierung.` },
  { id:'anki_s02_861', vl:'s02', cat:'Anki', source:'anki', q:`Was versteht man unter Signaladaption und welche Funktion hat sie?`, a:`Signaladaption bezeichnet die Fähigkeit von Zellen, auf ein anhaltendes oder wiederholtes Signal mit einer Abschwächung oder Abschaltung der Antwort zu reagieren.Dabei werden Signalwege gezielt herunterreguliert, z. B. durch Rezeptordesensibilisierung, Abbau von Second Messengern oder Inaktivierung von Signalproteinen.Dadurch verhindert die Zelle eine Überstimulation und passt ihre Empfindlichkeit an die aktuelle Umgebung an.` },
  { id:'anki_s02_862', vl:'s02', cat:'Anki', source:'anki', q:`Warum ist Signaladaption wichtig für Zellen?`, a:`ignaladaption ist wichtig, weil sie verhindert, dass Zellen auf ein dauerhaftes Signal mit einer übermäßigen oder schädlichen Reaktion antworten.Durch die Abschwächung der Signalantwort bleibt die Zelle empfindlich für neue Reize und kann ihre Reaktionen an veränderte Bedingungen anpassen.Damit ermöglicht Signaladaption eine kontrollierte und flexible Signalverarbeitung.` },
  { id:'anki_s02_863', vl:'s02', cat:'Anki', source:'anki', q:`Welche Mechanismen tragen zur Signaladaption bei?`, a:`Die Signaladaption kann durch verschiedene zelluläre Mechanismen erreicht werden, die die Signalstärke gezielt verringern oder beenden.Dazu gehören der Abbau oder die Internalisierung von Rezeptoren, die Inaktivierung von Signalproteinen, der Abbau von Second Messengern sowie die Wirkung inhibitorischer Proteine, die Signalwege gezielt hemmen.Diese Mechanismen sorgen dafür, dass Signale zeitlich begrenzt bleiben und die Zelle auf neue Reize reagieren kann.` },
];

  { id:'p02_6', vl:'p02', cat:'Imaging', q:'Was ist MALDI Imaging und was ist sein klinisches Potenzial?', a:'Punkt-für-Punkt-Abrasterung eines Gewebeschnitts per MALDI → 2D-Verteilung von Proteinen/Peptiden im Gewebe. Potenzial: Revolution der Histologie/Pathologie, Unterscheidung Tumorzellen vs. Stroma (analytische Pathologie).' },

  // P03
  { id:'p03_1', vl:'p03', cat:'Methode', q:'Welche 3 Schritte umfasst der Edman-Abbau?', a:'1. Kupplung: α-Aminogruppe + Phenylisothiocyanat (PTC) unter alkalischen Bedingungen. 2. Spaltung: saure Bedingungen → ATZ-Derivat. 3. Konvertierung: stabile PTH-Aminosäure → chromatographische Identifizierung.' },
  { id:'p03_2', vl:'p03', cat:'Methode', q:'Warum kann die Röntgenkristallographie keine Dynamik zeigen?', a:'Röntgenstrukturanalyse liefert eine Momentaufnahme: Röntgenbeugung am Kristall ergibt eine mittlere Elektronendichteverteilung. Bewegungen und zeitabhängige Prozesse sind nicht darstellbar (→ dafür NMR geeignet).' },
  { id:'p03_3', vl:'p03', cat:'Methode', q:'Bis zu welcher Größe ist NMR für Proteine geeignet und was ist der Vorteil?', a:'NMR: bis ca. 30 kDa. Vorteil gegenüber Röntgenkristallographie: ermöglicht Untersuchung zeitabhängiger Phänomene (Proteindynamik, Ligandenbindung) in Lösung.' },
  { id:'p03_4', vl:'p03', cat:'Methode', q:'Welches Prinzip nutzt die Kryo-Elektronenmikroskopie (Kryo-EM)?', a:'TEM bei ≤ −150 °C: tausende Aufnahmen desselben Objekts aus verschiedenen Perspektiven → computergestützte 3D-Rekonstruktion (Einzelpartikelmethode). Anwendbar auch für komplexe Strukturen (Ribosomen, Virushüllproteine).' },
  { id:'p03_5', vl:'p03', cat:'Methode', q:'Was ist AFM und welche Information liefert es?', a:'Rasterkraftmikroskopie (Atomic Force Microscopy): mikroskopische Spitze rastert Oberfläche → interatomare Kräfte lenken Blattfeder aus → 3D-Topographie im Nanometerbereich. Beispiel: Strukturanalyse von Cdc48/p97 (AAA-ATPase).' },
];

const V_CARDS = [
  // V01
  { id:'v01_1', vl:'v01', cat:'Grundlagen', q:'Wo liegt die Information für die 3D-Struktur eines Proteins?', a:'Vollständig in der Primärstruktur (Aminosäuresequenz). Belegt durch reversible Denaturierung von Ribonuklease A mit Harnstoff + β-Mercaptoethanol → spontane Rückfaltung nach Entfernen der Reagenzien.' },
  { id:'v01_2', vl:'v01', cat:'Chaperone', q:'Wie funktioniert das Hsp40/Hsp70-System?', a:'Hsp40 erkennt fehlgefaltete Proteine → übergibt an ATP-gebundenes Hsp70 → ATP-Hydrolyse → Hsp70 umfasst Substrat → ADP→ATP-Austausch (durch NEF) → korrekt gefaltetes Protein wird freigesetzt.' },
  { id:'v01_3', vl:'v01', cat:'Chaperone', q:'Was ist die Besonderheit von Hsp104?', a:'Hsp104 (Hefe) ist eine ATP-abhängige Disaggregase: löst Proteinaggregate auf. Künstlich hergestellte Hsp104-Varianten können auch humane Proteinaggregate auflösen → potenzieller therapeutischer Ansatz bei Neurodegeneration.' },
  { id:'v01_4', vl:'v01', cat:'Fehlfaltung', q:'Was sind die Folgen von Proteinfehlfaltung?', a:'(1) Loss of function: gefaltetes Protein fehlt. (2) Toxic gain of function: exponierte hydrophobe Areale wechselwirken unkontrolliert mit anderen Proteinen → Teufelskreis der Aggregation → Proteinopathien (Alzheimer, Parkinson, ALS).' },
  { id:'v01_5', vl:'v01', cat:'Chaperone', q:'Was ist der Unterschied zwischen Prionen und Prionoiden?', a:'Prionen: infektiöse Proteinaggregate, übertragbar auf andere Individuen (PrPSc). Prionoide: ähnliche Selbstvermehrung, breiten sich aber nur innerhalb eines Individuums aus (z.B. Tau, α-Synuclein, TDP-43).' },

  // V02
  { id:'v02_1', vl:'v02', cat:'Genetischer Code', q:'Wie viele Codons gibt es und wie viele Aminosäuren kodieren sie?', a:'64 Codons → 20 kanonische Aminosäuren (degenerierter Code). 3 Stopp-Codons: UAA, UAG, UGA. Start-Codon: AUG (Methionin).' },
  { id:'v02_2', vl:'v02', cat:'Ribosom', q:'Wie ist das eukaryotische Ribosom aufgebaut?', a:'80S = 40S (kleine Untereinheit: 18S-rRNA + 33 Proteine) + 60S (große Untereinheit: 5S, 5.8S, 28S-rRNA + 49 Proteine). Drei Bindestellen: A (Aminoacyl), P (Peptidyl), E (Exit).' },
  { id:'v02_3', vl:'v02', cat:'Translation', q:'Welche Rolle spielt eIF-2 bei der Initiation?', a:'eIF-2-GTP bringt die Initiator-Met-tRNA zur kleinen Untereinheit (40S). Bei Häm-Mangel phosphoryliert eine Kinase eIF-2-GDP → Translation wird blockiert (z.B. bei Anämie/Erythropoese).' },
  { id:'v02_4', vl:'v02', cat:'Regulation', q:'Wie hemmt Diphterietoxin die Translation?', a:'ADP-Ribosylierung des modifizierten Histidins (Diphtamid) an eEF-2 → Translation stoppt. Extrem potent: 1 Molekül reicht für die gesamte Zelle.' },
  { id:'v02_5', vl:'v02', cat:'Regulation', q:'Wie regulieren miRNAs die Translation?', a:'miRNAs (21–23 nt) binden komplementär an die 3\'-UTR der Ziel-mRNA → Translationshemmung oder mRNA-Abbau. Ein zentraler Regulationsmechanismus für Genexpression in Eukaryoten.' },
  { id:'v02_6', vl:'v02', cat:'Fakten', q:'Wie schnell und wie fehlerfrei arbeiten Ribosomen?', a:'Einbaugeschwindigkeit: 10–20 Aminosäuren/Sekunde. Fehlerquote: 1 Fehler pro 10.000 Aminosäuren. Jede mRNA wird ca. 4.500-mal translatiert.' },

  // V03
  { id:'v03_1', vl:'v03', cat:'Sortierung', q:'Was sind die drei Haupttransportmechanismen für Proteine zu ihren Zielorten?', a:'(1) Gesteuert (gated): Kernimport über Kernporen. (2) Transmembran: ER, Mitochondrien, Peroxisomen. (3) Vesikulär: ER → Golgi → Plasmamembran/Lysosomen/Sekretion.' },
  { id:'v03_2', vl:'v03', cat:'Kernimport', q:'Wie funktioniert der Ran-GTPase-Zyklus beim Kernimport?', a:'Importin-αβ-Heterodimer + NLS-Cargo → ins Kern. Ran-GEF im Kern: Ran-GTP bindet Importin-β → Cargo-Freisetzung. Ran-GAP im Zytosol: GTP-Hydrolyse → Ran-GDP → Importin kehrt zurück.' },
  { id:'v03_3', vl:'v03', cat:'ER', q:'Was ist das KDEL-Signal und welche Funktion hat es?', a:'C-terminales KDEL-Motiv auf ER-residenten Proteinen (z.B. BiP, PDI). KDEL-Rezeptor im Golgi bindet KDEL → COP-I-Vesikel transportieren Proteine retrograd zurück ins ER.' },
  { id:'v03_4', vl:'v03', cat:'Lysosom', q:'Wie werden lysosomale Enzyme zu den Lysosomen sortiert?', a:'M6P-Signal: Phosphotransferase im cis-Golgi fügt GlcNAc-Phosphat an Mannose an → freie Mannose-6-Phosphat-Reste → M6P-Rezeptor im TGN → Clathrin-Vesikel → späte Endosomen/Lysosomen.' },
  { id:'v03_5', vl:'v03', cat:'Klinik', q:'Was ist die I-Zell-Erkrankung (Mukolipidose II)?', a:'Mutation in N-Acetylglukosamin-Phosphotransferase → keine M6P-Markierung lysosomaler Enzyme → Enzyme fälschlicherweise sezerniert → Akkumulation unverdauter Substrate in Lysosomen (inclusion bodies) → geistige Retardierung, Skelettdefekte.' },

  // V04
  { id:'v04_1', vl:'v04', cat:'Ubiquitin', q:'Was ist Ubiquitin und wie ist es aufgebaut?', a:'Kleines, ubiquitär vorkommendes Protein: 8,5 kDa, 76 Aminosäuren, 7 Lysine (K6/11/27/29/33/48/63) + Met1. Sequenz hochkonserviert in allen Eukaryoten.' },
  { id:'v04_2', vl:'v04', cat:'UPS', q:'Welche Bedeutung haben K48- und K63-Polyubiquitin-Ketten?', a:'K48-Ketten: primäres Signal für proteasomalen Abbau. K63-Ketten: primär für Autophagie, DNA-Reparatur. Andere Lysine (K11, K27, K29): für Lokalisation, Aktivierung, Transkriptionsregulation.' },
  { id:'v04_3', vl:'v04', cat:'UPS', q:'Was ist der Unterschied zwischen HECT-E3 und RING-E3-Ligasen?', a:'HECT-E3: übernehmen Ubiquitin vom E2 selbst und heften es dann ans Substrat. RING-E3: ermöglichen direkten Transfer von E2 auf das Substrat (keine intermediäre Ubiquitin-Bindung an E3).' },
  { id:'v04_4', vl:'v04', cat:'UPS', q:'Wie ist das 26S-Proteasom aufgebaut?', a:'26S = 20S-core particle (CP; 2× α₁₋₇ + 2× β₁₋₇ Ringe; Chymotrypsin-, Trypsin-, Caspase-ähnliche Aktivität) + 1–2 × 19S-recognition particle (RP; Basis + Deckel; Substratbindung, Ub-Abspaltung).' },
  { id:'v04_5', vl:'v04', cat:'UPS', q:'Was ist Cdc48/VCP/p97 und warum ist es klinisch relevant?', a:'AAA-ATPase-Homohexamer; segregiert membrangebundene Proteine → Proteasom. Relevant für: ERAD (ER), MAD (Mitochondrien), Ribosomen-Qualitätskontrolle. VCP-Mutationen → Einschlusskörperchen-Myopathie (IBM) und FTD.' },

  // V05
  { id:'v05_1', vl:'v05', cat:'Autophagie', q:'Welche drei Arten der Autophagie gibt es?', a:'(1) Makroautophagie: Phagophore → Autophagosom → Autophagolysosom. (2) Mikroautophagie: direkte lysosomale Membraneinsstülpung. (3) CMA: KFERQ-Motiv → Hsc70 → LAMP-2A → direkter Import ins Lysosom.' },
  { id:'v05_2', vl:'v05', cat:'Regulation', q:'Wie reguliert mTORC1 die Autophagie?', a:'mTORC1 (Nährstoffsensor): bei Nährstoffen aktiv → phosphoryliert Atg13 → keine PAS-Bildung → Autophagie gehemmt. Bei Nährstoffmangel: mTORC1 inaktiv → Atg13 dephosphoryliert → PAS → Autophagie-Initiation. Rapamycin = pharmakologischer mTORC1-Inhibitor.' },
  { id:'v05_3', vl:'v05', cat:'Regulation', q:'Welche Rolle spielt p62/SQSTM1?', a:'p62 ist ein Autophagie-Adaptor: erkennt K63-ubiquitinylierte Substrate → bindet gleichzeitig Atg8/LC3 auf der Phagophore → Einschluss des Substrats in das Autophagosom. Verknüpft UPS und Autophagie.' },
  { id:'v05_4', vl:'v05', cat:'Altern', q:'Wie beeinflusst Spermidin die Lebensspanne?', a:'Spermidin ist ein natürliches Polyamin, induziert Autophagie. Verlängert Lebensspanne in S. cerevisiae und C. elegans (+15%), Drosophila (+30%). Zudem cardioprotektiv (Blutdrucksenkung) und neuroprotektiv beim Menschen.' },

  // V06
  { id:'v06_1', vl:'v06', cat:'Mitochondrien', q:'Welche drei Klassen mitochondrialer Proteasen gibt es?', a:'(1) Intrinsische Mitoproteasen: permanent in Mitochondrien, eigenständige Proteaseaktivität (LONP, CLPXP, iAAA, mAAA, HTRA2). (2) Pseudo-Mitoproteasen: kommen vor, aber keine Aktivität. (3) Transiente: situativ rekrutiert (Caspasen, Calpaine).' },
  { id:'v06_2', vl:'v06', cat:'Mitochondrien', q:'Wie ist LONP aufgebaut?', a:'LONP (Lon-Protease): Homoheptamer aus 7 identischen Untereinheiten. Jede Untereinheit: N-terminale Substratbindungsdomäne + AAA-ATPase-Domäne + C-terminale Protease-Domäne. Lokalisierung: mitochondriale Matrix.' },
  { id:'v06_3', vl:'v06', cat:'MAD', q:'Was ist der MAGIC-Mechanismus?', a:'Mitochondria As Guardian In Cytosol: Hsp104 löst zytosolische Proteinaggregate ATP-abhängig auf → Import über TOM/TIM in die mitochondriale Matrix → Abbau durch mitochondriale Proteasen. Überlastung → mitochondriale Schädigung + Mitophagie.' },

  // V07
  { id:'v07_1', vl:'v07', cat:'Aggregate', q:'Welche 4 physiologischen Aggregattypen gibt es in Hefe?', a:'CytoQ (zytosolisch), INQ (intranukleär), JUNQ (perinukleär/juxtanukleär), IPOD (an Vakuolen). INQ + JUNQ → Abbau via UPS; IPOD → Abbau via Vakuolen/Lysosomen.' },
  { id:'v07_2', vl:'v07', cat:'Mechanismen', q:'Was sind Aggresomen und wo befinden sie sich?', a:'Aggresomen: perinukleäre Proteinaggregate an Mikrotubuli-organisierendem Zentrum (MTOC) in Säugerzellen. Dynamisch; Abbau via UPS und Makroautophagie. Entstehen bei Überlastung der Proteinstase.' },
  { id:'v07_3', vl:'v07', cat:'Klinik', q:'Wie breiten sich Proteinaggregate im ZNS aus?', a:'Neuronen sekretieren Aggregate als Exosomen (30–150 nm) → Mikroglia können abbauen (protektiv) ODER extrazelluläre Anreicherung → benachbarte Neuronen nehmen auf → prionartige Ausbreitung (Tau, SOD1, TDP-43, PrPSc).' },

  // V08
  { id:'v08_1', vl:'v08', cat:'Proteostase', q:'Was ist Proteostase und was beeinflusst sie?', a:'Proteostase = Protein-Homöostase: Fließgleichgewicht zwischen Biosynthese/Faltung/Lokalisation und Abbau/Fehlfaltung/Aggregation. Beeinflusst durch: Metabolismus, Zelltyp, Hitze, Kälte, Strahlung, Toxine, Infektionen.' },
  { id:'v08_2', vl:'v08', cat:'Stressantwort', q:'Wie funktioniert die Hitzeschockantwort (HSR)?', a:'Fehlgefaltete Proteine angereichert → Sensoren rekrutieren HSF1 → HSF1 ins Kern → bindet Hitzeschock-Elemente (HSE) → HSP-Gentranskription ↑ → mehr Chaperone zur Bekämpfung fehlgefalteter Proteine.' },
  { id:'v08_3', vl:'v08', cat:'ROS', q:'Was ist die Maillard-Reaktion in biologischem Kontext?', a:'Nicht-enzymatische Glykierung: Lysinrest eines Proteins + Glukose → Schiff-Base → Amadori-Produkt → Quervernetzung (AGE = Advanced Glycation End Products). Bei Diabetes verstärkt. AGEs schädigen Blutgefäße, EZM, Augenlinse.' },
  { id:'v08_4', vl:'v08', cat:'Altern', q:'Welche drei Alterstheorien gibt es?', a:'1. Freie-Radikal-Theorie: ROS schädigen DNA/Membranen/Proteine. 2. Mitochondriale Theorie: mtDNA-Mutationen → defekte Atmungskette → mehr ROS → Teufelskreis. 3. Proteostase-Theorie: Proteinschäden akkumulieren → Funktionsverlust. Alle drei sind miteinander verknüpft.' },

  // V09
  { id:'v09_1', vl:'v09', cat:'Alzheimer', q:'Was sind die zwei molekularen Hauptpathologien bei Alzheimer?', a:'(1) Extrazelluläre neuritische Plaques: aggregiertes β-Amyloid (Aβ42/40) → entsteht aus APP durch β-Sekretase + γ-Sekretase. (2) Intrazelluläre neurofibrilläre Bündel: hyperphosphoryliertes Tau (Mikrotubuli-assoziiertes Protein).' },
  { id:'v09_2', vl:'v09', cat:'ALS', q:'Was ist TDP-43 und warum ist es bei ALS relevant?', a:'TDP-43 (43 kDa): RNA-bindendes Kernprotein; reguliert Transkription, Spleißen, RNA-Export. Bei ALS: Verlagerung vom Kern ins Zytoplasma → Aggregation → loss of function + toxic gain of function → gestörter RNA-Metabolismus, UPS/Autophagie überlastet.' },
  { id:'v09_3', vl:'v09', cat:'Genetik', q:'Welche genetischen Risikofaktoren gibt es bei Alzheimer?', a:'Familiäre AD (<60 J.): Mutationen in APP, PSEN1, PSEN2 (γ-Sekretase-Untereinheiten) → nur 5% aller Fälle. Sporadische AD (>60 J.): APOE ε4-Variante als Risikofaktor. ~80% der AD-Fälle haben genetische Komponente.' },
];

const A_CARDS = [
  // A01 – Myoglobin
  { id:'a01_1', vl:'a01', cat:'Struktur', q:'Wie ist Myoglobin aufgebaut?', a:'Monomeres Protein: 153 Aminosäuren, 8 α-Helices (A–H). Prosthetische Gruppe: Häm (Porphyrin-Ring mit zentralem Fe²⁺). Fe²⁺ hat 6 Koordinationsstellen: 4 N-Atome Porphyrin + proximales Histidin + O₂.' },
  { id:'a01_2', vl:'a01', cat:'Funktion', q:'Warum ist Myoglobin kein guter O₂-Transporter?', a:'Hyperbolische Bindungskurve (p50 = 2,8 Torr): sehr hohe O₂-Affinität. Myoglobin gibt O₂ erst bei extrem niedrigem Muskel-pO₂ ab → Funktion als O₂-Speicher und Puffer, nicht als Transporter.' },
  { id:'a01_3', vl:'a01', cat:'CO-Vergiftung', q:'Warum ist CO gefährlich, aber weniger als erwartet?', a:'CO hat 25.000× höhere Affinität an freies Häm als O₂. An Globin-gebundenes Häm jedoch nur 250× (distales Histidin reduziert CO-Affinität durch sterische Hinderung) → Proteinumgebung schützt partiell.' },
  // A02 – Hämoglobin
  { id:'a02_1', vl:'a02', cat:'Struktur', q:'Was ist die Quartärstruktur von HbA und wie viele O₂-Moleküle bindet es?', a:'α₂β₂-Tetramer (HbA = adultes Hämoglobin). 4 Untereinheiten, je eine Hämgruppe → 4 O₂-Bindestellen. p50 = 26 Torr (viel höher als Myoglobin: 2,8 Torr).' },
  { id:'a02_2', vl:'a02', cat:'Kooperativität', q:'Warum ist die Sauerstoffbindungskurve von Hämoglobin sigmoidal?', a:'Homotrop-allosterischer Effekt (Kooperativität): Bindung eines O₂ erhöht die Affinität der benachbarten Untereinheiten durch T→R-Konformationsänderung. Sigmoidal ermöglicht effizienten O₂-Transport (viel aufnehmen/abgeben mit kleinem pO₂-Unterschied).' },
  { id:'a02_3', vl:'a02', cat:'Konformation', q:'Was passiert bei der T→R-Konformationsänderung in Hämoglobin?', a:'Beim T→R-Übergang: Helix F (trägt proximales His + Fe²⁺) bewegt sich. Das α₁β₁-/α₂β₂-Protomerpaar dreht sich um 15°. Fe²⁺ verlagert sich von knapp oberhalb des Porphyrin-Rings (T) in die Porphyrin-Ebene (R).' },
  // A03 – Einflussfaktoren
  { id:'a03_1', vl:'a03', cat:'Bohr-Effekt', q:'Was ist der Bohr-Effekt?', a:'Sinkender pH-Wert (steigende H⁺-Konzentration) erniedrigt die O₂-Affinität von Hämoglobin → erleichterte O₂-Abgabe im Gewebe. Molekular: Protonierung β₁ His146 → H-Brücke mit β₁ Asp94 → T-Form stabilisiert.' },
  { id:'a03_2', vl:'a03', cat:'BPG', q:'Was ist 2,3-BPG und wie wirkt es?', a:'2,3-Bisphosphoglycerat: Nebenprodukt der Glykolyse in Erythrozyten. Negativer heterotrop-allosterischer Regulator: bindet in zentraler Pore des Tetramers (T-Form) → stabilisiert T-Form → erniedrigt O₂-Affinität → ermöglicht O₂-Abgabe ans Gewebe.' },
  { id:'a03_3', vl:'a03', cat:'HbF', q:'Warum hat fetales Hämoglobin (HbF) höhere O₂-Affinität als HbA?', a:'HbF = α₂γ₂-Tetramer: γ-Kette bindet BPG schlechter als β-Kette (struktureller Unterschied) → weniger T-Form-Stabilisierung → höhere O₂-Affinität. Funktion: O₂-Transfer von mütterlichem HbA auf Feten.' },
  // A04 – Hämoglobinopathien
  { id:'a04_1', vl:'a04', cat:'Sichelzelle', q:'Welche Mutation liegt bei der Sichelzellanämie vor und welche Konsequenz hat sie?', a:'Punktmutation: Glu6 → Val6 in der β-Kette (Hb β6 Glu→Val) → Hämoglobin S (HbS). Im Desoxyzustand: hydrophobe Valinreste bilden Kontaktstellen → unlösliche HbS-Fasern → Erythrozyten deformieren (Sichelform) → Kapillarverschluss, hämolytische Anämie.' },
  { id:'a04_2', vl:'a04', cat:'Thalassämie', q:'Wie unterscheiden sich α- und β-Thalassämie?', a:'α-Thalassämie: zu wenig α-Ketten → β₄-Tetramer (HbH): hyperbolische Bindungskurve, kaum O₂-Abgabe. β-Thalassämie: zu wenig β-Ketten → überschüssige α-Ketten aggregieren unlöslich → Erythrozyten-Zerstörung → Anämie.' },
  // A05 – EZM
  { id:'a05_1', vl:'a05', cat:'ECM', q:'Welche 4 Hauptkomponenten hat die extrazelluläre Matrix?', a:'(1) Kollagen + Elastin (Protofilamente: Zugstabilität/Elastizität), (2) Glykosaminoglykane/Proteoglykane (Druckelastizität), (3) Anorganische kristalline Strukturen (Festigkeit: Knochen, Knorpel), (4) Glykoproteine (Laminin, Fibronektin: Membranverankerung).' },
  { id:'a05_2', vl:'a05', cat:'Knochen', q:'Aus welchen Anteilen besteht Knochen und welche Funktion haben sie?', a:'70 % Hydroxylapatit [Ca₅(PO₄)₃OH] (Druckstabilität), 20 % Kollagen (Zugfestigkeit), 10 % Wasser. Osteoblasten bilden Knochen; Osteoklasten bauen ab (Resorptionslakunen + HCl + MMP-9/Cathepsin K).' },
  // A06 – Kollagen & Elastin
  { id:'a06_1', vl:'a06', cat:'Kollagen', q:'Was ist das Aminosäuremotiv von Kollagen und warum ist Glycin wichtig?', a:'Gly-X-Y-Motiv (X = oft Pro, Y = oft Hydroxyprolin); 300 Wiederholungen/Monomer. Glycin (kleinste AS) an jeder 3. Position essenziell: ermöglicht enge Packung in der Tripelhelix-Mitte.' },
  { id:'a06_2', vl:'a06', cat:'Kollagen', q:'Warum ist Vitamin C für die Kollagensynthese notwendig?', a:'Vitamin C (Ascorbinsäure) ist Kofaktor der Prolyl-Hydroxylase: Hydroxylierung von Prolin → Hydroxyprolin. Hydroxyprolin ermöglicht H-Brücken zwischen Strängen der Tripelhelix. Vitamin-C-Mangel → Skorbut.' },
  { id:'a06_3', vl:'a06', cat:'Elastin', q:'Wie verleiht Elastin Geweben Elastizität?', a:'Hydrophobe Bereiche entfalten sich bei Zug und falten sich ohne Krafteinwirkung kompakt zurück (entropische Rückstellkraft). Quervernetzung über Lysinreste extrazellulär → gibt Faser Stabilität. Fibrilline als Gerüst.' },
  // A07 – GAGs & anorganische Strukturen
  { id:'a07_1', vl:'a07', cat:'GAG', q:'Was ist Aggrecan und wie ist es organisiert?', a:'Aggrecan (250 kDa): Proteoglykan-Kernprotein mit >100 GAG-Ketten (Chondroitin- + Keratansulfat). Viele Aggrecane binden über Link-Protein an ein Hyaluronsäure-Molekül → riesiger Superkomplex → gelartige Grundsubstanz der ECM → Druckelastizität.' },
  { id:'a07_2', vl:'a07', cat:'Osteoklasten', q:'Wie lösen Osteoklasten Hydroxylapatit auf?', a:'Osteoklasten binden via Integrine an Knochen → bilden Resorptionslakunen → Carboanhydrase: CO₂ + H₂O → H⁺ + HCO₃⁻; H⁺ über ATP-Protonenpumpe → HCl → löst Hydroxylapatit auf. MMP-9 + Cathepsin K bauen organischen Anteil ab.' },
];

// PROGRESS TRACKER (localStorage)

// Subject-aware localStorage keys (updated when subject switches)
let PROGRESS_KEY = 'biochemie_progress';
let STATS_KEY    = 'biochemie_stats';
let SRS_KEY      = 'biochemie_srs';

function updateStorageKeys(subjectId) {
  PROGRESS_KEY = subjectId + '_progress';
  STATS_KEY    = subjectId + '_stats';
  SRS_KEY      = subjectId + '_srs';
}

// Safe storage wrapper (works in iframe + normal browser)
const _store = {};
function _sGet(k) { try { return localStorage.getItem(k); } catch(e) { return _store[k] || null; } }
function _sSet(k, v) { try { localStorage.setItem(k, v); } catch(e) { _store[k] = v; } }

function getProgress() {
  try { return JSON.parse(_sGet(PROGRESS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveProgress(p) {
  _sSet(PROGRESS_KEY, JSON.stringify(p));
  // Re-render nav to update visited indicators
  if (typeof renderSidebarNav === 'function') renderSidebarNav(currentSubject);
}
function markVLVisited(vl) {
  if (!vl || vl === 'all') return;
  const p = getProgress();
  if (!p[vl]) p[vl] = { visited: false, quizDone: false, cardsDone: false };
  p[vl].visited = true;
  saveProgress(p);
  renderProgressBar();
}
function markQuizDone(vl) {
  if (!vl || vl === 'all') return;
  const p = getProgress();
  if (!p[vl]) p[vl] = { visited: false, quizDone: false, cardsDone: false };
  p[vl].quizDone = true;
  saveProgress(p);
  renderProgressBar();
}
function markCardsDone(vl) {
  if (!vl || vl === 'all') return;
  const p = getProgress();
  if (!p[vl]) p[vl] = { visited: false, quizDone: false, cardsDone: false };
  p[vl].cardsDone = true;
  saveProgress(p);
  renderProgressBar();
}
function getTotalVLs() {
  return typeof VL_META !== 'undefined' ? Object.keys(VL_META).length : 43;
}
function getProgressPercent() {
  const p = getProgress();
  const total = getTotalVLs();
  if (total === 0) return 0;
  const visited = Object.values(p).filter(v => v.visited).length;
  return Math.round((visited / total) * 100);
}
function renderProgressBar() {
  const el = document.getElementById('progress-bar-fill');
  const label = document.getElementById('progress-bar-label');
  if (!el) return;
  const pct = getProgressPercent();
  el.style.width = pct + '%';
  const p = getProgress();
  const visited = Object.values(p).filter(v => v.visited).length;
  const total = getTotalVLs();
  if (label) label.textContent = `${visited} / ${total} VLs besucht (${pct}%)`;
  // Update nav button highlights
  Object.keys(p).forEach(vl => {
    const btn = document.querySelector(`.vl-btn[data-vl="${vl}"]`);
    if (btn) {
      btn.classList.toggle('vl-visited', !!p[vl].visited);
      btn.classList.toggle('vl-quiz-done', !!p[vl].quizDone);
    }
  });
}

function getStats() {
  try { return JSON.parse(_sGet(STATS_KEY) || '{"quizResults":{},"practiceCount":{},"weakCards":{}}'); }
  catch(e) { return { quizResults: {}, practiceCount: {}, weakCards: {} }; }
}
function saveStats(s) {
  _sSet(STATS_KEY, JSON.stringify(s));
}
function recordQuizResult(vl, score, total) {
  const s = getStats();
  if (!s.quizResults[vl]) s.quizResults[vl] = [];
  s.quizResults[vl].push({ score, total, date: Date.now() });
  if (s.quizResults[vl].length > 10) s.quizResults[vl].shift();
  saveStats(s);
}
function recordCardPractice(vl) {
  const s = getStats();
  s.practiceCount[vl] = (s.practiceCount[vl] || 0) + 1;
  saveStats(s);
}
function recordWeakCard(cardFront, rating) {
  const s = getStats();
  const key = cardFront.substring(0, 50);
  if (!s.weakCards[key]) s.weakCards[key] = { wieder: 0, gut: 0, perfekt: 0, front: cardFront };
  if (rating === 'wieder') s.weakCards[key].wieder++;
  else if (rating === 'gut') s.weakCards[key].gut++;
  else if (rating === 'perfekt') s.weakCards[key].perfekt++;
  saveStats(s);
}

  if (!container) return;

  const p = getProgress();
  const srs = getSRS();

  // Weak cards (top 5 by "wieder" count)

function resetAllStats() {
  if (!confirm('Alle Statistiken zurücksetzen?')) return;
  try { localStorage.removeItem(STATS_KEY); } catch(e) { delete _store[STATS_KEY]; }
  try { localStorage.removeItem(PROGRESS_KEY); } catch(e) { delete _store[PROGRESS_KEY]; }
  try { localStorage.removeItem(SRS_KEY); } catch(e) { delete _store[SRS_KEY]; }

}

// =========================================================
// SRS (Spaced Repetition System)
// =========================================================
function getSRS() {
  try { return JSON.parse(_sGet(SRS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveSRS(s) {
  _sSet(SRS_KEY, JSON.stringify(s));
}
function getSRSKey(card) {
  return (card.vl + '__' + (card.q || card.front || '')).substring(0, 80).replace(/\s+/g,'_');
}
function updateSRS(card, rating) {
  const srs = getSRS();
  const key = getSRSKey(card);
  const now = Date.now();
  const DAY = 86400000;
  let entry = srs[key] || { interval: 1, easeFactor: 2.5, repetitions: 0, nextReview: now };

  recordWeakCard(card.q || card.front || '?'  , rating);

  if (rating === 'wieder') {
    entry.interval = 1;
    entry.repetitions = 0;
    entry.easeFactor = Math.max(1.3, entry.easeFactor - 0.2);
  } else if (rating === 'gut') {
    if (entry.repetitions === 0) entry.interval = 1;
    else if (entry.repetitions === 1) entry.interval = 6;
    else entry.interval = Math.round(entry.interval * entry.easeFactor);
    entry.easeFactor = Math.max(1.3, entry.easeFactor - 0.15 + 0.1);
    entry.repetitions++;
  } else { // perfekt
    if (entry.repetitions === 0) entry.interval = 1;
    else if (entry.repetitions === 1) entry.interval = 6;
    else entry.interval = Math.round(entry.interval * entry.easeFactor);
    entry.easeFactor = Math.min(3.5, entry.easeFactor + 0.1);
    entry.repetitions++;
  }
  entry.nextReview = now + entry.interval * DAY;
  srs[key] = entry;
  saveSRS(srs);
  return entry;
}
function getDueCards() {
  const srs = getSRS();
  const now = Date.now();
  const allCards = typeof ALL_CARDS !== 'undefined' ? ALL_CARDS : [];
  return allCards.filter(card => {
    const key = getSRSKey(card);
    const entry = srs[key];
    if (!entry) return true; // never reviewed = due
    return entry.nextReview <= now;
  });
}

let pruefungCards = [];
let pruefungIdx = 0;
let pruefungFlipped = false;
let pruefungMode = 'all'; // 'all' | 'due'
let pruefungVLFilter = 'all';
let pruefungSession = { total: 0, wieder: 0, gut: 0, perfekt: 0 };

function initPruefung() {
  renderPruefung();
}

function startPruefungSession() {
  const mode = document.getElementById('pruefung-mode-select')?.value || 'all';
  const vlFilter = document.getElementById('pruefung-vl-select')?.value || 'all';
  pruefungMode = mode;
  pruefungVLFilter = vlFilter;
  pruefungSession = { total: 0, wieder: 0, gut: 0, perfekt: 0 };
  pruefungIdx = 0;
  pruefungFlipped = false;

  let pool = typeof ALL_CARDS !== 'undefined' ? [...ALL_CARDS] : [];
  if (vlFilter !== 'all') {
    pool = pool.filter(c => c.vl === vlFilter);
  }
  if (mode === 'due') {
    const due = getDueCards();
    const dueKeys = new Set(due.map(c => getSRSKey(c)));
    pool = pool.filter(c => dueKeys.has(getSRSKey(c)));
    if (pool.length === 0) {
      document.getElementById('pruefung-content').innerHTML = `
        <div class="pruefung-empty">
          <div style="font-size:48px">🎉</div>
          <h3>Keine fälligen Karten!</h3>
          <p>Alle Karten wurden bereits gelernt. Wähle "Alle Karten" für eine neue Session.</p>
        </div>`;
      return;
    }
  }

  // Shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  pruefungCards = pool.slice(0, Math.min(pool.length, 50));
  pruefungSession.total = pruefungCards.length;
  renderPruefungCard();
}

function renderPruefung() {
  const el = document.getElementById('pruefung-content');
  if (!el) return;

  // Build VL options from SUBJECTS registry (grouped, with labels)
  let vlOptions = '';
  if (typeof SUBJECTS !== 'undefined' && currentSubject && SUBJECTS[currentSubject]) {

function renderPruefungCard() {
  const el = document.getElementById('pruefung-content');
  if (!el) return;

  if (pruefungIdx >= pruefungCards.length) {
    renderPruefungSummary();
    return;
  }

  const card = pruefungCards[pruefungIdx];
  const srs = getSRS();
  const key = getSRSKey(card);
  const entry = srs[key];
  const meta = (typeof VL_META !== 'undefined' && VL_META[card.vl]) ? VL_META[card.vl] : null;
  const tagClass = meta ? (meta.color || 'tag-blue') : 'tag-blue';
  // Fallback label from SUBJECTS if VL_META entry missing
  const cardLabel = meta ? meta.label : (card.vl ? card.vl.toUpperCase() : '?');
  const cardTitle = meta ? meta.title : '';
  const progress = pruefungIdx + 1;
  const pct = Math.round((pruefungIdx / pruefungCards.length) * 100);

  const daysUntil = entry && entry.nextReview > Date.now()
    ? Math.round((entry.nextReview - Date.now()) / 86400000)
    : null;

  el.innerHTML = `
    <div class="pruefung-session">
      <div class="pruefung-progress-row">
        <span class="pruefung-counter">${progress} / ${pruefungCards.length}</span>
        <div class="pruefung-prog-bar"><div class="pruefung-prog-fill" style="width:${pct}%"></div></div>
        <span class="pruefung-score-mini">
          <span style="color:var(--red)">✗ ${pruefungSession.wieder}</span>
          <span style="color:var(--orange);margin-left:6px">~ ${pruefungSession.gut}</span>
          <span style="color:var(--green);margin-left:6px">✓ ${pruefungSession.perfekt}</span>
        </span>
      </div>

      <div class="pruefung-card ${pruefungFlipped ? 'flipped' : ''}" id="pruefung-flashcard" onclick="flipPruefungCard()">
        <div class="pruefung-card-inner">
          <div class="pruefung-card-front">
            <div class="pruefung-card-meta">
              <span class="pill ${tagClass}">${cardLabel}</span>
              <span class="pruefung-cat" style="font-size:12px;opacity:0.6;margin-left:8px">${card.cat}</span>
              ${daysUntil !== null ? `<span style="font-size:11px;opacity:0.5;margin-left:8px">nächste WH in ${daysUntil}d</span>` : ''}
            </div>
            <div class="pruefung-card-question">${card.q || card.front || ''}</div>
            <div class="pruefung-flip-hint">Klicken zum Aufdecken ↓</div>
          </div>
          <div class="pruefung-card-back">
            <div class="pruefung-card-meta">
              <span class="pill ${tagClass}">${cardLabel}</span>
              <span class="pruefung-cat" style="font-size:12px;opacity:0.6;margin-left:8px">${card.cat}</span>
            </div>
            <div class="pruefung-card-answer">${card.a || card.back || ''}</div>
          </div>
        </div>
      </div>

      ${pruefungFlipped ? `
      <div class="pruefung-rating">
        <p style="text-align:center;opacity:0.7;margin-bottom:12px;font-size:14px">Wie gut wusstest du es?</p>
        <div class="pruefung-rating-btns">
          <button class="pruefung-rate-btn pruefung-wieder" onclick="ratePruefungCard('wieder')">
            <span>✗</span> Wieder<small>Nicht gewusst</small>
          </button>
          <button class="pruefung-rate-btn pruefung-gut" onclick="ratePruefungCard('gut')">
            <span>~</span> Gut<small>Mit Mühe gewusst</small>
          </button>
          <button class="pruefung-rate-btn pruefung-perfekt" onclick="ratePruefungCard('perfekt')">
            <span>✓</span> Perfekt<small>Sofort gewusst</small>
          </button>
        </div>
      </div>
      ` : `
      <div class="pruefung-rating">
        <p style="text-align:center;opacity:0.5;font-size:13px">Karte aufdecken um zu bewerten</p>
      </div>
      `}
    </div>
  `;
}

function flipPruefungCard() {
  pruefungFlipped = !pruefungFlipped;
  renderPruefungCard();
}

function ratePruefungCard(rating) {
  const card = pruefungCards[pruefungIdx];
  updateSRS(card, rating);
  pruefungSession[rating]++;
  // For 'wieder', add card back later
  if (rating === 'wieder' && pruefungCards.length < 100) {
    const reinsertAt = Math.min(pruefungCards.length, pruefungIdx + 3 + Math.floor(Math.random() * 3));
    pruefungCards.splice(reinsertAt, 0, { ...card });
  }
  pruefungIdx++;
  pruefungFlipped = false;
  renderPruefungCard();
}

function renderPruefungSummary() {
  const el = document.getElementById('pruefung-content');
  if (!el) return;
  const s = pruefungSession;
  const pct = s.total > 0 ? Math.round((s.perfekt / (pruefungSession.wieder + pruefungSession.gut + pruefungSession.perfekt || 1)) * 100) : 0;

  el.innerHTML = `
    <div class="pruefung-summary">
      <div style="font-size:56px;text-align:center">${pct >= 80 ? '🏆' : pct >= 50 ? '💪' : '📚'}</div>
      <h2>Session abgeschlossen!</h2>
      <div class="summary-stats">
        <div class="sum-stat sum-wieder"><div class="sum-num">${s.wieder}</div><div class="sum-lbl">Wieder</div></div>
        <div class="sum-stat sum-gut"><div class="sum-num">${s.gut}</div><div class="sum-lbl">Gut</div></div>

      </div>
      <p style="text-align:center;font-size:18px;margin:16px 0">

}

let searchDebounce = null;

function initSearch() {
  const input = document.getElementById('search-input');
  if (!input) return;
  input.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(runSearch, 200);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      input.value = '';
      hideSearchResults();
    }
  });
  // Close on outside click
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('search-results-panel');
    const bar = document.getElementById('search-bar-wrap');
    if (panel && bar && !bar.contains(e.target)) {
      hideSearchResults();
    }
  });
}

function runSearch() {
  const input = document.getElementById('search-input');
  if (!input) return;
  const q = input.value.trim().toLowerCase();
  const panel = document.getElementById('search-results-panel');
  if (!panel) return;

  if (q.length < 2) {
    panel.style.display = 'none';
    panel.innerHTML = '';
    return;
  }

  const results = [];

  // Search flashcards
  if (typeof ALL_CARDS !== 'undefined') {
    ALL_CARDS.forEach(card => {
      if ((card.q||card.front||'').toLowerCase().includes(q) || (card.a||card.back||'').toLowerCase().includes(q)) {
        const meta = typeof VL_META !== 'undefined' ? VL_META[card.vl] : null;
        results.push({
          type: 'card',
          vl: card.vl,
          title: card.q || card.front || '?',
          preview: (card.a || card.back || '').substring(0, 100),
          label: meta ? meta.label : card.vl.toUpperCase(),
          color: meta ? meta.color : 'tag-blue'
        });
      }
    });
  }

  // Search overview topics
  if (typeof OVERVIEW_DATA !== 'undefined') {
    Object.entries(OVERVIEW_DATA).forEach(([vl, data]) => {
      if (!data || !data.topics) return;
      const meta = typeof VL_META !== 'undefined' ? VL_META[vl] : null;
      data.topics.forEach(topic => {
        const inTitle = topic.title.toLowerCase().includes(q);
        const inPoints = topic.points.some(p => p.toLowerCase().includes(q));
        if (inTitle || inPoints) {
          const matchPoint = topic.points.find(p => p.toLowerCase().includes(q));
          results.push({
            type: 'overview',
            vl: vl,
            title: topic.title,
            preview: matchPoint ? matchPoint.substring(0, 100) : topic.points[0].substring(0, 100),
            label: meta ? meta.label : vl.toUpperCase(),
            color: meta ? meta.color : 'tag-blue'
          });
        }
      });
    });
  }

  // Search tables
  if (typeof TABLES !== 'undefined') {
    Object.entries(TABLES).forEach(([vl, tableData]) => {
      if (!tableData) return;
      const meta = typeof VL_META !== 'undefined' ? VL_META[vl] : null;
      // tableData can be array or object of arrays
      const tables = Array.isArray(tableData) ? tableData : Object.values(tableData);
      tables.forEach(table => {
        if (!table) return;
        const title = table.title || '';
        const rows = table.rows || [];
        const inTitle = title.toLowerCase().includes(q);
        const inRows = rows.some(row => Array.isArray(row) && row.some(cell => String(cell).toLowerCase().includes(q)));
        if (inTitle || inRows) {
          results.push({
            type: 'table',
            vl: vl,
            title: title,
            preview: 'Tabelle gefunden',
            label: meta ? meta.label : vl.toUpperCase(),
            color: meta ? meta.color : 'tag-blue'
          });
        }
      });
    });
  }

  const limited = results.slice(0, 20);
  if (limited.length === 0) {
    panel.innerHTML = `<div class="search-empty">Keine Ergebnisse für "<strong>${escHtml(q)}</strong>"</div>`;
    panel.style.display = 'block';
    return;
  }

  const typeIcon = { card: '🃏', overview: '📋', table: '📊' };
  const typeLabel = { card: 'Karteikarte', overview: 'Übersicht', table: 'Tabelle' };

  panel.innerHTML = `
    <div class="search-header-row">
      <span>${results.length} Treffer für "<strong>${escHtml(q)}</strong>"</span>
      <button class="search-close-btn" onclick="hideSearchResults()">✕</button>
    </div>
    ${limited.map((r, i) => `
      <div class="search-result-item" onclick="openSearchResult('${r.vl}', '${r.type}')" data-idx="${i}">
        <div class="sr-left">
          <span class="pill ${r.color}" style="font-size:11px">${r.label}</span>
          <span class="sr-type">${typeIcon[r.type]} ${typeLabel[r.type]}</span>
        </div>
        <div class="sr-content">
          <div class="sr-title">${highlightMatch(r.title, q)}</div>
          <div class="sr-preview">${highlightMatch(r.preview, q)}</div>
        </div>
      </div>
    `).join('')}
    ${results.length > 20 ? `<div class="search-more">+ ${results.length - 20} weitere Ergebnisse — Suche verfeinern</div>` : ''}
  `;
  panel.style.display = 'block';
}

function highlightMatch(text, q) {
  if (!text || !q) return escHtml(text || '');
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hideSearchResults() {
  const panel = document.getElementById('search-results-panel');
  if (panel) { panel.style.display = 'none'; panel.innerHTML = ''; }
  const input = document.getElementById('search-input');
  if (input) input.value = '';
}

function openSearchResult(vl, type) {
  hideSearchResults();
  // Switch to that VL
  const vlBtns = document.querySelectorAll('.vl-btn');
  vlBtns.forEach(b => b.classList.remove('active'));
  const targetBtn = document.querySelector(`.vl-btn[data-vl="${vl}"]`);
  if (targetBtn) targetBtn.classList.add('active');
  if (typeof currentVL !== 'undefined') window.currentVL = vl;
  // Switch to appropriate tab
  const tabMap = { card: 'karteikarten', overview: 'uebersicht', table: 'tabellen' };
  const targetTab = tabMap[type] || 'uebersicht';
  switchToTab(targetTab);
}

function switchToTab(tabName) {
  const tabBtns = document.querySelectorAll('.tab-btn');
  tabBtns.forEach(b => b.classList.remove('active'));
  const targetTabBtn = document.querySelector(`.tab-btn[data-tab="${tabName}"]`);
  if (targetTabBtn) targetTabBtn.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const targetPage = document.getElementById(`page-${tabName}`);
  if (targetPage) targetPage.classList.add('active');
  window.currentTab = tabName;
  if (typeof refreshCurrentTab === 'function') refreshCurrentTab();
  else {
    if (tabName === 'statistiken') renderStatistiken();
    else if (tabName === 'pruefung') initPruefung();
  }
}

  }, 100);
}

  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderOverview() {

  for (const vl of vlsToShow) {

    const data = OVERVIEW_DATA[vl];

    const lernziele = typeof LERNZIELE !== 'undefined' ? LERNZIELE[vl] : null;
    const mnemonic = typeof MNEMONICS !== 'undefined' ? MNEMONICS[vl] : null;

    html += `

      <div class="vl-hero">
        <div class="vl-badge">${meta.label}</div>
        <div class="vl-hero-content">

          <p>Überblick über die wichtigsten Inhalte, Konzepte und klinischen Bezüge dieser Vorlesung.</p>
        </div>
      </div>

      ${(lernziele || mnemonic) ? `
      <div class="lernziele-mnemonic-row">
        ${lernziele ? `
        <div class="lernziele-box">
          <h4>🎯 Lernziele</h4>
          <ol>${lernziele.map(z => `<li>${z}</li>`).join('')}</ol>
        </div>` : '<div></div>'}
        ${mnemonic ? `
        <div class="mnemonic-box">
          <div class="mnemonic-icon">💡</div>
          <div>
            <div class="mnemonic-text">${mnemonic.mnemonic}</div>
            ${mnemonic.tip ? `<div class="mnemonic-tip">Tipp: ${mnemonic.tip}</div>` : ''}
          </div>
        </div>` : '<div></div>'}
      </div>` : ''}

    `;

    for (const topic of data.topics) {
      html += `

// RENDER: FLASHCARDS
// =========================================================
function getCategories(cards) {
  const cats = ['Alle', ...new Set(cards.map(c => c.cat))];
  return cats;
}

function initCards() {
  const rawCards = getCardsForVL(currentVL);
  const categories = getCategories(rawCards);

  // Category pills
  const pillsEl = document.getElementById('category-pills');
  pillsEl.innerHTML = categories.map(cat =>
    `<button class="pill ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');

  // Apply filter
  const filtered = activeCategory === 'Alle' ? rawCards : rawCards.filter(c => c.cat === activeCategory);
  filteredCards = [...filtered];
  currentCardIdx = 0;
  cardFlipped = false;

  updateCard();
}

function updateCard() {
  const card = filteredCards[currentCardIdx];
  const cardEl = document.getElementById('flashcard');
  const front = document.getElementById('card-front-text');
  const back = document.getElementById('card-back-text');
  const counter = document.getElementById('nav-counter');
  const progress = document.getElementById('card-progress-bar');
  const progressLabel = document.getElementById('card-progress-label');
  const catTag = document.getElementById('card-cat-tag');

  // Reset flip
  cardFlipped = false;
  cardEl.classList.remove('flipped');

  if (!card) {
    front.textContent = 'Keine Karten gefunden.';
    back.textContent = '';
    counter.textContent = '0 / 0';
    progress.style.width = '0%';
    progressLabel.textContent = '0 / 0';
    catTag.textContent = '';
    return;
  }

  front.textContent = card.q;
  back.textContent = card.a;
  catTag.className = `card-cat-tag tag ${catColor(card.cat)}`;
  catTag.textContent = card.cat;
  counter.textContent = `${currentCardIdx + 1} / ${filteredCards.length}`;
  const pct = filteredCards.length > 0 ? Math.round(((currentCardIdx + 1) / filteredCards.length) * 100) : 0;
  progress.style.width = pct + '%';
  progressLabel.textContent = `${currentCardIdx + 1} / ${filteredCards.length}`;
}

// RENDER: QUIZ
// =========================================================
function initQuiz() {
  const raw = getQuizForVL(currentVL);
  quizQuestions = shuffle(raw);
  currentQuizIdx = 0;
  quizScore = 0;
  quizFinished = false;
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const container = document.getElementById('quiz-container');
  if (quizFinished) {
    const pct = Math.round((quizScore / quizQuestions.length) * 100);
    let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';
    let msg = pct >= 90 ? 'Ausgezeichnet! Du beherrschst den Stoff!' : pct >= 70 ? 'Sehr gut! Noch ein paar Details festigen.' : pct >= 50 ? 'Guter Start! Übe die schwächeren Bereiche.' : 'Weitermachen! Wiederhole die Karteikarten.';
    container.innerHTML = `
      <div class="quiz-results fade-in">
        <div class="results-emoji">${emoji}</div>
        <div class="results-score">${quizScore} / ${quizQuestions.length} richtig</div>
        <p class="results-msg">${pct}% – ${msg}</p>
        <button class="btn-primary" id="quiz-restart">Quiz wiederholen</button>
      </div>`;
    document.getElementById('quiz-restart').addEventListener('click', initQuiz);
    return;
  }

  const q = quizQuestions[currentQuizIdx];
  quizAnswered = false;
  const letters = ['A','B','C','D'];
  container.innerHTML = `
    <div class="quiz-header">
      <div class="progress-bar-outer" style="flex:1">
        <div class="progress-bar-inner" style="width:${Math.round((currentQuizIdx/quizQuestions.length)*100)}%"></div>
      </div>
      <span class="quiz-score-display">✓ ${quizScore}</span>
    </div>
    <div class="quiz-question fade-in">
      <div class="quiz-q-number">Frage ${currentQuizIdx+1} von ${quizQuestions.length} · <span class="${getTagClass(q.vl)} tag">${VL_META[q.vl].label}</span></div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((opt, i) => `
          <button class="quiz-option" data-idx="${i}">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>`).join('')}
      </div>
      <div class="explanation-box" id="explanation">${q.exp}</div>
    </div>
    <div class="quiz-footer">
      <button class="btn-primary" id="next-q-btn" style="display:none">Nächste Frage →</button>
    </div>`;

  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => handleQuizAnswer(btn, q));
  });
}

function handleQuizAnswer(btn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const chosen = parseInt(btn.dataset.idx);
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach(b => b.disabled = true);
  opts[q.correct].classList.add('correct');
  if (chosen === q.correct) {
    quizScore++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
  }
  document.getElementById('explanation').classList.add('visible');
  const nextBtn = document.getElementById('next-q-btn');
  nextBtn.style.display = 'block';
  nextBtn.addEventListener('click', () => {
    currentQuizIdx++;
    if (currentQuizIdx >= quizQuestions.length) quizFinished = true;
    renderQuizQuestion();
  });
}

function renderTables() {
  const container = document.getElementById('tables-content');
  let html = '';

  const vlsToShow = currentVL === 'all' ? null : currentVL;

  for (const [key, tbl] of Object.entries(TABLES)) {
    if (currentVL !== 'all' && tbl.vl !== currentVL) continue;

    html += `
    <div class="table-section">
      <h2 class="section-title">
        <span class="tag ${getTagClass(tbl.vl)}">${VL_META[tbl.vl].label}</span>
        ${tbl.title}
      </h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>${tbl.headers.map(h => `<th>${h}</th>`).join('')}</tr>
          </thead>
          <tbody>
            ${tbl.rows.map(row => `
              <tr>
                ${row.map((cell, i) => {
                  const tagClass = tbl.tags[cell];
                  const content = tagClass ? `<span class="tag ${tagClass}">${cell}</span>` : cell;
                  return `<td>${content}</td>`;
                }).join('')}
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  if (!html) html = '<p class="empty-state">Keine Tabellen für diese Auswahl.</p>';
  container.innerHTML = html;
}

// EVENT HANDLERS
// =========================================================
// VL Navigation
// VL button events are now bound dynamically by renderSidebarNav()
// (kept empty for backward compat)

// Tab Navigation
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${currentTab}`).classList.add('active');
    refreshCurrentTab();
  });
});

function refreshCurrentTab() {
  if (currentTab === 'uebersicht') { renderOverview(); if(currentVL !== 'all') markVLVisited(currentVL); }
  else if (currentTab === 'karteikarten') { initCards(); if(currentVL !== 'all') { markVLVisited(currentVL); recordCardPractice(currentVL); } }
  else if (currentTab === 'quiz') { initQuiz(); if(currentVL !== 'all') markVLVisited(currentVL); }
  else if (currentTab === 'tabellen') renderTables();
  else if (currentTab === 'pruefung') initPruefung();
  else if (currentTab === 'statistiken') renderStatistiken();
}

// Category pills (event delegation)
document.getElementById('category-pills').addEventListener('click', (e) => {
  const pill = e.target.closest('.pill');
  if (!pill) return;
  activeCategory = pill.dataset.cat;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  const rawCards = getCardsForVL(currentVL);
  filteredCards = activeCategory === 'Alle' ? [...rawCards] : rawCards.filter(c => c.cat === activeCategory);
  currentCardIdx = 0;
  updateCard();
});

// Flashcard flip
document.getElementById('flashcard').addEventListener('click', () => {
  cardFlipped = !cardFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', cardFlipped);
});
document.getElementById('flashcard').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    cardFlipped = !cardFlipped;
    document.getElementById('flashcard').classList.toggle('flipped', cardFlipped);
  }
});

// Card navigation
document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentCardIdx > 0) { currentCardIdx--; updateCard(); }
});
document.getElementById('next-btn').addEventListener('click', () => {
  if (currentCardIdx < filteredCards.length - 1) { currentCardIdx++; updateCard(); }
});

// Keyboard navigation for cards
document.addEventListener('keydown', (e) => {
  if (currentTab !== 'karteikarten') return;
  if (e.key === 'ArrowRight' && currentCardIdx < filteredCards.length - 1) { currentCardIdx++; updateCard(); }
  if (e.key === 'ArrowLeft' && currentCardIdx > 0) { currentCardIdx--; updateCard(); }
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    cardFlipped = !cardFlipped;
    document.getElementById('flashcard').classList.toggle('flipped', cardFlipped);
  }
});

// Shuffle
document.getElementById('shuffle-btn').addEventListener('click', () => {
  filteredCards = shuffle(filteredCards);
  currentCardIdx = 0;
  updateCard();
});

// Reset
document.getElementById('reset-btn').addEventListener('click', () => {
  activeCategory = 'Alle';
  initCards();
});

function renderSubjectSwitcher() {

  if (!container) return;
  const ids = Object.keys(SUBJECTS);
  let html = '';
  ids.forEach(id => {
    const s = SUBJECTS[id];

    html += `<button class="subject-pill ${active}" data-subject="${id}" title="${s.name}">
      <span class="subject-pill-dot" style="background:${s.accentColor}"></span>

  container.querySelectorAll('.subject-pill[data-subject]').forEach(btn => {

function renderSidebarNav(subjectId) {
  const nav = document.getElementById('sidebar-nav-root');
  if (!nav) return;
  const subject = SUBJECTS[subjectId];
  if (!subject) return;

  // Home button
  let html = `<button class="sidebar-home-btn" id="sidebar-home-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Alle Fächer
  </button>`;

  subject.sidebarGroups.forEach(group => {
    // Determine if group should be expanded (contains currentVL)
    const hasActive = group.items.some(it => it.vl === currentVL);
    const expanded = hasActive ? 'true' : 'false';
    const collapsed = hasActive ? '' : 'collapsed';
    html += `<div class="sidebar-nav-group">
      <button class="sidebar-group-header" data-group="${group.id}" aria-expanded="${expanded}">
        <span class="sidebar-group-dot" style="background:${group.color}"></span>
        <span class="sidebar-group-label">${group.label}</span>
        <svg class="sidebar-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </button>
      <div class="sidebar-group-items ${collapsed}" id="group-${group.id}">`;
    group.items.forEach(item => {
      const active = item.vl === currentVL ? 'active' : '';
      // Get progress indicator
      const prog = getProgress();
      const visited = prog[item.vl] && prog[item.vl].visited;
      const done = prog[item.vl] && prog[item.vl].quizDone;
      const indicator = done ? '✓' : (visited ? '·' : '');
      html += `<button class="vl-btn ${active}" data-vl="${item.vl}">
          <span class="vl-code">${item.code}</span>
          <span class="vl-title-short">${item.title}</span>
          ${indicator ? `<span class="vl-done-indicator" style="margin-left:auto;opacity:0.6;font-size:0.7rem">${indicator}</span>` : ''}
        </button>`;
    });
    html += `</div></div>`;
  });
  nav.innerHTML = html;

  // Bind VL button events
  nav.querySelectorAll('.vl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // Hide dashboard if shown
      const dash = document.getElementById('page-dashboard');
      if (dash && dash.classList.contains('active')) {
        dash.classList.remove('active');
        const uebers = document.getElementById('page-uebersicht');
        if (uebers) uebers.classList.add('active');
        // Restore active tab
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const activeTabBtn = document.querySelector(`.tab-btn[data-tab="${currentTab}"]`);
        if (activeTabBtn) activeTabBtn.classList.add('active');
      }
      nav.querySelectorAll('.vl-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentVL = btn.dataset.vl;
      activeCategory = 'Alle';
      refreshCurrentTab();
      if (window.innerWidth <= 768) {
        // close sidebar on mobile
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        if (sidebar) sidebar.classList.remove('open');
        if (overlay) overlay.classList.remove('open');
        document.body.style.overflow = '';
      }
    });
  });

  // Bind accordion headers
  nav.querySelectorAll('.sidebar-group-header').forEach(btn => {
    btn.addEventListener('click', () => {
      const groupId = btn.dataset.group;
      const items = document.getElementById('group-' + groupId);
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      if (items) items.classList.toggle('collapsed', expanded);
    });
  });

  // Home button
  const homeBtn = document.getElementById('sidebar-home-btn');
  if (homeBtn) homeBtn.addEventListener('click', showDashboard);
}

function renderDashboard() {
  const grid = document.getElementById('dashboard-grid');
  if (!grid) return;
  let html = '';
  Object.values(SUBJECTS).forEach(s => {
    const prog = JSON.parse(_sGet(s.localStoragePrefix + '_progress') || '{}');
    const totalVLs = s.sidebarGroups.reduce((sum, g) => sum + g.items.length, 0);
    const visitedVLs = Object.keys(prog).filter(k => prog[k] && prog[k].visited).length;
    const pct = totalVLs > 0 ? Math.round(visitedVLs / totalVLs * 100) : 0;
    html += `<div class="subject-card" data-subject="${s.id}" style="--card-accent:${s.accentColor}">
      <div class="subject-card-icon">${s.icon}</div>
      <div class="subject-card-name">${s.name}</div>
      <div class="subject-card-sub">${s.subtitle}</div>
      <div class="subject-card-meta">
        <span>📚 ${totalVLs} Vorlesungen</span>
        <span>✓ ${pct}% besucht</span>
      </div>
    </div>`;
  });
  // Add subject card
  html += `<div class="subject-card subject-card-add">
    <div class="subject-card-add-icon">+</div>
    <p>Neues Fach hinzufügen</p>
  </div>`;
  grid.innerHTML = html;

  // Bind subject card clicks
  grid.querySelectorAll('.subject-card[data-subject]').forEach(card => {
    card.addEventListener('click', () => switchSubject(card.dataset.subject));
  });
  // Add card click
  const addCard = grid.querySelector('.subject-card-add');
  if (addCard) addCard.addEventListener('click', () => {
    alert('Neue Fächer können in der SUBJECTS-Registry in index.html hinzugefügt werden.');
  });
}

function showDashboard() {
  // Deactivate all pages
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const dash = document.getElementById('page-dashboard');
  if (dash) {
    dash.classList.add('active');
    renderDashboard();
  }
  // Deactivate sidebar home btn style
  const homeBtn = document.getElementById('sidebar-home-btn');
  if (homeBtn) homeBtn.classList.add('active');
}

function switchSubject(subjectId) {
  if (!SUBJECTS[subjectId]) return;
  currentSubject = subjectId;
  const subject = SUBJECTS[subjectId];

  // Update storage keys
  updateStorageKeys(subjectId);

  // Update logo text
  const titleEl = document.getElementById('sidebar-logo-title');
  const subEl = document.getElementById('sidebar-logo-sub');
  if (titleEl) titleEl.textContent = subject.name;
  if (subEl) subEl.textContent = subject.subtitle;

  // Update page title
  document.title = subject.name + ' Lernplattform – DPU Vorklinik';

  // Set first VL of this subject as active
  const firstGroup = subject.sidebarGroups[0];
  if (firstGroup && firstGroup.items.length > 0) {
    currentVL = firstGroup.items[0].vl;
  }

  // Re-render sidebar nav + switcher
  renderSidebarNav(subjectId);
  renderSubjectSwitcher();

  // Hide dashboard, show main content
  const dash = document.getElementById('page-dashboard');
  if (dash) dash.classList.remove('active');

  // Show correct page
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const activePage = document.getElementById('page-' + currentTab);
  if (activePage) activePage.classList.add('active');

  // Reset active tab indicator
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const activeTabBtn = document.querySelector(`.tab-btn[data-tab="${currentTab}"]`);
  if (activeTabBtn) activeTabBtn.classList.add('active');

  activeCategory = 'Alle';
  refreshCurrentTab();
}

// =========================================================
// INIT
// =========================================================

// Initialize subject system
updateStorageKeys(currentSubject);
renderSubjectSwitcher();
renderSidebarNav(currentSubject);

renderOverview();

// Initialize features
if (typeof initAllFeatures === 'function') initAllFeatures();


// ===== SIDEBAR ACCORDION + MOBILE TOGGLE =====
(function() {
  // NOTE: Accordion + VL-btn events are now bound by renderSidebarNav()
  // Only mobile toggle remains here

  const origVLBtns = []; // kept for compatibility

  // Mobile toggle
  const sidebar = document.getElementById('sidebar');
  const openBtn = document.getElementById('sidebar-open-btn');
  const closeBtn = document.getElementById('sidebar-close-btn');

  // Create overlay
  const overlay = document.createElement('div');
  overlay.className = 'sidebar-overlay';
  document.body.appendChild(overlay);

  function openSidebar() {
    sidebar.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  if (openBtn) openBtn.addEventListener('click', openSidebar);
  if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
  overlay.addEventListener('click', closeSidebar);

  // Close on VL select (mobile)
  origVLBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (window.innerWidth <= 768) closeSidebar();
    });
  });

  // expandGroupForVL is now handled by renderSidebarNav()
  // (nav already rendered with correct expanded state in INIT)
})();

</script>

<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script>
