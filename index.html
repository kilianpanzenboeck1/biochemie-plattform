  { id:'anki_v04_638', vl:'v04', cat:'Anki', source:'anki', q:`Warum sind Ubiquitin-Topologien wichtig?`, a:`Ubiquitin-Topologien sind wichtig, weil unterschiedliche Verknüpfungsarten von Ubiquitin-Ketten unterschiedliche zelluläre Signale und Funktionen vermitteln.→ Je nach Kettentyp kann ein Protein z. B. für den Abbau im Proteasom, für Signaltransduktion oder für Transportprozesse markiert werden.` },
  { id:'anki_v04_639', vl:'v04', cat:'Anki', source:'anki', q:`Welche Ubiquitin-Kette signalisiert klassisch den proteasomalen Abbau?`, a:`Vor allem K48-verknüpfte Polyubiquitin-Ketten dienen als klassisches Signal für den Abbau im Proteasom.` },
  { id:'anki_v04_640', vl:'v04', cat:'Anki', source:'anki', q:`Welche Ubiquitin-Kette ist besonders mit Autophagie und Signalwegen verknüpft?`, a:`Vor allem K63-verknüpfte Polyubiquitin-Ketten sind mit Signaltransduktion, Vesikeltransport und Autophagie assoziiert und dienen meist nicht dem proteasomalen Abbau.` },
  { id:'anki_v04_641', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktionen können Ubiquitin-Topologien außer dem Proteinabbau erfüllen?`, a:`Ubiquitin-Topologien können neben dem Abbau auch andere Prozesse regulieren, z. B.:• Proteinlokalisation (Transport innerhalb der Zelle)• Signaltransduktion (Weiterleitung von Signalen)• DNA-Reparatur• Proteinaktivität (Aktivierung oder Inaktivierung von Proteinen)` },
  { id:'anki_v04_642', vl:'v04', cat:'Anki', source:'anki', q:`Was ist Cdc48/VCP (p97) und welche Funktion hat es?`, a:`Cdc48/VCP (auch p97 genannt) ist eine evolutionär konservierte AAA-ATPase, die ubiquitinierte Proteine mithilfe von ATP aus Protein-Komplexen oder Membranen herauslöst.→ Dadurch werden diese Proteine für den Weitertransport, die Verarbeitung oder den Abbau (z. B. im Proteasom) zugänglich gemacht.` },
  { id:'anki_v04_643', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat Cdc48/VCP im Proteinabbau?`, a:`Cdc48/VCP extrahiert ubiquitinierte Proteine aus Membranen oder Proteinkomplexen und macht sie dadurch für den Transport zum Proteasom und den anschließenden Abbau zugänglich.` },
  { id:'anki_v04_644', vl:'v04', cat:'Anki', source:'anki', q:`Warum ist Cdc48/VCP für das Ubiquitin-Proteasom-System wichtig?`, a:`Cdc48/VCP ist wichtig, weil viele ubiquitinierte Proteine zunächst aus Membranen, Organellen oder stabilen Proteinkomplexen herausgelöst werden müssen.→ Erst nach dieser Extraktion können sie dem Proteasom zugeführt und effizient abgebaut werden.` },
  { id:'anki_v04_645', vl:'v04', cat:'Anki', source:'anki', q:`Wie ist das 26S-Proteasom aufgebaut?`, a:`Das 26S-Proteasom besteht aus einem 20S-Kernpartikel, das die proteolytisch aktiven Zentren enthält, und einem oder zwei 19S-Regulatorpartikeln, die für Erkennung, Entfaltung und Einschleusung ubiquitinierter Proteine verantwortlich sind.` },
  { id:'anki_v04_646', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat das 20S-Kernpartikel?`, a:`Im 20S-Kernpartikel findet die eigentliche Proteolyse statt.→ Es enthält proteolytisch aktive Zentren im Inneren, die Proteine in kurze Peptide zerlegen→ Die zylindrische Struktur sorgt dafür, dass der Abbau kontrolliert und abgeschirmt erfolgt→ Nur zuvor entfaltete Polypeptidketten können in das Innere gelangen und dort gespalten werden` },
  { id:'anki_v04_647', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat das 19S-Regulatorpartikel?`, a:`Das 19S-Regulatorpartikel übernimmt mehrere wichtige Schritte vor dem Abbau:→ Es erkennt ubiquitinierte Proteine (über die Ubiquitin-Kette)→ Es entfernt und recycelt Ubiquitin (durch DUBs)→ Es entfaltet das Substrat ATP-abhängig→ Es schleust die entfaltete Polypeptidkette in das 20S-Kernpartikel ein, wo anschließend die Proteolyse erfolgt` },
  { id:'anki_v04_648', vl:'v04', cat:'Anki', source:'anki', q:`Wo werden Proteine im Proteasom in kleinere Stücke zerlegt?`, a:`Proteine werden im 20S-Kernpartikel des Proteasoms in kurze Peptide gespalten, da sich dort die proteolytisch aktiven Zentren befinden.` },
  { id:'anki_v04_649', vl:'v04', cat:'Anki', source:'anki', q:`Welche Arten von Proteinen werden über das Ubiquitin-Proteasom-System abgebaut?`, a:`Über das UPS werden vor allem Proteine abgebaut, die entweder defekt sind oder gezielt reguliert werden sollen, z. B.:• fehlgefaltete Proteine• geschädigte oder oxidierte Proteine• regulatorische Proteine (z. B. Zellzyklusproteine)• kurzlebige Proteine• Membran- oder Organellenproteine nach vorheriger Extraktion (z. B. durch Cdc48/VCP)` },
  { id:'anki_v04_650', vl:'v04', cat:'Anki', source:'anki', q:`Welche Faktoren bestimmen die Lebensdauer von Proteinen?`, a:`Die Lebensdauer von Proteinen wird durch bestimmte strukturelle Merkmale und Signale beeinflusst, z. B.:• N-terminale Aminosäuren (N-End-Regel)• Degrons (spezifische Abbausignale im Protein)• PEST-Sequenzen (reich an Prolin, Glutamat, Serin, Threonin → oft kurzlebig)• posttranslationale Modifikationen (z. B. Ubiquitinylierung, Phosphorylierung)` },
  { id:'anki_v04_651', vl:'v04', cat:'Anki', source:'anki', q:`Was beschreibt die N-End-Regel?`, a:`Die N-End-Regel besagt, dass die N-terminale Aminosäure eines Proteins dessen Stabilität und Halbwertszeit bestimmt.→ Bestimmte Aminosäuren führen zu einem schnellen Abbau, während andere das Protein stabilisieren.` },
  { id:'anki_v04_652', vl:'v04', cat:'Anki', source:'anki', q:`Was sind Degrons?`, a:`Degrons sind spezifische Sequenz- oder Strukturmotive in Proteinen, die als Abbausignale dienen.→ Sie werden von Komponenten des Ubiquitin-Proteasom-Systems erkannt und führen dazu, dass das Protein gezielt ubiquitinyliert und anschließend abgebaut wird.` },
  { id:'anki_v04_653', vl:'v04', cat:'Anki', source:'anki', q:`Warum ist ein funktionierendes Ubiquitin-Proteasom-System für den menschlichen Körper wichtig?`, a:`Das UPS ist essenziell für die Aufrechterhaltung der Proteinhomöostase (Proteostase) und zahlreiche zelluläre Prozesse:• Abbau fehlgefalteter oder beschädigter Proteine (Qualitätskontrolle)• Regulation des Zellzyklus• Steuerung von Signaltransduktionswegen• Immunfunktion (z. B. Antigenprozessierung)→ Dadurch wird sichergestellt, dass Proteine zum richtigen Zeitpunkt in der richtigen Menge vorhanden sind.` },
  { id:'anki_v04_654', vl:'v04', cat:'Anki', source:'anki', q:`In welchen Krankheitsbereichen spielt das Ubiquitin-Proteasom-System eine wichtige Rolle?`, a:`Das UPS spielt eine zentrale Rolle bei verschiedenen Erkrankungen, insbesondere bei:• Proteinfehlfaltungserkrankungen (z. B. Aggregatbildung)• neurodegenerativen Erkrankungen (z. B. Alzheimer, Parkinson)• Krebserkrankungen (Störungen im Zellzyklus und in der Signalregulation)→ Fehlfunktionen des UPS führen dazu, dass defekte oder regulatorisch wichtige Proteine nicht korrekt abgebaut werden.` },
  { id:'anki_v04_655', vl:'v04', cat:'Anki', source:'anki', q:`Warum kann das Ubiquitin-Proteasom-System bei Proteinfehlfaltungserkrankungen überfordert sein?`, a:`Das UPS kann überfordert sein, weil sich große Mengen fehlgefalteter oder aggregationsanfälliger Proteine ansammeln.→ Diese Proteine können schlecht entfaltet oder schwer zugänglich sein und das System blockieren oder überlasten→ Dadurch wird der Abbau ineffizient, was zur weiteren Akkumulation toxischer Proteinaggregate führt` },
  { id:'anki_v04_656', vl:'v04', cat:'Anki', source:'anki', q:`Warum sind Krebszellen oft besonders empfindlich gegenüber einer Hemmung des UPS?`, a:`Krebszellen sind stark auf ein funktionierendes UPS angewiesen, da sie einen hohen Proteinstoffwechsel und viele fehlgefaltete oder regulatorisch veränderte Proteine besitzen.→ Eine Hemmung des UPS führt dazu, dass sich defekte Proteine ansammeln und wichtige Regulationsprozesse gestört werden→ Dies kann Zellstress auslösen und zum Zelltod (Apoptose) führen` },
  { id:'anki_v05_657', vl:'v05', cat:'Anki', source:'anki', q:`Was ist Autophagie?`, a:`Autophagie ist ein zellulärer Abbauprozess, bei dem eigene Zellbestandteile (z. B. Proteine oder Organellen) in Vesikeln eingeschlossen und anschließend im Lysosom abgebaut und recycelt werden.→ Sie dient der Qualitätskontrolle, der Energiegewinnung und der Anpassung an Stressbedingungen (z. B. Nährstoffmangel).` },
  { id:'anki_v05_658', vl:'v05', cat:'Anki', source:'anki', q:`Welche drei Formen der Autophagie gibt es?`, a:`Es werden drei Hauptformen der Autophagie unterschieden:• Makroautophagie → Bildung von Autophagosomen, die Zellbestandteile einschließen und mit Lysosomen fusionieren• Mikroautophagie → direkte Aufnahme von Zellmaterial durch Einstülpung der Lysosomenmembran• chaperonvermittelte Autophagie → selektiver Transport einzelner Proteine ins Lysosom mithilfe von Chaperonen` },
  { id:'anki_v05_659', vl:'v05', cat:'Anki', source:'anki', q:`Was ist Makroautophagie?`, a:`Bei der Makroautophagie werden zelluläre Bestandteile von einer doppelmembranigen Struktur umschlossen, wodurch ein Autophagosom entsteht.→ Dieses fusioniert anschließend mit einem Lysosom, in dem der Inhalt abgebaut und recycelt wird.` },
  { id:'anki_v05_660', vl:'v05', cat:'Anki', source:'anki', q:`Was ist Mikroautophagie?`, a:`Bei der Mikroautophagie nimmt das Lysosom zelluläre Bestandteile direkt auf, indem sich seine Membran einstülpt.→ Das aufgenommene Material wird anschließend im Lysosom abgebaut und recycelt.` },
  { id:'anki_v05_661', vl:'v05', cat:'Anki', source:'anki', q:`Was ist chaperon-vermittelte Autophagie?`, a:`Bei der chaperon-vermittelten Autophagie werden bestimmte, meist lösliche Proteine mit spezifischem Erkennungsmotiv von Chaperonen erkannt.→ Diese werden gezielt zum Lysosom transportiert, dort über Rezeptoren aufgenommen und selektiv abgebaut.` },
  { id:'anki_v05_662', vl:'v05', cat:'Anki', source:'anki', q:`Welche Schritte umfasst die Makroautophagie?`, a:`Die Makroautophagie verläuft in mehreren aufeinanderfolgenden Schritten:• Initiation → Aktivierung des Autophagie-Prozesses (z. B. bei Nährstoffmangel)• Bildung des Phagophors → erste Membranstruktur entsteht• Expansion → Membran wächst und umschließt das Material• Autophagosom-Bildung → abgeschlossene Doppelmembran vesikelisiert• Fusion mit Lysosom → Bildung eines Autolysosoms• Abbau und Recycling → Inhalt wird enzymatisch zerlegt und wiederverwertet` },
  { id:'anki_v05_663', vl:'v05', cat:'Anki', source:'anki', q:`Was ist ein Phagophor?`, a:`Ein Phagophor ist die frühe, noch offene Membranstruktur der Makroautophagie.→ Es entsteht zu Beginn des Prozesses und wächst kontinuierlich, um zelluläre Bestandteile zu umschließen→ Nach vollständigem Verschluss bildet es ein Autophagosom` },
  { id:'anki_v05_664', vl:'v05', cat:'Anki', source:'anki', q:`Was ist ein Autophagosom?`, a:`Ein Autophagosom ist ein doppelmembraniges Vesikel, das zelluläre Bestandteile (z. B. Proteine oder Organellen) einschließt.→ Es entsteht aus dem Phagophor und transportiert das Material zum Lysosom, wo es nach Fusion abgebaut wird` },
  { id:'anki_v05_665', vl:'v05', cat:'Anki', source:'anki', q:`Was ist ein Autolysosom?`, a:`Ein Autolysosom entsteht durch die Fusion eines Autophagosoms mit einem Lysosom.→ In diesem Kompartiment werden die eingeschlossenen Zellbestandteile durch lysosomale Enzyme abgebaut und die Bausteine anschließend recycelt.` },
  { id:'anki_v05_666', vl:'v05', cat:'Anki', source:'anki', q:`Unter welchen Bedingungen wird Autophagie in der Zelle aktiviert?`, a:`Autophagie wird vor allem bei Nährstoffmangel, zellulärem Stress und bei einer Anhäufung von geschädigten oder fehlgefalteten Zellbestandteilen aktiviert.→ Sie dient dann der Energiegewinnung und der Beseitigung defekter Strukturen.` },
  { id:'anki_v05_667', vl:'v05', cat:'Anki', source:'anki', q:`Wie reguliert TORC1 die Autophagie in Abhängigkeit vom Nährstoffstatus?`, a:`TORC1 (Target of Rapamycin Complex 1) ist ein zentraler Regulator der Autophagie:→ Bei guter Nährstoffversorgung ist TORC1 aktiv und hemmt die Autophagie→ Bei Nährstoffmangel wird TORC1 inaktiviert, wodurch die Autophagie aktiviert wird→ Damit koppelt TORC1 die Autophagie direkt an den Energie- und Nährstoffzustand der Zelle` },
  { id:'anki_v05_668', vl:'v05', cat:'Anki', source:'anki', q:`Warum wird Autophagie bei Nährstoffmangel aktiviert?`, a:`Bei Nährstoffmangel baut die Zelle gezielt eigene Bestandteile ab, um Aminosäuren, Lipide und Energie zurückzugewinnen.→ Dadurch kann sie überleben und wichtige Prozesse aufrechterhalten, obwohl von außen weniger Nährstoffe zur Verfügung stehen` },
  { id:'anki_v05_669', vl:'v05', cat:'Anki', source:'anki', q:`Welche Funktion hat Atg8/LC3 in der Autophagie?`, a:`Atg8/LC3 ist ein zentrales Protein der Autophagie, das an die Membran von Phagophoren und Autophagosomen gebunden wird.→ Es spielt eine wichtige Rolle bei der Membranexpansion und -stabilisierung→ Außerdem dient es als Marker für Autophagosomen und hilft bei der Erkennung und Aufnahme von abzubauendem Material` },
  { id:'anki_v05_670', vl:'v05', cat:'Anki', source:'anki', q:`Welche zellulären Bestandteile werden durch Autophagie abgebaut?`, a:`Durch Autophagie können verschiedene zelluläre Komponenten abgebaut und recycelt werden, z. B.:• Proteine• Proteinaggregate (z. B. Amyloid-β-Aggregate bei Alzheimer)• ganze Organellen (z. B. Mitochondrien)• Ribosomen• Lipidtröpfchen• beschädigte oder funktionslose Zellbestandteile` },
  { id:'anki_v05_671', vl:'v05', cat:'Anki', source:'anki', q:`Welche Organellen können gezielt durch Autophagie abgebaut werden?`, a:`Bestimmte Organellen können selektiv durch Autophagie entfernt werden, z. B.:• Mitochondrien (Mitophagie)• Peroxisomen (Pexophagie)• endoplasmatisches Retikulum (ER-Phagie)• Ribosomen (Ribophagie)→ Dieser selektive Abbau dient der Qualitätskontrolle und Anpassung an Zellstress.` },
  { id:'anki_v05_672', vl:'v05', cat:'Anki', source:'anki', q:`Wie ist die Autophagie mit anderen Proteinabbauwegen verknüpft?`, a:`Autophagie arbeitet eng mit anderen Abbauwegen der Zelle zusammen:→ Sie ist Teil des lysosomalen Abbausystems und eng mit dem endolysosomalen System verbunden→ Funktionell ergänzt sie das Ubiquitin-Proteasom-System (UPS):• UPS baut vor allem einzelne, kurzlebige oder fehlgefaltete Proteine ab• Autophagie entfernt eher größere Strukturen wie Aggregate oder ganze Organellen→ Beide Systeme sorgen gemeinsam für die Proteinhomöostase (Proteostase) der Zelle` },
  { id:'anki_v05_673', vl:'v05', cat:'Anki', source:'anki', q:`Welche Ubiquitin-Ketten sind besonders mit Autophagie verknüpft?`, a:`Vor allem K63-verknüpfte Polyubiquitin-Ketten sind mit der Autophagie assoziiert.→ Sie dienen häufig als Signal für den selektiven Abbau größerer Strukturen (z. B. Proteinaggregate oder Organellen) über den autophagischen Weg.` },
  { id:'anki_v05_674', vl:'v05', cat:'Anki', source:'anki', q:`Welche Funktion hat p62 in der selektiven Autophagie?`, a:`p62 (SQSTM1) ist ein Adapterprotein, das eine zentrale Rolle in der selektiven Autophagie spielt:→ Es bindet ubiquitinierte Proteine oder Aggregate→ Gleichzeitig interagiert es mit LC3 auf der Autophagosomenmembran→ Dadurch werden die Substrate gezielt in Autophagosomen eingebracht und abgebaut` },
  { id:'anki_v05_675', vl:'v05', cat:'Anki', source:'anki', q:`Welche Bedeutung hat Autophagie für die Proteostase?`, a:`Autophagie ist ein wichtiger Bestandteil der Proteostase, da sie große Proteinkomplexe, Aggregate und ganze Organellen abbaut, die vom UPS nicht effizient verarbeitet werden können.→ Sie ergänzt somit das Ubiquitin-Proteasom-System und trägt entscheidend zur Aufrechterhaltung der zellulären Qualität und Funktion bei.` },
  { id:'anki_v05_676', vl:'v05', cat:'Anki', source:'anki', q:`Welche Rolle spielt Autophagie im Alterungsprozess?`, a:`Mit zunehmendem Alter nimmt die Aktivität der Autophagie häufig ab.→ Dadurch werden geschädigte Proteine und Organellen weniger effizient abgebaut→ Dies führt zu einer Anreicherung zellulärer Schäden, die zur Funktionsverschlechterung von Zellen beitragen kann` },
  { id:'anki_v05_677', vl:'v05', cat:'Anki', source:'anki', q:`Welche Bedeutung hat Autophagie bei Krankheiten?`, a:`Autophagie spielt eine wichtige Rolle in verschiedenen Krankheitsprozessen:• neurodegenerative Erkrankungen (z. B. durch Anhäufung von Proteinaggregaten)• Stoffwechselstörungen• Krebserkrankungen (sowohl tumorhemmend als auch -fördernd möglich)• Alterungsprozesse→ Störungen der Autophagie führen dazu, dass zelluläre Schäden nicht ausreichend beseitigt werden.` },
  { id:'anki_v06_678', vl:'v06', cat:'Anki', source:'anki', q:`Wie ist das Ubiquitin-Proteasom-System am Abbau mitochondrialer Proteine beteiligt?`, a:`Das Ubiquitin-Proteasom-System (UPS) ist vor allem am Abbau von Proteinen der mitochondrialen Außenmembran beteiligt: Zunächst werden betroffene Proteine ubiquitinyliert Anschließend werden sie häufig durch Cdc48/VCP aus der Membran herausgelöst Danach erfolgt der Transport zum Proteasom und der Abbau→ Zusätzlich entfernt das UPS auch fehlgeleitete oder aus den Mitochondrien exportierte Proteine im ZytosolInsgesamt dient dieser Prozess der Qualitätskontrolle und Funktionssicherung der Mitochondrien` },
  { id:'anki_v06_679', vl:'v06', cat:'Anki', source:'anki', q:`Was versteht man unter „mitochondrial-associated degradation“ (MAD) im weiteren Sinn?`, a:`Unter „mitochondrial-associated degradation“ versteht man den UPS-abhängigen Abbau von Proteinen, die sich an den Mitochondrien befinden oder mit ihnen assoziiert sind.→ Dazu gehören vor allem Proteine der mitochondrialen Außenmembran sowie fehlgefaltete oder fehlgeleitete mitochondriale ProteineDer Prozess dient der Qualitätskontrolle und Aufrechterhaltung der mitochondrialen Funktion` },
  { id:'anki_v06_680', vl:'v06', cat:'Anki', source:'anki', q:`Welche Funktion hat Cdc48/VCP beim Abbau mitochondrialer Proteine?`, a:`Cdc48/VCP (p97) ist ein zentraler Faktor beim Abbau mitochondrialer Proteine:Es erkennt ubiquitinierte Proteine an der MitochondrienmembranEs extrahiert diese ATP-abhängig aus Membranen oder ProteinkomplexenAnschließend werden die Proteine dem Proteasom zum Abbau zugeführtDamit ermöglicht Cdc48/VCP den Zugang des UPS zu membrangebundenen mitochondrialen Proteinen` },
  { id:'anki_v06_681', vl:'v06', cat:'Anki', source:'anki', q:`Warum ist der proteasomale Abbau mitochondrialer Proteine wichtig?`, a:`Der proteasomale Abbau dient der Qualitätskontrolle der Mitochondrien:Er entfernt geschädigte, fehlgefaltete oder fehlplatzierte Proteine Dadurch wird die Funktionsfähigkeit der Mitochondrien erhalten Gleichzeitig wird die Anreicherung potenziell schädlicher Proteine verhindert` },
  { id:'anki_v06_682', vl:'v06', cat:'Anki', source:'anki', q:`Was sind intramitochondriale Proteasen?`, a:`Intramitochondriale Proteasen sind Proteasen innerhalb der Mitochondrien, die dort für die Qualitätskontrolle von Proteinen zuständig sind.Sie bauen beschädigte, fehlgefaltete oder nicht korrekt assemblierte Proteine direkt im Mitochondrium abDadurch tragen sie zur Aufrechterhaltung der mitochondrialen Funktion bei` },
  { id:'anki_v06_683', vl:'v06', cat:'Anki', source:'anki', q:`Nenne wichtige intramitochondriale Proteasen.`, a:`Wichtige intramitochondriale Proteasen sind:• LONP → Matrixprotease für Qualitätskontrolle und Abbau fehlgefalteter Proteine• CLPXP → ATP-abhängige Protease in der Matrix• m-AAA-Protease → wirkt an der inneren Mitochondrienmembran (Matrixseite)• i-AAA-Protease → wirkt an der inneren Membran (Intermembranraum-Seite)• HTRA2 (Omi) → Protease im Intermembranraum, auch an Stress- und Apoptoseprozessen beteiligt` },
  { id:'anki_v06_684', vl:'v06', cat:'Anki', source:'anki', q:`Wo befinden sich intramitochondriale Proteasen?`, a:`Intramitochondriale Proteasen befinden sich in verschiedenen Kompartimenten der Mitochondrien:→ Matrix (z. B. LONP, CLPXP)→ innere Mitochondrienmembran• m-AAA-Proteasen → zur Matrix hin orientiert• i-AAA-Proteasen → zum Intermembranraum hin orientiert→ Intermembranraum (z. B. HTRA2)Dadurch können sie Proteine in unterschiedlichen mitochondrialen Bereichen überwachen und abbauen` },
  { id:'anki_v06_685', vl:'v06', cat:'Anki', source:'anki', q:`Welche Funktion haben intramitochondriale Proteasen?`, a:`Intramitochondriale Proteasen übernehmen die Qualitätskontrolle innerhalb der Mitochondrien:Sie bauen geschädigte, fehlgefaltete oder nicht korrekt assemblierte Proteine abDadurch sichern sie die Funktionsfähigkeit und Stabilität der Mitochondrien` },
  { id:'anki_v06_686', vl:'v06', cat:'Anki', source:'anki', q:`Wie können intramitochondriale Proteasen zum Abbau zytosolischer Proteinaggregate beitragen?`, a:`Bestimmte fehlgefaltete oder aggregationsanfällige Proteine aus dem Zytosol können in die Mitochondrien importiert werden.→ Dort werden sie von intramitochondrialen Proteasen erkannt und abgebaut→ Dieser Mechanismus ergänzt andere Abbauwege wie das UPS und die AutophagieEr trägt somit zur Entlastung des Zytosols und zur Proteostase bei` },
  { id:'anki_v06_687', vl:'v06', cat:'Anki', source:'anki', q:`Was beschreibt das Konzept „mitochondria as guardian in cytosol“ (MAGIC)?`, a:`Das Konzept „mitochondria as guardian in cytosol (MAGIC)“ beschreibt, dass Mitochondrien unter bestimmten Bedingungen zur Proteinhomöostase im Zytosol beitragen.Sie können fehlgefaltete oder aggregationsgefährdete Proteine aufnehmenDiese werden anschließend durch intramitochondriale Proteasen abgebautDadurch wird das Zytosol entlastet und vor toxischen Proteinaggregaten geschützt` },
  { id:'anki_v06_688', vl:'v06', cat:'Anki', source:'anki', q:`Warum ist auch der mitochondriale Proteinabbau für die Proteostase wichtig?`, a:`Der mitochondriale Proteinabbau ist wichtig, weil Mitochondrien sowohl eine Quelle von Proteinschäden als auch Teil der zellulären Qualitätskontrolle sind.→ In Mitochondrien entstehen durch Stoffwechselprozesse (z. B. ROS) häufig geschädigte Proteine→ Gleichzeitig tragen sie durch eigene Proteasen und Mechanismen wie MAGIC zur Entfernung fehlgefalteter Proteine beiDadurch leisten Mitochondrien einen wichtigen Beitrag zur gesamten Proteostase der Zelle` },
  { id:'anki_v06_689', vl:'v06', cat:'Anki', source:'anki', q:`Welche Krankheitsrelevanz haben Defekte im mitochondrialen Proteinabbau?`, a:`Defekte im mitochondrialen Proteinabbau können zu einer Störung der mitochondrialen Funktion und der Proteostase führen. Es kommt zur Anreicherung geschädigter oder fehlgefalteter ProteineDie Energieproduktion und andere mitochondriale Prozesse werden beeinträchtigtBesonders betroffen sind energieabhängige Gewebe, z. B. das Nervensystem, weshalb solche Defekte häufig mit neurologischen Erkrankungen assoziiert sind` },
  { id:'anki_v07_690', vl:'v07', cat:'Anki', source:'anki', q:`Was versteht man unter Proteinaggregation?`, a:`Unter Proteinaggregation versteht man die Zusammenlagerung fehlgefalteter oder instabiler Proteine zu größeren, oft unlöslichen Komplexen.→ Diese Aggregate entstehen, wenn hydrophobe Bereiche exponiert sind und miteinander interagieren→ Sie können die Zellfunktion stören und sind häufig mit Erkrankungen verbunden` },
  { id:'anki_v07_691', vl:'v07', cat:'Anki', source:'anki', q:`Warum entstehen Proteinaggregate in Zellen?`, a:`Proteinaggregate entstehen, wenn Proteine fehlgefaltet sind und hydrophobe Bereiche freiliegen.Diese lagern sich zusammen, da hydrophobe Bereiche den Kontakt mit Wasser vermeiden.` },
  { id:'anki_v07_692', vl:'v07', cat:'Anki', source:'anki', q:`Warum sind Proteinaggregate für Zellen gefährlich?`, a:`Proteinaggregate sind problematisch, weil sie zelluläre Prozesse stören und toxisch wirken können.Sie können:• wichtige Proteine inaktivieren oder binden• zelluläre Strukturen beeinträchtigen• die Proteostase überlasten→ Insgesamt kann das zu Funktionsverlust und Zellschädigung führen` },
  { id:'anki_v07_693', vl:'v07', cat:'Anki', source:'anki', q:`Welche Mechanismen schützen Zellen vor Proteinaggregation?`, a:`Zellen besitzen mehrere Schutzsysteme, die die Bildung von Proteinaggregaten verhindern:• molekulare Chaperone → unterstützen die korrekte Faltung und verhindern Aggregation• Ubiquitin-Proteasom-System (UPS) → baut fehlgefaltete Proteine gezielt ab• Autophagie → entfernt größere Aggregate und beschädigte Zellbestandteile` },
  { id:'anki_v07_694', vl:'v07', cat:'Anki', source:'anki', q:`Was bedeutet Sequestrierung von Proteinen?`, a:`Sequestrierung bedeutet, dass potenziell toxische oder fehlgefaltete Proteine gezielt isoliert werden.→ Sie werden in bestimmte Zellkompartimente oder Aggregate eingeschlossen, um die restliche Zelle zu schützen.` },
  { id:'anki_v07_695', vl:'v07', cat:'Anki', source:'anki', q:`Welche Funktion hat die Sequestrierung von Proteinaggregaten?`, a:`Die Sequestrierung dient dazu, potenziell toxische Proteinaggregate zu isolieren.→ Dadurch werden wichtige zelluläre Prozesse geschützt, da die Aggregate nicht frei im Zytosol wirken können` },
  { id:'anki_v07_696', vl:'v07', cat:'Anki', source:'anki', q:`Welche Beziehung besteht zwischen Proteinaggregation und Proteinfaltung?`, a:`Proteinaggregation entsteht häufig dann, wenn die Proteinfaltung versagt.→ Wenn Chaperone fehlgefaltete Proteine nicht mehr korrekt falten oder stabilisieren können,→ lagern sich diese Proteine zusammen und bilden Aggregate` },
  { id:'anki_v07_697', vl:'v07', cat:'Anki', source:'anki', q:`Wie sind Proteinabbauwege mit der Bildung von Aggregaten verknüpft?`, a:`Proteinaggregate entstehen häufig dann, wenn die Abbausysteme der Zelle (UPS und Autophagie) nicht mehr ausreichen.→ Werden fehlgefaltete Proteine nicht rechtzeitig abgebaut,→ lagern sie sich zusammen und bilden Aggregate` },
  { id:'anki_v07_698', vl:'v07', cat:'Anki', source:'anki', q:`Was versteht man unter physiologischen Proteinaggregaten?`, a:`Physiologische Proteinaggregate sind gezielt gebildete, funktionelle Proteinansammlungen, die keine schädliche Wirkung haben.Sie erfüllen normale Aufgaben, z. B. in Signalprozessen oder der Organisation von Zellstrukturen.` },
  { id:'anki_v07_699', vl:'v07', cat:'Anki', source:'anki', q:`Nenne Beispiele für funktionelle Proteinaggregate.`, a:`Beispiele sind RNA-Granula und Stressgranula, die an der Regulation von mRNA und der Stressantwort beteiligt sind.` },
  { id:'anki_v07_700', vl:'v07', cat:'Anki', source:'anki', q:`Welche Rolle spielen Proteinaggregate bei der Zellteilung?`, a:`Proteinaggregate können bei der Zellteilung asymmetrisch auf Tochterzellen verteilt werden.→ Dadurch bleibt eine Zelle stärker belastet, während die andere funktionstüchtiger bleibt` },
  { id:'anki_v07_701', vl:'v07', cat:'Anki', source:'anki', q:`Was versteht man unter asymmetrischer Proteinvererbung?`, a:`Darunter versteht man die ungleiche Verteilung von Proteinen (z. B. Aggregaten) auf Tochterzellen während der Zellteilung.→ Bestimmte Zellbestandteile werden gezielt nur an eine Tochterzelle weitergegeben, wodurch sich die beiden Zellen funktionell unterscheiden` },
  { id:'anki_v07_702', vl:'v07', cat:'Anki', source:'anki', q:`Warum ist asymmetrische Proteinvererbung vorteilhaft?`, a:`Sie sorgt dafür, dass eine Tochterzelle möglichst frei von beschädigten oder aggregierten Proteinen bleibt.→ Dadurch bleibt diese Zelle funktionsfähig, während die andere die Schäden „übernimmt“` },
  { id:'anki_v07_703', vl:'v07', cat:'Anki', source:'anki', q:`Welche Verbindung besteht zwischen Proteinaggregation und Alterung?`, a:`Mit zunehmendem Alter lässt die Proteinhomöostase nach.→ Abbausysteme wie UPS und Autophagie arbeiten weniger effizient→ Fehlgefaltete Proteine werden schlechter entfernt und aggregieren leichterDies führt zur Anreicherung von Proteinaggregaten, die zur Zellalterung beitragen` },
  { id:'anki_v07_704', vl:'v07', cat:'Anki', source:'anki', q:`Welche Krankheiten sind besonders mit Proteinaggregation verbunden?`, a:`Vor allem neurodegenerative Erkrankungen sind eng mit Proteinaggregation verknüpft, z. B.:• Alzheimer-Krankheit• Parkinson-Krankheit• Huntington-Krankheit→ Dabei führen Proteinaggregate zur Schädigung von Nervenzellen` },
  { id:'anki_v07_705', vl:'v07', cat:'Anki', source:'anki', q:`Warum sind Nervenzellen besonders anfällig für Proteinaggregate?`, a:`Nervenzellen sind besonders anfällig, weil sie sehr langlebig sind und sich kaum teilen.→ Dadurch können sich fehlgefaltete Proteine und Aggregate über lange Zeit ansammeln→ Zusätzlich ist ihre Funktion stark von einer intakten Proteinhomöostase abhängig` },
  { id:'anki_v08_706', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter Proteostase?`, a:`Proteostase bezeichnet das Gleichgewicht zwischen Proteinsynthese, korrekter Faltung und Abbau von Proteinen.→ Sie stellt sicher, dass Proteine in der richtigen Menge, Form und zum richtigen Zeitpunkt vorhanden sind` },
  { id:'anki_v08_707', vl:'v08', cat:'Anki', source:'anki', q:`Welche Prozesse tragen zur Proteostase bei?`, a:`Zur Proteostase gehören mehrere miteinander verknüpfte Prozesse:• Proteinsynthese → Bildung neuer Proteine• Proteinfaltung → korrekte Ausbildung der Struktur (z. B. durch Chaperone)• Qualitätskontrolle → Erkennen fehlgefalteter Proteine• Ubiquitin-Proteasom-System (UPS) → Abbau einzelner Proteine• Autophagie → Abbau größerer Strukturen und Aggregate` },
  { id:'anki_v08_708', vl:'v08', cat:'Anki', source:'anki', q:`Warum ist Proteostase für Zellen wichtig?`, a:`Proteostase ist wichtig, weil sie die Anreicherung fehlgefalteter oder beschädigter Proteine verhindert.→ Dadurch bleiben Zellfunktionen stabil und schädliche Effekte durch Proteinaggregate werden vermieden` },
  { id:'anki_v08_709', vl:'v08', cat:'Anki', source:'anki', q:`Was ist eine transkriptionelle Stressantwort?`, a:`Eine transkriptionelle Stressantwort ist eine gezielte Veränderung der Genexpression bei Zellstress.→ Dabei werden vor allem Gene aktiviert, die Schutzmechanismen unterstützen (z. B. Chaperone, Abbauwege)` },
  { id:'anki_v08_710', vl:'v08', cat:'Anki', source:'anki', q:`Welche Rolle spielen Hitzeschockproteine bei Stressantworten?`, a:`Hitzeschockproteine wirken als molekulare Chaperone, die Proteine stabilisieren und ihre korrekte Faltung unterstützen.→ Sie verhindern die Aggregation fehlgefalteter Proteine und helfen bei deren Refolding oder Weiterleitung zum Abbau` },
  { id:'anki_v08_711', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter molekularem Altern?`, a:`Molekulares Altern beschreibt Veränderungen und Schäden auf molekularer Ebene, die sich im Laufe der Zeit ansammeln.Dazu gehören z. B.:• DNA-Schäden• Proteinfehlfaltung und -aggregation• Störungen der Proteostase` },
  { id:'anki_v08_712', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter zellulärem Altern?`, a:`Zelluläres Altern beschreibt Veränderungen innerhalb einzelner Zellen, die im Laufe der Zeit zu einem Funktionsverlust führen.→ Betroffene Zellen zeigen oft eine verminderte Teilungsfähigkeit und eingeschränkte Funktion` },
  { id:'anki_v08_713', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter organismischem Altern?`, a:`Organismisches Altern beschreibt die Alterung des gesamten Organismus.→ Sie entsteht durch die Anhäufung von Schäden auf zellulärer und molekularer Ebene und führt zu einem allmählichen Funktionsverlust von Geweben und Organen` },
  { id:'anki_v08_714', vl:'v08', cat:'Anki', source:'anki', q:`Welche Faktoren können zu Proteinschäden führen?`, a:`Proteinschäden können durch verschiedene Ursachen entstehen, z. B.:• oxidative Schäden (z. B. durch ROS)• Fehlfaltung• Mutationen (veränderte Aminosäuresequenz)• metabolischer Stress` },
  { id:'anki_v08_715', vl:'v08', cat:'Anki', source:'anki', q:`Was sind freie Radikale?`, a:`Freie Radikale sind hochreaktive Moleküle oder Atome mit ungepaarten Elektronen.→ Sie reagieren leicht mit anderen Molekülen und können dabei Zellbestandteile wie Proteine, Lipide oder DNA schädigen` },
  { id:'anki_v08_716', vl:'v08', cat:'Anki', source:'anki', q:`Welche Rolle spielen freie Radikale im Alterungsprozess?`, a:`Freie Radikale tragen zur Alterung bei, indem sie DNA, Proteine und Lipide schädigen.→ Diese Schäden akkumulieren mit der Zeit und führen zu einer Verschlechterung zellulärer Funktionen` },
  { id:'anki_v08_717', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter der freien Radikaltheorie des Alterns?`, a:`Die freie Radikaltheorie besagt, dass reaktive Sauerstoffspezies (freie Radikale) im Laufe der Zeit kumulative Schäden an Zellbestandteilen verursachen.→ Diese oxidativen Schäden (z. B. an DNA, Proteinen und Lipiden) tragen wesentlich zum Alterungsprozess bei` },
  { id:'anki_v08_718', vl:'v08', cat:'Anki', source:'anki', q:`Was ist die mitochondriale Theorie des Alterns?`, a:`Diese Theorie besagt, dass Schäden an Mitochondrien (z. B. an der mitochondrialen DNA) zur Alterung beitragen.→ Dadurch wird die Energieproduktion beeinträchtigt und es entstehen vermehrt reaktive Sauerstoffspezies (ROS)→ Dies verstärkt wiederum zelluläre Schäden und Alterungsprozesse` },
  { id:'anki_v08_719', vl:'v08', cat:'Anki', source:'anki', q:`Warum ist mitochondriale DNA besonders anfällig für Mutationen?`, a:`Mitochondriale DNA ist besonders anfällig, weil sie nahe an der Elektronentransportkette liegt, wo viele reaktive Sauerstoffspezies (ROS) entstehen.Zudem besitzt sie weniger effiziente Reparaturmechanismen als die nukleäre DNA.` },
  { id:'anki_v08_720', vl:'v08', cat:'Anki', source:'anki', q:`Was versteht man unter nicht-enzymatischer Glykierung?`, a:`Nicht-enzymatische Glykierung ist die spontane, nicht regulierte Anheftung von Zuckern an Proteine (oder andere Biomoleküle).→ Dabei entstehen veränderte, oft funktionell eingeschränkte Moleküle, die zur Alterung und zu Krankheiten beitragen können` },
  { id:'anki_v08_721', vl:'v08', cat:'Anki', source:'anki', q:`Warum ist nicht-enzymatische Glykierung problematisch?`, a:`Sie verändert Struktur und Funktion von Proteinen und kann deren Aktivität beeinträchtigen.→ Dadurch entstehen oft schwer abbaubare, geschädigte Proteine, die sich in der Zelle anreichern können` },
  { id:'anki_v08_722', vl:'v08', cat:'Anki', source:'anki', q:`Welche Rolle spielt Glykierung bei Diabetes?`, a:`Bei erhöhtem Blutzucker kommt es verstärkt zur nicht-enzymatischen Glykierung von Proteinen.→ Dabei entstehen AGEs (Advanced Glycation Endproducts)→ Diese verändern Proteine dauerhaft und können Gewebe schädigen (z. B. Gefäße, Nerven)` },
  { id:'anki_v08_723', vl:'v08', cat:'Anki', source:'anki', q:`Welche Mechanismen verhindern die Anreicherung beschädigter Proteine?`, a:`Zellen besitzen mehrere Schutzsysteme, um beschädigte Proteine zu kontrollieren und zu entfernen:• Chaperone → unterstützen die korrekte Faltung und verhindern Aggregation• Ubiquitin-Proteasom-System (UPS) → baut einzelne defekte Proteine gezielt ab• Autophagie → entfernt größere Strukturen wie Aggregate oder beschädigte Organellen` },
  { id:'anki_v08_724', vl:'v08', cat:'Anki', source:'anki', q:`Warum nimmt die Proteostase im Alter ab?`, a:`Mit zunehmendem Alter werden Qualitätskontrolle und Abbausysteme (z. B. Chaperone, UPS, Autophagie) weniger effizient.→ Fehlgefaltete Proteine werden schlechter repariert oder entfernt→ Dadurch kommt es zur Anreicherung von Schäden und Aggregaten` },
  { id:'anki_v09_725', vl:'v09', cat:'Anki', source:'anki', q:`Was sind neurodegenerative Erkrankungen?`, a:`Neurodegenerative Erkrankungen sind Krankheiten, bei denen es zu einem fortschreitenden Verlust von Nervenzellen (Neuronen) kommt.→ Dies führt zu zunehmenden Funktionsstörungen, z. B. in Bewegung, Gedächtnis oder Kognition` },
  { id:'anki_v09_726', vl:'v09', cat:'Anki', source:'anki', q:`Welche Faktoren erhöhen das Risiko für neurodegenerative Erkrankungen?`, a:`Wichtige Risikofaktoren sind:• Alter (wichtigster Faktor)• genetische Faktoren• Umweltfaktoren (z. B. Toxine, Lebensstil)` },
  { id:'anki_v09_727', vl:'v09', cat:'Anki', source:'anki', q:`Welche molekularen Merkmale zeigen viele neurodegenerative Erkrankungen?`, a:`Viele neurodegenerative Erkrankungen sind durch Proteinfehlfaltung und die Bildung von Aggregaten gekennzeichnet.→ Diese Aggregate wirken oft toxisch auf Nervenzellen und stören wichtige Zellfunktionen` },
  { id:'anki_v09_728', vl:'v09', cat:'Anki', source:'anki', q:`Warum gelten viele neurodegenerative Erkrankungen als Proteinfehlfaltungserkrankungen?`, a:`Weil fehlgefaltete Proteine zu unlöslichen, oft toxischen Aggregaten zusammenlagern.→ Diese Aggregate stören Zellfunktionen und tragen zum Absterben von Nervenzellen bei` },
  { id:'anki_v09_729', vl:'v09', cat:'Anki', source:'anki', q:`Welche Krankheit ist besonders mit β-Amyloid-Aggregaten verbunden?`, a:`Die Alzheimer-Krankheit ist besonders mit der Bildung von β-Amyloid-Aggregaten (Plaques) verknüpft.` },
  { id:'anki_v09_730', vl:'v09', cat:'Anki', source:'anki', q:`Was sind die zwei wichtigsten pathologischen Marker der Alzheimer-Erkrankung?`, a:`• Amyloid-Plaques → extrazelluläre Ablagerungen aus β-Amyloid• Tau-Fibrillen (Neurofibrillen) → intrazelluläre Aggregate aus fehlgefaltetem Tau-Protein` },
  { id:'anki_v09_731', vl:'v09', cat:'Anki', source:'anki', q:`Woraus bestehen Amyloid-Plaques?`, a:`Amyloid-Plaques bestehen hauptsächlich aus β-Amyloid-Peptiden, die aus dem Amyloid-Vorläuferprotein (APP) entstehen und sich zu unlöslichen Aggregaten zusammenlagern.` },
  { id:'anki_v09_732', vl:'v09', cat:'Anki', source:'anki', q:`Was sind Tau-Fibrillen?`, a:`Tau-Fibrillen sind intrazelluläre Aggregate aus fehlgefaltetem Tau-Protein.→ Sie entstehen durch abnorme (oft hyper-)Phosphorylierung von Tau→ Dadurch verliert Tau seine Funktion bei der Stabilisierung von Mikrotubuli und lagert sich zu Fibrillen zusammen` },
  { id:'anki_v09_733', vl:'v09', cat:'Anki', source:'anki', q:`Was beschreibt die β-Amyloid-Kaskadenhypothese?`, a:`Die β-Amyloid-Kaskadenhypothese besagt, dass die Ablagerung und Aggregation von β-Amyloid ein früher und zentraler Auslöser der Alzheimer-Erkrankung ist.→ Diese Aggregation führt zu weiteren Prozessen wie Tau-Pathologie, Entzündung und Nervenzellschädigung` },
  { id:'anki_v09_734', vl:'v09', cat:'Anki', source:'anki', q:`Welche genetischen Befunde stützen die β-Amyloid-Kaskadenhypothese?`, a:`Mutationen in APP, Presenilin-1 und Presenilin-2 führen zu einer erhöhten Bildung von β-Amyloid.→ Dies unterstützt die Annahme, dass β-Amyloid eine zentrale Rolle im Krankheitsbeginn der Alzheimer-Erkrankung spielt` },
  { id:'anki_v09_735', vl:'v09', cat:'Anki', source:'anki', q:`Welche Kritik gibt es an der β-Amyloid-Kaskadenhypothese?`, a:`Die Hypothese kann nicht alle Beobachtungen vollständig erklären:• Amyloid-Plaques korrelieren nicht immer mit dem Schweregrad der Erkrankung• Es gibt Patienten mit Plaques, aber ohne starke Symptome• Andere Faktoren (z. B. Tau-Pathologie, Entzündung) spielen ebenfalls eine wichtige RolleDaher gilt Alzheimer heute als multifaktoriell und nicht ausschließlich Amyloid-getrieben` },
  { id:'anki_v09_736', vl:'v09', cat:'Anki', source:'anki', q:`Welche Krankheit ist durch Degeneration von Motoneuronen gekennzeichnet?`, a:`Die Amyotrophe Lateralsklerose (ALS) ist eine Erkrankung, die durch den fortschreitenden Verlust von Motoneuronen gekennzeichnet ist.` },
  { id:'anki_v09_737', vl:'v09', cat:'Anki', source:'anki', q:`Welche Rolle spielt TDP-43 bei ALS?`, a:`TDP-43 bildet in Nervenzellen fehlgefaltete, pathologische Proteinaggregate.Gleichzeitig geht die normale Funktion von TDP-43 verloren (z. B. in der RNA-Verarbeitung)Beides trägt zur Schädigung und zum Absterben von Nervenzellen bei` },
  { id:'anki_v09_738', vl:'v09', cat:'Anki', source:'anki', q:`Welche normale Funktion hat TDP-43?`, a:`TDP-43 ist ein RNA-bindendes Protein, das an der Verarbeitung von RNA beteiligt ist.→ Dazu gehören u. a. Splicing, Stabilität und Transport von mRNA` },
  { id:'anki_v09_739', vl:'v09', cat:'Anki', source:'anki', q:`Warum ist TDP-43-Aggregation problematisch?`, a:`TDP-43-Aggregation ist schädlich, weil sie zwei Effekte gleichzeitig verursacht:• Funktionsverlust → normales TDP-43 fehlt für die RNA-Verarbeitung• toxischer Effekt → Aggregate stören zelluläre Prozesse→ Beides trägt zur Schädigung von Nervenzellen bei` },
  { id:'anki_v09_740', vl:'v09', cat:'Anki', source:'anki', q:`Welche Verbindung besteht zwischen Proteostase und neurodegenerativen Erkrankungen?`, a:`Störungen der Proteostase führen dazu, dass fehlgefaltete Proteine nicht ausreichend gefaltet oder abgebaut werden.→ Dadurch kommt es zur Anreicherung toxischer Proteinaggregate, die Nervenzellen schädigen` },
  { id:'anki_v09_741', vl:'v09', cat:'Anki', source:'anki', q:`Warum ist Alter der wichtigste Risikofaktor für neurodegenerative Erkrankungen?`, a:`Mit zunehmendem Alter nimmt die Effizienz der Proteostase ab.Chaperone, UPS und Autophagie arbeiten weniger effektivFehlgefaltete Proteine werden schlechter entfernt und aggregieren leichter→ Dadurch steigt das Risiko für neurodegenerative Erkrankungen` },
  { id:'anki_v09_742', vl:'v09', cat:'Anki', source:'anki', q:`Welche zellulären Systeme versuchen Proteinaggregate bei neurodegenerativen Erkrankungen zu entfernen?`, a:`Vor allem das Ubiquitin-Proteasom-System (UPS) und die Autophagie sind daran beteiligt.→ Das UPS baut vor allem einzelne fehlgefaltete Proteine ab→ Die Autophagie entfernt eher größere Aggregate und beschädigte Zellbestandteile` },
  { id:'anki_v09_743', vl:'v09', cat:'Anki', source:'anki', q:`Warum sind Nervenzellen (neuronale Zellen) besonders empfindlich gegenüber Störungen der Proteostase?`, a:`Nervenzellen sind besonders anfällig, weil sie sehr langlebig sind und sich kaum teilen.Schäden können daher nicht durch Zellteilung „verdünnt“ werdenFehlgefaltete Proteine und Aggregate akkumulieren über die Zeit` },
  { id:'anki_v09_744', vl:'v09', cat:'Anki', source:'anki', q:`Warum ist das Verständnis von Proteinfehlfaltung wichtig für Therapien?`, a:`Viele Therapien zielen darauf ab, Proteinaggregation zu verhindern oder vorhandene Aggregate abzubauen.→ Ein gutes Verständnis der Fehlfaltung hilft, gezielt in Krankheitsprozesse einzugreifen (z. B. Stabilisierung von Proteinen oder Förderung des Abbaus)` },
  { id:'anki_a01_745', vl:'a01', cat:'Anki', source:'anki', q:`Wie ist Myoglobin aufgebaut?`, a:`Myoglobin ist ein monomeres Protein mit 153 Aminosäuren, das überwiegend aus α-Helices aufgebaut ist.Es enthält eine Hämgruppe mit einem Fe²⁺-Ion, an die Sauerstoff (O₂) binden kann.` },
  { id:'anki_a01_746', vl:'a01', cat:'Anki', source:'anki', q:`Welche Funktion hat Myoglobin?`, a:`Myoglobin dient der Speicherung von Sauerstoff (O₂) im Muskel und erleichtert zusätzlich die Diffusion von O₂ innerhalb der Muskelzellen.Dadurch wird eine kontinuierliche Sauerstoffversorgung für die Energiegewinnung sichergestellt.` },
  { id:'anki_a01_747', vl:'a01', cat:'Anki', source:'anki', q:`Wie ist Hämoglobin aufgebaut und was ist daran besonders?`, a:`Hämoglobin ist ein tetrameres Protein, das aus 2 α- und 2 β-Untereinheiten besteht.Jede Untereinheit enthält eine Hämgruppe mit Fe²⁺, sodass insgesamt vier Sauerstoffmoleküle (O₂) gebunden werden können.Die Untereinheiten ermöglichen zudem kooperative Bindung von Sauerstoff.` },
  { id:'anki_a01_748', vl:'a01', cat:'Anki', source:'anki', q:`Wie viele O₂-Moleküle kann ein Hämoglobin binden?`, a:`Hämoglobin kann bis zu 4 O₂-Moleküle binden, da jede der vier Untereinheiten eine Hämgruppe mit Fe²⁺ enthält, die jeweils ein Sauerstoffmolekül binden kann.` },
  { id:'anki_a01_749', vl:'a01', cat:'Anki', source:'anki', q:`Was ist der wichtigste strukturelle Unterschied zwischen Myoglobin und Hämoglobin?`, a:`Der wichtigste Unterschied ist:• Myoglobin → monomeres Protein (eine Polypeptidkette)• Hämoglobin → tetrameres Protein (4 Untereinheiten: 2 α + 2 β)Diese unterschiedliche Struktur ermöglicht beim Hämoglobin zusätzlich eine kooperative Sauerstoffbindung, die Myoglobin nicht besitzt.` },
  { id:'anki_a01_750', vl:'a01', cat:'Anki', source:'anki', q:`Wie unterscheiden sich die O₂-Bindungskurven von Myoglobin und Hämoglobin?`, a:`Die O₂-Bindungskurven unterscheiden sich deutlich:• Myoglobin → hyperbolische Kurve, da es keine Kooperativität zeigt• Hämoglobin → sigmoidale (S-förmige) Kurve, aufgrund kooperativer Sauerstoffbindung zwischen den UntereinheitenDadurch kann Hämoglobin Sauerstoff effizient aufnehmen und wieder abgeben.` },
  { id:'anki_a01_751', vl:'a01', cat:'Anki', source:'anki', q:`Warum zeigt Hämoglobin eine sigmoide Bindungskurve?`, a:`Hämoglobin zeigt eine sigmoide Bindungskurve, weil es positive Kooperativität besitzt: Die Bindung eines O₂-Moleküls an eine Untereinheit erhöht die Affinität der übrigen Untereinheiten für weiteren Sauerstoff.` },
  { id:'anki_a01_752', vl:'a01', cat:'Anki', source:'anki', q:`Was bedeutet Kooperativität bei Hämoglobin?`, a:`Kooperativität bedeutet, dass die Bindung eines O₂-Moleküls an Hämoglobin die Affinität der übrigen Bindungsstellen erhöht, sodass weiterer Sauerstoff leichter gebunden wird.` },
  { id:'anki_a01_753', vl:'a01', cat:'Anki', source:'anki', q:`Welche Konformationszustände besitzt Hämoglobin und was bedeuten sie?`, a:`Hämoglobin kann zwischen zwei Zuständen wechseln:• T-Zustand (tense) → niedrige O₂-Affinität, stabil ohne gebundenen Sauerstoff• R-Zustand (relaxed) → hohe O₂-Affinität, stabil bei gebundenem SauerstoffDie O₂-Bindung fördert den Übergang vom T- in den R-Zustand.` },
  { id:'anki_a01_754', vl:'a01', cat:'Anki', source:'anki', q:`Was passiert beim Übergang vom T- zum R-Zustand bei Hämoglobin?`, a:`Beim Übergang vom T-Zustand zum R-Zustand kommt es zu einer Konformationsänderung der Proteinstruktur, die die O₂-Affinität erhöht. Dadurch wird die Bindung weiteren Sauerstoffs erleichtert (Kooperativität).` },
  { id:'anki_a01_755', vl:'a01', cat:'Anki', source:'anki', q:`Was ist der Bohr-Effekt (Hämagllobin) und welche Bedeutung hat er?`, a:`Der Bohr-Effekt beschreibt die Senkung der O₂-Affinität von Hämoglobin bei niedrigem pH (hohem CO₂-Gehalt).Dadurch wird Sauerstoff besonders in stoffwechselaktiven Geweben leichter abgegeben.` },
  { id:'anki_a01_756', vl:'a01', cat:'Anki', source:'anki', q:`Welche physiologische Bedeutung hat der Bohr-Effekt?`, a:`Der Bohr-Effekt erleichtert die Abgabe von O₂ im Gewebe, insbesondere dort, wo durch hohen Stoffwechsel viel CO₂ und ein niedriger pH vorliegen.` },
  { id:'anki_a01_757', vl:'a01', cat:'Anki', source:'anki', q:`Wie beeinflusst CO₂ die O₂-Bindung von Hämoglobin?`, a:`CO₂ senkt die O₂-Affinität von Hämoglobin durch zwei Mechanismen:• Carbamatbildung an Hämoglobin stabilisiert den T-Zustand• Bildung von H⁺ führt zu pH-Abfall (Bohr-Effekt)→ Dadurch wird die O₂-Abgabe im Gewebe erleichtert.` },
  { id:'anki_a01_758', vl:'a01', cat:'Anki', source:'anki', q:`Welche Rolle spielt 2,3-Bisphosphoglycerat (BPG) bei Hämoglobin?`, a:`2,3-Bisphosphoglycerat (BPG) bindet an Hämoglobin und stabilisiert den T-Zustand (niedrige O₂-Affinität).→ Dadurch wird die O₂-Abgabe im Gewebe erleichtert.` },
  { id:'anki_a01_759', vl:'a01', cat:'Anki', source:'anki', q:`Wann steigt die BPG-Konzentration physiologisch und warum?`, a:`Die BPG-Konzentration steigt bei Hypoxie oder Höhenaufenthalt, also bei niedrigem Sauerstoffangebot.→ Dadurch wird die O₂-Affinität von Hämoglobin gesenkt und die Sauerstoffabgabe im Gewebe verbessert.` },
  { id:'anki_a01_760', vl:'a01', cat:'Anki', source:'anki', q:`Warum ist fetales Hämoglobin (HbF) besonders?`, a:`Fetales Hämoglobin (HbF) besitzt eine höhere O₂-Affinität als adultes Hämoglobin (HbA).→ Dadurch kann der Fetus Sauerstoff effizient aus dem mütterlichen Blut aufnehmen.` },
  { id:'anki_a01_761', vl:'a01', cat:'Anki', source:'anki', q:`Warum hat fetales Hämoglobin (HbF) eine höhere O₂-Affinität?`, a:`HbF hat eine geringere Bindung an 2,3-Bisphosphoglycerat (BPG).→ Dadurch wird der T-Zustand weniger stabilisiert, und die O₂-Affinität ist höher als bei HbA.` },
  { id:'anki_a01_762', vl:'a01', cat:'Anki', source:'anki', q:`Welche Untereinheiten besitzt fetales Hämoglobin (HbF)?`, a:`HbF besteht aus 2 α- und 2 γ-Ketten (α₂γ₂), im Gegensatz zu HbA mit 2 α- und 2 β-Ketten (α₂β₂).` },
  { id:'anki_a01_763', vl:'a01', cat:'Anki', source:'anki', q:`Was ist die molekulare Ursache der Sichelzellanämie?`, a:`Die Sichelzellanämie entsteht durch eine Punktmutation in der β-Globinkette, bei der Glutamat durch Valin ersetzt wird.→ Dies führt zu veränderter Proteinstruktur und Aggregation von Hämoglobin (HbS).` },
  { id:'anki_a01_764', vl:'a01', cat:'Anki', source:'anki', q:`Welche Folge hat die Mutation bei der Sichelzellanämie?`, a:`Die Mutation führt zu hydrophoben Wechselwirkungen zwischen Hämoglobinmolekülen, wodurch HbS aggregiert (polymerisiert).→ Dies verursacht die Verformung der Erythrozyten (Sichelform).` },
  { id:'anki_a01_765', vl:'a01', cat:'Anki', source:'anki', q:`Was passiert mit Erythrozyten bei Sichelzellanämie?`, a:`Erythrozyten werden durch HbS-Aggregation zu sichelförmigen Zellen verformt und verlieren ihre Flexibilität.→ Dadurch kommt es zu Durchblutungsstörungen und erhöhter Hämolyse.` },
  { id:'anki_a01_766', vl:'a01', cat:'Anki', source:'anki', q:`Welche klinischen Folgen hat Sichelzellanämie?`, a:`Die Sichelzellanämie führt zu:• Gefäßverschlüssen (durch starre Sichelzellen)• Hämolyse (vermehrter Abbau von Erythrozyten)• Anämie (verminderte Sauerstofftransportkapazität)` },
  { id:'anki_a01_767', vl:'a01', cat:'Anki', source:'anki', q:`Warum ist Sichelzellanämie in bestimmten Regionen häufiger?`, a:`In Malariagebieten besteht ein Selektionsvorteil für heterozygote Träger (HbA/HbS).→ Diese sind teilweise gegen Malaria geschützt, weshalb sich das Gen in diesen Regionen häufiger verbreitet.` },
  { id:'anki_a01_768', vl:'a01', cat:'Anki', source:'anki', q:`Was sind Thalassämien?`, a:`Thalassämien sind genetische Erkrankungen, bei denen die Synthese von Globinketten (α- oder β-Ketten) vermindert oder gestört ist.→ Dies führt zu Ungleichgewicht der Globinketten und gestörter Hämoglobinbildung.` },
  { id:'anki_a01_769', vl:'a01', cat:'Anki', source:'anki', q:`Welche Formen der Thalassämie gibt es und worin unterscheiden sie sich?`, a:`Es gibt zwei Hauptformen:• α-Thalassämie → verminderte oder fehlende Synthese der α-Globinketten• β-Thalassämie → verminderte oder fehlende Synthese der β-Globinketten→ Beide führen zu einem Ungleichgewicht der Globinketten und gestörter Hämoglobinbildung.` },
  { id:'anki_a01_770', vl:'a01', cat:'Anki', source:'anki', q:`Was ist die Folge eines Globinketten-Ungleichgewichts bei Thalassämien?`, a:`Ein Ungleichgewicht der Globinketten führt zu instabilen Hämoglobinstrukturen und zur Schädigung der Erythrozyten.→ Dies verursacht eine Anämie.` },
  { id:'anki_a04_771', vl:'a04', cat:'Anki', source:'anki', q:`Was ist die extrazelluläre Matrix (ECM) und welche Funktion hat sie?`, a:`Die extrazelluläre Matrix (ECM) ist ein Netzwerk aus Proteinen und Polysacchariden außerhalb von Zellen.→ Sie verleiht Geweben Struktur und Stabilität und spielt eine wichtige Rolle bei Zelladhäsion, Signalübertragung und Gewebefunktion.` },
  { id:'anki_a04_772', vl:'a04', cat:'Anki', source:'anki', q:`Welche Hauptfunktionen hat die extrazelluläre Matrix (ECM)?`, a:`Die ECM erfüllt mehrere zentrale Funktionen:• Struktur und mechanische Stabilität von Geweben• Verankerung und Organisation von Zellen (Zelladhäsion)• Signalübertragung zwischen Zellen und Umgebung→ Sie beeinflusst damit Zellverhalten, Differenzierung und Gewebefunktion.` },
  { id:'anki_a04_773', vl:'a04', cat:'Anki', source:'anki', q:`Welche Hauptbestandteile hat die extrazelluläre Matrix (ECM)?`, a:`Die ECM besteht aus mehreren wichtigen Komponenten:• Kollagen → verleiht Zugfestigkeit• Elastin → sorgt für Elastizität• Proteoglykane → binden Wasser und bilden eine gelartige Matrix• Glykosaminoglykane (GAGs) → stark hydrophil, wichtig für Druckresistenz und Volumen→ Zusammen bestimmen sie die mechanischen Eigenschaften und Funktion von Geweben.` },
  { id:'anki_a04_774', vl:'a04', cat:'Anki', source:'anki', q:`Was ist Kollagen und welche Funktion hat es?`, a:`Kollagen ist ein strukturelles Protein und die wichtigste Komponente der extrazellulären Matrix (ECM).→ Es verleiht Geweben hohe Zugfestigkeit und Stabilität.` },
  { id:'anki_a04_775', vl:'a04', cat:'Anki', source:'anki', q:`Wie ist Kollagen strukturell aufgebaut?`, a:`Kollagen besteht aus drei Polypeptidketten, die sich zu einer Triple-Helix winden.→ Diese Struktur verleiht Kollagen seine hohe Stabilität und Zugfestigkeit.` },
  { id:'anki_a04_776', vl:'a04', cat:'Anki', source:'anki', q:`Welche Aminosäuren sind typisch für Kollagen und warum?`, a:`Typische Aminosäuren im Kollagen sind:• Glycin → sehr klein, ermöglicht die enge Packung der Triple-Helix• Prolin → sorgt für Struktur und Stabilität der Helix• Hydroxyprolin → stabilisiert die Struktur durch Wasserstoffbrückenbindungen→ Diese Aminosäuren sind entscheidend für die hohe Stabilität des Kollagens.` },
  { id:'anki_a04_777', vl:'a04', cat:'Anki', source:'anki', q:`Warum ist Glycin im Kollagen besonders wichtig?`, a:`Glycin ist die kleinste Aminosäure und kommt im Kollagen an jeder dritten Position vor.→ Dadurch ermöglicht es die enge Packung der drei Polypeptidketten in der Triple-Helix.` },
  { id:'anki_a04_778', vl:'a04', cat:'Anki', source:'anki', q:`Wo beginnt die Kollagensynthese und was passiert dort?`, a:`Die Kollagensynthese beginnt im rauen endoplasmatischen Retikulum (ER).→ Dort werden die Pro-α-Ketten synthetisiert und erste posttranslationale Modifikationen (z. B. Hydroxylierung) durchgeführt.` },
  { id:'anki_a04_779', vl:'a04', cat:'Anki', source:'anki', q:`Welche posttranslationale Modifikation ist für Kollagen essenziell und warum?`, a:`Die Hydroxylierung von Prolin und Lysin ist entscheidend für Kollagen.→ Sie ermöglicht die Stabilisierung der Triple-Helix durch Wasserstoffbrückenbindungen und ist notwendig für die korrekte Struktur und Festigkeit des Kollagens.` },
  { id:'anki_a04_780', vl:'a04', cat:'Anki', source:'anki', q:`Welcher Cofaktor ist für die Hydroxylierung im Kollagen notwendig?`, a:`Für die Hydroxylierung von Prolin und Lysin ist Vitamin C (Ascorbinsäure) erforderlich.→ Es ist notwendig für die Stabilisierung der Kollagenstruktur.` },
  { id:'anki_a04_781', vl:'a04', cat:'Anki', source:'anki', q:`Was passiert bei Vitamin-C-Mangel im Zusammenhang mit Kollagen?`, a:`Bei Vitamin-C-Mangel kommt es zu Skorbut, da die Hydroxylierung von Prolin und Lysin gestört ist.→ Dadurch entsteht instabiles Kollagen, was zu schwachem Bindegewebe, Zahnfleischbluten und schlechter Wundheilung führt.` },
  { id:'anki_a04_782', vl:'a04', cat:'Anki', source:'anki', q:`Wo findet die Kollagenreifung statt und was passiert dort?`, a:`Die Kollagenreifung findet extrazellulär statt.→ Dort werden Prokollagenmoleküle zu Kollagen verarbeitet und durch Quervernetzungen stabilisiert.` },
  { id:'anki_a04_783', vl:'a04', cat:'Anki', source:'anki', q:`Was sind Kollagenfasern und wie entstehen sie?`, a:`Kollagenfasern sind stabile, zugfeste Strukturen, die aus Kollagenmolekülen aufgebaut sind.→ Sie entstehen durch Zusammenlagerung von Fibrillen und Quervernetzung, wodurch eine hohe mechanische Stabilität erreicht wird.` },
  { id:'anki_a04_784', vl:'a04', cat:'Anki', source:'anki', q:`Was ist Elastin und welche Funktion hat es?`, a:`Elastin ist ein Strukturprotein der ECM, das Geweben Elastizität und Dehnbarkeit verleiht.→ Es ermöglicht, dass Gewebe sich dehnen und wieder in ihre ursprüngliche Form zurückkehren (z. B. in Haut und Lunge).` },
  { id:'anki_a04_785', vl:'a04', cat:'Anki', source:'anki', q:`Wo kommt Elastin im Körper vor und warum gerade dort?`, a:`Elastin kommt vor allem in Geweben vor, die dehnbar und elastisch sein müssen:• Lunge → für Ausdehnung und Rückstellkraft beim Atmen• Haut → für Elastizität und Spannkraft• Blutgefäße → für Druckausgleich bei Pulsbewegungen→ Es ermöglicht die Rückkehr zur Ausgangsform nach Dehnung.` },
  { id:'anki_a04_786', vl:'a04', cat:'Anki', source:'anki', q:`Was sind Glykosaminoglykane (GAGs) und welche Funktion haben sie?`, a:`Glykosaminoglykane (GAGs) sind lange, unverzweigte Polysaccharide, die aus sich wiederholenden Disaccharideinheiten bestehen.→ Sie sind stark hydrophil, binden viel Wasser und tragen zur Druckresistenz und Elastizität von Geweben bei.` },
  { id:'anki_a04_787', vl:'a04', cat:'Anki', source:'anki', q:`Welche Eigenschaften besitzen Glykosaminoglykane (GAGs)?`, a:`GAGs sind stark negativ geladen (durch Sulfat- und Carboxylgruppen) und daher hoch hydrophil.→ Sie binden große Mengen Wasser und verleihen Geweben Druckresistenz und Elastizität.` },
  { id:'anki_a04_788', vl:'a04', cat:'Anki', source:'anki', q:`Was sind Proteoglykane und welche Funktion haben sie?`, a:`Proteoglykane sind Proteine, an die kovalent Glykosaminoglykane (GAGs) gebunden sind.→ Sie bilden eine gelartige Matrix, binden Wasser und tragen zur Druckresistenz und Stoßdämpfung von Geweben bei.` },
  { id:'anki_a04_789', vl:'a04', cat:'Anki', source:'anki', q:`Welche Funktion haben Proteoglykane in der ECM?`, a:`Proteoglykane binden große Mengen Wasser und verleihen Geweben eine hohe Druckelastizität.→ Sie wirken als Stoßdämpfer und tragen zur mechanischen Stabilität bei.` },
  { id:'anki_a04_790', vl:'a04', cat:'Anki', source:'anki', q:`Was sind anorganische Bestandteile der ECM und welche Funktion haben sie?`, a:`Anorganische Bestandteile der ECM sind z. B. Hydroxylapatit-Kristalle im Knochen.→ Sie verleihen Geweben, insbesondere dem Knochen, Härte und Druckfestigkeit.` },
  { id:'anki_a04_791', vl:'a04', cat:'Anki', source:'anki', q:`Welche Funktion hat Hydroxylapatit in der ECM?`, a:`Hydroxylapatit verleiht dem Knochen hohe Festigkeit und Druckstabilität.→ Es sorgt dafür, dass Knochen mechanischen Belastungen standhalten können.` },
  { id:'anki_a04_792', vl:'a04', cat:'Anki', source:'anki', q:`Welche Erkrankung entsteht bei Kollagendefekten und was ist die Ursache?`, a:`Ein Beispiel ist Osteogenesis imperfecta (Glasknochenkrankheit).→ Sie entsteht durch Defekte im Kollagen (meist Typ I), was zu verminderter Stabilität der Knochen und erhöhter Frakturanfälligkeit führt.` },
  { id:'anki_a04_793', vl:'a04', cat:'Anki', source:'anki', q:`Welche Erkrankung ist mit Defekten von Elastin bzw. elastischen Fasern verbunden und was passiert dabei?`, a:`Ein Beispiel ist das Marfan-Syndrom.→ Durch Defekte in elastischen Fasern (z. B. Fibrillin) kommt es zu verminderter Stabilität des Bindegewebes, besonders in Gefäßen, Skelett und Augen.` },
  { id:'anki_a04_794', vl:'a04', cat:'Anki', source:'anki', q:`Warum sind Defekte der extrazellulären Matrix (ECM) klinisch relevant?`, a:`ECM-Defekte führen zu Störungen der Gewebestruktur und -funktion.→ Dadurch entstehen mechanische Instabilität, Funktionsverlust und Erkrankungen verschiedener Organe.` },
  { id:'anki_a01_795', vl:'a01', cat:'Anki', source:'anki', q:`Wie unterscheiden sich die O₂-Bindungseigenschaften von Myoglobin und Hämoglobin?`, a:`Myoglobin zeigt eine hyperbolische Bindungskurve, bindet O₂ stark schon bei niedrigem pO₂ und besitzt keine Kooperativität → Sauerstoffspeicher.Hämoglobin zeigt eine sigmoidale Bindungskurve durch kooperative Bindung, nimmt O₂ gut auf und gibt ihn wieder ab → Sauerstofftransport.Merksatz:Hyperbolisch = Myoglobin (Speicher, kein kooperatives Verhalten)Sigmoidal = Hämoglobin (Transport, kooperatives Verhalten)` },
  { id:'anki_s01_796', vl:'s01', cat:'Anki', source:'anki', q:`Welche Mechanismen der interzellulären Kommunikation gibt es?`, a:`Es gibt direkte und indirekte Kommunikationsformen:• Direkte Kommunikation:– Gap Junctions → direkter Stoffaustausch zwischen Zellen– juxtakrin → Signalübertragung durch direkten Zellkontakt• Indirekte Kommunikation:– autokrin → Zelle wirkt auf sich selbst– parakrin → Signal an benachbarte Zellen– synaptisch → schnelle Signalübertragung über Nervenzellen– endokrin → Hormone wirken über den Blutkreislauf auf entfernte Zellen→ Diese Mechanismen ermöglichen eine gezielte und koordinierte Zellkommunikation.` },
  { id:'anki_s01_797', vl:'s01', cat:'Anki', source:'anki', q:`Was sind Gap Junctions und welche Funktion haben sie?`, a:`Gap Junctions sind kanalförmige Verbindungen zwischen benachbarten Zellen, die einen direkten Austausch von kleinen Molekülen und Ionen zwischen den Zytoplasmen ermöglichen.→ Sie ermöglichen eine schnelle und koordinierte Zellkommunikation (z. B. im Herzmuskel).` },
  { id:'anki_s01_798', vl:'s01', cat:'Anki', source:'anki', q:`Was ist juxtakrine Signalübertragung und wie funktioniert sie?`, a:`Juxtakrine Signalübertragung erfolgt durch direkten Zell-Zell-Kontakt, bei dem Membranproteine einer Zelle an Rezeptoren einer benachbarten Zelle binden.→ Sie ermöglicht eine sehr spezifische und lokal begrenzte Kommunikation zwischen Zellen.` },
  { id:'anki_s01_799', vl:'s01', cat:'Anki', source:'anki', q:`Nenne Beispiele für Moleküle der juxtakrinen Signalvermittlung und ihre Funktion.`, a:`Wichtige Moleküle der juxtakrinen Signalübertragung sind:• Selektine → vermitteln vorübergehende Zell-Zell-Kontakte (z. B. bei Immunzellen)• Integrine → vermitteln Zell-Matrix- und Zell-Zell-Adhäsion• Cadherine → wichtig für stabile Zell-Zell-Verbindungen (z. B. in Geweben)• Immunglobulin-Superfamilie → beteiligt an Zelladhäsion und Signalübertragung→ Sie ermöglichen direkten Zellkontakt und gezielte Kommunikation zwischen Zellen.` },
  { id:'anki_s01_800', vl:'s01', cat:'Anki', source:'anki', q:`Was ist autokrine Signalübertragung und welche Bedeutung hat sie?`, a:`Autokrine Signalübertragung bedeutet, dass eine Zelle ein Signalstoff produziert, der auf dieselbe Zelle zurückwirkt.→ Sie dient der Selbstregulation von Zellfunktionen (z. B. Wachstum und Differenzierung).` },
  { id:'anki_s01_801', vl:'s01', cat:'Anki', source:'anki', q:`Was ist parakrine Signalübertragung und welche Bedeutung hat sie?`, a:`Parakrine Signalübertragung bedeutet, dass ein Signalstoff von einer Zelle freigesetzt wird und auf benachbarte Zellen wirkt.→ Sie ermöglicht eine lokale Kommunikation, z. B. bei Gewebereaktionen oder Entzündungen.` },
  { id:'anki_s01_802', vl:'s01', cat:'Anki', source:'anki', q:`Was ist endokrine Signalübertragung und wie funktioniert sie?`, a:`Endokrine Signalübertragung erfolgt durch Hormone, die ins Blut abgegeben werden und auf weit entfernte Zielzellen wirken.→ Sie ermöglicht eine langsame, aber weitreichende Regulation von Körperfunktionen (z. B. Stoffwechsel, Wachstum).` },
  { id:'anki_s01_803', vl:'s01', cat:'Anki', source:'anki', q:`Was ist synaptische Signalübertragung und wie funktioniert sie?`, a:`Synaptische Signalübertragung erfolgt über Neurotransmitter, die an einer Synapse freigesetzt werden und an Rezeptoren der Zielzelle binden.→ Sie ermöglicht eine sehr schnelle und gezielte Kommunikation zwischen Nervenzellen.` },
  { id:'anki_s01_804', vl:'s01', cat:'Anki', source:'anki', q:`Welche Eigenschaften haben Botenstoffe und warum ist das wichtig?`, a:`Botenstoffe können hydrophil oder lipophil sein.• Hydrophile Botenstoffe → binden an Membranrezeptoren (können Membran nicht durchqueren)• Lipophile Botenstoffe → passieren die Zellmembran und binden an intrazelluläre Rezeptoren→ Diese Eigenschaft bestimmt den Wirkmechanismus und die Signalübertragung.` },
  { id:'anki_s01_805', vl:'s01', cat:'Anki', source:'anki', q:`Wie unterscheiden sich hydrophile und lipophile Botenstoffe?`, a:`Hydrophile Botenstoffe sind membranundurchlässig und wirken über Membranrezeptoren.Lipophile Botenstoffe sind membrangängig, wirken über intrazelluläre Rezeptoren und benötigen im Blut meist Transportproteine.→ Unterschied liegt in Membrandurchlässigkeit und Wirkmechanismus.` },
  { id:'anki_s01_806', vl:'s01', cat:'Anki', source:'anki', q:`Was sind extrazelluläre Vesikel und welche Funktion haben sie?`, a:`Extrazelluläre Vesikel sind kleine membranumhüllte Partikel, die von Zellen abgegeben werden.→ Sie transportieren Proteine, Lipide und Nukleinsäuren und dienen der Signalübertragung und Kommunikation zwischen Zellen.` },
  { id:'anki_s01_807', vl:'s01', cat:'Anki', source:'anki', q:`Welche Schritte umfasst die Signalübertragung?`, a:`Die Signalübertragung erfolgt in drei Schritten:• Erkennung (Reception) → Bindung eines Signals an einen Rezeptor• Übertragung (Transduktion) → Weiterleitung und Verstärkung des Signals in der Zelle• Antwort (Response) → zelluläre Reaktion (z. B. Genexpression, Enzymaktivität)→ Diese Schritte ermöglichen eine gezielte Reaktion der Zelle auf Signale.` },
  { id:'anki_s01_808', vl:'s01', cat:'Anki', source:'anki', q:`Was passiert bei der Erkennung eines Signals (Reception)?`, a:`Bei der Erkennung bindet ein Ligand spezifisch an einen Rezeptor.→ Dadurch wird der Rezeptor aktiviert und die Signalübertragung gestartet.` },
  { id:'anki_s01_809', vl:'s01', cat:'Anki', source:'anki', q:`Was passiert bei der Signalübertragung (Transduktion)?`, a:`Bei der Signalübertragung wird eine intrazelluläre Signalkaskade aktiviert, die das Signal weiterleitet und oft verstärkt.→ Dies geschieht häufig über second messenger oder Phosphorylierungen.` },
  { id:'anki_s01_810', vl:'s01', cat:'Anki', source:'anki', q:`Was passiert bei der Antwort (Response)?`, a:`Bei der Antwort führt das Signal zu einer spezifischen zellulären Reaktion, z. B.:• Änderung der Genexpression• Aktivierung oder Hemmung von Enzymen→ Die Zelle passt ihr Verhalten und ihre Funktion an das Signal an.` },
  { id:'anki_s01_811', vl:'s01', cat:'Anki', source:'anki', q:`Welche Klassen von Rezeptoren gibt es?`, a:`Es gibt drei Hauptklassen von Rezeptoren:• Membranrezeptoren → binden meist hydrophile Liganden (z. B. GPCR, Ionenkanäle, Enzymrezeptoren)• Intrazelluläre Rezeptoren → binden lipophile Liganden (z. B. Steroidhormone)• Rezeptoren mit enzymatischer Aktivität → besitzen intrinsische Enzymfunktion (z. B. Tyrosinkinasen)→ Sie unterscheiden sich in Lokalisation und Signalmechanismus.` },
  { id:'anki_s01_812', vl:'s01', cat:'Anki', source:'anki', q:`Nenne wichtige Typen von Membranrezeptoren und ihre Funktionen.`, a:`Wichtige Membranrezeptoren sind:• G-Protein-gekoppelte Rezeptoren (GPCR) → aktivieren G-Proteine und second messenger• Rezeptor-Tyrosinkinasen (RTK) → lösen Phosphorylierungskaskaden aus• Ligandengesteuerte Ionenkanäle → öffnen/schließen sich und verändern den Ionentransport→ Sie ermöglichen eine schnelle und spezifische Signalübertragung an der Zellmembran.` },
  { id:'anki_s01_813', vl:'s01', cat:'Anki', source:'anki', q:`Wo befinden sich intrazelluläre Rezeptoren und welche Funktion haben sie?`, a:`Intrazelluläre Rezeptoren befinden sich im Zytoplasma oder im Zellkern.→ Sie binden meist lipophile Liganden und wirken oft als Transkriptionsfaktoren, die die Genexpression regulieren.` },
  { id:'anki_s01_814', vl:'s01', cat:'Anki', source:'anki', q:`Wie funktionieren G-Protein-gekoppelte Rezeptoren (GPCR)?`, a:`G-Protein-gekoppelte Rezeptoren (GPCR) sind Membranrezeptoren, die äußere Signale in intrazelluläre Antworten umwandeln.Der Ablauf ist:Ligand bindet an den GPCR→ Der Rezeptor verändert seine Konformation.Aktivierung des G-Proteins→ An der Innenseite der Membran ist ein heterotrimeres G-Protein gebunden, das aus α-, β- und γ-Untereinheit besteht.→ Im inaktiven Zustand ist an der α-Untereinheit GDP gebunden.→ Durch die Aktivierung des Rezeptors wird GDP gegen GTP ausgetauscht.Dissoziation des G-Proteins→ Die α-Untereinheit mit GTP trennt sich von der βγ-Untereinheit.→ Beide können nun Effektorproteine beeinflussen.Aktivierung von Effektorproteinen→ Das können z. B. sein:• Adenylatcyclase → bildet cAMP• Phospholipase C → bildet IP₃ und DAG• Ionenkanäle → ändern den IonenstromAuslösung einer Zellantwort→ Es entsteht eine Signalkaskade, die z. B. zu• Enzymaktivierung• Änderung der Genexpression• Muskelkontraktion• Sekretion führen kann.Abschaltung des Signals→ Die α-Untereinheit besitzt eine GTPase-Aktivität und spaltet GTP zu GDP.→ Dadurch wird das G-Protein wieder inaktiv und vereinigt sich erneut mit βγ.Wichtig:GPCRs sind deshalb so bedeutend, weil sie viele Hormone, Neurotransmitter und Sinnesreize vermitteln und das Signal oft stark verstärken.` },
  { id:'anki_s01_815', vl:'s01', cat:'Anki', source:'anki', q:`Was ist die Funktion von G-Proteinen?`, a:`G-Proteine wirken als molekulare Schalter in der Signalübertragung.→ Sie sind aktiv (mit GTP gebunden) oder inaktiv (mit GDP gebunden) und übertragen Signale von Rezeptoren auf Effektorproteine.` },
  { id:'anki_s01_816', vl:'s01', cat:'Anki', source:'anki', q:`Wie funktionieren Rezeptor-Tyrosinkinasen (RTK)?`, a:`Rezeptor-Tyrosinkinasen (RTK) sind Membranrezeptoren mit intrinsischer Enzymaktivität (Tyrosinkinase).Der Ablauf ist:Ligand bindet an den Rezeptor→ Zwei Rezeptoren lagern sich zusammen (Dimerisierung).Autophosphorylierung→ Die intrazellulären Domänen phosphorylieren sich gegenseitig an Tyrosinresten.Bindung von Signalproteinen→ Die phosphorylierten Tyrosine dienen als Andockstellen für intrazelluläre Signalproteine.Aktivierung von Signalkaskaden→ Es werden verschiedene Signalwege aktiviert (z. B. MAP-Kinase, PI3K).Zelluläre Antwort→ Führt zu Zellwachstum, Differenzierung oder Überleben.Wichtig:RTKs spielen eine zentrale Rolle bei Wachstumsfaktoren und sind häufig bei Krebserkrankungen fehlreguliert.` },
  { id:'anki_s01_817', vl:'s01', cat:'Anki', source:'anki', q:`Wie funktionieren ligandengesteuerte Ionenkanäle?`, a:`Ligand bindet an den Rezeptor (Ionenkanal)→ Konformationsänderung → Kanal öffnet sich→ Ionen strömen entlang ihres elektrochemischen Gradienten (z. B. Na⁺, K⁺, Ca²⁺, Cl⁻)→ Änderung des Membranpotentials→ Führt zu einer sehr schnellen Zellantwort (z. B. in Nervenzellen)Na⁺ / Ca²⁺ Einstrom → Depolarisation (erregend)Cl⁻ Einstrom oder K⁺ Ausstrom → Hyperpolarisation (hemmend)` },
  { id:'anki_s01_818', vl:'s01', cat:'Anki', source:'anki', q:`Wie funktionieren intrazelluläre Rezeptoren?`, a:`Lipophiler Ligand (z. B. Steroidhormon) diffundiert durch die Zellmembran→ Bindung an intrazellulären Rezeptor (im Zytoplasma oder Zellkern)→ Konformationsänderung des Rezeptors→ Komplex wirkt als Transkriptionsfaktor und bindet an DNA→ Regulation der Genexpression→ Führt zu einer langsamen, aber langfristigen Zellantwort.` },
  { id:'anki_s01_819', vl:'s01', cat:'Anki', source:'anki', q:`Was ist eine Phosphorylierungskaskade?`, a:`Eine Phosphorylierungskaskade ist eine Abfolge von Reaktionen, bei denen Proteine (meist Kinasen) sich gegenseitig durch Phosphorylierung aktivieren.→ Dabei wird ein Signal schrittweise weitergeleitet und verstärkt, was schließlich zu einer zellulären Antwort führt.` },
  { id:'anki_s01_820', vl:'s01', cat:'Anki', source:'anki', q:`Nenne wichtige Second Messenger und ihre Funktion.`, a:`Wichtige Second Messenger sind:• cAMP → aktiviert Proteinkinase A (PKA)• cGMP → beteiligt an Signalwegen (z. B. NO-Signalweg)• Ca²⁺ → reguliert viele Prozesse (z. B. Muskelkontraktion, Enzymaktivität)• DAG (Diacylglycerol) → aktiviert Proteinkinase C (PKC)• IP₃ (Inositoltriphosphat) → setzt Ca²⁺ aus dem ER frei→ Sie verstärken und vermitteln Signale innerhalb der Zelle.` },
  { id:'anki_s01_821', vl:'s01', cat:'Anki', source:'anki', q:`Was versteht man unter Signalverstärkung und wie entsteht sie?`, a:`Signalverstärkung bedeutet, dass ein einzelnes Signal eine stark vergrößerte (amplifizierte) Zellantwort auslöst.→ Sie entsteht durch Signalkaskaden, bei denen jedes aktivierte Molekül viele weitere aktiviert (z. B. Second Messenger, Phosphorylierungskaskaden).` },
  { id:'anki_s01_822', vl:'s01', cat:'Anki', source:'anki', q:`Was bedeutet Zellspezifität der Antwort bei der Signalübertragung?`, a:`Zellspezifität der Antwort bedeutet, dass verschiedene Zelltypen auf dasselbe Signal unterschiedlich reagieren.→ Dies hängt von der Art der Rezeptoren, vorhandenen Signalproteinen und Genexpression in der jeweiligen Zelle ab.` },
  { id:'anki_s01_823', vl:'s01', cat:'Anki', source:'anki', q:`Was bedeutet „multiple Antworten“ bei der Signalübertragung?`, a:`Multiple Antworten bedeutet, dass ein einzelnes Signal mehrere unterschiedliche zelluläre Reaktionen gleichzeitig auslösen kann.→ Dies geschieht durch Verzweigung von Signalkaskaden und Aktivierung verschiedener Signalwege.` },
  { id:'anki_s02_824', vl:'s02', cat:'Anki', source:'anki', q:`Nenne hydrophile Second Messenger und ihre Funktion.`, a:`Wichtige hydrophile Second Messenger sind:• cAMP → aktiviert Proteinkinase A (PKA)• cGMP → beteiligt an Signalwegen (z. B. NO-Signalweg)• Ca²⁺ → reguliert Enzymaktivität und Muskelkontraktion• IP₃ → setzt Ca²⁺ aus dem ER frei• ROS (reaktive Sauerstoffspezies) → wirken als Signalmoleküle bei Stress- und Immunreaktionen→ Sie vermitteln und verstärken Signale im Zellinneren.` },
  { id:'anki_s02_825', vl:'s02', cat:'Anki', source:'anki', q:`Nenne einen lipophilen Second Messenger und seine Funktion.`, a:`DAG (Diacylglycerol) → ist ein lipophiler Second Messenger, der in der Zellmembran verbleibt und die Proteinkinase C (PKC) aktiviert.→ Er wirkt oft zusammen mit IP₃ und Ca²⁺ in Signalwegen.` },
  { id:'anki_s02_826', vl:'s02', cat:'Anki', source:'anki', q:`Wie entsteht cAMP und wie wird seine Bildung reguliert?`, a:`Ein Ligand bindet an einen GPCR→ Aktivierung eines G-Proteins (Gs)→ Adenylatzyklase wird aktiviert→ ATP wird zu cAMP umgewandelt→ cAMP wirkt als Second Messenger und aktiviert z. B. die Proteinkinase A (PKA).Zusatz (wichtig):• Gi-Protein kann die Adenylatzyklase hemmen• Phosphodiesterasen bauen cAMP wieder zu AMP ab→ Dadurch ist das Signal streng reguliert.` },
  { id:'anki_s02_827', vl:'s02', cat:'Anki', source:'anki', q:`Welche Funktion hat cAMP und wie wirkt es in der Zelle?`, a:`cAMP ist ein Second Messenger, der durch Adenylatzyklase aus ATP gebildet wird.→ Es bindet an die regulatorischen Untereinheiten der Proteinkinase A (PKA) und aktiviert diese.→ Die aktive PKA phosphoryliert spezifische Zielproteine, wodurch:• Enzyme aktiviert oder gehemmt werden• Stoffwechselprozesse reguliert werden• Genexpression beeinflusst wird (z. B. über Transkriptionsfaktoren)→ Dadurch wird das ursprüngliche Signal verstärkt und in eine spezifische Zellantwort umgesetzt.` },
  { id:'anki_s02_828', vl:'s02', cat:'Anki', source:'anki', q:`Wie entsteht cGMP und wie wird seine Bildung reguliert?`, a:`GMP (cyclisches GMP) entsteht durch die Umwandlung von GTP zu cGMP, katalysiert von der Guanylatzyklase.→ Es gibt zwei Formen der Guanylatzyklase:• lösliche Guanylatzyklase → wird durch Stickstoffmonoxid (NO) aktiviert• membranständige Guanylatzyklase → wird durch natriuretische Peptide aktiviert→ Das gebildete cGMP fungiert als Second Messenger und aktiviert u. a. die Proteinkinase G (PKG), die verschiedene zelluläre Prozesse reguliert.` },
  { id:'anki_s02_829', vl:'s02', cat:'Anki', source:'anki', q:`Welche Funktion hat Ca²⁺ als Second Messenger und wie wirkt es?`, a:`Ca²⁺ ist ein vielseitiger Second Messenger, dessen Konzentration in der Zelle streng reguliert ist.→ Ein Anstieg von Ca²⁺ im Cytosol führt zur Aktivierung von Ca²⁺-abhängigen Proteinen, z. B.:• Calmodulin → aktiviert verschiedene Enzyme• Proteinkinasen → Signalweiterleitung• Kontraktionsproteine → Muskelkontraktion→ Ca²⁺ spielt eine zentrale Rolle bei:• Muskelkontraktion• Sekretion (Exozytose)• Signalübertragung in Nervenzellen→ Damit vermittelt Ca²⁺ schnelle und vielfältige Zellantworten.` },
  { id:'anki_s02_830', vl:'s02', cat:'Anki', source:'anki', q:`Welche Prozesse werden durch Ca²⁺ als Second Messenger ausgelöst?`, a:`• Aktivierung von Calmodulin → reguliert zahlreiche Enzyme• Aktivierung von Kinasen → Weiterleitung und Verstärkung von Signalen• Vesikelfusion (Exozytose) → Freisetzung von Neurotransmittern oder Hormonen→ Dadurch steuert Ca²⁺ u. a. Signaltransduktion, Sekretion und Muskelkontraktion.` },
  { id:'anki_s02_831', vl:'s02', cat:'Anki', source:'anki', q:`Wie werden die Second Messenger IP₃ und DAG gebildet und was bewirken sie?`, a:`IP₃ (Inositol-1,4,5-trisphosphat) und DAG (Diacylglycerol) entstehen durch die Spaltung eines Membranlipids (PIP₂).→ Diese Spaltung wird durch das Enzym Phospholipase C (PLC) ausgelöst, nachdem ein Rezeptor (z. B. GPCR) aktiviert wurde.→ Dabei entstehen zwei wichtige Second Messenger mit unterschiedlichen Wirkorten:• IP₃ → löst sich von der Membran und diffundiert ins Cytosol→ bindet am endoplasmatischen Retikulum und sorgt für die Freisetzung von Ca²⁺• DAG → bleibt in der Zellmembran→ aktiviert zusammen mit Ca²⁺ die Proteinkinase C (PKC)→ Ergebnis: Verstärkung des Signals und Auslösung verschiedener Zellreaktionen (z. B. Sekretion, Kontraktion, Enzymaktivierung).` },
  { id:'anki_s02_832', vl:'s02', cat:'Anki', source:'anki', q:`Welche Funktion hat IP₃ (Inositol-1,4,5-trisphosphat) als Second Messenger?`, a:`IP₃ wirkt als Second Messenger und bindet an Rezeptoren am endoplasmatischen Retikulum.→ Dadurch werden Ca²⁺-Kanäle geöffnet→ Ca²⁺ wird ins Cytosol freigesetzt→ Das freigesetzte Ca²⁺ aktiviert weitere Signalprozesse u. a.:• Calmodulin• Proteinkinasen• Muskelkontraktion und Sekretion` },
  { id:'anki_s02_833', vl:'s02', cat:'Anki', source:'anki', q:`Welche Funktion hat DAG (Diacylglycerol)?`, a:`DAG ist ein Second Messenger, der in der Zellmembran verbleibt.→ Es aktiviert zusammen mit Ca²⁺ die Proteinkinase C (PKC)→ Die aktivierte PKC reguliert u. a.:• Enzymaktivität• Genexpression• Zellwachstum und Differenzierung` },
  { id:'anki_s02_834', vl:'s02', cat:'Anki', source:'anki', q:`Was sind ROS als Second Messenger und welche Funktion haben sie?`, a:`ROS (reaktive Sauerstoffspezies) sind reaktive Moleküle (z. B. O₂⁻, H₂O₂), die neben ihrer potenziell schädlichen Wirkung auch als Second Messenger dienen.→ Sie wirken, indem sie Proteine reversibel oxidativ verändern (z. B. an Cysteinresten)→ Dadurch regulieren sie u. a.:• Signaltransduktionswege• Genexpression• Zellwachstum und Stressantworten` },
  { id:'anki_s02_835', vl:'s02', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Eustress und Distress?`, a:`Eustress (positiver Stress - physiologisch) ist eine Form von Stress, die den Organismus aktiviert und die Leistungsfähigkeit steigert.→ fördert Konzentration, Motivation und Anpassung→ tritt häufig bei Herausforderungen oder positiven Ereignissen aufDistress (negativer Stress) ist belastender Stress, der den Organismus überfordert und schädlich wirken kann.→ führt zu Erschöpfung, verminderter Leistungsfähigkeit und gesundheitlichen Problemen→ entsteht bei anhaltender Überforderung oder unzureichender Bewältigung` },
  { id:'anki_s02_836', vl:'s02', cat:'Anki', source:'anki', q:`Was sind Proteinkinasen?`, a:`Proteinkinasen sind Enzyme, die Phosphatgruppen (meist von ATP) auf bestimmte Aminosäuren von Proteinen übertragen. Dieser Vorgang wird als Phosphorylierung bezeichnet.Durch die Phosphorylierung wird die Funktion des Zielproteins gezielt verändert, z. B. durch Aktivierung oder Inaktivierung von Enzymen, durch Weiterleitung von Signalen innerhalb der Zelle oder durch Regulation von Prozessen wie Wachstum und Genexpression.Typische Zielaminosäuren sind Serin, Threonin und Tyrosin.` },
  { id:'anki_s02_837', vl:'s02', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Signal- und Effektorkinasen?`, a:`Signalkinasen sind Proteinkinasen, die vor allem der Weiterleitung und Verstärkung von Signalen innerhalb einer Signalkaskade dienen. Dabei phosphorylieren sie häufig andere Kinasen und ermöglichen so eine Kaskadenaktivierung, bei der ein Signal schrittweise verstärkt wird.Effektorkinasen wirken am Ende einer Signalkette und lösen die konkrete Zellantwort aus. Sie phosphorylieren Zielproteine, deren Aktivität direkt verändert wird, beispielsweise Enzyme, Transkriptionsfaktoren oder Strukturproteine. Dadurch beeinflussen sie Prozesse wie Stoffwechsel, Genexpression und Zellverhalten.Damit gilt: Signalkinasen vermitteln die Signalweiterleitung, während Effektorkinasen die eigentliche zelluläre Antwort ausführen.` },
