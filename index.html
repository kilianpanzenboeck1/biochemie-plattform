  { id:'anki_b11_243', vl:'b11', cat:'Anki', source:'anki', q:`Was versteht man unter energetischer Kopplung?`, a:`Unter energetischer Kopplung versteht man die Verknüpfung einer energieverbrauchenden (endergonen) Reaktion mit einer energieliefernden (exergonen) Reaktion.Dabei liefert meist die ATP-Hydrolyse die Energie, damit sonst nicht spontan ablaufende Reaktionen stattfinden können.` },
  { id:'anki_b11_244', vl:'b11', cat:'Anki', source:'anki', q:`Was ist NAD⁺?`, a:`NAD⁺ (Nicotinamidadenindinukleotid) ist ein wichtiges Coenzym im Zellstoffwechsel, das als Elektronen- und Protonenträger fungiert.Es nimmt bei Oxidationsreaktionen Elektronen und Protonen auf und wird dabei zu NADH + H⁺ reduziert.Anschließend kann es diese Elektronen in anderen Stoffwechselreaktionen, z. B. in der Atmungskette, wieder abgeben.` },
  { id:'anki_b11_245', vl:'b11', cat:'Anki', source:'anki', q:`Was ist NADH?`, a:`NADH ist die reduzierte Form von NAD⁺ (Nicotinamidadenindinukleotid).Es entsteht, wenn NAD⁺ Elektronen und Protonen aufnimmt und dient als Elektronenträger im Zellstoffwechsel.NADH transportiert diese hochenergetischen Elektronen z. B. zur Atmungskette, wo sie zur ATP-Produktion genutzt werden.` },
  { id:'anki_b11_246', vl:'b11', cat:'Anki', source:'anki', q:`Welche Rolle spielt NADH im Stoffwechsel?`, a:`NADH dient im Stoffwechsel als Elektronen- und Protonenträger.Es nimmt bei Abbauprozessen von Nährstoffen (z. B. im Citratzyklus) Elektronen auf und transportiert sie zur Atmungskette in den Mitochondrien.Dort werden die Elektronen genutzt, um ATP zu erzeugen.` },
  { id:'anki_b11_247', vl:'b11', cat:'Anki', source:'anki', q:`Was ist Acetyl-CoA?`, a:`Acetyl-CoA (Acetyl-Coenzym A) ist ein zentrales Stoffwechselintermediat, das beim Abbau von Kohlenhydraten, Fettsäuren und Aminosäuren entsteht.Es besteht aus einer Acetylgruppe (C₂-Einheit), die an Coenzym A gebunden ist.Acetyl-CoA tritt anschließend in den Citratzyklus ein, wo seine chemische Energie zur ATP-Produktion genutzt wird.` },
  { id:'anki_b11_248', vl:'b11', cat:'Anki', source:'anki', q:`Welche Rolle spielt Acetyl-CoA im Stoffwechsel?`, a:`Acetyl-CoA ist ein zentrales Zwischenprodukt des Stoffwechsels.Es entsteht beim Abbau von Kohlenhydraten, Fettsäuren und einigen Aminosäuren und tritt anschließend in den Citratzyklus ein.` },
  { id:'anki_b11_249', vl:'b11', cat:'Anki', source:'anki', q:`Was ist die mitochondriale Atmungskette? (Bild/Abbildung ansehen)`, a:`Die mitochondriale Atmungskette ist eine Reihe von Elektronentransportreaktionen in der inneren Mitochondrienmembran.Dabei geben NADH und FADH₂ ihre Elektronen ab, die über mehrere Protein-Komplexe weitergeleitet werden.Die dabei frei werdende Energie wird genutzt, um Protonen über die Membran zu pumpen, wodurch ein Protonengradient entsteht.Dieser Gradient treibt die ATP-Synthase an, die schließlich ATP produziert.` },
  { id:'anki_b11_250', vl:'b11', cat:'Anki', source:'anki', q:`Wo befindet sich die Atmungskette?`, a:`Die Atmungskette befindet sich in der inneren Membran der Mitochondrien.Dort sind mehrere Protein-Komplexe und Elektronentransporter eingebettet, die Elektronen von NADH und FADH₂ weiterleiten.Die dabei frei werdende Energie wird genutzt, um einen Protonengradienten aufzubauen, der schließlich die ATP-Synthese antreibt.` },
  { id:'anki_b11_251', vl:'b11', cat:'Anki', source:'anki', q:`Was passiert mit Elektronen in der Atmungskette?`, a:`In der Atmungskette werden Elektronen schrittweise von einem Elektronentransport-Komplex zum nächsten weitergegeben.Dabei wird Energie frei, die genutzt wird, um Protonen (H⁺) über die innere Mitochondrienmembran zu pumpen.Am Ende der Kette werden die Elektronen auf Sauerstoff übertragen, wodurch Wasser (H₂O) entsteht.` },
  { id:'anki_b11_252', vl:'b11', cat:'Anki', source:'anki', q:`Welche Moleküle liefern Elektronen an die Atmungskette?`, a:`Die wichtigsten Elektronendonoren der mitochondrialen Atmungskette sind NADH und FADH₂.Diese Moleküle entstehen zuvor in Stoffwechselwegen wie Glykolyse, Citratzyklus und Fettsäureabbau.Sie geben ihre hochenergetischen Elektronen an die Komplexe der Atmungskette ab, wodurch letztlich die ATP-Synthese ermöglicht wird.` },
  { id:'anki_b11_253', vl:'b11', cat:'Anki', source:'anki', q:`Was ist der Protonengradient in Mitochondrien?`, a:`Der Protonengradient ist ein Unterschied in der Protonenkonzentration (H⁺) zwischen dem Intermembranraum und der Matrix der Mitochondrien.Er entsteht, weil die Atmungskette Protonen aus der Matrix in den Intermembranraum pumpt.Dieser Gradient speichert potentielle Energie, die von der ATP-Synthase genutzt wird, um ATP zu bilden.` },
  { id:'anki_b11_254', vl:'b11', cat:'Anki', source:'anki', q:`Wie entsteht der Protonengradient in den Mitochondrien?`, a:`Der Protonengradient entsteht durch den Elektronentransport in der Atmungskette der inneren Mitochondrienmembran.Wenn Elektronen von NADH und FADH₂ über die Protein-Komplexe der Atmungskette weitergegeben werden, wird Energie frei.Diese Energie wird genutzt, um Protonen (H⁺) aus der Mitochondrienmatrix in den Intermembranraum zu pumpen.` },
  { id:'anki_b11_255', vl:'b11', cat:'Anki', source:'anki', q:`Welche Bedeutung hat der Protonengradient in den Mitochondrien?`, a:`Der Protonengradient speichert potenzielle Energie in Form eines elektrochemischen Gradienten über der inneren Mitochondrienmembran.Wenn die Protonen durch die ATP-Synthase zurück in die Matrix fließen, wird diese Energie genutzt, um ATP aus ADP und anorganischem Phosphat (Pi) zu bilden. Dieser Prozess wird als oxidative Phosphorylierung bezeichnet.` },
  { id:'anki_b11_256', vl:'b11', cat:'Anki', source:'anki', q:`Was ist die ATP-Synthase?`, a:`Die ATP-Synthase ist ein Enzymkomplex in der inneren Mitochondrienmembran, der ATP aus ADP und anorganischem Phosphat (Pi) bildet.Sie nutzt die Energie des Protonengradienten, indem Protonen durch das Enzym zurück in die Mitochondrienmatrix strömen.Diese Bewegung treibt die Synthese von ATP, dem wichtigsten Energieträger der Zelle, an.` },
  { id:'anki_b11_257', vl:'b11', cat:'Anki', source:'anki', q:`Wie wird ATP in den Mitochondrien gebildet?`, a:`ATP wird in den Mitochondrien durch oxidative Phosphorylierung gebildet.Dabei übertragen NADH und FADH₂ ihre Elektronen an die Atmungskette, wodurch ein Protonengradient über der inneren Mitochondrienmembran entsteht.Der Rückfluss der Protonen durch die ATP-Synthase liefert die Energie, um ATP aus ADP und anorganischem Phosphat (Pi) zu synthetisieren.` },
  { id:'anki_b11_258', vl:'b11', cat:'Anki', source:'anki', q:`Warum ist die Atmungskette für Zellen wichtig?`, a:`Die Atmungskette ist wichtig, weil sie den größten Teil des zellulären ATP produziert.Durch den Elektronentransport von NADH und FADH₂ wird ein Protonengradient in der inneren Mitochondrienmembran aufgebaut.Dieser treibt die ATP-Synthase an, wodurch ATP als wichtigste Energiequelle der Zelle gebildet wird.` },
  { id:'anki_b11_259', vl:'b11', cat:'Anki', source:'anki', q:`Welche Bedeutung hat Thermodynamik für biochemische Prozesse?`, a:`Die Thermodynamik beschreibt, ob und unter welchen Bedingungen biochemische Reaktionen ablaufen können.Sie bestimmt, welche Reaktionen spontan stattfinden (ΔG < 0) und wie Energie in der Zelle gespeichert, übertragen und genutzt wird, z. B. durch ATP oder Redoxreaktionen.` },
  { id:'anki_b11_260', vl:'b11', cat:'Anki', source:'anki', q:`Warum ist Energieumwandlung zentral für den Stoffwechsel?`, a:`Zellen müssen Energie aus Nährstoffen gewinnen und in nutzbare Formen umwandeln, vor allem in ATP.Diese Energie wird benötigt für Wachstum, Bewegung, aktiven Transport, Biosynthese und die Aufrechterhaltung zellulärer Strukturen.Ohne kontinuierliche Energieumwandlung könnten Stoffwechselprozesse nicht stattfinden.` },
  { id:'anki_vl01_261', vl:'vl01', cat:'Anki', source:'anki', q:`Was sind Proteine?`, a:`Proteine sind biologische Makromoleküle, die aus linearen Ketten von Aminosäuren aufgebaut sind, welche durch Peptidbindungen miteinander verbunden sind.Sie übernehmen in Zellen zahlreiche Funktionen, z. B. als Enzyme, Strukturproteine, Transportproteine, Signalstoffe oder Antikörper.` },
  { id:'anki_vl01_262', vl:'vl01', cat:'Anki', source:'anki', q:`Welche vier zentralen Eigenschaften besitzen Proteine?`, a:`Proteine sind lineare Polymere aus Aminosäuren, die über Peptidbindungen miteinander verbunden sind.Sie besitzen zahlreiche funktionelle Gruppen (z. B. aus den Seitenketten der Aminosäuren), die chemische Reaktionen ermöglichen.Sie können Komplexe mit anderen Molekülen bilden, z. B. mit Metallen, Lipiden oder anderen Proteinen.Sie können unterschiedliche Strukturen und Beweglichkeiten besitzen, also starr oder flexibel sein, was ihre Funktion beeinflusst.` },
  { id:'anki_vl01_263', vl:'vl01', cat:'Anki', source:'anki', q:`Warum besitzen Proteine eine große funktionelle Vielfalt?`, a:`Proteine bestehen aus 20 verschiedenen Aminosäuren, deren Seitenketten unterschiedliche chemische Eigenschaften besitzen (z. B. polar, unpolar oder geladen).Durch die verschiedene Kombination und Reihenfolge dieser Aminosäuren können Proteine sehr unterschiedliche dreidimensionale Strukturen und Funktionen ausbilden.` },
  { id:'anki_vl01_264', vl:'vl01', cat:'Anki', source:'anki', q:`Welche Funktionen können Proteine in Zellen übernehmen?`, a:`Proteine erfüllen in Zellen zahlreiche wichtige Funktionen, z. B.:• Enzyme → katalysieren biochemische Reaktionen• Strukturproteine → verleihen Zellen und Geweben Stabilität• Transportproteine → transportieren Moleküle (z. B. Sauerstoff)• Signalproteine/Rezeptoren → vermitteln und verarbeiten Signale• Motorproteine → ermöglichen Bewegung innerhalb der Zelle• Antikörper → erkennen und bekämpfen Fremdstoffe im ImmunsystemDamit sind Proteine für nahezu alle zellulären Prozesse unverzichtbar.` },
  { id:'anki_vl01_265', vl:'vl01', cat:'Anki', source:'anki', q:`Nenne Beispiele für Strukturproteine.`, a:`Beispiele sind Kollagen, das vor allem im Bindegewebe für Festigkeit sorgt, und Zytoskelettproteine (z. B. Aktin oder Tubulin), die der Zelle Form, Stabilität und mechanische Unterstützung geben` },
  { id:'anki_vl01_266', vl:'vl01', cat:'Anki', source:'anki', q:`Nenne Beispiele für Transportproteine.`, a:`Beispiele sind Hämoglobin, das Sauerstoff im Blut transportiert, und Serumalbumin, das verschiedene Moleküle (z. B. Fettsäuren oder Medikamente) im Blut bindet und transportiert.` },
  { id:'anki_vl01_267', vl:'vl01', cat:'Anki', source:'anki', q:`Nenne Beispiele für Motorproteine.`, a:`Beispiele sind Myosin, das an der Muskelkontraktion beteiligt ist, sowie Kinesin und Dynein, die entlang von Mikrotubuli den intrazellulären Transport von Vesikeln und Organellen ermöglichen.` },
  { id:'anki_vl01_268', vl:'vl01', cat:'Anki', source:'anki', q:`Welche Rolle spielen Proteine in der Signalübertragung?`, a:`Proteine wirken als Rezeptoren, Signalmoleküle oder Enzyme in Signaltransduktionswegen.Sie erkennen äußere Signale (z. B. Hormone), leiten diese innerhalb der Zelle weiter und lösen dadurch spezifische zelluläre Reaktionen aus.` },
  { id:'anki_vl01_269', vl:'vl01', cat:'Anki', source:'anki', q:`Welche Rolle spielen Proteine im Immunsystem?`, a:`Proteine wie Antikörper (Immunglobuline) erkennen spezifisch Fremdstoffe (Antigene) und binden an sie.Dadurch können sie diese neutralisieren oder für andere Immunzellen markieren, sodass sie gezielt abgebaut und beseitigt werden.` },
  { id:'anki_vl01_270', vl:'vl01', cat:'Anki', source:'anki', q:`Warum können Proteine komplexe Strukturen bilden?`, a:`Proteine können komplexe Strukturen bilden, weil sie vielfältige Wechselwirkungen eingehen können, z. B. Wasserstoffbrücken, ionische Bindungen, hydrophobe Wechselwirkungen und Disulfidbrücken.Diese ermöglichen sowohl die Faltung innerhalb eines Proteins als auch die Zusammenlagerung mit anderen Molekülen, wodurch komplexe Strukturen entstehen.` },
  { id:'anki_vl01_271', vl:'vl01', cat:'Anki', source:'anki', q:`Warum können Proteine flexibel sein?`, a:`Proteine können flexibel sein, weil ihre dreidimensionale Struktur nicht starr ist, sondern Konformationsänderungen zulässt.Diese Beweglichkeit ermöglicht es ihnen, sich an Bindungspartner anzupassen und ihre Funktion dynamisch auszuführen (z. B. bei Enzymen oder Rezeptoren).` },
  { id:'anki_vl02_272', vl:'vl02', cat:'Anki', source:'anki', q:`Was versteht man unter einem Liganden?`, a:`Ein Ligand ist ein Molekül, das spezifisch an ein Protein bindet, meist an eine bestimmte Bindungsstelle (z. B. aktives oder allosterisches Zentrum).Durch diese Bindung kann es die Struktur und Funktion des Proteins beeinflussen (z. B. Aktivierung oder Hemmung).` },
  { id:'anki_vl02_273', vl:'vl02', cat:'Anki', source:'anki', q:`Was passiert häufig bei der Bindung eines Liganden an ein Protein?`, a:`Die Bindung eines Liganden führt häufig zu einer Konformationsänderung des Proteins.Dadurch kann sich die Aktivität, Bindungsfähigkeit oder Funktion des Proteins verändern, z. B. bei Enzymen oder Rezeptoren.` },
  { id:'anki_vl02_274', vl:'vl02', cat:'Anki', source:'anki', q:`Was versteht man unter einer Konformationsänderung eines Proteins?`, a:`Eine Konformationsänderung ist eine Veränderung der dreidimensionalen Struktur eines Proteins, ohne dass die Primärstruktur (Aminosäuresequenz) verändert wird.Dabei verschieben sich Teile des Proteins, was häufig die Funktion oder Aktivität beeinflusst (z. B. bei Enzymen oder Rezeptoren).` },
  { id:'anki_vl02_275', vl:'vl02', cat:'Anki', source:'anki', q:`Was versteht man unter allosterischen Effekten?`, a:`Allosterische Effekte treten auf, wenn ein Molekül nicht am aktiven Zentrum, sondern an einer anderen Bindungsstelle (allosterische Stelle) eines Proteins bindet.Diese Bindung führt zu einer Strukturänderung des gesamten Proteins, wodurch sich die Eigenschaften des aktiven Zentrums verändern.Dadurch kann die Enzymaktivität entweder gesteigert oder gehemmt werden.` },
  { id:'anki_vl02_276', vl:'vl02', cat:'Anki', source:'anki', q:`Was bedeutet positive Allosterie?`, a:`Positive Allosterie bedeutet, dass die Bindung eines Moleküls an die allosterische Stelle eines Proteins die Aktivität oder Bindungsfähigkeit des Proteins erhöht.Dadurch wird z. B. die Bindung weiterer Substrate erleichtert oder die Reaktionsgeschwindigkeit eines Enzyms gesteigert.` },
  { id:'anki_vl02_277', vl:'vl02', cat:'Anki', source:'anki', q:`Was bedeutet negative Allosterie?`, a:`Negative Allosterie bedeutet, dass die Bindung eines Moleküls an die allosterische Stelle eines Proteins die Aktivität oder Bindungsfähigkeit des Proteins verringert.Dadurch wird die Bindung weiterer Liganden erschwert oder die Enzymaktivität gehemmt.` },
  { id:'anki_vl02_278', vl:'vl02', cat:'Anki', source:'anki', q:`Was versteht man unter einem Proteom?`, a:`Das Proteom ist die Gesamtheit aller Proteine, die in einer Zelle, einem Gewebe oder einem Organismus zu einem bestimmten Zeitpunkt vorhanden sind.Es ist dynamisch, da sich die Proteinzusammensetzung je nach Zelltyp, Entwicklungszustand und Umweltbedingungen verändern kann.` },
  { id:'anki_vl02_279', vl:'vl02', cat:'Anki', source:'anki', q:`Warum ist das Proteom komplexer als das Genom?`, a:`Das Proteom ist komplexer als das Genom, weil aus einem Gen mehrere verschiedene Proteine entstehen können.Dies geschieht durch alternatives Spleißen, RNA-Editing und posttranslationale Modifikationen, wodurch die Struktur und Funktion von Proteinen verändert werden.` },
  { id:'anki_vl02_280', vl:'vl02', cat:'Anki', source:'anki', q:`Welche Arten von Proteinen enthält das menschliche Proteom?`, a:`Das menschliche Proteom umfasst viele verschiedene Proteinarten,  z. B.:• Enzyme → katalysieren biochemische Reaktionen• Transkriptionsfaktoren → regulieren die Genexpression• Transportproteine → transportieren Moleküle innerhalb des Körpers• Signalproteine → vermitteln und steuern zelluläre SignalprozesseDiese Vielfalt ermöglicht die komplexen Funktionen des menschlichen Körpers.` },
  { id:'anki_vl02_281', vl:'vl02', cat:'Anki', source:'anki', q:`Wie viele proteinkodierende Gene besitzt der Mensch ungefähr?`, a:`Der Mensch besitzt etwa 20.000 proteinkodierende Gene.Trotz dieser relativ begrenzten Anzahl kann durch Mechanismen wie alternatives Spleißen und posttranslationale Modifikationen eine deutlich größere Vielfalt an Proteinen entstehen.` },
  { id:'anki_vl02_282', vl:'vl02', cat:'Anki', source:'anki', q:`Warum entstehen aus diesen Genen mehr Proteine?`, a:`Aus einem Gen können mehrere unterschiedliche Proteine entstehen, weil die mRNA unterschiedlich verarbeitet werden kann (alternatives Spleißen).Zusätzlich werden Proteine nach der Translation durch posttranslationale Modifikationen verändert, wodurch sich ihre Struktur und Funktion weiter anpassen.` },
  { id:'anki_vl02_283', vl:'vl02', cat:'Anki', source:'anki', q:`Was versteht man unter posttranslationalen Modifikationen?`, a:`Posttranslationale Modifikationen sind chemische Veränderungen eines Proteins nach der Translation.Sie dienen dazu, die Struktur, Aktivität, Stabilität oder Lokalisation eines Proteins zu verändern und seine biologische Funktion anzupassen.` },
  { id:'anki_vl02_284', vl:'vl02', cat:'Anki', source:'anki', q:`Nenne Beispiele für posttranslationale Modifikationen.`, a:`Typische Beispiele sind:• Phosphorylierung → Anlagerung einer Phosphatgruppe (meist an Serin, Threonin oder Tyrosin); dient häufig der Regulation der Enzymaktivität (an/aus-Schalter).• Glykosylierung → Anlagerung von Zuckerketten; wichtig für Protein-Stabilität, Zell-Zell-Erkennung und Transport (z. B. Membranproteine).• Acetylierung → Anlagerung einer Acetylgruppe (oft an Lysinreste); beeinflusst z. B. die Genexpression (bei Histonen) und die Proteinaktivität.Diese Modifikationen können z. B. die Aktivität eines Proteins regulieren, seine Stabilität verändern oder seine Lokalisation in der Zelle beeinflussen.` },
  { id:'anki_vl02_285', vl:'vl02', cat:'Anki', source:'anki', q:`Welche Rolle spielt Calcium bei manchen Proteinregulationen?`, a:`Calciumionen (Ca²⁺) wirken als second messenger in der Zelle und übertragen Signale innerhalb von Signalwegen.Durch die Bindung an bestimmte Proteine (z. B. Calmodulin) können sie Konformationsänderungen auslösen und dadurch die Aktivität von Enzymen oder anderen Proteinen regulieren.` },
  { id:'anki_vl02_286', vl:'vl02', cat:'Anki', source:'anki', q:`Nenne ein Beispiel für ein Ca²⁺-reguliertes Protein.`, a:`Ein wichtiges Beispiel ist Calmodulin.Calmodulin bindet Calciumionen (Ca²⁺) und verändert dabei seine Konformation, wodurch es andere Proteine aktivieren oder hemmen kann und so an der Signalweiterleitung in der Zelle beteiligt ist.` },
  { id:'anki_vl03_287', vl:'vl03', cat:'Anki', source:'anki', q:`In welcher Richtung wird die Aminosäuresequenz eines Proteins angegeben?`, a:`Die Aminosäuresequenz eines Proteins wird immer vom N-Terminus (Ende mit freier Aminogruppe, –NH₂) zum C-Terminus (Ende mit freier Carboxylgruppe, –COOH) angegeben.Das liegt daran, dass Proteine während der Translation in genau dieser Richtung aufgebaut werden, wobei neue Aminosäuren immer am C-Terminus angehängt werden.` },
  { id:'anki_vl03_288', vl:'vl03', cat:'Anki', source:'anki', q:`Was ist der N-Terminus eines Proteins?`, a:`Der N-Terminus ist das Ende einer Polypeptidkette mit einer freien Aminogruppe (–NH₂).Er stellt den Startpunkt der Aminosäuresequenz dar und ist das Ende, das bei der Proteinsynthese zuerst gebildet wird.` },
  { id:'anki_vl03_289', vl:'vl03', cat:'Anki', source:'anki', q:`Was ist der C-Terminus eines Proteins?`, a:`Der C-Terminus ist das Ende einer Polypeptidkette mit einer freien Carboxylgruppe (–COOH).Er stellt das Ende der Aminosäuresequenz dar und ist die Stelle, an die während der Proteinsynthese neue Aminosäuren angefügt werden.` },
  { id:'anki_vl03_290', vl:'vl03', cat:'Anki', source:'anki', q:`Welche Bindung verbindet Aminosäuren in Proteinen?`, a:`Aminosäuren werden in Proteinen durch Peptidbindungen miteinander verknüpft.Dabei handelt es sich um eine kovalente Bindung zwischen der Carboxylgruppe der einen und der Aminogruppe der nächsten Aminosäure, wodurch eine stabile Polypeptidkette entsteht.` },
  { id:'anki_vl03_291', vl:'vl03', cat:'Anki', source:'anki', q:`Wie entsteht eine Peptidbindung?`, a:`Eine Peptidbindung entsteht durch eine Kondensationsreaktion zwischen der Aminogruppe einer Aminosäure und der Carboxylgruppe einer anderen Aminosäure.Dabei wird Wasser (H₂O) abgespalten und es bildet sich eine kovalente Amidbindung, die die Aminosäuren zu einer Polypeptidkette verknüpft.` },
  { id:'anki_vl03_292', vl:'vl03', cat:'Anki', source:'anki', q:`Welche Eigenschaften besitzt die Peptidbindung?`, a:`Die Peptidbindung besitzt mehrere charakteristische Eigenschaften:• planare Struktur → alle beteiligten Atome liegen in einer Ebene• partieller Doppelbindungscharakter → durch Resonanz ist die Bindung teilweise doppelt gebunden• eingeschränkte Rotation → die Bindung ist starr und kann nicht frei rotierenDiese Eigenschaften sind wichtig für die räumliche Struktur von Proteinen.` },
  { id:'anki_vl03_293', vl:'vl03', cat:'Anki', source:'anki', q:`Warum ist die Peptidbindung planar?`, a:`Die Peptidbindung ist planar, weil sie Resonanzstrukturen (Mesomerie) besitzt.Dabei werden Elektronen zwischen der C–N-Bindung und der C=O-Gruppe delokalisiert, wodurch die Peptidbindung einen partiellen Doppelbindungscharakter erhält.Das führt dazu, dass die Bindung starr ist und alle beteiligten Atome in einer Ebene liegen.` },
  { id:'anki_vl03_294', vl:'vl03', cat:'Anki', source:'anki', q:`Welche zwei wichtigsten Sekundärstrukturen gibt es in Proteinen?`, a:`Die zwei wichtigsten Sekundärstrukturen sind:• α-Helix → eine schraubenförmige (helikale) Struktur der Polypeptidkette• β-Faltblatt → eine gefaltete, gestreckte Struktur aus mehreren PolypeptidsträngenBeide werden durch Wasserstoffbrückenbindungen zwischen Peptidgruppen stabilisiert.` },
  { id:'anki_vl03_295', vl:'vl03', cat:'Anki', source:'anki', q:`Wie wird die α-Helix stabilisiert?`, a:`Die α-Helix wird durch Wasserstoffbrückenbindungen zwischen den Peptidgruppen stabilisiert.Dabei bildet die C=O-Gruppe einer Aminosäure eine Wasserstoffbrücke mit der N–H-Gruppe einer etwa vier Positionen entfernten Aminosäure.Diese regelmäßigen Bindungen sorgen für die stabile, schraubenförmige Struktur der Helix.` },
  { id:'anki_vl03_296', vl:'vl03', cat:'Anki', source:'anki', q:`Welche Struktur besitzt die α-Helix?`, a:`Die α-Helix besitzt eine rechtsgängige, schraubenförmige (helikale) Struktur.Die Polypeptidkette windet sich dabei regelmäßig um eine Achse, wobei die Seitenketten der Aminosäuren nach außen zeigen, sodass sie nicht stören und mit der Umgebung interagieren können.` },
  { id:'anki_vl03_297', vl:'vl03', cat:'Anki', source:'anki', q:`Wie sind Seitenketten in der α-Helix orientiert?`, a:`Die Seitenketten der Aminosäuren ragen in der α-Helix nach außen von der Helix weg.Dadurch können sie untereinander oder mit der Umgebung interagieren, ohne die Stabilität der Helixstruktur zu stören.` },
  { id:'anki_vl03_298', vl:'vl03', cat:'Anki', source:'anki', q:`Was ist ein β-Faltblatt?`, a:`Ein β-Faltblatt ist eine sekundäre Proteinstruktur, die aus gestreckten Polypeptidketten (β-Strängen) besteht, die nebeneinander liegen.Diese Stränge sind durch Wasserstoffbrückenbindungen zwischen den Peptidgruppen verbunden und bilden eine gefaltete, blattartige Struktur.` },
  { id:'anki_vl03_299', vl:'vl03', cat:'Anki', source:'anki', q:`Welche zwei Formen von β-Faltblättern gibt es?`, a:`Es gibt zwei Formen von β-Faltblättern:• parallel → die Polypeptidstränge verlaufen in gleicher Richtung (N → C)• antiparallel → die Stränge verlaufen in entgegengesetzter Richtung (N → C und C → N)Die antiparallelen β-Faltblätter sind meist etwas stabiler, da ihre Wasserstoffbrücken günstiger angeordnet sind.` },
  { id:'anki_vl03_300', vl:'vl03', cat:'Anki', source:'anki', q:`Wie werden β-Faltblätter stabilisiert?`, a:`β-Faltblätter werden durch Wasserstoffbrückenbindungen zwischen den Peptidgruppen benachbarter Polypeptidstränge stabilisiert.Dabei bilden die C=O-Gruppen eines Strangs Wasserstoffbrücken mit den N–H-Gruppen eines anderen Strangs, wodurch die blattartige Struktur zusammengehalten wird.` },
  { id:'anki_vl03_301', vl:'vl03', cat:'Anki', source:'anki', q:`Was versteht man unter antiparallelen β-Faltblättern?`, a:`Antiparallele β-Faltblätter bestehen aus Polypeptidsträngen, die in entgegengesetzter Richtung verlaufen (ein Strang N → C, der andere C → N).Dadurch können sich geradlinige und stabilere Wasserstoffbrückenbindungen zwischen den Strängen ausbilden, was diese Struktur besonders stabil macht.` },
  { id:'anki_vl03_302', vl:'vl03', cat:'Anki', source:'anki', q:`Was versteht man unter parallelen β-Faltblättern?`, a:`Parallele β-Faltblätter bestehen aus Polypeptidsträngen, die in gleicher Richtung verlaufen (alle N → C).Die Wasserstoffbrückenbindungen zwischen den Strängen sind dabei etwas schräger angeordnet und daher meist weniger stabil als bei antiparallelen β-Faltblättern.` },
  { id:'anki_vl03_303', vl:'vl03', cat:'Anki', source:'anki', q:`Warum ist die Proteinstruktur für die Funktion entscheidend?`, a:`Die dreidimensionale Struktur eines Proteins bestimmt, wie es mit anderen Molekülen interagieren kann (z. B. Substraten, Liganden oder anderen Proteinen).Nur die korrekte Faltung ermöglicht die spezifische Bindung und Funktion, weshalb schon kleine Strukturänderungen die Funktion stark beeinflussen oder aufheben können.` },
  { id:'anki_vl03_304', vl:'vl03', cat:'Anki', source:'anki', q:`Was passiert bei Fehlfaltung eines Proteins?`, a:`Bei einer Fehlfaltung nimmt ein Protein nicht seine korrekte dreidimensionale Struktur an.Dadurch kann es seine normale Funktion verlieren oder fehlgefaltete Aggregate bilden, die für die Zelle schädlich sein können und z. B. bei neurodegenerativen Erkrankungen auftreten.` },
  { id:'anki_vl03_305', vl:'vl03', cat:'Anki', source:'anki', q:`Nenne ein Beispiel für Krankheiten durch Proteinfehlfaltung.`, a:`Beispiele sind Alzheimer-Krankheit, bei der sich fehlgefaltete Proteine zu Amyloid-Plaques zusammenlagern, sowie Prionenerkrankungen (z. B. Creutzfeldt-Jakob-Krankheit), bei denen fehlgefaltete Proteine andere Proteine ebenfalls zur Fehlfaltung anregen.` },
  { id:'anki_vl03_306', vl:'vl03', cat:'Anki', source:'anki', q:`Warum können Sekundärstrukturen in Proteinmodellen erkannt werden?`, a:`Sekundärstrukturen wie α-Helices und β-Faltblätter besitzen typische, regelmäßige geometrische Formen.Diese entstehen durch definierte Wasserstoffbrückenbindungen zwischen Peptidgruppen, wodurch sich charakteristische Muster bilden, die in Strukturmodellen leicht erkannt werden können.` },
  { id:'anki_vl03_307', vl:'vl03', cat:'Anki', source:'anki', q:`Welche Wechselwirkungen stabilisieren Proteinstrukturen zusätzlich?`, a:`Proteinstrukturen werden durch verschiedene Wechselwirkungen stabilisiert:• Wasserstoffbrückenbindungen → zwischen polaren Gruppen• hydrophobe Wechselwirkungen → unpolare Aminosäuren lagern sich im Inneren zusammen• ionische Bindungen (Salzbrücken) → zwischen positiv und negativ geladenen Seitenketten• Disulfidbrücken → kovalente Bindungen zwischen zwei CysteinrestenDiese Kräfte sorgen gemeinsam für die stabile dreidimensionale Struktur von Proteinen.` },
  { id:'anki_vl03_308', vl:'vl03', cat:'Anki', source:'anki', q:`Welche Bedeutung haben hydrophobe Wechselwirkungen in Proteinen?`, a:`Hydrophobe Wechselwirkungen spielen eine zentrale Rolle bei der Faltung von Proteinen im wässrigen Milieu.Dabei lagern sich unpolare (hydrophobe) Aminosäuren im Inneren des Proteins zusammen, während polare Gruppen nach außen zeigen.Dies führt zu einer stabilen, energetisch günstigen dreidimensionalen Struktur.` },
  { id:'anki_vl04_309', vl:'vl04', cat:'Anki', source:'anki', q:`Was versteht man unter der Tertiärstruktur eines Proteins?`, a:`Die Tertiärstruktur beschreibt die dreidimensionale Gesamtstruktur eines einzelnen Polypeptids.Sie entsteht durch die räumliche Anordnung aller Sekundärstrukturen und wird durch verschiedene Wechselwirkungen wie hydrophobe Effekte, Wasserstoffbrücken, ionische Bindungen und Disulfidbrücken stabilisiert.` },
  { id:'anki_vl04_310', vl:'vl04', cat:'Anki', source:'anki', q:`Welche Wechselwirkungen stabilisieren die Tertiärstruktur eines Proteins?`, a:`Die Tertiärstruktur eines Proteins wird durch mehrere Wechselwirkungen stabilisiert:• hydrophobe Wechselwirkungen → unpolare Aminosäuren lagern sich im Inneren zusammen• Wasserstoffbrückenbindungen → zwischen polaren Gruppen• ionische Bindungen (Salzbrücken) → zwischen geladenen Seitenketten• Disulfidbrücken → kovalente Bindungen zwischen zwei CysteinrestenDiese Wechselwirkungen sorgen gemeinsam für die stabile räumliche Faltung des Proteins.` },
  { id:'anki_vl04_311', vl:'vl04', cat:'Anki', source:'anki', q:`Was sind Disulfidbrücken?`, a:`Disulfidbrücken sind kovalente Bindungen zwischen zwei Cysteinresten, die durch die Oxidation von zwei Thiolgruppen (–SH) entstehen.Sie stabilisieren die dreidimensionale Struktur von Proteinen, insbesondere bei extrazellulären Proteinen, und tragen zur Festigkeit der Tertiär- oder Quartärstruktur bei.` },
  { id:'anki_vl04_312', vl:'vl04', cat:'Anki', source:'anki', q:`Welche Bedeutung haben hydrophobe Wechselwirkungen für Proteinstrukturen?`, a:`Hydrophobe Wechselwirkungen führen dazu, dass sich unpolare Aminosäuren im Inneren eines Proteins zusammenlagern und den Kontakt mit Wasser vermeiden.Dadurch entsteht ein hydrophober Kern, der wesentlich zur stabilen Faltung und energetisch günstigen Struktur des Proteins beiträgt.` },
  { id:'anki_vl04_313', vl:'vl04', cat:'Anki', source:'anki', q:`Was versteht man unter der Quartärstruktur eines Proteins?`, a:`Die Quartärstruktur beschreibt die räumliche Anordnung und Wechselwirkung mehrerer Polypeptidketten (Untereinheiten) zu einem funktionellen Protein.Diese Untereinheiten werden durch nicht-kovalente Wechselwirkungen (z. B. hydrophobe Effekte, Wasserstoffbrücken, ionische Bindungen) und teilweise auch durch Disulfidbrücken zusammengehalten.` },
  { id:'anki_vl04_314', vl:'vl04', cat:'Anki', source:'anki', q:`Wie nennt man einzelne Untereinheiten eines Proteins mit Quartärstruktur?`, a:`Die einzelnen Polypeptidketten eines Proteins mit Quartärstruktur werden als Untereinheiten (Subunits) bezeichnet.Jede Subunit kann eine eigene Struktur und Funktion besitzen und trägt gemeinsam mit den anderen zur Gesamtfunktion des Proteins bei.` },
  { id:'anki_vl04_315', vl:'vl04', cat:'Anki', source:'anki', q:`Nenne ein Beispiel für ein Protein mit Quartärstruktur.`, a:`Ein klassisches Beispiel ist Hämoglobin.Es besteht aus vier Untereinheiten (Subunits) und kann dadurch Sauerstoff effizient binden und transportieren, wobei die Untereinheiten kooperativ zusammenarbeiten.` },
  { id:'anki_vl04_316', vl:'vl04', cat:'Anki', source:'anki', q:`Wie viele Untereinheiten besitzt Hämoglobin?`, a:`Hämoglobin besitzt vier Untereinheiten (2 α- und 2 β-Ketten).Diese Struktur ermöglicht eine kooperative Sauerstoffbindung, wodurch die Effizienz des Sauerstofftransports im Blut erhöht wird.` },
  { id:'anki_vl04_317', vl:'vl04', cat:'Anki', source:'anki', q:`Welche Wechselwirkungen stabilisieren die Quartärstruktur?`, a:`Die Quartärstruktur wird vor allem durch nicht-kovalente Wechselwirkungen zwischen den Untereinheiten stabilisiert:• hydrophobe Wechselwirkungen → treiben die Zusammenlagerung der Subunits• ionische Wechselwirkungen (Salzbrücken) → zwischen geladenen Seitenketten• Wasserstoffbrückenbindungen → zwischen polaren GruppenIn manchen Fällen können zusätzlich auch Disulfidbrücken zur Stabilisierung beitragen.` },
  { id:'anki_vl04_318', vl:'vl04', cat:'Anki', source:'anki', q:`Was versteht man unter Proteinmotiven?`, a:`Proteinmotive sind wiederkehrende, charakteristische Kombinationen von Sekundärstrukturen (z. B. α-Helices und β-Faltblätter), die häufig in verschiedenen Proteinen vorkommen.Sie stellen oft funktionelle oder strukturelle Bausteine dar und sind wichtig für bestimmte Bindungs- oder Aktivitätsfunktionen.` },
  { id:'anki_vl04_319', vl:'vl04', cat:'Anki', source:'anki', q:`Nenne Beispiele für Proteinmotive.`, a:`Typische Beispiele für Proteinmotive sind:• Helix-Turn-Helix-Motiv → häufig in DNA-bindenden Proteinen (z. B. Transkriptionsfaktoren)• β-α-β-Motiv → besteht aus zwei β-Strängen und einer dazwischenliegenden α-Helix und ist ein häufiges strukturelles Element in EnzymenDiese Motive dienen oft als funktionelle Bausteine innerhalb von Proteinen.` },
  { id:'anki_vl04_320', vl:'vl04', cat:'Anki', source:'anki', q:`Was versteht man unter Proteindomänen?`, a:`Proteindomänen sind strukturelle und funktionelle Einheiten eines Proteins, die sich unabhängig voneinander falten können.Sie besitzen oft eine eigene spezifische Funktion (z. B. Bindung von Liganden) und ermöglichen es, dass ein Protein mehrere Funktionen kombinieren kann.` },
  { id:'anki_vl04_321', vl:'vl04', cat:'Anki', source:'anki', q:`Welche Funktion können Proteindomänen besitzen?`, a:`Proteindomänen können spezifische Funktionen oder Bindungen vermitteln, z. B. die Bindung von Liganden, DNA oder anderen Proteinen.Dadurch ermöglichen sie, dass ein Protein gezielt mit bestimmten Molekülen interagiert und komplexe biologische Funktionen ausführt.` },
  { id:'anki_vl04_322', vl:'vl04', cat:'Anki', source:'anki', q:`Warum besitzen viele Proteine mehrere Domänen?`, a:`Viele Proteine besitzen mehrere Domänen, um verschiedene Funktionen in einem einzigen Protein zu vereinen.Jede Domäne kann eine spezifische Aufgabe übernehmen (z. B. Bindung, Katalyse oder Regulation), sodass das Protein komplexe und koordinierte Funktionen ausführen kann.` },
  { id:'anki_vl05_323', vl:'vl05', cat:'Anki', source:'anki', q:`Wie können sich Proteine im Verlauf der Evolution verändern?`, a:`Proteine können sich im Verlauf der Evolution durch Mutationen, Genduplikationen und Rekombinationen verändern.Diese Prozesse führen zu Veränderungen in der Aminosäuresequenz, wodurch sich Struktur und Funktion von Proteinen anpassen oder neue Funktionen entstehen können.` },
  { id:'anki_vl05_324', vl:'vl05', cat:'Anki', source:'anki', q:`Was versteht man unter einer Genmutation?`, a:`Eine Genmutation ist eine Veränderung der DNA-Sequenz eines Gens.Sie kann dazu führen, dass sich die Aminosäuresequenz eines Proteins verändert, was wiederum Struktur und Funktion des Proteins beeinflussen kann.` },
  { id:'anki_vl05_325', vl:'vl05', cat:'Anki', source:'anki', q:`Was versteht man unter einer Genduplikation?`, a:`Eine Genduplikation ist die Verdopplung eines Gens im Genom, sodass zwei identische Genkopien vorliegen.Eine dieser Kopien kann ihre ursprüngliche Funktion beibehalten, während die andere sich durch Mutationen weiterentwickeln und neue Funktionen ausbilden kann.` },
  { id:'anki_vl05_326', vl:'vl05', cat:'Anki', source:'anki', q:`Warum sind Genduplikationen wichtig für die Evolution?`, a:`Genduplikationen sind wichtig, weil sie eine zusätzliche Genkopie bereitstellen.Dadurch kann eine Kopie die ursprüngliche Funktion beibehalten, während die andere durch Mutationen neue Funktionen entwickeln kann, ohne dass ein Funktionsverlust entsteht.` },
  { id:'anki_vl05_327', vl:'vl05', cat:'Anki', source:'anki', q:`Was versteht man unter Exon-Shuffling?`, a:`Exon-Shuffling bezeichnet die Rekombination von Exons verschiedener Gene, wodurch neue Kombinationen von Proteinbausteinen (Domänen) entstehen.Dadurch können Proteine mit neuen Strukturen und Funktionen gebildet werden, was eine wichtige Rolle in der Evolution von Proteinen spielt.` },
  { id:'anki_vl05_328', vl:'vl05', cat:'Anki', source:'anki', q:`Was versteht man unter Sequenzhomologie?`, a:`Sequenzhomologie bezeichnet die Ähnlichkeit von DNA- oder Proteinsequenzen, die auf eine gemeinsame evolutionäre Abstammung zurückzuführen ist.Solche Ähnlichkeiten können Hinweise darauf geben, dass Moleküle eine ähnliche Struktur oder Funktion besitzen.` },
  { id:'anki_vl05_329', vl:'vl05', cat:'Anki', source:'anki', q:`Was sind evolutionär konservierte Proteine?`, a:`Evolutionär konservierte Proteine sind Proteine, deren Struktur und Funktion über lange Zeiträume der Evolution hinweg kaum verändert wurden.Das deutet darauf hin, dass sie lebenswichtige Funktionen erfüllen, sodass Veränderungen oft nachteilige Auswirkungen hätten.` },
  { id:'anki_vl05_330', vl:'vl05', cat:'Anki', source:'anki', q:`Warum sind konservierte Proteine wichtig?`, a:`Konservierte Proteine sind wichtig, weil sie grundlegende und lebenswichtige Funktionen in Zellen erfüllen.Da ihre Struktur und Funktion über die Evolution hinweg erhalten geblieben sind, sind sie oft essentiell für zentrale Prozesse wie Stoffwechsel, Zellteilung oder Genexpression.` },
  { id:'anki_vl05_331', vl:'vl05', cat:'Anki', source:'anki', q:`Was sind Proteindatenbanken?`, a:`Proteindatenbanken sind Sammlungen von Informationen über Proteine, insbesondere ihre Aminosäuresequenzen und dreidimensionalen Strukturen.Sie ermöglichen es, Proteine zu vergleichen, zu analysieren und ihre Funktion oder Struktur vorherzusagen.` },
  { id:'anki_vl05_332', vl:'vl05', cat:'Anki', source:'anki', q:`Nenne Beispiele für Proteindatenbanken.`, a:`Beispiele für wichtige Proteindatenbanken sind:• UniProt → enthält umfassende Informationen zu Proteinsequenzen und deren Funktion• Protein Data Bank (PDB) → enthält dreidimensionale Strukturen von Proteinen und anderen BiomolekülenDiese Datenbanken sind zentrale Werkzeuge in der biochemischen und medizinischen Forschung.` },
  { id:'anki_vl05_333', vl:'vl05', cat:'Anki', source:'anki', q:`Welche Bedeutung haben Proteindatenbanken für die Forschung?`, a:`Proteindatenbanken ermöglichen den Vergleich und die Analyse von Proteinen, z. B. hinsichtlich ihrer Sequenz und Struktur.Sie helfen außerdem dabei, Struktur und Funktion unbekannter Proteine vorherzusagen und sind damit ein wichtiges Werkzeug für biochemische, medizinische und pharmazeutische Forschung.` },
  { id:'anki_vl06_334', vl:'vl06', cat:'Anki', source:'anki', q:`Was sind Enzyme?`, a:`Enzyme sind biologische Katalysatoren, die biochemische Reaktionen beschleunigen, ohne dabei selbst verbraucht zu werden.Sie wirken, indem sie die Aktivierungsenergie einer Reaktion senken, sodass Reaktionen unter physiologischen Bedingungen schnell und effizient ablaufen können.` },
  { id:'anki_vl06_335', vl:'vl06', cat:'Anki', source:'anki', q:`Welche Eigenschaft besitzen Enzyme bezüglich der Aktivierungsenergie?`, a:`Enzyme senken die Aktivierungsenergie einer Reaktion, indem sie den Übergangszustand stabilisieren.Dadurch können Reaktionen schneller ablaufen, ohne dass sich die Gleichgewichtslage der Reaktion verändert.` },
  { id:'anki_vl06_336', vl:'vl06', cat:'Anki', source:'anki', q:`Werden Enzyme während einer Reaktion verbraucht?`, a:`Nein, Enzyme werden während einer Reaktion nicht verbraucht und liegen nach der Reaktion unverändert vor.Sie können daher mehrfach hintereinander verwendet werden und katalysieren viele Reaktionszyklen.` },
  { id:'anki_vl06_337', vl:'vl06', cat:'Anki', source:'anki', q:`Warum sind Enzyme hochspezifisch?`, a:`Enzyme sind hochspezifisch, weil ihr aktives Zentrum eine genau passende räumliche Struktur und chemische Eigenschaften besitzt.Dadurch können sie nur bestimmte Substrate binden (Substratspezifität) und meist nur eine bestimmte Reaktion katalysieren (Reaktionsspezifität).` },
  { id:'anki_vl06_338', vl:'vl06', cat:'Anki', source:'anki', q:`Was ist das aktive Zentrum eines Enzyms?`, a:`Das aktive Zentrum ist der spezifische Bereich eines Enzyms, an dem das Substrat bindet und die chemische Reaktion katalysiert wird.Es besteht aus bestimmten Aminosäureseitenketten, die die Bindung des Substrats ermöglichen und den Übergangszustand stabilisieren.` },
  { id:'anki_vl06_339', vl:'vl06', cat:'Anki', source:'anki', q:`Was versteht man unter Substratspezifität?`, a:`Substratspezifität bedeutet, dass ein Enzym nur bestimmte Substrate binden kann, da das aktive Zentrum räumlich und chemisch genau auf diese Substrate abgestimmt ist.Dieses Prinzip wird oft mit dem Schlüssel-Schloss- oder Induced-Fit-Modell beschrieben.` },
  { id:'anki_vl06_340', vl:'vl06', cat:'Anki', source:'anki', q:`Was versteht man unter Reaktionsspezifität?`, a:`Reaktionsspezifität bedeutet, dass ein Enzym nur eine ganz bestimmte chemische Reaktion katalysiert, selbst wenn es an dasselbe Substrat gebunden ist.Das liegt daran, dass das aktive Zentrum so aufgebaut ist, dass es nur einen bestimmten Reaktionsmechanismus ermöglicht.` },
  { id:'anki_vl06_341', vl:'vl06', cat:'Anki', source:'anki', q:`Was versteht man unter Stereospezifität?`, a:`Stereospezifität bedeutet, dass ein Enzym nur eine bestimmte räumliche Form (Stereoisomer) eines Moleküls erkennt und umsetzt.Das aktive Zentrum ist dreidimensional exakt angepasst, sodass z. B. nur ein Enantiomer gebunden und umgesetzt wird, während andere Formen nicht passen.` },
  { id:'anki_vl06_342', vl:'vl06', cat:'Anki', source:'anki', q:`Was sind Cofaktoren?`, a:`Cofaktoren sind nicht-proteinartige Moleküle oder Ionen, die für die Aktivität eines Enzyms notwendig sind.Sie unterstützen das Enzym z. B. bei der Substratbindung, Stabilisierung des Übergangszustands oder Durchführung der Reaktion.` },
  { id:'anki_vl06_343', vl:'vl06', cat:'Anki', source:'anki', q:`Welche Arten von Cofaktoren gibt es?`, a:`Es gibt zwei Hauptarten von Cofaktoren:• Metallionen → z. B. Mg²⁺, Zn²⁺; sie können Ladungen stabilisieren, Substrate binden oder an Reaktionen teilnehmen• Coenzyme → organische Moleküle, die als Überträger von Elektronen oder funktionellen Gruppen fungieren (z. B. NAD⁺, FAD)Beide sind entscheidend für die korrekte Funktion vieler Enzyme.` },
  { id:'anki_vl06_344', vl:'vl06', cat:'Anki', source:'anki', q:`Was sind Coenzyme?`, a:`Coenzyme sind organische Cofaktoren, die Enzyme bei chemischen Reaktionen unterstützen.Sie wirken oft als Überträger von Elektronen oder funktionellen Gruppen (z. B. NAD⁺, FAD) und werden dabei vorübergehend chemisch verändert, anschließend aber wieder regeneriert.` },
  { id:'anki_vl06_345', vl:'vl06', cat:'Anki', source:'anki', q:`Nenne Beispiele für Coenzyme.`, a:`Typische Beispiele für Coenzyme sind:• NAD⁺ (Nicotinamid-Adenin-Dinukleotid) → überträgt Elektronen und Protonen in Redoxreaktionen• FAD (Flavin-Adenin-Dinukleotid) → ebenfalls ein Elektronenüberträger im Energiestoffwechsel• Coenzym A (CoA) → überträgt Acylgruppen (z. B. Acetylgruppen) im StoffwechselDiese Coenzyme sind zentral für viele Stoffwechselprozesse.` },
  { id:'anki_vl06_346', vl:'vl06', cat:'Anki', source:'anki', q:`Welche Rolle spielen Metallionen als Cofaktoren?`, a:`Metallionen wirken als Cofaktoren, indem sie Reaktionszustände stabilisieren, Ladungen ausgleichen oder die Bindung von Substraten erleichtern.Sie können außerdem direkt an der Katalyse beteiligt sein, z. B. durch Elektronenübertragung oder Aktivierung von Molekülen.` },
  { id:'anki_vl06_347', vl:'vl06', cat:'Anki', source:'anki', q:`Was versteht man unter Enzymklassen?`, a:`Enzymklassen sind eine Einteilung von Enzymen nach der Art der Reaktion, die sie katalysieren.Diese Klassifizierung hilft, Enzyme systematisch zu ordnen und ihre Funktion besser zu verstehen, da Enzyme mit ähnlicher Funktion in dieselbe Klasse eingeordnet werden.` },
  { id:'anki_vl06_348', vl:'vl06', cat:'Anki', source:'anki', q:`Wie viele Hauptklassen von Enzymen gibt es?`, a:`Es gibt sechs Hauptklassen von Enzymen.Diese werden nach der Art der katalysierten Reaktion eingeteilt und umfassen z. B. Oxidoreduktasen, Transferasen und Hydrolasen.` },
  { id:'anki_vl06_349', vl:'vl06', cat:'Anki', source:'anki', q:`Welche sechs Hauptklassen von Enzymen gibt es und was ist ihre jeweilige Funktion?`, a:`Es gibt sechs Enzymklassen, die nach der Art der von ihnen katalysierten Reaktion eingeteilt werden:• Oxidoreduktasen → katalysieren Redoxreaktionen (Elektronenübertragung)• Transferasen → übertragen funktionelle Gruppen (z. B. Methyl-, Phosphatgruppen)• Hydrolasen → spalten Bindungen durch Wasser (Hydrolyse)• Lyasen → spalten oder bilden Bindungen ohne Wasser oder ATP, oft unter Bildung von Doppelbindungen• Isomerasen → katalysieren Umlagerungen innerhalb eines Moleküls• Ligasen → verknüpfen Moleküle unter Verbrauch von ATP` },
  { id:'anki_vl06_350', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Oxidoreduktasen und was passiert dabei genau?`, a:`Oxidoreduktasen katalysieren Redoxreaktionen, also Reaktionen, bei denen Elektronen von einem Molekül auf ein anderes übertragen werden.Dabei wird ein Stoff oxidiert (gibt Elektronen ab) und ein anderer reduziert (nimmt Elektronen auf).` },
  { id:'anki_vl06_351', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Transferasen und was geschieht dabei genau?`, a:`Transferasen katalysieren die Übertragung funktioneller Gruppen (z. B. Methyl-, Amino- oder Phosphatgruppen) von einem Molekül (Donor) auf ein anderes (Akzeptor).Dabei wird die funktionelle Gruppe gezielt von einem Substrat auf ein anderes übertragen.` },
  { id:'anki_vl06_352', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Hydrolasen und wie funktioniert der Mechanismus?`, a:`Hydrolasen katalysieren die hydrolytische Spaltung von Bindungen, indem sie Wasser in die Reaktion einbauen.Dabei wird eine chemische Bindung durch Addition von H₂O gespalten, z. B. bei der Spaltung von Peptid-, Ester- oder glykosidischen Bindungen.` },
  { id:'anki_vl06_353', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Lyasen und wie funktioniert der Mechanismus?`, a:`Lyasen katalysieren die Spaltung oder Bildung von chemischen Bindungen ohne Einsatz von Wasser oder ATP.Dabei entstehen häufig Doppelbindungen oder es werden Gruppen an Doppelbindungen addiert.` },
  { id:'anki_vl06_354', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Isomerasen und was passiert dabei genau?`, a:`Isomerasen katalysieren Umlagerungen innerhalb eines Moleküls, bei denen die Struktur verändert wird, ohne dass Atome hinzugefügt oder entfernt werden.Dabei entstehen Isomere, also Moleküle mit gleicher Summenformel, aber unterschiedlicher Struktur.` },
  { id:'anki_vl06_355', vl:'vl06', cat:'Anki', source:'anki', q:`Was katalysieren Ligasen und wie läuft die Reaktion ab?`, a:`Ligasen katalysieren die Verknüpfung zweier Moleküle, wobei Energie aus ATP verbraucht wird.Dabei wird eine neue kovalente Bindung gebildet, oft unter Spaltung von ATP zu ADP oder AMP.` },
  { id:'anki_vl06_356', vl:'vl06', cat:'Anki', source:'anki', q:`Warum sind Enzyme für den Stoffwechsel unverzichtbar?`, a:`Enzyme sind unverzichtbar, weil sie biochemische Reaktionen stark beschleunigen, indem sie die Aktivierungsenergie senken.Dadurch können Reaktionen unter physiologischen Bedingungen (Temperatur, pH) überhaupt effizient ablaufen und der Stoffwechsel bleibt funktionsfähig.` },
  { id:'anki_vl06_357', vl:'vl06', cat:'Anki', source:'anki', q:`Warum wären viele Stoffwechselreaktionen ohne Enzyme zu langsam?`, a:`Ohne Enzyme wäre die Aktivierungsenergie vieler Reaktionen zu hoch, sodass nur sehr wenige Teilchen die nötige Energie besitzen.Dadurch würden die Reaktionen extrem langsam oder praktisch gar nicht ablaufen.` },
  { id:'anki_vl07_358', vl:'vl07', cat:'Anki', source:'anki', q:`Warum ist die Peptidbindung chemisch sehr stabil?`, a:`Die Peptidbindung ist stabil, weil sie durch Resonanzstrukturen einen partiellen Doppelbindungscharakter besitzt.Dadurch ist die Bindung planar, wenig reaktiv und ihre Rotation stark eingeschränkt.` },
  { id:'anki_vl07_359', vl:'vl07', cat:'Anki', source:'anki', q:`Warum findet die spontane Hydrolyse von Peptidbindungen kaum statt?`, a:`Die spontane Hydrolyse erfolgt kaum, weil die Aktivierungsenergie sehr hoch ist.Obwohl die Spaltung thermodynamisch möglich ist, läuft sie ohne Enzyme extrem langsam ab.` },
  { id:'anki_vl07_360', vl:'vl07', cat:'Anki', source:'anki', q:`Wie können Proteasen Peptidbindungen trotzdem spalten?`, a:`Proteasen spalten Peptidbindungen durch enzymatische Katalyse, indem sie die Aktivierungsenergie deutlich senken.Sie stabilisieren den Übergangszustand und ermöglichen so eine schnelle Hydrolyse der Peptidbindung unter physiologischen Bedingungen.` },
  { id:'anki_vl07_361', vl:'vl07', cat:'Anki', source:'anki', q:`Was versteht man unter enzymatischer Katalyse?`, a:`Unter enzymatischer Katalyse versteht man die Beschleunigung einer chemischen Reaktion durch ein Enzym, indem die Aktivierungsenergie gesenkt wird.Das Enzym bindet das Substrat im aktiven Zentrum, stabilisiert den Übergangszustand und wird dabei nicht verbraucht.` },
  { id:'anki_vl07_362', vl:'vl07', cat:'Anki', source:'anki', q:`Welche Rolle spielt der Übergangszustand bei enzymatischen Reaktionen?`, a:`Der Übergangszustand ist der energiereichste Zustand einer Reaktion.Enzyme stabilisieren gezielt diesen Übergangszustand, wodurch die Aktivierungsenergie sinkt und die Reaktion schneller ablaufen kann.` },
  { id:'anki_vl07_363', vl:'vl07', cat:'Anki', source:'anki', q:`Was versteht man unter Säure-Base-Katalyse?`, a:`Unter Säure-Base-Katalyse versteht man die Übertragung von Protonen (H⁺) während einer Reaktion durch das Enzym.Dabei wirken Aminosäurereste im aktiven Zentrum als Protonendonoren oder -akzeptoren und erleichtern so die Spaltung oder Bildung von Bindungen.` },
  { id:'anki_vl07_364', vl:'vl07', cat:'Anki', source:'anki', q:`Welche Moleküle können als Säuren oder Basen im aktiven Zentrum wirken?`, a:`Im aktiven Zentrum wirken vor allem Seitenketten bestimmter Aminosäuren als Säuren oder Basen.Typische Beispiele sind:• Histidin (häufig Protonenüberträger)• Aspartat und Glutamat (sauer, Protonendonoren)• Lysin und Arginin (basisch, Protonenakzeptoren)• Serin, Tyrosin, Cystein (können ebenfalls an Protonenübertragungen beteiligt sein)` },
  { id:'anki_vl07_365', vl:'vl07', cat:'Anki', source:'anki', q:`Was versteht man unter kovalenter Katalyse bei enzymatischen Reaktionen?`, a:`Unter kovalenter Katalyse versteht man die vorübergehende Bildung einer kovalenten Bindung zwischen Enzym und Substrat.Dabei entsteht ein reaktives Zwischenprodukt (Enzym-Substrat-Komplex), das die Reaktion erleichtert und anschließend wieder aufgelöst wird, sodass das Enzym unverändert vorliegt.` },
  { id:'anki_vl07_366', vl:'vl07', cat:'Anki', source:'anki', q:`Was versteht man unter Metallionenkatalyse bei enzymatischen Reaktionen?`, a:`Unter Metallionenkatalyse versteht man die Beteiligung von Metallionen (z. B. Zn²⁺, Mg²⁺, Fe²⁺/Fe³⁺) an enzymatischen Reaktionen.Diese Metallionen können• Ladungen stabilisieren• Substrate richtig ausrichten• Elektronenübertragungen erleichternund dadurch die Aktivierungsenergie der Reaktion senken.` },
  { id:'anki_vl07_367', vl:'vl07', cat:'Anki', source:'anki', q:`Welche Rolle können Metallionen in Enzymen spielen?`, a:`Metallionen können in Enzymen mehrere wichtige Funktionen übernehmen:• Stabilisierung von Ladungen im Übergangszustand• Ausrichtung und Bindung von Substraten im aktiven Zentrum• Beteiligung an Elektronenübertragungen (Redoxreaktionen)Dadurch tragen sie wesentlich zur Erniedrigung der Aktivierungsenergie und zur Effizienz der Katalyse bei.` },
  { id:'anki_vl07_368', vl:'vl07', cat:'Anki', source:'anki', q:`Welche Funktion haben Proteasen und wie wirken sie?`, a:`Proteasen sind Enzyme, die Peptidbindungen in Proteinen hydrolytisch spalten.Sie zerlegen Proteine in kleinere Peptide oder einzelne Aminosäuren, indem sie Wasser in die Bindung einbauen und so die Spaltung ermöglichen.` },
  { id:'anki_vl07_369', vl:'vl07', cat:'Anki', source:'anki', q:`Was sind Serinproteasen und wie funktionieren sie?`, a:`Serinproteasen sind Proteasen, die eine reaktive Serin-Seitenkette im aktiven Zentrum besitzen.Dieses Serin greift das Substrat nukleophil an und bildet eine kovalente Zwischenstufe, wodurch die Spaltung der Peptidbindung ermöglicht wird.` },
  { id:'anki_vl07_370', vl:'vl07', cat:'Anki', source:'anki', q:`Nenne wichtige Beispiele für Serinproteasen.`, a:`Wichtige Beispiele für Serinproteasen sind:• Trypsin → spaltet Peptidbindungen nach basischen Aminosäuren• Chymotrypsin → spaltet nach aromatischen Aminosäuren• Elastase → spaltet nach kleinen, unpolaren AminosäurenAlle besitzen eine Serin-Seitenkette im aktiven Zentrum, die für die katalytische Aktivität entscheidend ist.` },
  { id:'anki_vl07_371', vl:'vl07', cat:'Anki', source:'anki', q:`Welche Rolle spielt Trypsin im Körper und wie wirkt es?`, a:`Trypsin ist ein Verdauungsenzym im Dünndarm, das Proteine spaltet.Es schneidet Peptidbindungen gezielt nach basischen Aminosäuren (v. a. Lysin und Arginin) und ermöglicht so die Zerlegung von Proteinen in kleinere Peptide.` },
  { id:'anki_vl07_372', vl:'vl07', cat:'Anki', source:'anki', q:`Was sind Ribozyme und welche Bedeutung haben sie?`, a:`Ribozyme sind RNA-Moleküle mit katalytischer Aktivität, die selbst chemische Reaktionen beschleunigen können.Sie zeigen, dass nicht nur Proteine, sondern auch RNA als Enzym wirken kann, z. B. bei der RNA-Spaltung oder -Verarbeitung.` },
  { id:'anki_vl07_373', vl:'vl07', cat:'Anki', source:'anki', q:`Nenne Beispiele für biologische Prozesse, bei denen Ribozyme eine Rolle spielen.`, a:`Beispiele für Prozesse mit Ribozymen sind:• RNA-Splicing (z. B. Selbstspleißen bestimmter Introns)• Peptidbindungsknüpfung im Ribosom (katalysiert durch rRNA)• RNA-Prozessierung und -SpaltungDiese zeigen, dass RNA selbst katalytisch aktiv sein kann.` },
  { id:'anki_vl08_374', vl:'vl08', cat:'Anki', source:'anki', q:`Was beschreibt die Michaelis-Menten-Kinetik und was sagt sie aus?`, a:`Die Michaelis-Menten-Kinetik beschreibt die Abhängigkeit der Reaktionsgeschwindigkeit eines Enzyms von der Substratkonzentration.Sie zeigt, wie die Geschwindigkeit mit steigender Substratkonzentration zunimmt, bis das Enzym gesättigt ist (Vmax) und keine weitere Steigerung mehr möglich ist.` },
  { id:'anki_vl08_375', vl:'vl08', cat:'Anki', source:'anki', q:`Was versteht man unter der Reaktionsgeschwindigkeit eines Enzyms?`, a:`Die Reaktionsgeschwindigkeit eines Enzyms ist die Menge an Produkt, die pro Zeiteinheit gebildet wird (oder die Menge an Substrat, die umgesetzt wird).Sie beschreibt also, wie schnell eine enzymatische Reaktion abläuft.` },
  { id:'anki_vl08_376', vl:'vl08', cat:'Anki', source:'anki', q:`Was beschreibt Vmax in der Enzymkinetik?`, a:`Vmax ist die maximale Reaktionsgeschwindigkeit, die ein Enzym erreichen kann.Sie wird erreicht, wenn alle aktiven Zentren des Enzyms mit Substrat besetzt (gesättigt) sind und keine weitere Steigerung der Geschwindigkeit möglich ist.` },
  { id:'anki_vl08_377', vl:'vl08', cat:'Anki', source:'anki', q:`Wann wird die maximale Reaktionsgeschwindigkeit (Vmax) erreicht?`, a:`Vmax wird erreicht, wenn alle aktiven Zentren eines Enzyms vollständig mit Substrat besetzt sind (Sättigung).In diesem Zustand kann die Reaktionsgeschwindigkeit auch bei weiterer Erhöhung der Substratkonzentration nicht mehr steigen.` },
  { id:'anki_vl08_378', vl:'vl08', cat:'Anki', source:'anki', q:`Was beschreibt die Michaelis-Konstante (KM) und was sagt sie über das Enzym aus?`, a:`Die Michaelis-Konstante (KM) ist die Substratkonzentration, bei der die Reaktionsgeschwindigkeit halbmaximal (½ Vmax) ist.Sie ist ein Maß für die Affinität des Enzyms zum Substrat:• niedriger KM → hohe Affinität• hoher KM → geringe Affinität` },
  { id:'anki_vl08_379', vl:'vl08', cat:'Anki', source:'anki', q:`Was sagt ein niedriger KM-Wert aus?`, a:`Ein niedriger KM-Wert bedeutet, dass ein Enzym bereits bei geringer Substratkonzentration eine hohe Reaktionsgeschwindigkeit erreicht.Das zeigt, dass das Enzym eine hohe Affinität zum Substrat besitzt, also das Substrat besonders gut bindet.` },
  { id:'anki_vl08_380', vl:'vl08', cat:'Anki', source:'anki', q:`Was sagt ein hoher KM-Wert aus?`, a:`Ein hoher KM-Wert bedeutet, dass eine hohe Substratkonzentration nötig ist, um eine nennenswerte Reaktionsgeschwindigkeit zu erreichen.Das zeigt, dass das Enzym eine geringe Affinität zum Substrat besitzt, also das Substrat weniger gut bindet.` },
  { id:'anki_vl08_381', vl:'vl08', cat:'Anki', source:'anki', q:`Was ist eine Enzymaktivität?`, a:`Die Enzymaktivität ist ein Maß dafür, wie viel Substrat ein Enzym pro Zeiteinheit in Produkt umsetzt.Sie beschreibt somit die Leistungsfähigkeit eines Enzyms unter bestimmten Bedingungen (z. B. Temperatur, pH).` },
  { id:'anki_vl08_382', vl:'vl08', cat:'Anki', source:'anki', q:`Wie kann man die Enzymaktivität experimentell bestimmen?`, a:`Die Enzymaktivität wird bestimmt, indem man die Änderung der Stoffmenge pro Zeit misst.Das erfolgt z. B. durch:• Messung der Produktbildung• Messung des SubstratverbrauchsOft werden dabei photometrische Methoden verwendet, um die Reaktion quantitativ zu verfolgen.` },
  { id:'anki_vl08_383', vl:'vl08', cat:'Anki', source:'anki', q:`Was ist ein optischer Enzymtest und wie funktioniert er?`, a:`Ein optischer Enzymtest ist ein Verfahren zur Bestimmung der Enzymaktivität, bei dem die Reaktion über Änderungen der Lichtabsorption gemessen wird.Dabei wird ein Stoff (Substrat oder Produkt) verwendet, der Licht bei einer bestimmten Wellenlänge absorbiert, sodass man die Reaktion kontinuierlich verfolgen kann.` },
  { id:'anki_vl08_384', vl:'vl08', cat:'Anki', source:'anki', q:`Welches physikalische Gesetz wird bei optischen Enzymtests genutzt und was beschreibt es?`, a:`Es wird das Lambert-Beer-Gesetz genutzt.Es beschreibt den Zusammenhang zwischen der Absorption von Licht und der Konzentration einer Lösung:Je höher die Konzentration eines absorbierenden Stoffes, desto stärker wird Licht absorbiert.` },
  { id:'anki_vl08_385', vl:'vl08', cat:'Anki', source:'anki', q:`Was beschreibt das Lambert-Beer-Gesetz genau?`, a:`Das Lambert-Beer-Gesetz beschreibt den Zusammenhang zwischen Lichtabsorption (Extinktion), Konzentration eines Stoffes und der Schichtdicke der Lösung.Es besagt: Je höher die Konzentration und je größer die Schichtdicke, desto stärker ist die Absorption des Lichts.` },
  { id:'anki_vl08_386', vl:'vl08', cat:'Anki', source:'anki', q:`Warum wird NADH häufig in enzymatischen Tests verwendet?`, a:`NADH wird häufig verwendet, weil es Licht bei 340 nm stark absorbiert, während die oxidierte Form (NAD⁺) dies kaum tut.Dadurch kann man enzymatische Reaktionen einfach verfolgen, indem man die Änderung der Absorption bei 340 nm misst.` },
  { id:'anki_vl08_387', vl:'vl08', cat:'Anki', source:'anki', q:`Was sind gekoppelte enzymatische Tests und warum werden sie verwendet?`, a:`Gekoppelte enzymatische Tests sind Messverfahren, bei denen die zu untersuchende Reaktion mit einer zweiten, gut messbaren Reaktion verknüpft wird.Dabei wird das Produkt der ersten Reaktion in einer Folge­reaktion umgesetzt, die z. B. eine optisch messbare Änderung (z. B. NADH-Verbrauch bei 340 nm) verursacht.So können auch Reaktionen gemessen werden, die selbst nicht direkt nachweisbar sind.` },
  { id:'anki_vl08_388', vl:'vl08', cat:'Anki', source:'anki', q:`Welche Bedeutung haben Enzymtests in der Medizin und wofür werden sie eingesetzt?`, a:`Enzymtests sind in der Medizin wichtig, weil sie zur Diagnostik von Krankheiten eingesetzt werden.Sie ermöglichen die Bestimmung von Enzymaktivitäten oder Konzentrationen im Blut, wodurch man Organfunktionen beurteilen und Erkrankungen erkennen kann (z. B. Leber- oder Herzschäden).` },
  { id:'anki_vl08_389', vl:'vl08', cat:'Anki', source:'anki', q:`Nenne wichtige Beispiele diagnostischer Enzyme und wofür sie stehen.`, a:`Wichtige diagnostische Enzyme sind:• ALT (Alanin-Aminotransferase) → Hinweis auf Leberschäden• AST (Aspartat-Aminotransferase) → kommt in Leber, Herz und Muskulatur vor• CK (Creatinkinase) → Hinweis auf Muskelschäden oder HerzinfarktIhre Aktivität im Blut liefert wichtige Informationen über den Zustand verschiedener Organe.` },
  { id:'anki_vl08_390', vl:'vl08', cat:'Anki', source:'anki', q:`Warum beeinflusst der pH-Wert die Enzymaktivität und welche Folgen hat das?`, a:`Der pH-Wert beeinflusst die Enzymaktivität, weil er die Ladung von Aminosäureseitenketten verändert.Dadurch können sich• die Struktur des aktiven Zentrums• und die Bindung des Substratsverändern, was die Enzymaktivität erhöht oder vermindert (bis hin zur Denaturierung).` },
  { id:'anki_vl08_391', vl:'vl08', cat:'Anki', source:'anki', q:`Warum beeinflusst die Temperatur enzymatische Reaktionen und wie wirkt sie sich aus?`, a:`Die Temperatur beeinflusst enzymatische Reaktionen, weil sie die Bewegungsenergie der Moleküle verändert.Bei steigender Temperatur:• nimmt die Reaktionsgeschwindigkeit zu (mehr Kollisionen)• bis ein Optimum erreicht wirdDarüber hinaus kommt es zur Denaturierung des Enzyms, wodurch die Aktivität stark abnimmt.` },
  { id:'anki_vl09_392', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter Enzyminhibition?`, a:`Unter Enzyminhibition versteht man die Hemmung der Aktivität eines Enzyms durch ein Molekül, den sogenannten Inhibitor.Der Inhibitor bindet an das Enzym und verringert oder verhindert die Umsetzung des Substrats, wodurch die Reaktionsgeschwindigkeit sinkt.` },
  { id:'anki_vl09_393', vl:'vl09', cat:'Anki', source:'anki', q:`Was ist eine kompetitive Hemmung und wie wirkt sie sich auf das Enzym aus?`, a:`Bei der kompetitiven Hemmung konkurriert der Inhibitor mit dem Substrat um das aktive Zentrum des Enzyms.Der Inhibitor bindet reversibel an das aktive Zentrum und blockiert es, sodass das Substrat nicht binden kann.Die Hemmung kann durch Erhöhung der Substratkonzentration aufgehoben werden.` },
  { id:'anki_vl09_394', vl:'vl09', cat:'Anki', source:'anki', q:`Wie beeinflusst eine kompetitive Hemmung die Parameter KM und Vmax?`, a:`Bei der kompetitiven Hemmung:• KM steigt → scheinbar geringere Affinität, da mehr Substrat nötig ist• Vmax bleibt unverändert → bei hoher Substratkonzentration kann die Hemmung überwunden werden` },
  { id:'anki_vl09_395', vl:'vl09', cat:'Anki', source:'anki', q:`Was ist eine nichtkompetitive Hemmung und wie wirkt sie auf das Enzym?`, a:`Bei der nichtkompetitiven Hemmung bindet der Inhibitor an eine andere Stelle als das aktive Zentrum (allosterische Stelle).Dadurch wird die Struktur und Funktion des Enzyms verändert, sodass die katalytische Aktivität abnimmt, auch wenn das Substrat noch binden kann.` },
  { id:'anki_vl09_396', vl:'vl09', cat:'Anki', source:'anki', q:`Wie beeinflusst eine nichtkompetitive Hemmung die Parameter Vmax und KM?`, a:`Bei der nichtkompetitiven Hemmung:• Vmax sinkt → die maximale Reaktionsgeschwindigkeit wird reduziert• KM bleibt unverändert → die Affinität des Enzyms zum Substrat ändert sich nichtDie Hemmung kann nicht durch Erhöhung der Substratkonzentration aufgehoben werden.` },
  { id:'anki_vl09_397', vl:'vl09', cat:'Anki', source:'anki', q:`Was ist eine unkompetitive Hemmung und wie wirkt sie?`, a:`Bei der unkompetitiven Hemmung bindet der Inhibitor nur an den Enzym-Substrat-Komplex (ES-Komplex) und nicht an das freie Enzym.Dadurch wird die Umwandlung des Substrats zu Produkt verhindert, und der ES-Komplex wird stabilisiert, sodass die Reaktion verlangsamt wird.` },
  { id:'anki_vl09_398', vl:'vl09', cat:'Anki', source:'anki', q:`Was sind reversible Inhibitoren und wie wirken sie?`, a:`Reversible Inhibitoren sind Moleküle, die vorübergehend und nicht dauerhaft an ein Enzym binden.Die Bindung ist löslich (nicht kovalent) und kann wieder gelöst werden, sodass das Enzym seine Aktivität zurückerlangen kann.` },
  { id:'anki_vl09_399', vl:'vl09', cat:'Anki', source:'anki', q:`Was sind irreversible Inhibitoren und wie wirken sie?`, a:`Irreversible Inhibitoren sind Moleküle, die dauerhaft (meist kovalent) an ein Enzym binden.Dadurch wird das Enzym dauerhaft inaktiviert, sodass es seine Funktion nicht mehr wiedererlangen kann.` },
  { id:'anki_vl09_400', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter Suizidinhibition und wie funktioniert sie?`, a:`Unter Suizidinhibition versteht man eine spezielle Form der irreversiblen Enzymhemmung, bei der der Inhibitor zunächst als scheinbar normales Substrat bindet.Während der Reaktion wird er jedoch in ein hochreaktives Zwischenprodukt umgewandelt, das das Enzym kovalent bindet und dauerhaft inaktiviert.` },
  { id:'anki_vl09_401', vl:'vl09', cat:'Anki', source:'anki', q:`Warum sind Enzyminhibitoren pharmakologisch wichtig?`, a:`Enzyminhibitoren sind pharmakologisch wichtig, weil sie gezielt bestimmte Enzyme hemmen und dadurch biochemische Prozesse im Körper beeinflussen können.Sie werden als Medikamente eingesetzt, z. B. zur• Hemmung von Krankheitserregern• Regulation von Stoffwechselwegen• Behandlung von Erkrankungen (z. B. Bluthochdruck, Krebs)` },
  { id:'anki_vl09_402', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter allosterischer Regulation und wie wirkt sie?`, a:`Unter allosterischer Regulation versteht man die Beeinflussung der Enzymaktivität durch Bindung eines Moleküls an eine andere Stelle als das aktive Zentrum (allosterische Stelle).Diese Bindung führt zu einer Konformationsänderung des Enzyms, wodurch die Aktivität entweder erhöht (Aktivator) oder gehemmt (Inhibitor) wird.` },
  { id:'anki_vl09_403', vl:'vl09', cat:'Anki', source:'anki', q:`Was sind allosterische Enzyme und was zeichnet sie aus?`, a:`Allosterische Enzyme sind Enzyme, deren Aktivität durch Bindung von Molekülen an allosterische Stellen (nicht am aktiven Zentrum) reguliert wird.Diese Bindung führt zu Konformationsänderungen, wodurch die Enzymaktivität gesteigert oder gehemmt werden kann.Oft zeigen sie eine kooperative Kinetik (sigmoidale Kurve statt Michaelis-Menten-Verlauf).` },
  { id:'anki_vl09_404', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter positiver allosterischer Regulation und wie wirkt sie?`, a:`Bei der positiven allosterischen Regulation bindet ein Molekül (Aktivator) an eine allosterische Stelle des Enzyms und erhöht dessen Aktivität.Dabei wird die Substratbindung erleichtert oder die katalytische Effizienz gesteigert, sodass die Reaktion schneller abläuft.` },
  { id:'anki_vl09_405', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter negativer allosterischer Regulation und wie wirkt sie?`, a:`Bei der negativen allosterischen Regulation bindet ein Molekül (Inhibitor) an eine allosterische Stelle des Enzyms und senkt dessen Aktivität.Die Bindung führt zu einer Konformationsänderung, wodurch die Substratbindung erschwert oder die katalytische Aktivität reduziert wird.` },
  { id:'anki_vl09_406', vl:'vl09', cat:'Anki', source:'anki', q:`Was ist reversible Phosphorylierung und welche Bedeutung hat sie?`, a:`Reversible Phosphorylierung ist die Anlagerung und Entfernung von Phosphatgruppen an Proteine zur Regulation ihrer Aktivität.Sie erfolgt durch das Zusammenspiel von Kinasen (Phosphorylierung) und Phosphatasen (Dephosphorylierung) und dient als wichtiger Schaltmechanismus in zellulären Signalwegen.` },
  { id:'anki_vl09_407', vl:'vl09', cat:'Anki', source:'anki', q:`Welche Enzyme katalysieren Phosphorylierungen und wie funktionieren sie?`, a:`Kinasen katalysieren die Übertragung von Phosphatgruppen auf Proteine oder andere Moleküle.Dabei übertragen sie meist eine Phosphatgruppe von ATP auf eine Aminosäure (z. B. Serin, Threonin oder Tyrosin) und regulieren so die Aktivität von Proteinen.` },
  { id:'anki_vl09_408', vl:'vl09', cat:'Anki', source:'anki', q:`Welche Enzyme entfernen Phosphatgruppen?`, a:`Enzyme, die Phosphatgruppen entfernen, heißen Phosphatasen.Sie katalysieren die Abspaltung von Phosphatgruppen und wirken damit oft als Gegenspieler von Kinasen bei der Regulation von Proteinen.` },
  { id:'anki_vl09_409', vl:'vl09', cat:'Anki', source:'anki', q:`Wie beeinflusst Phosphorylierung die Enzymaktivität und warum?`, a:`Die Phosphorylierung kann Enzyme aktivieren oder inaktivieren, je nach Enzym und Kontext.Durch die Anlagerung einer Phosphatgruppe verändern sich Ladung und Struktur des Proteins, was zu einer Konformationsänderung und damit zu einer Änderung der Aktivität führt.` },
  { id:'anki_vl09_410', vl:'vl09', cat:'Anki', source:'anki', q:`Was versteht man unter limitierter Proteolyse und wie wirkt sie?`, a:`Unter limitierter Proteolyse versteht man die gezielte Spaltung eines Vorläuferproteins (Zymogens) durch ein Enzym.Dabei wird nur ein bestimmter Abschnitt abgespalten, wodurch das Protein in seine aktive Form überführt wird.` },
  { id:'anki_vl09_411', vl:'vl09', cat:'Anki', source:'anki', q:`Wie nennt man inaktive Vorstufen von Enzymen?`, a:`Inaktive Vorstufen von Enzymen werden Zymogene (oder Proenzyme) genannt.Sie müssen erst durch spezifische Aktivierung (z. B. proteolytische Spaltung) in ihre aktive Form überführt werden.` },
  { id:'anki_vl09_412', vl:'vl09', cat:'Anki', source:'anki', q:`Nenne Beispiele für Enzymkaskaden.`, a:`Typische Beispiele für Enzymkaskaden sind:• Blutgerinnung → eine Abfolge von Aktivierungen von Gerinnungsfaktoren, die zur Bildung eines Blutgerinnsels führt• Komplementsystem → Teil des Immunsystems, bei dem eine Kaskade von Proteinen aktiviert wird, um Pathogene zu bekämpfenBeide Systeme zeigen eine starke Signalverstärkung durch aufeinanderfolgende Aktivierungen.` },
  { id:'anki_vl09_413', vl:'vl09', cat:'Anki', source:'anki', q:`Warum sind Enzymkaskaden biologisch sinnvoll?`, a:`Enzymkaskaden ermöglichen eine starke Signalverstärkung, da ein aktiviertes Enzym viele weitere Enzyme aktivieren kann.Dadurch wird ein kleines Ausgangssignal schnell in eine große Zellantwort umgesetzt und Prozesse können schnell und effizient gesteuert werden.` },
  { id:'anki_vl09_414', vl:'vl09', cat:'Anki', source:'anki', q:`Warum ist Enzymregulation wichtig für Zellen?`, a:`Enzymregulation ermöglicht einen gezielten und kontrollierten Ablauf von Stoffwechselprozessen.Dadurch können Zellen ihre Reaktionen an den aktuellen Bedarf anpassen, Energie sparen und verhindern, dass unnötige oder schädliche Reaktionen ablaufen.` },
  { id:'anki_p01_415', vl:'p01', cat:'Anki', source:'anki', q:`Warum werden Proteine aus komplexen Proteingemischen häufig zunächst aufgereinigt?`, a:`Proteine werden aufgereinigt, damit ihre biochemischen Eigenschaften, Funktionen und Strukturen gezielt untersucht werden können.In einem komplexen Gemisch würden sich die Effekte verschiedener Proteine überlagern, sodass eine eindeutige Analyse nicht möglich wäre.` },
  { id:'anki_p01_416', vl:'p01', cat:'Anki', source:'anki', q:`Welche Eigenschaften eines Proteins können nach Aufreinigung untersucht werden?`, a:`Nach der Aufreinigung können verschiedene Eigenschaften eines Proteins gezielt analysiert werden, z. B.:• Löslichkeit → Verhalten in verschiedenen Lösungen• Membranassoziation → ob das Protein an Membranen gebunden ist• posttranslationale Modifikationen → chemische Veränderungen nach der Translation• enzymatische Aktivität → katalytische Funktion• Interaktionspartner → Bindung an andere Proteine oder Moleküle• Proteinstruktur → räumliche Anordnung (z. B. Sekundär-, Tertiärstruktur)Diese Analysen ermöglichen ein umfassendes Verständnis der Funktion des Proteins.` },
  { id:'anki_p01_417', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man unter Proteom-Analysen?`, a:`Unter Proteom-Analysen versteht man die Untersuchung der Gesamtheit aller Proteine (Proteom) einer Zelle, eines Gewebes oder eines Organismus unter bestimmten Bedingungen.Dabei werden z. B. Menge, Struktur, Modifikationen und Interaktionen von Proteinen analysiert, um die Funktionsweise biologischer Systeme besser zu verstehen.` },
  { id:'anki_p01_418', vl:'p01', cat:'Anki', source:'anki', q:`Wie gewinnt man Proteine aus extrazellulären Flüssigkeiten (z. B. Blut)?`, a:`Proteine aus extrazellulären Flüssigkeiten werden meist durch Zentrifugation gewonnen.Dabei werden Zellen und feste Bestandteile sedimentiert (Pellet), während die löslichen Proteine im Überstand verbleiben und anschließend weiter untersucht werden können.` },
  { id:'anki_p01_419', vl:'p01', cat:'Anki', source:'anki', q:`Wie gewinnt man Proteinextrakte aus Zellen oder Geweben?`, a:`Proteinextrakte werden durch Zellaufschluss (Lyse) gewonnen, bei dem Zellen oder Gewebe mechanisch oder chemisch aufgebrochen werden.Anschließend erfolgt eine Zentrifugation, bei der Zelltrümmer sedimentieren, während die löslichen Proteine im Überstand verbleiben und weiter analysiert werden können.` },
  { id:'anki_p01_420', vl:'p01', cat:'Anki', source:'anki', q:`Nenne mechanische Methoden des Zellaufschlusses.`, a:`Typische mechanische Methoden des Zellaufschlusses sind:• Zerkleinern von Gewebe (z. B. mit einem Homogenisator oder Mixer)• Zellaufschluss mit Glaskugeln (glass beads) → Zellen werden durch Schütteln mit kleinen Kügelchen aufgebrochenDiese Methoden zerstören die Zellstruktur mechanisch, sodass die Proteine freigesetzt werden.` },
  { id:'anki_p01_421', vl:'p01', cat:'Anki', source:'anki', q:`Nenne physikalische Methoden des Zellaufschlusses.`, a:`Typische physikalische Methoden des Zellaufschlusses sind:• osmotischer Schock in hypotonen Lösungen → Wasser strömt in die Zelle, sie schwillt an und platzt• Ultraschall (Sonikation) → hochfrequente Schallwellen erzeugen Druckunterschiede, die die Zellmembran zerstörenDiese Methoden führen zur Auflösung der Zellmembran und Freisetzung der Zellinhalte.` },
  { id:'anki_p01_422', vl:'p01', cat:'Anki', source:'anki', q:`Warum werden nach dem Zellaufschluss Zentrifugationsschritte durchgeführt?`, a:`Nach dem Zellaufschluss werden Zentrifugationsschritte durchgeführt, um große Zelltrümmer und nicht vollständig aufgeschlossene Zellen zu sedimentieren (pelletieren).Dadurch erhält man einen klaren Überstand, der die löslichen Proteine enthält und für weitere Analysen verwendet werden kann.` },
  { id:'anki_p01_423', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man bei einer Zentrifugation unter dem Begriff „Pellet“?`, a:`Als Pellet bezeichnet man den sedimentierten Niederschlag, der sich bei der Zentrifugation am Boden des Röhrchens absetzt.Er enthält meist die schweren oder unlöslichen Bestandteile, wie z. B. Zelltrümmer oder Organellen.` },
  { id:'anki_p01_424', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man bei einer Zentrifugation unter dem Überstand?`, a:`Der Überstand ist die Flüssigkeit oberhalb des Pellets nach der Zentrifugation.Er enthält die gelösten, leichteren Bestandteile, wie z. B. lösliche Proteine, die nicht sedimentiert sind und weiter untersucht werden können.` },
  { id:'anki_p01_425', vl:'p01', cat:'Anki', source:'anki', q:`Welche Rolle spielen Detergenzien bei der Proteinextraktion?`, a:`Detergenzien werden eingesetzt, um hydrophobe Proteine und Membranproteine in Lösung zu bringen.Sie wirken, indem sie Lipidmembranen auflösen und hydrophobe Bereiche von Proteinen umhüllen, sodass diese in wässriger Lösung stabil bleiben.` },
  { id:'anki_p01_426', vl:'p01', cat:'Anki', source:'anki', q:`Was sind denaturierende Detergenzien und wie wirken sie?`, a:`Denaturierende Detergenzien sind starke Tenside, die Proteine entfalten (denaturieren), indem sie ihre nicht-kovalenten Wechselwirkungen zerstören.Dadurch verlieren Proteine ihre natürliche Struktur und Funktion, oft irreversibel.` },
  { id:'anki_p01_427', vl:'p01', cat:'Anki', source:'anki', q:`Nenne Beispiele für denaturierende Detergenzien.`, a:`Typische Beispiele für denaturierende Detergenzien sind:• SDS (Natriumdodecylsulfat) → ein starkes anionisches Detergens, das Proteine entfaltet und negativ lädt• 16-BAC (Hexadecyltrimethylammoniumbromid) → ein kationisches Detergens, das ebenfalls Proteinstrukturen zerstörtDiese Detergenzien werden häufig eingesetzt, um Proteine für analytische Methoden (z. B. SDS-PAGE) vorzubereiten.` },
  { id:'anki_p01_428', vl:'p01', cat:'Anki', source:'anki', q:`Warum sind denaturierende Detergenzien ungeeignet zur Untersuchung von Proteinaktivität?`, a:`Denaturierende Detergenzien sind ungeeignet, weil sie die dreidimensionale Struktur eines Proteins zerstören.Da die Struktur direkt die Funktion bestimmt, verlieren die Proteine ihre biologische Aktivität, sodass ihre Funktion nicht mehr untersucht werden kann.` },
  { id:'anki_p01_429', vl:'p01', cat:'Anki', source:'anki', q:`Was sind nicht-denaturierende Detergenzien und wofür werden sie verwendet?`, a:`Nicht-denaturierende Detergenzien sind Detergenzien, die Proteine lösen, ohne deren native Struktur stark zu verändern.Sie werden verwendet, um z. B. Membranproteine zu isolieren, während deren Funktion und Aktivität erhalten bleibt.` },
  { id:'anki_p01_430', vl:'p01', cat:'Anki', source:'anki', q:`Nenne Beispiele für nicht-denaturierende Detergenzien.`, a:`Typische Beispiele für nicht-denaturierende Detergenzien sind:• Triton X-100 → mildes, nicht-ionisches Detergens• NP-40 → ebenfalls ein nicht-ionisches Detergens, häufig für Zelllyse verwendet• Desoxycholat → ein milderes ionisches DetergensDiese Detergenzien ermöglichen die Lösung von Membranproteinen, ohne deren Struktur und Funktion wesentlich zu beeinträchtigen.` },
  { id:'anki_p01_431', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man unter Proteinfällung und wie wird sie erreicht?`, a:`Unter Proteinfällung versteht man die Ausfällung von Proteinen aus einer Lösung, sodass sie nicht mehr löslich sind und als Niederschlag vorliegen.Dies wird durch Veränderungen wie• Erhöhung der Salzkonzentration (z. B. „Salting out“)• Änderung des pH-Werts• oder Zugabe von organischen Lösungsmittelnerreicht, wodurch die Löslichkeit der Proteine abnimmt.` },
  { id:'anki_p01_432', vl:'p01', cat:'Anki', source:'anki', q:`Was ist der Aussalzeffekt und wie wirkt er auf Proteine?`, a:`Der **Aussalzeffekt („Salting out“) ** beschreibt, dass bei hoher Salzkonzentration die Löslichkeit von Proteinen abnimmt.Salzionen binden Wasser und entziehen es den Proteinen, wodurch hydrophobe Wechselwirkungen zwischen Proteinen zunehmen und diese ausfallen (präzipitieren).` },
  { id:'anki_p01_433', vl:'p01', cat:'Anki', source:'anki', q:`Warum führt hohe Salzkonzentration zur Proteinfällung?`, a:`Bei hoher Salzkonzentration konkurrieren Salzionen mit den Proteinen um Wassermoleküle.Dadurch wird die Hydrathülle der Proteine reduziert, sodass sich hydrophobe Bereiche stärker gegenseitig anziehen und die Proteine aggregieren und ausfallen.` },
  { id:'anki_p01_434', vl:'p01', cat:'Anki', source:'anki', q:`Wie beeinflusst der isoelektrische Punkt die Löslichkeit eines Proteins?`, a:`Am isoelektrischen Punkt (pI) besitzt ein Protein keine Nettoladung.Dadurch fehlen elektrostatische Abstoßungskräfte zwischen den Molekülen, sodass sie sich leichter annähern, aggregieren und ausfallen.` },
  { id:'anki_p01_435', vl:'p01', cat:'Anki', source:'anki', q:`Welche Salzlösung wird häufig zur Proteinfällung verwendet und warum?`, a:`Häufig wird Ammoniumsulfat ((NH₄)₂SO₄) zur Proteinfällung verwendet.Es ist besonders geeignet, weil es sehr gut wasserlöslich ist und effektiv Wassermoleküle bindet, wodurch der Aussalzeffekt verstärkt und die Proteinfällung gezielt gesteuert werden kann.` },
  { id:'anki_p01_436', vl:'p01', cat:'Anki', source:'anki', q:`Warum ist die Ammoniumsulfat-Fällung besonders für die Proteinreinigung geeignet?`, a:`Die Ammoniumsulfat-Fällung ist geeignet, weil sie reversibel ist.Nach dem Entfernen des Salzes (z. B. durch Dialyse) können die Proteine wieder in Lösung gehen, ohne ihre Struktur und Funktion dauerhaft zu verlieren.Außerdem ermöglicht sie eine fraktionierte Fällung, sodass unterschiedliche Proteine bei verschiedenen Salzkonzentrationen getrennt werden können.` },
  { id:'anki_p01_437', vl:'p01', cat:'Anki', source:'anki', q:`Welche Methode nutzt Trichloressigsäure (TCA) und wie wirkt sie?`, a:`Trichloressigsäure (TCA) wird für die denaturierende Proteinfällung verwendet.Sie wirkt, indem sie die Proteinstruktur zerstört (denaturiert) und dadurch die Löslichkeit stark verringert, sodass Proteine irreversibel ausfallen.` },
