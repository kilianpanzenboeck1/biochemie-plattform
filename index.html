  { id:'anki_p01_438', vl:'p01', cat:'Anki', source:'anki', q:`Warum ist TCA-Fällung nicht reversibel?`, a:`Die TCA-Fällung ist nicht reversibel, weil Trichloressigsäure die Proteine stark denaturiert.Dabei werden die nicht-kovalenten Wechselwirkungen zerstört, sodass die Proteine ihre native Struktur und Funktion irreversibel verlieren und sich nicht wieder korrekt zurückfalten können.` },
  { id:'anki_p01_439', vl:'p01', cat:'Anki', source:'anki', q:`Welche organischen Lösungsmittel können zur Proteinfällung verwendet werden und wie wirken sie?`, a:`Typische organische Lösungsmittel zur Proteinfällung sind:• Aceton• Methanol• EthanolSie wirken, indem sie die Polarität des Lösungsmittels verändern und die Hydrathülle der Proteine stören, wodurch die Löslichkeit abnimmt und die Proteine ausfallen.` },
  { id:'anki_p01_440', vl:'p01', cat:'Anki', source:'anki', q:`Welches Prinzip nutzt die Zentrifugation zur Trennung von Zellbestandteilen?`, a:`Die Zentrifugation nutzt Unterschiede im Sedimentationsvermögen und in der Dichte von Teilchen.Größere und dichtere Bestandteile sedimentieren schneller und bilden ein Pellet, während kleinere oder leichtere Bestandteile im Überstand verbleiben.` },
  { id:'anki_p01_441', vl:'p01', cat:'Anki', source:'anki', q:`Was ist der Sedimentationskoeffizient und wovon hängt er ab?`, a:`Der Sedimentationskoeffizient ist ein Maß für die Geschwindigkeit, mit der ein Teilchen in einer Zentrifuge sedimentiert.Er hängt von Größe, Form und Dichte des Teilchens sowie von den Eigenschaften des Mediums ab.` },
  { id:'anki_p01_442', vl:'p01', cat:'Anki', source:'anki', q:`In welcher Einheit wird der Sedimentationskoeffizient angegeben und was bedeutet sie?`, a:`Der Sedimentationskoeffizient wird in Svedberg (S) angegeben.Diese Einheit beschreibt, wie schnell ein Teilchen in einer Zentrifuge sedimentiert, und hängt von Größe, Form und Dichte des Moleküls ab.` },
  { id:'anki_p01_443', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man unter differenzieller Zentrifugation und wie funktioniert sie?`, a:`Die differenzielle Zentrifugation ist eine Methode zur schrittweisen Trennung von Zellbestandteilen, bei der mit zunehmend höheren Zentrifugationsgeschwindigkeiten gearbeitet wird.Dabei sedimentieren zunächst die größeren und dichteren Strukturen (z. B. Zellkerne), während kleinere Bestandteile im Überstand bleiben und erst bei höheren Geschwindigkeiten sedimentieren.` },
  { id:'anki_p01_444', vl:'p01', cat:'Anki', source:'anki', q:`Was versteht man unter Dichtegradientenzentrifugation und wie funktioniert sie?`, a:`Die Dichtegradientenzentrifugation ist eine Methode zur Trennung von Partikeln nach ihrer Dichte und Sedimentationsgeschwindigkeit in einem Medium mit Dichtegradienten.Die Partikel bewegen sich im Gradienten so lange, bis sie eine Position erreichen, an der ihre Dichte der des Mediums entspricht, und bleiben dort stabil liegen.` },
  { id:'anki_p01_445', vl:'p01', cat:'Anki', source:'anki', q:`Nach welchem Prinzip trennt die Gelfiltrationschromatographie Proteine?`, a:`Die Gelfiltrationschromatographie (Größenausschlusschromatographie) trennt Proteine nach ihrer Größe (Molekülgröße bzw. Volumen).• Große Moleküle können nicht in die Poren des Gels eindringen und eluieren zuerst• Kleine Moleküle dringen in die Poren ein und eluieren späterSo erfolgt eine Trennung nach Größe ohne Bindung an die Matrix.` },
  { id:'anki_p01_446', vl:'p01', cat:'Anki', source:'anki', q:`Welche Moleküle eluieren bei der Gelfiltrationschromatographie zuerst?`, a:`Bei der Gelfiltrationschromatographie eluieren große Moleküle zuerst.Sie können nicht in die Poren der Gelmatrix eindringen und nehmen daher den direkten Weg durch die Säule, während kleinere Moleküle verzögert werden.` },
  { id:'anki_p01_447', vl:'p01', cat:'Anki', source:'anki', q:`Nach welchem Prinzip trennt die Ionenaustauschchromatographie Proteine?`, a:`Die Ionenaustauschchromatographie trennt Proteine nach ihrer elektrischen Ladung.Dabei binden Proteine mit entgegengesetzter Ladung an geladene Gruppen der stationären Phase:• Kationenaustauscher → binden positiv geladene Proteine• Anionenaustauscher → binden negativ geladene ProteineDie gebundenen Proteine werden anschließend durch Änderung des pH-Werts oder der Salzkonzentration eluiert.` },
  { id:'anki_p01_448', vl:'p01', cat:'Anki', source:'anki', q:`Was ist ein Kationenaustauscher und wie funktioniert er?`, a:`Ein Kationenaustauscher ist eine negativ geladene Säulenmatrix, die positiv geladene Proteine (Kationen) bindet.Die Bindung erfolgt durch elektrostatische Wechselwirkungen, und die Proteine können anschließend durch Erhöhung der Salzkonzentration oder Änderung des pH-Werts wieder eluiert werden.` },
  { id:'anki_p01_449', vl:'p01', cat:'Anki', source:'anki', q:`Was ist ein Anionenaustauscher und wie funktioniert er?`, a:`Ein Anionenaustauscher ist eine positiv geladene Säulenmatrix, die negativ geladene Proteine (Anionen) bindet.Die Bindung erfolgt über elektrostatische Wechselwirkungen, und die Proteine können durch Erhöhung der Salzkonzentration oder Änderung des pH-Werts wieder von der Säule eluiert werden.` },
  { id:'anki_p01_450', vl:'p01', cat:'Anki', source:'anki', q:`Nach welchem Prinzip trennt die Affinitätschromatographie Proteine?`, a:`Die Affinitätschromatographie trennt Proteine nach ihrer spezifischen Bindung an Liganden, die an eine stationäre Phase gebunden sind.Nur Proteine mit passender Bindungsaffinität (z. B. Enzyme, Rezeptoren) binden an die Säule, während andere ausgewaschen werden.Anschließend können die gebundenen Proteine durch Änderung der Bedingungen (z. B. pH oder Salzkonzentration) wieder eluiert werden.` },
  { id:'anki_p01_451', vl:'p01', cat:'Anki', source:'anki', q:`Welche Moleküle können als Liganden in der Affinitätschromatographie verwendet werden?`, a:`Als Liganden in der Affinitätschromatographie können verschiedene Moleküle dienen, die spezifisch an das Zielprotein binden, z. B.:• Substrate → binden an Enzyme• Antikörper → erkennen spezifische Proteine• Nukleinsäuren → binden DNA- oder RNA-bindende Proteine• Protein-Interaktionspartner → binden gezielt an andere ProteineDiese spezifischen Bindungen ermöglichen eine hochselektive Aufreinigung.` },
  { id:'anki_p01_452', vl:'p01', cat:'Anki', source:'anki', q:`Wie werden Proteine bei der Affinitätschromatographie eluiert?`, a:`Proteine werden eluiert, indem die spezifische Bindung zwischen Protein und Ligand aufgehoben wird.Dies geschieht z. B. durch:• Zugabe eines Überschusses an freiem Liganden, der das Protein verdrängt• Änderung des pH-Werts oder der Salzkonzentration, wodurch die Bindung geschwächt wirdSo lösen sich die Proteine von der Säule und können isoliert werden.` },
  { id:'anki_p01_453', vl:'p01', cat:'Anki', source:'anki', q:`Warum müssen Proteinextrakte oft aufkonzentriert werden?`, a:`Proteinextrakte müssen häufig aufkonzentriert werden, weil sie sehr verdünnt vorliegen und die Proteine sonst nur schwer nachweisbar sind.Eine höhere Konzentration ist notwendig, um biochemische Analysen zuverlässig durchführen, Enzymaktivitäten messen und weitere Reinigungsschritte effizient anwenden zu können.` },
  { id:'anki_p01_454', vl:'p01', cat:'Anki', source:'anki', q:`Welche Methoden zur Aufkonzentrierung von Proteinextrakten gibt es?`, a:`Zur Aufkonzentrierung von Proteinextrakten werden vor allem folgende Methoden eingesetzt:• Proteinfällung → Proteine werden ausgefällt und anschließend in kleinerem Volumen wieder gelöst• Ultrafiltration → Lösung wird durch eine Membran gepresst, die kleine Moleküle durchlässt, während Proteine zurückgehalten und konzentriert werdenBeide Methoden erhöhen die Proteinkonzentration für weitere Analysen.` },
  { id:'anki_p01_455', vl:'p01', cat:'Anki', source:'anki', q:`Was ist Ultrafiltration und wie funktioniert sie?`, a:`Ultrafiltration ist ein Verfahren zur Trennung von Molekülen mithilfe von Membranen mit definierter Porengröße.Dabei können kleine Moleküle und Lösungsmittel die Membran passieren, während größere Moleküle wie Proteine zurückgehalten werden, wodurch die Lösung aufkonzentriert wird.` },
  { id:'anki_p01_456', vl:'p01', cat:'Anki', source:'anki', q:`Was ist Dialyse und wie funktioniert sie?`, a:`Dialyse ist ein Verfahren zur Entfernung kleiner Moleküle (z. B. Salze) aus einer Proteinlösung mithilfe einer semipermeablen Membran.Dabei diffundieren kleine Moleküle entlang ihres Konzentrationsgradienten durch die Membran, während größere Moleküle wie Proteine zurückgehalten werden.` },
  { id:'anki_p01_457', vl:'p01', cat:'Anki', source:'anki', q:`Welche Moleküle können Dialysemembranen passieren?`, a:`Dialysemembranen lassen kleine Moleküle wie Salze, Ionen und kleine Metabolite passieren, während größere Moleküle wie Proteine zurückgehalten werden.Die Trennung erfolgt aufgrund der Porengröße der Membran.` },
  { id:'anki_p01_458', vl:'p01', cat:'Anki', source:'anki', q:`Warum muss die Proteinkonzentration bestimmt werden?`, a:`Die Proteinkonzentration muss bestimmt werden, um quantitative biochemische Analysen korrekt durchführen zu können.Nur so lassen sich Versuche vergleichen, Enzymaktivitäten berechnen und Ergebnisse zuverlässig interpretieren.` },
  { id:'anki_p01_459', vl:'p01', cat:'Anki', source:'anki', q:`Welcher einfache Farbstofftest wird häufig zur Proteinbestimmung verwendet und wie funktioniert er?`, a:`Ein häufig verwendeter Test ist der Bradford-Test.Dabei bindet ein Farbstoff (Coomassie-Brillantblau) an Proteine und verändert seine Farbe je nach Proteinmenge.Die Farbintensität kann photometrisch gemessen werden und ist proportional zur Proteinkonzentration.` },
  { id:'anki_p01_460', vl:'p01', cat:'Anki', source:'anki', q:`Welcher Farbstoff wird beim Bradford-Test verwendet und was passiert dabei?`, a:`Beim Bradford-Test wird der Farbstoff Coomassie Brilliant Blue G-250 verwendet.Er bindet an Proteine (vor allem an basische und aromatische Aminosäuren) und verändert dabei seine Farbe von rötlich-braun zu blau, was photometrisch gemessen werden kann.` },
  { id:'anki_p01_461', vl:'p01', cat:'Anki', source:'anki', q:`Was passiert beim Bradford-Test bei Proteinbindung?`, a:`Bei der Bindung des Farbstoffs an Proteine verschiebt sich das Absorptionsmaximum von etwa 470 nm auf 595 nm.Diese Verschiebung geht mit einer Farbänderung zu blau einher und ermöglicht die photometrische Bestimmung der Proteinkonzentration.` },
  { id:'anki_p01_462', vl:'p01', cat:'Anki', source:'anki', q:`Was ist Elektrophorese und wie funktioniert sie?`, a:`Elektrophorese ist ein Verfahren zur Trennung geladener Moleküle in einem elektrischen Feld.Dabei wandern Moleküle je nach Ladung, Größe und Form unterschiedlich schnell durch ein Medium (z. B. Gel), sodass sie voneinander getrennt werden.` },
  { id:'anki_p01_463', vl:'p01', cat:'Anki', source:'anki', q:`Welche Elektrophorese wird häufig zur Proteintrennung verwendet und warum?`, a:`Häufig wird die SDS-Polyacrylamid-Gelelektrophorese (SDS-PAGE) verwendet.Dabei werden Proteine durch SDS denaturiert und gleichmäßig negativ geladen, sodass die Trennung ausschließlich nach der Molekülgröße erfolgt.` },
  { id:'anki_p01_464', vl:'p01', cat:'Anki', source:'anki', q:`Welche Funktion hat SDS in der SDS-PAGE und warum ist das wichtig?`, a:`SDS (Natriumdodecylsulfat) denaturiert Proteine, indem es ihre sekundäre und tertiäre Struktur auflöst, und verleiht ihnen eine einheitliche negative Ladung.Dadurch werden Unterschiede in Form und Ladung aufgehoben, sodass die Proteine ausschließlich nach ihrer Molekülgröße getrennt werden.` },
  { id:'anki_p01_465', vl:'p01', cat:'Anki', source:'anki', q:`Welche Funktion hat DTT bei der Proteinbehandlung und warum wird es eingesetzt?`, a:`DTT (Dithiothreitol) dient dazu, Disulfidbrücken in Proteinen zu reduzieren.Dadurch werden kovalente Bindungen zwischen Cysteinresten aufgebrochen, sodass die Proteine vollständig entfaltet werden können – z. B. für die Analyse in der SDS-PAGE.` },
  { id:'anki_p01_466', vl:'p01', cat:'Anki', source:'anki', q:`Nach welchem Prinzip trennt SDS-PAGE Proteine?`, a:`Die SDS-PAGE trennt Proteine nach ihrer Molekülgröße (Masse).Das Detergens SDS entfaltet die Proteine und verleiht ihnen eine einheitliche negative Ladung, sodass Unterschiede in der Ladung keine Rolle mehr spielen.Die Trennung erfolgt daher ausschließlich nach der Größe, wobei kleinere Proteine schneller durch das Gel wandern als größere.` },
  { id:'anki_p01_467', vl:'p01', cat:'Anki', source:'anki', q:`Warum wandern kleinere Proteine schneller im Gel (z. B. bei SDS-PAGE)?`, a:`Kleinere Proteine wandern schneller, weil sie leichter durch die Poren der Gelmatrix gelangen können und dabei weniger behindert werden.Größere Proteine werden stärker gebremst, da sie schwerer durch die Poren passen, und wandern daher langsamer.` },
  { id:'anki_p01_468', vl:'p01', cat:'Anki', source:'anki', q:`Wozu dient ein Proteinmarker bei der SDS-PAGE?`, a:`Ein Proteinmarker (Größenstandard) dient zur Bestimmung der Molekülgröße von Proteinen.Er enthält Proteine bekannter Größe, sodass man die Wanderstrecke der Probenproteine vergleichen und deren Molekulargewicht abschätzen kann.` },
  { id:'anki_p01_469', vl:'p01', cat:'Anki', source:'anki', q:`Was ist isoelektrische Fokussierung (IEF) und wie funktioniert sie?`, a:`Die isoelektrische Fokussierung (IEF) ist eine Methode zur Trennung von Proteinen nach ihrem isoelektrischen Punkt (pI).Dabei bewegen sich Proteine in einem pH-Gradienten im elektrischen Feld, bis sie den pH-Wert erreichen, bei dem sie keine Nettoladung besitzen.An diesem Punkt stoppen sie und werden fokussiert, sodass eine Trennung nach pI erfolgt.` },
  { id:'anki_p01_470', vl:'p01', cat:'Anki', source:'anki', q:`Wann stoppt die Wanderung eines Proteins bei der isoelektrischen Fokussierung (IEF)?`, a:`Die Wanderung eines Proteins stoppt, wenn der pH-Wert dem isoelektrischen Punkt (pI) des Proteins entspricht.In diesem Zustand besitzt das Protein keine Nettoladung, sodass es sich nicht weiter im elektrischen Feld bewegt.` },
  { id:'anki_p01_471', vl:'p01', cat:'Anki', source:'anki', q:`Was ist eine zweidimensionale Gelelektrophorese (2-DE) und wie funktioniert sie?`, a:`Die zweidimensionale Gelelektrophorese (2-DE) ist eine Methode zur Trennung von Proteinen in zwei Schritten:Isoelektrische Fokussierung (IEF) → Trennung nach isoelektrischem Punkt (Ladung)SDS-PAGE → Trennung nach MolekülgrößeDadurch werden Proteine sehr genau getrennt, da zwei unterschiedliche Eigenschaften gleichzeitig berücksichtigt werden.` },
  { id:'anki_p02_472', vl:'p02', cat:'Anki', source:'anki', q:`Warum können Antikörper zum Nachweis von Proteinen verwendet werden?`, a:`Antikörper können zum Nachweis von Proteinen verwendet werden, weil sie hoch spezifisch an bestimmte Antigene (Proteine) binden.Diese spezifische Bindung ermöglicht es, ein bestimmtes Protein gezielt zu erkennen und nachzuweisen, selbst in komplexen Gemischen.` },
  { id:'anki_p02_473', vl:'p02', cat:'Anki', source:'anki', q:`Wie entsteht ein Antikörper gegen ein bestimmtes Protein?`, a:`Ein Antikörper entsteht, wenn das Immunsystem eines Säugetiers ein fremdes Protein (Antigen) erkennt und darauf reagiert.Spezialisierte Immunzellen (B-Zellen) werden aktiviert und produzieren Antikörper, die spezifisch an dieses Protein binden, sodass es erkannt und bekämpft werden kann.` },
  { id:'anki_p02_474', vl:'p02', cat:'Anki', source:'anki', q:`Aus welchen Ketten besteht ein Antikörper?`, a:`Ein Antikörper besteht aus zwei schweren (H-) und zwei leichten (L-) Ketten, die über Disulfidbrücken miteinander verbunden sind.Diese Struktur bildet eine Y-förmige Gesamtstruktur, wobei die variablen Bereiche für die spezifische Antigenbindung verantwortlich sind.` },
  { id:'anki_p02_475', vl:'p02', cat:'Anki', source:'anki', q:`Wie sind die Ketten eines Antikörpers miteinander verbunden?`, a:`Die Ketten eines Antikörpers sind über Disulfidbrücken miteinander verbunden.Diese kovalenten Bindungen zwischen Cysteinresten sorgen für die stabile Y-förmige Struktur des Antikörpers.` },
  { id:'anki_p02_476', vl:'p02', cat:'Anki', source:'anki', q:`Welche zwei Hauptbereiche besitzen Antikörperketten?`, a:`Antikörperketten bestehen aus zwei Hauptbereichen:• variable Regionen (V) → bestimmen die Spezifität der Antigenbindung• konstante Regionen (C) → sorgen für die strukturelle Stabilität und vermitteln biologische EffekteDie variablen Regionen bilden zusammen die Bindungsstelle für das Antigen.` },
  { id:'anki_p02_477', vl:'p02', cat:'Anki', source:'anki', q:`Welche Funktion haben die variablen Regionen eines Antikörpers?`, a:`Die variablen Regionen eines Antikörpers sind für die spezifische Bindung an ein Antigen verantwortlich.Sie bilden die Antigen-Bindungsstelle, deren Struktur genau zum Antigen passt und so eine hochselektive Erkennung ermöglicht.` },
  { id:'anki_p02_478', vl:'p02', cat:'Anki', source:'anki', q:`In welchen Tieren werden häufig Antikörper für Experimente produziert?`, a:`Antikörper für Experimente werden häufig in folgenden Tieren produziert:• Maus• Kaninchen• Ratte• ZiegeDiese Tiere werden immunisiert, sodass ihr Immunsystem spezifische Antikörper gegen das gewünschte Antigen bildet.` },
  { id:'anki_p02_479', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ein Western Blot und wie funktioniert er?`, a:`Ein Western Blot ist eine Methode zum spezifischen Nachweis von Proteinen mithilfe von Antikörpern.Dabei werden Proteine zunächst durch SDS-PAGE getrennt, anschließend auf eine Membran übertragen und dort mit spezifischen Antikörpern nachgewiesen.` },
  { id:'anki_p02_480', vl:'p02', cat:'Anki', source:'anki', q:`Was passiert im ersten Schritt eines Western Blots?`, a:`Im ersten Schritt werden die Proteine durch SDS-PAGE nach ihrer Molekülgröße aufgetrennt.Dabei werden sie zuvor denaturiert und gleichmäßig negativ geladen, sodass die Trennung ausschließlich nach der Größe erfolgt.` },
  { id:'anki_p02_481', vl:'p02', cat:'Anki', source:'anki', q:`Was geschieht nach der Elektrophorese beim Western Blot?`, a:`Nach der Elektrophorese werden die getrennten Proteine auf eine Membran (z. B. Nitrozellulose oder PVDF) übertragen.Dieser Schritt wird Blotting genannt und ermöglicht es, die Proteine anschließend gezielt mit Antikörpern nachzuweisen.` },
  { id:'anki_p02_482', vl:'p02', cat:'Anki', source:'anki', q:`Warum werden Membranen beim Western Blot blockiert?`, a:`Die Membran wird blockiert, um unspezifische Bindungen von Antikörpern zu verhindern.Dabei werden freie Bindungsstellen auf der Membran mit Proteinen (z. B. Milchprotein oder BSA) besetzt, sodass Antikörper nur noch an das Zielprotein binden.` },
  { id:'anki_p02_483', vl:'p02', cat:'Anki', source:'anki', q:`Womit werden unspezifische Stellen beim Western Blot häufig blockiert?`, a:`Unspezifische Bindungsstellen werden häufig mit Milchpulverlösung (z. B. Magermilch) oder Serumalbumin (BSA) blockiert.Diese Proteine besetzen freie Oberflächen der Membran und verhindern, dass Antikörper unspezifisch binden.` },
  { id:'anki_p02_484', vl:'p02', cat:'Anki', source:'anki', q:`Welche Rolle hat der primäre Antikörper beim Western Blot?`, a:`Der primäre Antikörper bindet spezifisch an das Zielprotein (Antigen) auf der Membran.Er sorgt somit für die gezielte Erkennung des gewünschten Proteins und bestimmt die Spezifität des Nachweises.` },
  { id:'anki_p02_485', vl:'p02', cat:'Anki', source:'anki', q:`Welche Rolle hat der sekundäre Antikörper beim Western Blot?`, a:`Der sekundäre Antikörper bindet an den primären Antikörper und ist meist mit einem Enzym oder Fluoreszenzmarker gekoppelt.Er ermöglicht die sichtbare Detektion des Zielproteins und verstärkt gleichzeitig das Signal, da mehrere sekundäre Antikörper an einen primären binden können.` },
  { id:'anki_p02_486', vl:'p02', cat:'Anki', source:'anki', q:`Warum ist der sekundäre Antikörper enzymgekoppelt?`, a:`Der sekundäre Antikörper ist enzymgekoppelt, damit nach seiner Bindung eine nachweisbare Reaktion (z. B. Farb- oder Lumineszenzreaktion) ausgelöst wird.Das Enzym setzt ein Substrat um und erzeugt ein messbares Signal, wodurch das Zielprotein sichtbar gemacht und detektiert werden kann.` },
  { id:'anki_p02_487', vl:'p02', cat:'Anki', source:'anki', q:`Nenne Beispiele für Enzyme, die im Western Blot verwendet werden.`, a:`Typische Enzyme im Western Blot sind:• Alkalische Phosphatase → erzeugt eine farbige oder fluoreszierende Reaktion• Peroxidase (z. B. HRP) → erzeugt eine Farbreaktion oder ChemilumineszenzDiese Enzyme ermöglichen den sichtbaren Nachweis des gebundenen Antikörpers.` },
  { id:'anki_p02_488', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ELISA und wie funktioniert es?`, a:`ELISA (Enzyme-Linked Immunosorbent Assay) ist ein enzymgekoppelter immunologischer Nachweis von Proteinen.Dabei wird ein Zielprotein durch spezifische Antikörper gebunden, und ein enzymgekoppelter Antikörper erzeugt anschließend eine messbare Farb- oder Lumineszenzreaktion.` },
  { id:'anki_p02_489', vl:'p02', cat:'Anki', source:'anki', q:`Wofür steht ELISA?`, a:`Enzyme-Linked Immunosorbent Assay.` },
  { id:'anki_p02_490', vl:'p02', cat:'Anki', source:'anki', q:`Welches Prinzip nutzt der Sandwich-ELISA und wie läuft er ab?`, a:`Beim Sandwich-ELISA wird das Zielprotein zwischen zwei spezifischen Antikörpern „eingeklemmt“.Zunächst bindet ein fest gebundener Antikörper das Protein, anschließend bindet ein zweiter, enzymgekoppelter Antikörper an das Protein.Das Enzym erzeugt dann eine messbare Reaktion, wodurch das Protein quantitativ nachgewiesen werden kann.` },
  { id:'anki_p02_491', vl:'p02', cat:'Anki', source:'anki', q:`Wie wird das Signal im ELISA sichtbar gemacht?`, a:`Das Signal im ELISA wird durch eine enzymatische Reaktion sichtbar gemacht.Dabei setzt ein enzymgekoppelter Antikörper ein Substrat um, wodurch eine Farbreaktion (oder Lumineszenz) entsteht, die photometrisch gemessen werden kann.` },
  { id:'anki_p02_492', vl:'p02', cat:'Anki', source:'anki', q:`Wofür wird ELISA häufig eingesetzt?`, a:`ELISA wird häufig zum quantitativen Nachweis von Proteinen eingesetzt.Er ermöglicht die Bestimmung der Konzentration bestimmter Moleküle (z. B. Hormone, Antikörper oder Antigene) in biologischen Proben.` },
  { id:'anki_p02_493', vl:'p02', cat:'Anki', source:'anki', q:`Was ist Immunfluoreszenz und wofür wird sie verwendet?`, a:`Die Immunfluoreszenz ist eine Methode zur Lokalisierung von Proteinen in Zellen oder Geweben mithilfe von fluoreszenzmarkierten Antikörpern.Diese Antikörper binden spezifisch an das Zielprotein und ermöglichen es, dessen Position unter dem Fluoreszenzmikroskop sichtbar zu machen.` },
  { id:'anki_p02_494', vl:'p02', cat:'Anki', source:'anki', q:`Wie funktioniert die Immunfluoreszenz genau?`, a:`Bei der Immunfluoreszenz bindet ein fluoreszenzmarkierter Antikörper spezifisch an das Zielprotein.Wird die Probe mit Licht einer bestimmten Wellenlänge angeregt, sendet der Fluorophor Licht aus, sodass die Position des Proteins sichtbar gemacht werden kann.` },
  { id:'anki_p02_495', vl:'p02', cat:'Anki', source:'anki', q:`Welche Antikörper werden bei der Immunfluoreszenz verwendet und welche Funktion haben sie?`, a:`Bei der Immunfluoreszenz werden zwei Antikörpertypen verwendet:• primärer Antikörper → bindet spezifisch an das Zielprotein• fluoreszenzmarkierter sekundärer Antikörper → bindet an den primären Antikörper und trägt den Fluorophor für die SichtbarmachungDiese Kombination ermöglicht eine spezifische und verstärkte Signalgebung.` },
  { id:'anki_p02_496', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ein Fluorochrom und wie funktioniert es?`, a:`Ein Fluorochrom ist ein Molekül, das Licht einer bestimmten Wellenlänge absorbiert und anschließend Licht mit längerer Wellenlänge (Fluoreszenz) emittiert.Diese Eigenschaft wird genutzt, um biologische Moleküle sichtbar zu machen, z. B. in der Immunfluoreszenz.` },
  { id:'anki_p02_497', vl:'p02', cat:'Anki', source:'anki', q:`Was geschieht bei der Fluoreszenz auf molekularer Ebene?`, a:`Bei der Fluoreszenz werden Elektronen durch Absorption von Lichtenergie in einen angeregten Zustand gehoben.Anschließend fallen sie wieder in den energetisch niedrigeren Grundzustand zurück und geben dabei Energie in Form von Licht (Fluoreszenz) ab.` },
  { id:'anki_p02_498', vl:'p02', cat:'Anki', source:'anki', q:`Warum hat das emittierte Fluoreszenzlicht eine längere Wellenlänge als das absorbierte Licht?`, a:`Ein Teil der aufgenommenen Energie wird nicht als Licht abgegeben, sondern als Wärme verloren.Dadurch besitzt das emittierte Licht weniger Energie und somit eine längere Wellenlänge als das ursprünglich absorbierte Licht.` },
  { id:'anki_p02_499', vl:'p02', cat:'Anki', source:'anki', q:`Was zeigt ein Fluoreszenzmikroskop und wofür wird es verwendet?`, a:`Ein Fluoreszenzmikroskop macht fluoreszierende Moleküle in Zellen oder Geweben sichtbar.Es wird verwendet, um die Lokalisation und Verteilung bestimmter Proteine oder Strukturen in biologischen Proben darzustellen.` },
  { id:'anki_p02_500', vl:'p02', cat:'Anki', source:'anki', q:`Welche Komponenten besitzt ein Fluoreszenzmikroskop und welche Funktion haben sie?`, a:`Ein Fluoreszenzmikroskop besteht aus mehreren wichtigen Komponenten:• Lichtquelle → erzeugt Anregungslicht für die Fluorochrome• Filter (Anregungs- und Emissionsfilter) → wählen die passenden Wellenlängen aus• Objektiv → sammelt und fokussiert das emittierte Licht• Okular (oder Kamera) → ermöglicht die Beobachtung bzw. Aufnahme des BildesDiese Komponenten sorgen dafür, dass nur das fluoreszierende Signal sichtbar wird.` },
  { id:'anki_p02_501', vl:'p02', cat:'Anki', source:'anki', q:`Was ist das Abbe-Limit und was begrenzt es?`, a:`Das Abbe-Limit beschreibt die physikalische Auflösungsgrenze der Lichtmikroskopie, die bei etwa 200 nm liegt.Es gibt an, wie nah zwei Punkte beieinander liegen können, um noch als getrennt erkannt zu werden, und wird durch die Wellenlänge des Lichts und die Optik des Mikroskops bestimmt.` },
  { id:'anki_p02_502', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ein Transmissions-Elektronenmikroskop (TEM) und wie funktioniert es?`, a:`Ein Transmissions-Elektronenmikroskop (TEM) ist ein Mikroskop, das Elektronenstrahlen zur Abbildung von sehr feinen Strukturen verwendet.Die Elektronen durchdringen eine sehr dünne Probe, und je nach Dichte werden sie unterschiedlich stark gestreut, wodurch ein hochaufgelöstes Bild der inneren Struktur entsteht.` },
  { id:'anki_p02_503', vl:'p02', cat:'Anki', source:'anki', q:`Warum hat das Transmissions-Elektronenmikroskop (TEM) eine höhere Auflösung als die Lichtmikroskopie?`, a:`Das TEM hat eine höhere Auflösung, weil Elektronen eine deutlich kürzere Wellenlänge als sichtbares Licht besitzen.Dadurch können feinere Strukturen dargestellt werden, da die Auflösung direkt von der Wellenlänge der verwendeten Strahlung abhängt.` },
  { id:'anki_p02_504', vl:'p02', cat:'Anki', source:'anki', q:`Wie werden Elektronen im Transmissions-Elektronenmikroskop (TEM) erzeugt?`, a:`Die Elektronen werden im TEM durch eine Kathode (z. B. erhitzter Wolframdraht) erzeugt.Durch Erhitzen werden Elektronen freigesetzt (thermische Emission) und anschließend durch eine hohe Spannung beschleunigt, sodass sie den Elektronenstrahl bilden.` },
  { id:'anki_p02_505', vl:'p02', cat:'Anki', source:'anki', q:`Was passiert, wenn Elektronen im TEM auf eine Probe treffen?`, a:`Wenn Elektronen auf die Probe treffen, werden sie je nach Elektronendichte der Struktur unterschiedlich gestreut oder absorbiert.Dichte Bereiche streuen oder absorbieren mehr Elektronen und erscheinen dunkler, während weniger dichte Bereiche mehr Elektronen durchlassen und heller erscheinen.` },
  { id:'anki_p02_506', vl:'p02', cat:'Anki', source:'anki', q:`Was ist Immungold-TEM und wofür wird es verwendet?`, a:`Beim Immungold-TEM werden Antikörper mit kleinen Goldpartikeln markiert, die spezifisch an ein Zielprotein binden.Die Goldpartikel sind im Elektronenmikroskop elektronendicht und erscheinen als dunkle Punkte, wodurch die genaue Lokalisation von Proteinen in der Zelle sichtbar gemacht werden kann.` },
  { id:'anki_p02_507', vl:'p02', cat:'Anki', source:'anki', q:`Warum wird Gold bei Immungold-TEM verwendet?`, a:`Gold wird verwendet, weil es sehr elektronendicht ist und Elektronen stark streut.Dadurch erscheint es im TEM als dunkler, gut sichtbarer Punkt, sodass die Position des gebundenen Antikörpers und damit des Zielproteins genau lokalisiert werden kann.` },
  { id:'anki_p02_508', vl:'p02', cat:'Anki', source:'anki', q:`Was ist Massenspektrometrie und wofür wird sie verwendet?`, a:`Die Massenspektrometrie ist eine Methode zur Bestimmung des Masse-zu-Ladungs-Verhältnisses (m/z) von Molekülen.Sie wird verwendet, um Moleküle zu identifizieren, ihre Masse zu bestimmen und ihre Struktur zu analysieren, z. B. bei der Untersuchung von Proteinen.` },
  { id:'anki_p02_509', vl:'p02', cat:'Anki', source:'anki', q:`Wozu wird Massenspektrometrie in der Proteinforschung verwendet?`, a:`Die Massenspektrometrie wird in der Proteinforschung vor allem zur Identifizierung von Proteinen eingesetzt.Dabei werden Proteine in Fragmente zerlegt, deren Masse-zu-Ladungs-Verhältnis bestimmt wird, sodass sie mit Datenbanken verglichen und eindeutig zugeordnet werden können.` },
  { id:'anki_p02_510', vl:'p02', cat:'Anki', source:'anki', q:`Wie werden Proteine für die Massenspektrometrie vorbereitet?`, a:`Proteine werden meist mit Trypsin in kleinere Peptide gespalten.Diese Peptide lassen sich besser ionisieren und analysieren, sodass ihre Masse-zu-Ladungs-Verhältnisse bestimmt und die Proteine anschließend identifiziert werden können.` },
  { id:'anki_p02_511', vl:'p02', cat:'Anki', source:'anki', q:`Welche Aminosäuren erkennt Trypsin und wo spaltet es?`, a:`Trypsin erkennt die basischen Aminosäuren Lysin und Arginin und spaltet die Peptidbindung auf der C-terminalen Seite dieser Aminosäuren.Dadurch entstehen definierte Peptidfragmente, die sich gut für die Massenspektrometrie eignen.` },
  { id:'anki_p02_512', vl:'p02', cat:'Anki', source:'anki', q:`Was entsteht durch den Trypsinverdau eines Proteins und wofür ist das wichtig?`, a:`Durch den Trypsinverdau entsteht ein charakteristisches Muster von Peptidfragmenten.Dieses Muster kann in der Massenspektrometrie als eine Art „Fingerprint“ genutzt werden, um das Protein eindeutig zu identifizieren.` },
  { id:'anki_p02_513', vl:'p02', cat:'Anki', source:'anki', q:`Was ist das Masse-zu-Ladungs-Verhältnis (m/z) und warum ist es wichtig?`, a:`Das Masse-zu-Ladungs-Verhältnis (m/z) ist das Verhältnis zwischen der Masse eines Ions und seiner elektrischen Ladung.Es ist die zentrale Größe in der Massenspektrometrie, da Moleküle anhand ihres m/z-Wertes detektiert und identifiziert werden.` },
  { id:'anki_p02_514', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ein Peptide Mass Fingerprint (PMF) und wofür wird er genutzt?`, a:`Ein Peptide Mass Fingerprint (PMF) ist das charakteristische Muster der Massen von Peptidfragmenten, die aus einem Protein entstehen (z. B. nach Trypsinverdau).Dieses Muster wird mit Datenbanken verglichen, um das Protein eindeutig zu identifizieren.` },
  { id:'anki_p02_515', vl:'p02', cat:'Anki', source:'anki', q:`Wie werden Proteine anhand eines Peptide Mass Fingerprint (PMF) identifiziert?`, a:`Proteine werden identifiziert, indem das gemessene Peptidmuster (PMF) mit theoretischen Peptidmustern aus Protein-Datenbanken verglichen wird.Die Übereinstimmung der Massen der Peptidfragmente ermöglicht die eindeutige Zuordnung zum entsprechenden Protein.` },
  { id:'anki_p02_516', vl:'p02', cat:'Anki', source:'anki', q:`Was ist MALDI und wie funktioniert diese Methode?`, a:`MALDI (Matrix-Assisted Laser Desorption/Ionization) ist eine Methode zur Ionisierung von Molekülen für die Massenspektrometrie.Dabei wird die Probe mit einer Matrix vermischt, die Laserenergie aufnimmt. Ein Laserpuls führt dazu, dass die Moleküle verdampfen (desorbieren) und ionisiert werden, ohne stark zu fragmentieren.` },
  { id:'anki_p02_517', vl:'p02', cat:'Anki', source:'anki', q:`Was ist ESI-Massenspektrometrie und wie funktioniert sie?`, a:`Die ESI-Massenspektrometrie (Electrospray-Ionisation) ist eine Methode zur Ionisierung von Molekülen in Lösung.Dabei wird die Probe durch eine feine Kapillare versprüht und unter hoher Spannung in geladene Tröpfchen überführt, aus denen schließlich geladene Moleküle (Ionen) entstehen, die im Massenspektrometer analysiert werden können.` },
  { id:'anki_p02_518', vl:'p02', cat:'Anki', source:'anki', q:`Was ist Tandem-Massenspektrometrie (MS/MS) und wie funktioniert sie?`, a:`Die Tandem-Massenspektrometrie (MS/MS) ist eine Methode, bei der zwei Massenspektrometer hintereinander geschaltet sind.Zunächst wird ein bestimmtes Ion ausgewählt, anschließend wird es gezielt fragmentiert, und die entstehenden Fragmente werden im zweiten Massenspektrometer analysiert.Dadurch können Strukturinformationen von Molekülen (z. B. Peptidsequenzen) bestimmt werden.` },
  { id:'anki_p02_519', vl:'p02', cat:'Anki', source:'anki', q:`Was passiert zwischen den beiden Massenspektrometern bei MS/MS?`, a:`Zwischen den beiden Massenspektrometern werden die ausgewählten Peptide gezielt fragmentiert.` },
  { id:'anki_p02_520', vl:'p02', cat:'Anki', source:'anki', q:`Warum ist die Tandem-Massenspektrometrie (MS/MS) genauer als ein Peptide Mass Fingerprint (PMF)?`, a:`MS/MS ist genauer, weil dabei nicht nur die Masse der Peptide, sondern auch ihre Aminosäuresequenz bestimmt werden kann.Durch die Analyse der Fragmentmuster erhält man deutlich detailliertere Informationen, wodurch Proteine eindeutiger identifiziert werden können.` },
  { id:'anki_p02_521', vl:'p02', cat:'Anki', source:'anki', q:`Was ist das Proteom?`, a:`Das Proteom ist die Gesamtheit aller Proteine einer Zelle, eines Gewebes oder eines Organismus zu einem bestimmten Zeitpunkt.Es ist dynamisch, da sich die Zusammensetzung je nach Bedingungen, Zelltyp und Entwicklungszustand verändern kann.` },
  { id:'anki_p02_522', vl:'p02', cat:'Anki', source:'anki', q:`Warum ist das Proteom dynamisch?`, a:`Das Proteom ist dynamisch, weil sich Proteinexpression, Abbau und posttranslationale Modifikationen ständig verändern.Diese Veränderungen hängen von Umweltbedingungen, Zelltyp und physiologischem Zustand ab und ermöglichen eine flexible Anpassung der Zellfunktion.` },
  { id:'anki_p02_523', vl:'p02', cat:'Anki', source:'anki', q:`Welche Modifikationen können massenspektrometrisch erkannt werden?`, a:`Mit der Massenspektrometrie können verschiedene posttranslationale Modifikationen erkannt werden, z. B.:• Phosphorylierung → Anlagerung einer Phosphatgruppe• Ubiquitinylierung → Markierung eines Proteins mit Ubiquitin (z. B. für Abbau)• Glykosylierung → Anlagerung von ZuckerkettenDiese Modifikationen führen zu charakteristischen Massenänderungen, die im Massenspektrum nachweisbar sind.` },
  { id:'anki_p02_524', vl:'p02', cat:'Anki', source:'anki', q:`Was bedeutet LC-MS/MS und wofür wird es eingesetzt?`, a:`LC-MS/MS steht für Liquid Chromatography gekoppelt mit Tandem-Massenspektrometrie.Dabei werden Moleküle zunächst durch Flüssigchromatographie getrennt und anschließend im Massenspektrometer analysiert und fragmentiert.Diese Kombination ermöglicht eine sehr genaue Identifizierung und Quantifizierung von Proteinen und Peptiden.` },
  { id:'anki_p02_525', vl:'p02', cat:'Anki', source:'anki', q:`Warum wird vor der Massenspektrometrie eine Flüssigchromatographie (LC) eingesetzt?`, a:`Die LC wird eingesetzt, um komplexe Peptidgemische vor der Analyse zu trennen.` },
  { id:'anki_p02_526', vl:'p02', cat:'Anki', source:'anki', q:`Was ist bildgebende Massenspektrometrie und was ermöglicht sie?`, a:`Die bildgebende Massenspektrometrie ist eine Methode, mit der die räumliche Verteilung von Molekülen in Geweben dargestellt werden kann.Dabei werden Massenspektren an vielen Punkten einer Probe aufgenommen und zu einem Bild zusammengesetzt, sodass sichtbar wird, wo bestimmte Moleküle lokalisiert sind.` },
  { id:'anki_p02_527', vl:'p02', cat:'Anki', source:'anki', q:`Wie funktioniert MALDI-Imaging?`, a:`Beim MALDI-Imaging wird ein Gewebe mit einer Matrix beschichtet und anschließend Punkt für Punkt mit einem Laser analysiert.Für jeden Punkt wird ein Massenspektrum aufgenommen, und diese Daten werden räumlich zugeordnet, sodass ein Bild der Verteilung bestimmter Moleküle im Gewebe entsteht.` },
  { id:'anki_p02_528', vl:'p02', cat:'Anki', source:'anki', q:`Welche Bedeutung hat bildgebende Massenspektrometrie für die Medizin?`, a:`Die bildgebende Massenspektrometrie hat großes Potenzial für die Medizin, da sie die räumliche Verteilung von Biomolekülen direkt im Gewebe sichtbar machen kann.Dadurch kann sie Histologie und Pathologie erweitern oder revolutionieren, indem sie neben der Struktur auch die molekulare Zusammensetzung von Geweben analysiert (z. B. bei Tumoren).` },
  { id:'anki_p03_529', vl:'p03', cat:'Anki', source:'anki', q:`Welche klassische Methode dient zur Bestimmung der Primärstruktur von Proteinen und wie funktioniert sie?`, a:`Die klassische Methode ist der Edman-Abbau.Dabei wird schrittweise die N-terminale Aminosäure eines Proteins abgespalten und identifiziert, ohne die restliche Kette vollständig zu zerstören.Durch wiederholte Anwendung kann so die Aminosäuresequenz (Primärstruktur) bestimmt werden.` },
  { id:'anki_p03_530', vl:'p03', cat:'Anki', source:'anki', q:`Welches Ende eines Peptids wird beim Edman-Abbau analysiert?`, a:`Beim Edman-Abbau wird der N-Terminus (freies Aminoende) eines Peptids analysiert.Dabei wird jeweils die N-terminale Aminosäure schrittweise abgespalten und identifiziert.` },
  { id:'anki_p03_531', vl:'p03', cat:'Anki', source:'anki', q:`Wie funktioniert der Edman-Abbau grundsätzlich?`, a:`Beim Edman-Abbau wird die N-terminale Aminosäure selektiv chemisch markiert und abgespalten, ohne die restliche Peptidkette zu zerstören.Die abgespaltene Aminosäure wird anschließend identifiziert, und der Prozess wird zyklisch wiederholt, sodass die Aminosäuresequenz Schritt für Schritt bestimmt werden kann.` },
  { id:'anki_p03_532', vl:'p03', cat:'Anki', source:'anki', q:`Welches Reagenz wird im Edman-Abbau verwendet und welche Funktion hat es?`, a:`Im Edman-Abbau wird Phenylisothiocyanat (PTC) verwendet.Es reagiert mit der N-terminalen Aminosäure, markiert sie und ermöglicht deren selektive Abspaltung und Identifikation.` },
  { id:'anki_p03_533', vl:'p03', cat:'Anki', source:'anki', q:`Was entsteht nach der Kopplung von Phenylisothiocyanat (PTC) mit der Aminogruppe beim Edman-Abbau?`, a:`Nach der Kopplung von PTC mit der N-terminalen Aminogruppe entsteht zunächst ein Anilinothiazolinon-Derivat (ATZ).Dieses Zwischenprodukt wird anschließend in ein stabileres Phenylthiohydantoin (PTH)-Derivat überführt, das zur Identifikation der Aminosäure dient.` },
  { id:'anki_p03_534', vl:'p03', cat:'Anki', source:'anki', q:`In welche stabile Verbindung wird das ATZ-Derivat beim Edman-Abbau umgewandelt?`, a:`Das ATZ-Derivat (Anilinothiazolinon) wird in eine stabile Phenylthiohydantoin-Aminosäure (PTH-Derivat) umgewandelt.Dieses stabile Produkt kann anschließend chromatographisch identifiziert werden, um die N-terminale Aminosäure zu bestimmen.` },
  { id:'anki_p03_535', vl:'p03', cat:'Anki', source:'anki', q:`Wie werden PTH-Aminosäuren beim Edman-Abbau identifiziert?`, a:`Die PTH-Aminosäuren werden durch chromatographische Trennung (z. B. HPLC) identifiziert.Dabei werden sie anhand ihrer charakteristischen Retentionszeiten unterschieden und so die jeweilige Aminosäure bestimmt.` },
  { id:'anki_p03_536', vl:'p03', cat:'Anki', source:'anki', q:`Welche moderne Methode kann ebenfalls Aminosäuresequenzen bestimmen und warum?`, a:`Eine moderne Methode ist die Tandem-Massenspektrometrie (MS/MS).Sie ermöglicht die Bestimmung von Aminosäuresequenzen, indem Peptide fragmentiert und die entstehenden Massenmuster analysiert werden, wodurch die Reihenfolge der Aminosäuren abgeleitet werden kann.` },
  { id:'anki_p03_537', vl:'p03', cat:'Anki', source:'anki', q:`Welche Methode wird häufig zur Bestimmung der dreidimensionalen Struktur von Proteinen verwendet und wie funktioniert sie?`, a:`Eine häufig verwendete Methode ist die Röntgenkristallographie.Dabei wird ein Proteinkristall mit Röntgenstrahlen bestrahlt, und aus dem entstehenden Beugungsmuster kann die dreidimensionale Struktur des Proteins auf atomarer Ebene berechnet werden.` },
  { id:'anki_p03_538', vl:'p03', cat:'Anki', source:'anki', q:`Welche Voraussetzung benötigt die Röntgenstrukturanalyse von Proteinen?`, a:`Die wichtigste Voraussetzung ist die Kristallisierung des Proteins.Nur in einem geordneten Kristallgitter können Röntgenstrahlen ein auswertbares Beugungsmuster erzeugen, aus dem die dreidimensionale Struktur berechnet werden kann.` },
  { id:'anki_p03_539', vl:'p03', cat:'Anki', source:'anki', q:`Was ist eine Einheitszelle in einem Proteinkristall?`, a:`Die Einheitszelle ist die kleinste sich regelmäßig wiederholende strukturelle Einheit eines Kristallgitters.Durch ihre periodische Wiederholung in alle Raumrichtungen entsteht die gesamte Kristallstruktur.` },
  { id:'anki_p03_540', vl:'p03', cat:'Anki', source:'anki', q:`Was passiert, wenn Röntgenstrahlen auf einen Proteinkristall treffen?`, a:`Wenn Röntgenstrahlen auf einen Proteinkristall treffen, werden sie an den Elektronenhüllen der Atome gestreut und erzeugen ein charakteristisches Beugungsmuster.Aus diesem Muster kann mithilfe mathematischer Auswertung die dreidimensionale Struktur des Proteins auf atomarer Ebene bestimmt werden.` },
  { id:'anki_p03_541', vl:'p03', cat:'Anki', source:'anki', q:`Warum kann man Proteine nicht direkt mit Röntgenstrahlen abbilden?`, a:`Proteine können nicht direkt abgebildet werden, weil es keine geeigneten Linsen für Röntgenstrahlen gibt.Daher entsteht kein direktes Bild, sondern ein Beugungsmuster, das erst durch mathematische Auswertung in eine Struktur umgerechnet werden muss.` },
  { id:'anki_p03_542', vl:'p03', cat:'Anki', source:'anki', q:`Welche Information enthält ein Röntgenbeugungsbild?`, a:`Ein Röntgenbeugungsbild enthält Informationen über die räumliche Anordnung der Elektronen (Elektronendichte) im Kristall.Aus den Intensitäten und Positionen der Beugungsreflexe kann die dreidimensionale Struktur des Proteins berechnet werden.` },
  { id:'anki_p03_543', vl:'p03', cat:'Anki', source:'anki', q:`Wie erhält man aus Röntgenbeugungsbildern die dreidimensionale Struktur eines Proteins?`, a:`Die Beugungsdaten werden mithilfe mathematischer Transformationen (z. B. Fourier-Transformation) in eine Elektronendichtekarte umgerechnet.` },
  { id:'anki_p03_544', vl:'p03', cat:'Anki', source:'anki', q:`Wie entsteht aus der Elektronendichtekarte ein Proteinmodell?`, a:`In die Elektronendichtekarte wird die Polypeptidkette schrittweise eingepasst, indem die Positionen der Atome entsprechend der Dichte interpretiert werden.So entsteht ein dreidimensionales Strukturmodell des Proteins, das anschließend weiter verfeinert und validiert wird.` },
  { id:'anki_p03_545', vl:'p03', cat:'Anki', source:'anki', q:`Welchen Nachteil hat die Röntgenstrukturanalyse von Proteinen?`, a:`Ein Nachteil ist, dass sie nur eine statische Momentaufnahme der Proteinstruktur liefert.Dynamische Prozesse wie Konformationsänderungen oder Bewegungen des Proteins können damit nur eingeschränkt erfasst werden.` },
  { id:'anki_p03_546', vl:'p03', cat:'Anki', source:'anki', q:`Welche Methode erlaubt Strukturuntersuchungen von Proteinen in Lösung und warum ist das wichtig?`, a:`Die NMR-Spektroskopie (Kernspinresonanzspektroskopie) ermöglicht die Untersuchung von Proteinstrukturen in Lösung.Das ist wichtig, weil Proteine dabei in einem natürlicheren, beweglichen Zustand vorliegen und somit auch dynamische Prozesse und Konformationsänderungen untersucht werden können.` },
  { id:'anki_p03_547', vl:'p03', cat:'Anki', source:'anki', q:`Wofür steht NMR?`, a:`NMR steht für Nuclear Magnetic Resonance (Kernspinresonanz).Dabei handelt es sich um eine Methode, die die magnetischen Eigenschaften von Atomkernen nutzt, um Strukturinformationen von Molekülen zu gewinnen.` },
  { id:'anki_p03_548', vl:'p03', cat:'Anki', source:'anki', q:`Welche Atomkerne werden häufig in der NMR-Spektroskopie untersucht?`, a:`Häufig untersuchte Atomkerne sind ¹H (Protonen), ¹³C und ¹⁵N.Diese Kerne besitzen einen magnetischen Spin und liefern daher auswertbare NMR-Signale, die Informationen über die Struktur und Umgebung der Atome im Molekül geben.` },
  { id:'anki_p03_549', vl:'p03', cat:'Anki', source:'anki', q:`Welche physikalische Eigenschaft nutzen NMR-Experimente?`, a:`NMR-Experimente nutzen den Kernspin bestimmter Atomkerne.Diese Kerne verhalten sich im Magnetfeld wie kleine Magnete und können durch Radiowellen angeregt werden, wodurch messbare Signale entstehen, die Informationen über die chemische Umgebung und Struktur liefern.` },
  { id:'anki_p03_550', vl:'p03', cat:'Anki', source:'anki', q:`Wie verhalten sich Atomkerne mit Spin in einem Magnetfeld?`, a:`Atomkerne mit Spin verhalten sich wie magnetische Dipole (kleine Magnete).Im äußeren Magnetfeld richten sie sich parallel oder antiparallel zum Feld aus und können durch Energieaufnahme zwischen diesen Zuständen wechseln, was die Grundlage der NMR-Spektroskopie ist.` },
  { id:'anki_p03_551', vl:'p03', cat:'Anki', source:'anki', q:`Was passiert, wenn Radiowellen auf Kerne mit Spin im Magnetfeld treffen?`, a:`Die Kerne können Radiowellen absorbieren und dadurch in einen höheren Energiezustand übergehen (Resonanz).Beim Zurückfallen in den niedrigeren Energiezustand geben sie Energie wieder ab, die als NMR-Signal gemessen wird.` },
  { id:'anki_p03_552', vl:'p03', cat:'Anki', source:'anki', q:`Was ist eine chemische Verschiebung in der NMR und wodurch entsteht sie?`, a:`Die chemische Verschiebung ist eine kleine Änderung der Resonanzfrequenz eines Atomkerns, die durch seine chemische Umgebung verursacht wird.Unterschiedliche Elektronendichten und Nachbaratome schirmen den Kern unterschiedlich ab, sodass er bei leicht unterschiedlichen Frequenzen resoniert – dies liefert wichtige Strukturinformationen.` },
  { id:'anki_p03_553', vl:'p03', cat:'Anki', source:'anki', q:`Welche Information liefert die Spin-Spin-Kopplung in der NMR?`, a:`Die Spin-Spin-Kopplung liefert Informationen über die räumliche Nähe und Bindungsbeziehungen zwischen Atomkernen.Sie zeigt, welche Kerne miteinander gekoppelt sind (meist über Bindungen) und ermöglicht Rückschlüsse auf die Struktur und Nachbarschaft von Atomen im Molekül.` },
  { id:'anki_p03_554', vl:'p03', cat:'Anki', source:'anki', q:`Was ist 2D-NMR und welchen Vorteil bietet diese Methode?`, a:`Die 2D-NMR ist eine zweidimensionale NMR-Spektroskopie, bei der Signale auf zwei Frequenzachsen dargestellt werden.Sie ermöglicht es, Wechselwirkungen zwischen Atomkernen sichtbar zu machen (z. B. Kopplungen oder räumliche Nähe) und erleichtert dadurch die Strukturaufklärung komplexer Moleküle deutlich.` },
  { id:'anki_p03_555', vl:'p03', cat:'Anki', source:'anki', q:`Warum ist 2D-NMR besonders nützlich für die Untersuchung von Proteinen?`, a:`Die 2D-NMR ist besonders nützlich, weil sie deutlich mehr strukturelle Informationen liefert als 1D-NMR.Sie erlaubt die Analyse von Wechselwirkungen zwischen Atomkernen (z. B. Kopplungen und räumliche Nähe) und hilft so, die dreidimensionale Struktur und Faltung von Proteinen aufzuklären.` },
  { id:'anki_p03_556', vl:'p03', cat:'Anki', source:'anki', q:`Bis zu welcher Größe können Proteine typischerweise mit NMR untersucht werden?`, a:`Mit der NMR-Spektroskopie können meist Proteine bis etwa 30–50 kDa gut untersucht werden.Größere Proteine sind schwieriger zu analysieren, da die Signale überlappen und breiter werden, was die Auswertung komplexer macht.` },
  { id:'anki_p03_557', vl:'p03', cat:'Anki', source:'anki', q:`Was ist Kryo-Elektronenmikroskopie (Kryo-EM) und wie funktioniert sie?`, a:`Die Kryo-Elektronenmikroskopie (Kryo-EM) ist eine Methode zur Strukturbestimmung von Biomolekülen bei sehr niedrigen Temperaturen.Dabei werden Proben schnell schockgefroren (vitrifiziert), sodass Wasser nicht kristallisiert, und anschließend mit Elektronenstrahlen untersucht.So können hochaufgelöste Strukturen von Proteinen und Komplexen in einem nahezu nativen Zustand bestimmt werden.` },
  { id:'anki_p03_558', vl:'p03', cat:'Anki', source:'anki', q:`Bei welchen Temperaturen werden Proben bei der Kryo-Elektronenmikroskopie untersucht?`, a:`Proben werden bei etwa ≤ −150 °C untersucht.Durch diese sehr niedrigen Temperaturen bleiben die Proben im vitrifizierten (glasartigen) Zustand, wodurch ihre natürliche Struktur erhalten bleibt.` },
  { id:'anki_p03_559', vl:'p03', cat:'Anki', source:'anki', q:`Wie wird bei der Kryo-EM eine 3D-Struktur berechnet?`, a:`Die 3D-Struktur wird durch die Auswertung vieler Einzelaufnahmen desselben Moleküls aus unterschiedlichen Orientierungen berechnet.Diese Bilder werden computergestützt kombiniert und gemittelt, sodass eine hochaufgelöste dreidimensionale Struktur entsteht.` },
  { id:'anki_p03_560', vl:'p03', cat:'Anki', source:'anki', q:`Welche großen Molekülkomplexe können mit Kryo-EM untersucht werden?`, a:`Mit Kryo-EM können vor allem große Biomolekülkomplexe untersucht werden, z. B.:• Ribosomen• Membranproteinkomplexe• ViruspartikelDiese Methode eignet sich besonders für große und komplexe Strukturen, die mit anderen Methoden schwer zugänglich sind.` },
  { id:'anki_p03_561', vl:'p03', cat:'Anki', source:'anki', q:`Was ist Rasterkraftmikroskopie (AFM) und wie funktioniert sie?`, a:`Die Rasterkraftmikroskopie (AFM) ist eine Methode zur Abtastung von Oberflächen mit einer nanoskopischen Spitze.Dabei fährt eine feine Spitze über die Oberfläche, und die Kräfte zwischen Spitze und Probe werden gemessen. Daraus wird ein hochaufgelöstes Oberflächenbild erstellt, auch unter physiologischen Bedingungen.` },
  { id:'anki_p03_562', vl:'p03', cat:'Anki', source:'anki', q:`Welche Information liefert die Rasterkraftmikroskopie (AFM)?`, a:`Die AFM liefert eine dreidimensionale Topographie von Molekülen oder Zelloberflächen.Sie zeigt die Oberflächenstruktur im Nanometerbereich und ermöglicht Aussagen über Form, Höhe und mechanische Eigenschaften von Proben.` },
  { id:'anki_p03_563', vl:'p03', cat:'Anki', source:'anki', q:`In welchem Auflösungsbereich arbeitet die Rasterkraftmikroskopie (AFM)?`, a:`Die AFM arbeitet im Nanometerbereich und kann in manchen Fällen sogar atomare Auflösung erreichen.Damit lassen sich sehr feine Oberflächenstrukturen detailliert darstellen.` },
  { id:'anki_v01_564', vl:'v01', cat:'Anki', source:'anki', q:`Was versteht man unter der nativen Konformation eines Proteins?`, a:`Die native Konformation eines Proteins ist seine korrekt gefaltete, dreidimensionale Struktur, in der es biologisch aktiv ist.Sie stellt den energetisch günstigsten Zustand des Proteins dar und wird durch verschiedene nicht-kovalente Wechselwirkungen stabilisiert.Nur in dieser Konformation kann das Protein seine spezifische Funktion (z. B. als Enzym oder Rezeptor) erfüllen.` },
  { id:'anki_v01_565', vl:'v01', cat:'Anki', source:'anki', q:`Wo ist die Information für die korrekte Proteinfaltung gespeichert?`, a:`Die Information für die korrekte Faltung eines Proteins ist in seiner Primärstruktur, also in der Aminosäuresequenz, gespeichert.Die Reihenfolge der Aminosäuren bestimmt die Wechselwirkungen zwischen den Seitenketten und führt so zur Ausbildung der spezifischen dreidimensionalen Struktur.Damit legt die Primärstruktur fest, wie sich ein Protein faltet und welche Funktion es übernehmen kann.` },
  { id:'anki_v01_566', vl:'v01', cat:'Anki', source:'anki', q:`Warum ist die Proteinfaltung thermodynamisch begünstigt?`, a:`Die Proteinfaltung ist thermodynamisch begünstigt, weil die native, gefaltete Struktur den Zustand mit der niedrigsten freien Energie (Minimum von ΔG) darstellt.Während der Faltung werden energetisch günstige Wechselwirkungen wie hydrophobe Effekte, Wasserstoffbrücken und ionische Bindungen ausgebildet.Dadurch entsteht eine stabile Struktur, die für das Protein energetisch vorteilhaft und funktionell geeignet ist.` },
  { id:'anki_v01_567', vl:'v01', cat:'Anki', source:'anki', q:`Welche Kräfte stabilisieren die dreidimensionale Struktur eines Proteins?`, a:`Die dreidimensionale Struktur eines Proteins wird durch verschiedene nicht-kovalente Wechselwirkungen sowie kovalente Bindungen stabilisiert.Dazu gehören vor allem hydrophobe Wechselwirkungen, die das Proteininnere stabilisieren, sowie Wasserstoffbrückenbindungen, ionische Wechselwirkungen und Van-der-Waals-Kräfte zwischen den Aminosäureresten.Zusätzlich können Disulfidbrücken als kovalente Bindungen zwischen Cysteinresten zur weiteren Stabilisierung der Proteinstruktur beitragen.` },
  { id:'anki_v01_568', vl:'v01', cat:'Anki', source:'anki', q:`Was versteht man unter dem hydrophoben Effekt bei der Proteinfaltung?`, a:`Der hydrophobe Effekt beschreibt die Tendenz unpolarer (hydrophober) Aminosäurereste, sich im Inneren eines Proteins zusammenzulagern und den Kontakt mit Wasser zu vermeiden.Dabei werden hydrophobe Seitenketten aus dem wässrigen Umfeld ins Proteininnere verdrängt, während polare und geladene Gruppen bevorzugt an der Oberfläche liegen.Dieser Prozess trägt entscheidend zur Faltung und Stabilisierung der dreidimensionalen Proteinstruktur bei.` },
  { id:'anki_v01_569', vl:'v01', cat:'Anki', source:'anki', q:`Warum ist die zelluläre Umgebung für die Proteinfaltung problematisch?`, a:`Die zelluläre Umgebung, insbesondere das Cytosol, ist sehr dicht mit Proteinen und Makromolekülen gefüllt.Dadurch besteht die Gefahr, dass neu synthetisierte Proteine unerwünschte Wechselwirkungen eingehen, was zu Fehlfaltung oder Aggregation führen kann.Deshalb benötigen viele Proteine molekulare Chaperone, die eine korrekte Faltung unterstützen und Fehlfaltung verhindern.` },
  { id:'anki_v01_570', vl:'v01', cat:'Anki', source:'anki', q:`Was sind molekulare Chaperone?`, a:`Molekulare Chaperone sind Proteine, die die korrekte Faltung anderer Proteine unterstützen und Fehlfaltung oder Aggregation verhindern.` },
  { id:'anki_v01_571', vl:'v01', cat:'Anki', source:'anki', q:`Welche Hauptfunktionen haben molekulare Chaperone?`, a:`Molekulare Chaperone unterstützen die korrekte Proteinfaltung, verhindern die Aggregation fehlgefalteter Proteine und stabilisieren instabile Zwischenzustände während der Faltung.` },
  { id:'anki_v01_572', vl:'v01', cat:'Anki', source:'anki', q:`Wann werden viele Chaperone verstärkt exprimiert?`, a:`Chaperone werden vor allem bei Zellstress, insbesondere bei erhöhter Temperatur (Hitzeschock), verstärkt exprimiert, da unter diesen Bedingungen die Gefahr von Proteindenaturierung und Fehlfaltung steigt.` },
  { id:'anki_v01_573', vl:'v01', cat:'Anki', source:'anki', q:`Was sind Heat-Shock-Proteine (HSP)?`, a:`Heat-Shock-Proteine (HSP) sind molekulare Chaperone, die vor allem bei Zellstress (z. B. Hitze) vermehrt gebildet werden und die Proteinfaltung stabilisieren bzw. Fehlfaltung verhindern.` },
  { id:'anki_v01_574', vl:'v01', cat:'Anki', source:'anki', q:`Welche Rolle spielen Chaperone bei fehlgefalteten Proteinen?`, a:`Chaperone können fehlgefaltete Proteine erneut korrekt falten (Refolding) oder, wenn dies nicht gelingt, ihren Abbau einleiten.` },
  { id:'anki_v01_575', vl:'v01', cat:'Anki', source:'anki', q:`Was versteht man unter Proteinqualitätskontrolle?`, a:`Die Proteinqualitätskontrolle umfasst Mechanismen, die sicherstellen, dass Proteine korrekt gefaltet und funktionsfähig sind, und fehlgefaltete Proteine erkennen und abbauen.` },
  { id:'anki_v01_576', vl:'v01', cat:'Anki', source:'anki', q:`Welche Systeme sind an der Proteinqualitätskontrolle beteiligt?`, a:`An der Proteinqualitätskontrolle sind mehrere Systeme beteiligt:Molekulare Chaperone unterstützen die korrekte Faltung von Proteinen und verhindern deren Aggregation. Fehlgefaltete Proteine können sie erneut falten (Refolding).Das Ubiquitin-Proteasom-System markiert defekte oder fehlgefaltete Proteine mit Ubiquitin und baut sie anschließend im Proteasom gezielt ab.Die Autophagie dient dem Abbau größerer Proteinaggregate oder beschädigter Zellbestandteile, indem diese in Vesikel eingeschlossen und anschließend lysosomal abgebaut werden.` },
  { id:'anki_v01_577', vl:'v01', cat:'Anki', source:'anki', q:`Warum können fehlgefaltete Proteine toxisch sein?`, a:`Fehlgefaltete Proteine können unlösliche Aggregate bilden, die sich in der Zelle anreichern und wichtige Strukturen stören.Dadurch werden zelluläre Prozesse beeinträchtigt, was letztlich zu Zellschäden oder Zelltod führen kann.` },
  { id:'anki_v01_578', vl:'v01', cat:'Anki', source:'anki', q:`Was versteht man unter Proteinfehlfaltungserkrankungen?`, a:`Proteinfehlfaltungserkrankungen sind Krankheiten, die durch fehlgefaltete Proteine entstehen, welche sich zu Aggregaten zusammenlagern und dadurch die Zellfunktion stören.` },
  { id:'anki_v01_579', vl:'v01', cat:'Anki', source:'anki', q:`Nenne Beispiele für Proteinfehlfaltungserkrankungen.`, a:`Typische Beispiele für Proteinfehlfaltungserkrankungen sind Alzheimer, Parkinson, Huntington sowie Prionenerkrankungen, bei denen fehlgefaltete Proteine zu Aggregaten führen und Nervenzellen schädigen.` },
  { id:'anki_v01_580', vl:'v01', cat:'Anki', source:'anki', q:`Warum sind Nervenzellen besonders anfällig für Proteinfehlfaltung?`, a:`Nervenzellen sind besonders anfällig, weil sie sehr langlebig sind und sich kaum teilen, sodass fehlgefaltete Proteine über lange Zeit akkumulieren können.Dadurch steigt das Risiko für Proteinaggregate und zelluläre Schäden` },
  { id:'anki_v02_581', vl:'v02', cat:'Anki', source:'anki', q:`Was beschreibt das zentrale Dogma der Molekularbiologie?`, a:`Das zentrale Dogma beschreibt den Informationsfluss in der Zelle von DNA über RNA zu Protein.Dabei wird die genetische Information zunächst von DNA in RNA transkribiert und anschließend von RNA in ein Protein translatiert.` },
  { id:'anki_v02_582', vl:'v02', cat:'Anki', source:'anki', q:`Was ist der genetische Code?`, a:`Der genetische Code beschreibt die Zuordnung von Basentripletts (Codons) der mRNA zu bestimmten Aminosäuren.Dabei codiert jedes Codon für eine spezifische Aminosäure oder ein Stoppsignal während der Proteinsynthese.` },
  { id:'anki_v02_583', vl:'v02', cat:'Anki', source:'anki', q:`Welche Eigenschaften hat der genetische Code?`, a:`Der genetische Code ist degeneriert, da mehrere Codons für dieselbe Aminosäure codieren, aber gleichzeitig eindeutig, weil jedes Codon nur für eine Aminosäure steht.Er ist nicht überlappend, das heißt, die Codons werden nacheinander ohne Überschneidung gelesen, und nahezu universell, da er in fast allen Organismen gleich ist.` },
  { id:'anki_v02_584', vl:'v02', cat:'Anki', source:'anki', q:`Was ist ein Codon?`, a:`Ein Codon ist ein Triplett aus drei Nukleotiden der mRNA, das für eine bestimmte Aminosäure oder ein Stoppsignal codiert.` },
  { id:'anki_v02_585', vl:'v02', cat:'Anki', source:'anki', q:`Was ist ein Leseraster (Reading Frame)?`, a:`Das Leseraster beschreibt die Art und Weise, wie eine mRNA in aufeinanderfolgende Codons (Tripletts) eingeteilt und gelesen wird.Es bestimmt, welche Aminosäuren in welcher Reihenfolge in das Protein eingebaut werden.` },
  { id:'anki_v02_586', vl:'v02', cat:'Anki', source:'anki', q:`Was passiert bei einer Frameshift-Mutation?`, a:`Bei einer Frameshift-Mutation kommt es durch Insertion oder Deletion von Nukleotiden zu einer Verschiebung des Leserasters.Dadurch ändern sich alle nachfolgenden Codons, was meist zu einem stark veränderten oder funktionslosen Protein führt.` },
  { id:'anki_v02_587', vl:'v02', cat:'Anki', source:'anki', q:`Wie ist eine eukaryotische mRNA aufgebaut und welche Funktionen haben die einzelnen Bereiche?`, a:`Die eukaryotische mRNA besteht aus mehreren funktionellen Abschnitten, die für Stabilität und Translation wichtig sind:5’-Cap (7-Methylguanosin)→ schützt die mRNA vor Abbau und ermöglicht die Initiation (Startsignal) der Translation5’-UTR (untranslatierte Region)→ enthält regulatorische Sequenzen und beeinflusst die Translationseffizienzcodierende Region (ORF)→ enthält die Information für die Aminosäuresequenz des Proteins3’-UTR→ reguliert Stabilität, Lokalisation und Translation der mRNAPoly-A-Schwanz→ schützt vor Abbau und erhöht die Stabilität der mRNA` },
  { id:'anki_v02_588', vl:'v02', cat:'Anki', source:'anki', q:`Welche Funktion hat die 5’-Cap-Struktur?`, a:`Die 5’-Cap-Struktur schützt die mRNA vor enzymatischem Abbau und dient als Erkennungssignal für die Initiation der Translation.` },
  { id:'anki_v02_589', vl:'v02', cat:'Anki', source:'anki', q:`Welche Funktion hat der Poly-A-Schwanz?`, a:`Der Poly-A-Schwanz stabilisiert die mRNA, schützt sie vor Abbau und erleichtert sowohl den Export aus dem Zellkern als auch die Translation.` },
  { id:'anki_v02_590', vl:'v02', cat:'Anki', source:'anki', q:`Was ist eine tRNA und welche Funktion hat sie?`, a:`Die tRNA (Transfer-RNA) ist ein Adaptermolekül, das bei der Translation die Verknüpfung zwischen mRNA und Aminosäuren herstellt.Sie transportiert eine spezifische Aminosäure zum Ribosom und besitzt ein Anticodon, das komplementär an das passende Codon der mRNA bindet.Dadurch wird sichergestellt, dass die richtige Aminosäure in die wachsende Polypeptidkette eingebaut wird.` },
  { id:'anki_v02_591', vl:'v02', cat:'Anki', source:'anki', q:`Welche zwei wichtigen funktionellen Bereiche besitzt die tRNA?`, a:`Die tRNA besitzt zwei zentrale funktionelle Bereiche:• Anticodon-Schleife→ enthält das Anticodon, das komplementär an das Codon der mRNA bindet• Aminosäure-Bindungsstelle (3’-Ende)→ hier wird die spezifische Aminosäure kovalent an die tRNA gebundenDiese beiden Bereiche ermöglichen die korrekte Zuordnung von Codon und Aminosäure während der Translation.` },
  { id:'anki_v02_592', vl:'v02', cat:'Anki', source:'anki', q:`Was ist das Anticodon der tRNA und welche Funktion hat es?`, a:`Das Anticodon ist eine Abfolge von drei Nukleotiden auf der tRNA.→ Es bindet komplementär an ein Codon der mRNA (Basenpaarung)→ Dadurch erkennt die tRNA genau die Position, an der sie am Ribosom benötigt wirdDa jede tRNA eine bestimmte Aminosäure trägt, sorgt das Anticodon dafür, dass die passende Aminosäure entsprechend der mRNA-Sequenz eingebaut wird.So wird die genetische Information korrekt in ein Protein übersetzt.` },
  { id:'anki_v02_593', vl:'v02', cat:'Anki', source:'anki', q:`Wie werden tRNAs mit Aminosäuren beladen?`, a:`tRNAs werden durch spezifische Aminoacyl-tRNA-Synthetasen mit der passenden Aminosäure beladen.→ Jede Aminosäure besitzt ihre eigene Synthetase→ Diese erkennt sowohl die richtige Aminosäure als auch die passende tRNA→ Unter ATP-Verbrauch wird die Aminosäure an das 3’-Ende der tRNA gebundenSo entsteht eine beladene tRNA, die die korrekte Aminosäure zur Translation bringt.` },
  { id:'anki_v02_594', vl:'v02', cat:'Anki', source:'anki', q:`Warum ist die korrekte Beladung von tRNA wichtig?`, a:`Die korrekte Beladung der tRNA ist entscheidend, weil sie bestimmt, welche Aminosäure eingebaut wird.Da das Ribosom nur Codon–Anticodon erkennt, hängt die Genauigkeit der Proteinsynthese von der richtigen Beladung ab.` },
  { id:'anki_v02_595', vl:'v02', cat:'Anki', source:'anki', q:`Wo werden ribosomale Untereinheiten gebildet?`, a:`Die ribosomalen Untereinheiten werden im Nucleolus des Zellkerns gebildet.Dort wird rRNA synthetisiert und mit ribosomalen Proteinen zusammengesetzt, bevor die Untereinheiten ins Cytosol exportiert werden.` },
  { id:'anki_v02_596', vl:'v02', cat:'Anki', source:'anki', q:`Woraus bestehen Ribosomen?`, a:`Ribosomen bestehen aus ribosomaler RNA (rRNA) und Proteinen.Sie sind aus zwei Untereinheiten aufgebaut, die zusammen die Proteinsynthese ermöglichen.` },
  { id:'anki_v02_597', vl:'v02', cat:'Anki', source:'anki', q:`Welche drei Phasen umfasst die Translation?`, a:`Die Translation verläuft in drei aufeinanderfolgenden Phasen:• Initiation→ Zusammenlagerung von Ribosom, mRNA und Start-tRNA• Elongation→ schrittweiser Einbau von Aminosäuren und Verlängerung der Polypeptidkette• Termination→ Erreichen eines Stopcodons und Freisetzung des fertigen Proteins` },
  { id:'anki_v02_598', vl:'v02', cat:'Anki', source:'anki', q:`Welches Codon startet die Translation?`, a:`Die Translation startet am Startcodon AUG, das für die Aminosäure Methionin codiert.` },
  { id:'anki_v02_599', vl:'v02', cat:'Anki', source:'anki', q:`Welche Aminosäure wird durch AUG codiert?`, a:`Das Codon AUG codiert für die Aminosäure Methionin, die als Startaminosäure der Translation dient.` },
  { id:'anki_v02_600', vl:'v02', cat:'Anki', source:'anki', q:`Was passiert während der Initiation der Translation?`, a:`Während der Initiation bindet die kleine ribosomale Untereinheit an die mRNA und erkennt das Startcodon (AUG).Daraufhin bindet die Start-tRNA mit Methionin, und die große Untereinheit lagert sich an, sodass ein funktionsfähiges Ribosom entsteht.` },
  { id:'anki_v02_601', vl:'v02', cat:'Anki', source:'anki', q:`Was passiert während der Elongation?`, a:`Während der Elongation wird die Polypeptidkette schrittweise verlängert, indem passende tRNAs Aminosäuren zum Ribosom bringen.Diese werden über Peptidbindungen miteinander verknüpft, während das Ribosom entlang der mRNA weiterwandert.` },
  { id:'anki_v02_602', vl:'v02', cat:'Anki', source:'anki', q:`Welche enzymatische Aktivität katalysiert die Peptidbindung?`, a:`Die Bildung der Peptidbindung wird durch die Peptidyltransferase-Aktivität des Ribosoms katalysiert, die in der rRNA der großen Untereinheit lokalisiert ist.` },
  { id:'anki_v02_603', vl:'v02', cat:'Anki', source:'anki', q:`Welche drei Bindungsstellen besitzt das Ribosom und welche Funktion haben sie?`, a:`Das Ribosom besitzt drei funktionelle Bindungsstellen für tRNAs:• A-Stelle (Aminoacyl-Stelle)→ hier bindet die neue, beladene tRNA mit der nächsten Aminosäure• P-Stelle (Peptidyl-Stelle)→ hält die tRNA mit der wachsenden Polypeptidkette• E-Stelle (Exit-Stelle)→ hier verlässt die entladene tRNA das Ribosom` },
  { id:'anki_v02_604', vl:'v02', cat:'Anki', source:'anki', q:`Wie endet die Translation?`, a:`Die Translation endet, wenn ein Stopcodon (UAA, UAG oder UGA) erreicht wird.→ Es bindet kein tRNA, sondern ein Release-Faktor→ die Polypeptidkette wird freigesetzt und das Ribosom zerfällt in seine Untereinheiten.` },
  { id:'anki_v02_605', vl:'v02', cat:'Anki', source:'anki', q:`Welche Stopcodons existieren?`, a:`Die drei Stopcodons der mRNA sind UAA, UAG und UGA, die das Ende der Translation signalisieren.` },
  { id:'anki_v02_606', vl:'v02', cat:'Anki', source:'anki', q:`Welche Proteine erkennen Stopcodons?`, a:`Stopcodons werden von Release-Faktoren (Freisetzungsfaktoren) erkannt, die an das Ribosom binden, wenn ein Stopcodon in der mRNA erreicht wird.Sie lösen die Freisetzung der Polypeptidkette aus und beenden damit die Translation.` },
  { id:'anki_v03_607', vl:'v03', cat:'Anki', source:'anki', q:`Welche zwei Grundprinzipien gibt es für den Proteintransport in der Zelle?`, a:`Proteine werden in der Zelle grundsätzlich auf zwei Arten transportiert:• Transport durch Kernporen→ erfolgt zwischen Zellkern und Cytosol→ bereits gefaltete Proteine können durch Kernporenkomplexe transportiert werden• Transport über Membranen bzw. Vesikel→ betrifft Organellen wie ER, Golgi, Mitochondrien→ Proteine werden entweder durch Membranen geschleust oder in Vesikeln verpackt und weitertransportiertDiese beiden Prinzipien bilden die Grundlage für den zielgerichteten Proteintransport in eukaryotischen Zellen.` },
  { id:'anki_v03_608', vl:'v03', cat:'Anki', source:'anki', q:`Was beschreibt die „Straßenkarte“ des intrazellulären Proteinverkehrs?`, a:`Die „Straßenkarte“ beschreibt die typischen Transportwege von Proteinen innerhalb der Zelle.→ Sie zeigt, wie Proteine zwischen ER, Golgi-Apparat, Vesikeln und verschiedenen Organellen weitergeleitet werden→ und wie sie gezielt an ihren Bestimmungsort gelangenDamit stellt sie ein Modell für die Organisation und Koordination des Proteintransports in der Zelle dar.` },
  { id:'anki_v03_609', vl:'v03', cat:'Anki', source:'anki', q:`Wie gelangen Proteine in den Zellkern?`, a:`Proteine gelangen durch Kernporenkomplexe in den Zellkern, ohne zuvor entfaltet werden zu müssen.→ Voraussetzung ist ein Kernlokalisationssignal (NLS) (eine kurze Aminosäuresequenz)→ dieses wird von Importinen (Transportproteinen) erkannt→ Das Protein-Importin-Komplex wird durch die Kernpore in den Zellkern transportiert→ dort sorgt Ran-GTP für die Freisetzung des ProteinsSo wird der Transport in den Zellkern gezielt und reguliert gesteuert.` },
  { id:'anki_v03_610', vl:'v03', cat:'Anki', source:'anki', q:`Wie gelangen Proteine in Mitochondrien?`, a:`Proteine werden meist im Cytosol synthetisiert und anschließend in die Mitochondrien importiert.→ Sie besitzen eine mitochondriale Signalsequenz, die vom Importapparat erkannt wird→ Der Transport erfolgt über spezielle Translokationskomplexe (TOM- und TIM-Komplexe) in der äußeren und inneren Membran→ Während des Transports müssen die Proteine ungefaltet sein und werden von Chaperonen begleitetNach dem Import werden sie in die richtige Kompartimente weitergeleitet und falten sich in ihre aktive Struktur` },
  { id:'anki_v03_611', vl:'v03', cat:'Anki', source:'anki', q:`Wie gelangen Proteine in Peroxisomen?`, a:`Proteine gelangen mithilfe von Peroxisomen-Targeting-Signalen (PTS) in die Peroxisomen.→ Diese Signale werden von Rezeptorproteinen im Cytosol erkannt→ Der Protein-Rezeptor-Komplex wird an die Peroxisomenmembran transportiert und eingeschleustBesonders ist, dass Proteine auch im bereits gefalteten Zustand in Peroxisomen importiert werden können.` },
  { id:'anki_v03_612', vl:'v03', cat:'Anki', source:'anki', q:`Was ist der sekretorische Pathway (Weg)?`, a:`Der sekretorische Pathway beschreibt den Transportweg von Proteinen, die für die Sekretion oder die Zellmembran bestimmt sind.→ Diese Proteine werden am rauen ER synthetisiert→ anschließend über Vesikel zum Golgi-Apparat transportiert→ dort modifiziert und sortiert→ und schließlich in Vesikeln zu ihrem Ziel (z. B. Zellmembran oder Extrazellulärraum) transportiert.Damit ermöglicht der sekretorische Pathway die gezielte Weiterleitung von Proteinen durch das Endomembransystem.` },
  { id:'anki_v03_613', vl:'v03', cat:'Anki', source:'anki', q:`Wo beginnt der sekretorische Weg?`, a:`Der sekretorische Weg beginnt am rauen endoplasmatischen Retikulum (rER).→ Proteine, die für den sekretorischen Weg bestimmt sind, besitzen ein Signalpeptid→ dieses wird vom SRP (Signal Recognition Particle) erkannt→ dadurch wird das Ribosom an die ER-Membran geleitet→ Die Translation wird fortgesetzt und das Protein wird direkt in das ER eingeschleust` },
  { id:'anki_v03_614', vl:'v03', cat:'Anki', source:'anki', q:`Welche Rolle spielt das raue endoplasmatische Retikulum (ER) bei der Synthese und Verarbeitung von Proteinen?`, a:`Das raue endoplasmatische Retikulum (rER) ist der Ort, an dem Proteine für den sekretorischen Weg synthetisiert werden.→ Ribosomen an der ER-Membran produzieren diese Proteine→ sie werden während der Translation direkt in das ER eingeschleust→ im ER beginnen erste Faltung und Modifikationen (z. B. Disulfidbrücken)` },
  { id:'anki_v03_615', vl:'v03', cat:'Anki', source:'anki', q:`Welche Rolle spielt der Golgi-Apparat im Proteintransport?`, a:`Der Golgi-Apparat ist für die Modifikation, Sortierung und den Weitertransport von Proteinen zuständig.→ Proteine aus dem ER werden hier weiter modifiziert (z. B. Glykosylierung)→ anschließend nach ihrem Bestimmungsort sortiert→ und in Vesikeln zu ihrem Ziel transportiert (z. B. Membran, Lysosom, Sekretion)` },
  { id:'anki_v03_616', vl:'v03', cat:'Anki', source:'anki', q:`Was ist N-Glykosylierung und wo findet sie statt?`, a:`Die N-Glykosylierung ist eine posttranslationale Modifikation, bei der Zuckerketten an Asparaginreste eines Proteins gebunden werden.→ Sie beginnt im endoplasmatischen Retikulum und wird im Golgi-Apparat weiter modifiziert→ Sie ist wichtig für Proteinfaltung, Stabilität und Funktion.` },
  { id:'anki_v03_617', vl:'v03', cat:'Anki', source:'anki', q:`Wo findet N-Glykosylierung statt?`, a:`Die N-Glykosylierung beginnt im endoplasmatischen Retikulum (ER) und wird im Golgi-Apparat weiter modifiziert.` },
  { id:'anki_v03_618', vl:'v03', cat:'Anki', source:'anki', q:`Was ist O-Glykosylierung?`, a:`Die O-Glykosylierung ist eine posttranslationale Modifikation, bei der Zuckerketten an die Hydroxylgruppen von Serin- oder Threoninresten eines Proteins gebunden werden.Sie findet hauptsächlich im Golgi-Apparat statt und ist wichtig für Proteinstruktur und Funktion.` },
  { id:'anki_v03_619', vl:'v03', cat:'Anki', source:'anki', q:`Wo findet die O-Glykosylierung statt?`, a:`Die O-Glykosylierung findet im Golgi-Apparat statt.` },
  { id:'anki_v03_620', vl:'v03', cat:'Anki', source:'anki', q:`Wie beeinflusst Glykosylierung unsere Blutgruppe?`, a:`Die ABO-Blutgruppen werden durch unterschiedliche Zuckerreste auf Glykoproteinen und Glykolipiden der Zelloberfläche bestimmt.→ Je nach Enzym werden verschiedene Zucker angeheftet→ diese unterscheiden die Blutgruppen A, B, AB und 0Damit basiert die Blutgruppenbestimmung auf spezifischen Glykosylierungsmustern.` },
  { id:'anki_v03_621', vl:'v03', cat:'Anki', source:'anki', q:`Was versteht man unter Vesikeltransport?`, a:`er Vesikeltransport ist ein Mechanismus, bei dem Proteine zwischen Zellkompartimenten über membranumhüllte Vesikel transportiert werden.→ Vesikel schnüren sich von einer Membran ab→ werden zum Ziel transportiert→ und verschmelzen dort mit der ZielmembranSo werden Proteine gezielt zwischen ER, Golgi und anderen Organellen weitergeleitet.` },
  { id:'anki_v03_622', vl:'v03', cat:'Anki', source:'anki', q:`Warum ist Vesikeltransport wichtig?`, a:`Der Vesikeltransport ist wichtig, weil er sicherstellt, dass Proteine gezielt an ihr richtiges Zielkompartiment gelangen.→ Dadurch können Proteine ihre spezifische Funktion am richtigen Ort erfüllen.` },
  { id:'anki_v03_623', vl:'v03', cat:'Anki', source:'anki', q:`Was passiert bei Fehlern im Proteintransport?`, a:`Bei Fehlern im Proteintransport gelangen Proteine nicht an ihren richtigen Bestimmungsort.→ Dadurch können sie ihre Funktion nicht erfüllen oder fehlgeleitet wirken→ dies führt häufig zu Störungen zellulärer Prozesse und kann Krankheiten verursachen` },
  { id:'anki_v04_624', vl:'v04', cat:'Anki', source:'anki', q:`Was ist die Grundfunktion des Ubiquitin-Proteasom-Systems (UPS)?`, a:`Das Ubiquitin-Proteasom-System (UPS) dient dem gezielten Abbau von überflüssigen, fehlgefalteten oder geschädigten Proteinen im Cytosol und Zellkern.→ Proteine werden mit Ubiquitin markiert→ anschließend im Proteasom abgebautSo trägt das UPS zur Proteinqualität und Regulation zellulärer Prozesse bei.` },
  { id:'anki_v04_625', vl:'v04', cat:'Anki', source:'anki', q:`Welche Hauptschritte umfasst das Ubiquitin-Proteasom-System?`, a:`Das Ubiquitin-Proteasom-System läuft in mehreren aufeinanderfolgenden Schritten ab:Zunächst wird das Zielprotein durch Anheftung von Ubiquitin markiertDas markierte Protein wird anschließend erkannt und zum Proteasom transportiertDort erfolgt die Entfaltung und Einschleusung in das Proteasom Im Inneren wird das Protein durch Proteolyse in kleine Peptide zerlegt Abschließend werden die Peptide freigesetzt und das Ubiquitin recycelt` },
  { id:'anki_v04_626', vl:'v04', cat:'Anki', source:'anki', q:`Was ist Ubiquitin?`, a:`Ubiquitin ist ein kleines, hochkonserviertes Protein, das kovalent an andere Proteine angeheftet werden kann und häufig als Abbausignal dient.Damit markiert es Proteine für den gezielten Abbau im Proteasom.` },
  { id:'anki_v04_627', vl:'v04', cat:'Anki', source:'anki', q:`An welche Aminosäure des Zielproteins wird Ubiquitin meist gebunden?`, a:`Ubiquitin wird meist an die ε-Aminogruppe eines Lysinrests des Zielproteins gebunden.Dabei entsteht eine kovalente Isopeptidbindung zwischen Ubiquitin und dem Protein.` },
  { id:'anki_v04_628', vl:'v04', cat:'Anki', source:'anki', q:`Welche Enzyme sind an der Ubiquitinylierung beteiligt und welche Funktion haben sie?`, a:`Die Ubiquitinylierung erfolgt durch drei aufeinanderfolgende Enzyme:• E1 (Ubiquitin-aktivierendes Enzym)→ aktiviert Ubiquitin unter ATP-Verbrauch• E2 (Ubiquitin-konjugierendes Enzym)→ übernimmt das aktivierte Ubiquitin und überträgt es weiter• E3 (Ubiquitin-Ligase)→ erkennt das Zielprotein und vermittelt die Übertragung von Ubiquitin auf das Substrat→ Die E3-Ligase bestimmt dabei die Substratspezifität des Systems` },
  { id:'anki_v04_629', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat E1 im Ubiquitin-Proteasom-System?`, a:`Das E1-Enzym (Ubiquitin-aktivierendes Enzym) aktiviert Ubiquitin unter ATP-Verbrauch.→ Dabei wird Ubiquitin kovalent an E1 gebunden und für die Weitergabe an E2 vorbereitet.` },
  { id:'anki_v04_630', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat E2 im Ubiquitin-Proteasom-System?`, a:`E2 (Ubiquitin-konjugierendes Enzym) übernimmt das aktivierte Ubiquitin von E1.→ Es trägt Ubiquitin und überträgt es in Zusammenarbeit mit E3 auf das Zielprotein.` },
  { id:'anki_v04_631', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion hat E3 im Ubiquitin-Proteasom-System?`, a:`E3-Ubiquitin-Ligasen erkennen spezifisch das Zielprotein und vermitteln die Übertragung von Ubiquitin auf dieses.→ Sie bestimmen die Substratspezifität des Systems und entscheiden, welche Proteine abgebaut werden.` },
  { id:'anki_v04_632', vl:'v04', cat:'Anki', source:'anki', q:`Warum sind E3-Ubiquitin-Ligasen besonders wichtig?`, a:`E3-Ubiquitin-Ligasen sind besonders wichtig, weil sie die Substratspezifität des Ubiquitin-Proteasom-Systems bestimmen.→ Sie erkennen gezielt bestimmte Proteine und entscheiden damit, welches Protein ubiquitinyliert und abgebaut wird.` },
  { id:'anki_v04_633', vl:'v04', cat:'Anki', source:'anki', q:`Was sind DUBs?`, a:`DUBs (Deubiquitinylierungs-Enzyme) sind Enzyme, die Ubiquitin von Proteinen wieder entfernen oder Ubiquitin-Ketten bearbeiten.→ Dadurch können sie den Abbau von Proteinen verhindern oder das Ubiquitin recyceln.` },
  { id:'anki_v04_634', vl:'v04', cat:'Anki', source:'anki', q:`Welche Funktion haben DUBs im Ubiquitin-Proteasom-System?`, a:`DUBs (Deubiquitinylierungs-Enzyme) entfernen oder bearbeiten Ubiquitin-Markierungen auf Proteinen.→ Sie ermöglichen das Recycling von Ubiquitin→ können fehlerhafte Ubiquitinylierungen korrigieren→ und regulieren damit, ob ein Protein abgebaut oder erhalten bleibt` },
  { id:'anki_v04_635', vl:'v04', cat:'Anki', source:'anki', q:`Welche Formen der Ubiquitinylierung gibt es?`, a:`Es gibt verschiedene Formen der Ubiquitinylierung:• Monoubiquitinylierung→ Anheftung eines einzelnen Ubiquitin-Moleküls an ein Protein• Multi-Monoubiquitinylierung→ Anheftung mehrerer einzelner Ubiquitin-Moleküle an verschiedene Stellen desselben Proteins• Polyubiquitinylierung→ Bildung einer Ubiquitin-Kette an einem Protein, oft als Signal für den Abbau im Proteasom` },
  { id:'anki_v04_636', vl:'v04', cat:'Anki', source:'anki', q:`Was bedeutet Monoubiquitinylierung?`, a:`Bei der Monoubiquitinylierung wird ein einzelnes Ubiquitin kovalent an ein Protein angeheftet.` },
  { id:'anki_v04_637', vl:'v04', cat:'Anki', source:'anki', q:`Was bedeutet Polyubiquitinylierung?`, a:`Bei der Polyubiquitinylierung wird eine Kette aus mehreren Ubiquitin-Molekülen an ein Protein angeheftet.→ Diese Ubiquitin-Ketten dienen häufig als Signal für den Abbau im Proteasom.` },
