  { id:'anki_b01_3', vl:'b01', cat:'Anki', source:'anki', q:`Wie ist das Periodensystem der Elemente grundlegend aufgebaut?`, a:`Das Periodensystem ordnet die Elemente nach ihrer Ordnungszahl (Anzahl der Protonen).• Perioden (Zeilen) → geben die Anzahl der Elektronenschalen an• Gruppen (Spalten) → enthalten Elemente mit ähnlichen chemischen Eigenschaften (gleiche Valenzelektronen)→ Dadurch lassen sich Eigenschaften und Reaktivität von Elementen vorhersagen.` },
  { id:'anki_b01_4', vl:'b01', cat:'Anki', source:'anki', q:`Welche chemischen Elemente sind die wichtigsten Bausteine des Lebens und warum?`, a:`Die wichtigsten Elemente biologischer Systeme sind:• Sauerstoff (O)• Kohlenstoff (C)• Wasserstoff (H)• Stickstoff (N)→ Diese bilden den Großteil aller biologischen Moleküle (z. B. Proteine, Lipide, Kohlenhydrate, Nukleinsäuren).Weitere wichtige Elemente sind:• Phosphor (P) → Bestandteil von DNA, RNA und ATP• Schwefel (S) → wichtig für Proteinstruktur (z. B. Disulfidbrücken)→ Zusammen bilden sie die Grundlage für Struktur und Funktion lebender Systeme.` },
  { id:'anki_b01_5', vl:'b01', cat:'Anki', source:'anki', q:`Was sind Orbitale?`, a:`Orbitale sind räumliche Bereiche um den Atomkern, in denen sich Elektronen mit hoher Wahrscheinlichkeit aufhalten.→ Sie beschreiben die Aufenthaltswahrscheinlichkeit von Elektronen und bestimmen die chemischen Eigenschaften eines Atoms.` },
  { id:'anki_b01_6', vl:'b01', cat:'Anki', source:'anki', q:`Was versteht man unter Elektronenkonfiguration?`, a:`Die Elektronenkonfiguration beschreibt die Verteilung der Elektronen auf die verschiedenen Orbitale eines Atoms.→ Sie bestimmt maßgeblich die chemischen Eigenschaften und Reaktivität eines Elements.` },
  { id:'anki_b01_7', vl:'b01', cat:'Anki', source:'anki', q:`Was versteht man unter der Edelgaskonfiguration?`, a:`Eine Edelgaskonfiguration liegt vor, wenn die äußere Elektronenschale vollständig besetzt ist (meist 8 Valenzelektronen).→ Diese Konfiguration ist besonders stabil, weshalb Atome dazu neigen, sie durch Bindungsbildung oder Elektronenübertragung zu erreichen.` },
  { id:'anki_b01_8', vl:'b01', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen ionischer und kovalenter Bindung?`, a:`Ionische Bindung: entsteht durch Elektronenübertragung, wodurch Kationen und Anionen entstehen, die sich elektrostatisch anziehen.Kovalente Bindung: entsteht durch das Teilen von Elektronenpaaren zwischen zwei Atomen.→ Ionisch = Elektronen übertragen→ Kovalent = Elektronen geteilt` },
  { id:'anki_b01_9', vl:'b01', cat:'Anki', source:'anki', q:`Was sind σ- und π-Bindungen und wie unterscheiden sie sich?`, a:`σ-Bindung: entsteht durch Überlappung von Orbitalen entlang der Bindungsachse → starke, rotationsfreie Bindungπ-Bindung: entsteht durch seitliche Überlappung von p-Orbitalen → schwächer und schränkt Rotation ein→ Doppelbindung = 1 σ + 1 π→ Dreifachbindung = 1 σ + 2 π` },
  { id:'anki_b01_10', vl:'b01', cat:'Anki', source:'anki', q:`Was versteht man unter Hybridisierung von Orbitalen?`, a:`Hybridisierung ist die Mischung von Atomorbitalen zu neuen Hybridorbitalen, die die räumliche Anordnung von Bindungen bestimmen.• sp³ → tetraedrische Geometrie (109,5°)• sp² → trigonal-planar (120°)• sp → linear (180°)→ Sie erklärt die Struktur und Bindungswinkel von Molekülen.` },
  { id:'anki_b01_11', vl:'b01', cat:'Anki', source:'anki', q:`Wie lässt sich die Molekülbildung an Beispielen erklären?`, a:`Moleküle entstehen durch kovalente Bindungen, bei denen Atome Elektronenpaare teilen, um eine stabile Elektronenkonfiguration zu erreichen.Beispiele:• Wasser (H₂O) → gewinkelte Struktur (sp³)• Ammoniak (NH₃) → trigonal-pyramidal (sp³)• Methan (CH₄) → tetraedrisch (sp³)• Ethan (C₂H₆) → Einfachbindung (sp³)• Ethen (C₂H₄) → Doppelbindung (sp²)• Ethin (C₂H₂) → Dreifachbindung (sp)→ Die Bindungsart und Hybridisierung bestimmen die räumliche Struktur der Moleküle.` },
  { id:'anki_b01_12', vl:'b01', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen polaren und unpolaren Bindungen?`, a:`Unpolare Bindung: Elektronen werden gleichmäßig zwischen den Atomen geteilt → keine LadungsverschiebungPolare Bindung: Elektronen werden ungleich verteilt, da ein Atom sie stärker anzieht → es entstehen Partialladungen (δ⁺ / δ⁻)→ Ursache ist ein Unterschied in der Elektronegativität der Atome.` },
  { id:'anki_b01_13', vl:'b01', cat:'Anki', source:'anki', q:`Was versteht man unter Elektronegativität?`, a:`` },
  { id:'anki_b01_14', vl:'b01', cat:'Anki', source:'anki', q:`Was sind Oxidationszahlen?`, a:`` },
  { id:'anki_b02_15', vl:'b02', cat:'Anki', source:'anki', q:`Was sind Kohlenwasserstoffe und welche Eigenschaften haben sie?`, a:`Kohlenwasserstoffe sind organische Verbindungen, die ausschließlich aus Kohlenstoff (C) und Wasserstoff (H) bestehen.→ Sie sind meist unpolar, daher schlecht wasserlöslich (hydrophob) und dienen häufig als Energieträger oder Grundgerüst organischer Moleküle.` },
  { id:'anki_b02_16', vl:'b02', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen gesättigten und ungesättigten Kohlenwasserstoffen?`, a:`Gesättigte Kohlenwasserstoffe besitzen nur C–C-Einfachbindungen und sind mit Wasserstoff „gesättigt“.Ungesättigte Kohlenwasserstoffe enthalten mindestens eine Doppel- oder Dreifachbindung (C=C oder C≡C).→ Ungesättigte Verbindungen sind meist reaktiver als gesättigte.` },
  { id:'anki_b02_17', vl:'b02', cat:'Anki', source:'anki', q:`Was sind Alkane und welche Eigenschaften besitzen sie?`, a:`Alkane sind gesättigte aliphatische Kohlenwasserstoffe, die ausschließlich C–C-Einfachbindungen enthalten.→ Sie sind unpolar, reaktionsträge und dienen häufig als Energieträger (z. B. in Fetten und Brennstoffen).` },
  { id:'anki_b02_18', vl:'b02', cat:'Anki', source:'anki', q:`Was sind Alkene und Alkine und welche Eigenschaften haben sie?`, a:`Alkene sind ungesättigte Kohlenwasserstoffe mit mindestens einer C=C-Doppelbindung.Alkine sind ungesättigte Kohlenwasserstoffe mit mindestens einer C≡C-Dreifachbindung.→ Beide sind reaktiver als Alkane, da die π-Bindungen leichter angreifbar sind.` },
  { id:'anki_b02_19', vl:'b02', cat:'Anki', source:'anki', q:`Welche Biomoleküle enthalten aliphatische Kohlenwasserstoffreste und warum ist das wichtig?`, a:`Aliphatische Kohlenwasserstoffreste finden sich in:• Fettsäuren• Lipiden• einigen Aminosäuren (z. B. Alanin, Valin, Leucin, Isoleucin)→ Diese Reste sind hydrophob und bestimmen die Struktur, Membranbildung und Wechselwirkungen biologischer Moleküle.` },
  { id:'anki_b02_20', vl:'b02', cat:'Anki', source:'anki', q:`Welche Biomoleküle enthalten aromatische Strukturen und welche Bedeutung haben sie?`, a:`Aromatische Strukturen finden sich in:• aromatischen Aminosäuren (Phenylalanin, Tyrosin, Tryptophan)• Nukleinbasen→ Sie ermöglichen π-π-Wechselwirkungen, tragen zur Stabilität von Biomolekülen bei und sind oft wichtig für Lichtabsorption und Signalprozesse.` },
  { id:'anki_b02_21', vl:'b02', cat:'Anki', source:'anki', q:`Was ist eine Kondensationsreaktion?`, a:`Eine Kondensationsreaktion ist eine chemische Reaktion, bei der zwei Moleküle zu einem größeren Molekül verbunden werden, wobei Wasser (H₂O) abgespalten wird.→ Sie ist wichtig für den Aufbau von Biomolekülen (z. B. Peptide, Polysaccharide).` },
  { id:'anki_b02_22', vl:'b02', cat:'Anki', source:'anki', q:`Was ist eine Hydrolyse?`, a:`Eine Hydrolyse ist die Spaltung einer chemischen Bindung durch Addition von Wasser (H₂O).→ Sie ist die Umkehrreaktion der Kondensation und wichtig für den Abbau von Biomolekülen.` },
  { id:'anki_b02_23', vl:'b02', cat:'Anki', source:'anki', q:`Welche wichtigen einfachen funktionellen Gruppen gibt es und welche Eigenschaften haben sie?`, a:`Wichtige funktionelle Gruppen sind:• Hydroxylgruppe (–OH) → polar, erhöht Wasserlöslichkeit• Thiolgruppe (–SH) → kann Disulfidbrücken bilden• Aminogruppe (–NH₂) → basisch, kann Protonen aufnehmen• Carbonylgruppe (C=O) → wichtig für Aldehyde und Ketone• Carboxylgruppe (–COOH) → sauer, kann Protonen abgeben→ Sie bestimmen die chemischen Eigenschaften und Reaktivität von Biomolekülen.` },
  { id:'anki_b02_24', vl:'b02', cat:'Anki', source:'anki', q:`Was ist eine Peptidbindung und welche Funktion hat sie?`, a:`Eine Peptidbindung ist eine Amidbindung zwischen der Aminogruppe einer Aminosäure und der Carboxylgruppe einer anderen.→ Sie verbindet Aminosäuren zu Peptiden und Proteinen und entsteht durch eine Kondensationsreaktion (Wasserabspaltung).` },
  { id:'anki_b03_25', vl:'b03', cat:'Anki', source:'anki', q:`Abbildung verstehen!!`, a:`` },
  { id:'anki_b03_26', vl:'b03', cat:'Anki', source:'anki', q:`Was sind Konstitutionsisomere?`, a:`Konstitutionsisomere sind Verbindungen mit gleicher Summenformel, aber unterschiedlicher Verknüpfung der Atome (Bindungsstruktur).→ Dadurch unterscheiden sie sich oft deutlich in ihren chemischen und physikalischen Eigenschaften.` },
  { id:'anki_b03_27', vl:'b03', cat:'Anki', source:'anki', q:`Was sind Stereoisomere?`, a:`Stereoisomere sind Verbindungen mit gleicher Summenformel und gleicher Verknüpfung der Atome, aber unterschiedlicher räumlicher Anordnung.→ Sie können sich in ihren physikalischen, chemischen und biologischen Eigenschaften unterscheiden.` },
  { id:'anki_b03_28', vl:'b03', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Konfigurationsisomeren und Konformationsisomeren?`, a:`Konfigurationsisomere können nur durch Aufbrechen von Bindungen ineinander überführt werden (z. B. Enantiomere, Diastereomere).Konformationsisomere entstehen durch Rotation um Einfachbindungen und gehen ohne Bindungsbruch ineinander über.→ Konfiguration = fest, Konformation = beweglich` },
  { id:'anki_b03_29', vl:'b03', cat:'Anki', source:'anki', q:`Was versteht man unter Chiralität?`, a:`Chiralität beschreibt Moleküle, die nicht mit ihrem Spiegelbild deckungsgleich sind.→ Solche Moleküle besitzen meist ein asymmetrisches (chirales) Zentrum, häufig ein C-Atom mit vier unterschiedlichen Substituenten.` },
  { id:'anki_b03_30', vl:'b03', cat:'Anki', source:'anki', q:`Was sind Enantiomere?`, a:`Enantiomere sind Spiegelbildisomere, die sich wie Bild und Spiegelbild verhalten und nicht zur Deckung gebracht werden können.→ Sie besitzen identische physikalische Eigenschaften, unterscheiden sich jedoch oft in ihrer biologischen Wirkung.` },
  { id:'anki_b03_31', vl:'b03', cat:'Anki', source:'anki', q:`Was sind Diastereomere?`, a:`Diastereomere sind Stereoisomere, die keine Spiegelbilder voneinander sind.→ Sie unterscheiden sich in ihren physikalischen und chemischen Eigenschaften und oft auch in ihrer biologischen Wirkung.` },
  { id:'anki_b03_32', vl:'b03', cat:'Anki', source:'anki', q:`Was ist cis-trans-Isomerie?`, a:`Cis-trans-Isomerie ist eine Form der Stereoisomerie an Doppelbindungen, da dort keine freie Rotation möglich ist.• cis → Substituenten liegen auf derselben Seite• trans → Substituenten liegen auf gegenüberliegenden Seiten→ Dies führt zu unterschiedlichen physikalischen und biologischen Eigenschaften.` },
  { id:'anki_b03_33', vl:'b03', cat:'Anki', source:'anki', q:`Warum ist Isomerie biologisch wichtig?`, a:`Isomere können trotz gleicher Summenformel unterschiedliche räumliche Strukturen besitzen.→ Dadurch können sie unterschiedliche biologische Eigenschaften und Wirkungen haben (z. B. unterschiedliche Enzymbindung oder Wirkung als Wirkstoff).` },
  { id:'anki_b04_34', vl:'b04', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen kovalenten und nicht-kovalenten Bindungen?`, a:`Kovalente Bindungen entstehen durch das Teilen von Elektronenpaaren und sind stark und stabil.Nicht-kovalente Wechselwirkungen sind schwächere physikalische Kräfte (z. B. Wasserstoffbrücken, ionische Wechselwirkungen, Van-der-Waals-Kräfte).→ Kovalent = stark, stabil→ Nicht-kovalent = schwach, reversibel, wichtig für Struktur und Dynamik` },
  { id:'anki_b04_35', vl:'b04', cat:'Anki', source:'anki', q:`Welche wichtigen nicht-kovalenten Wechselwirkungen gibt es und was charakterisiert sie?`, a:`Wichtige nicht-kovalente Wechselwirkungen sind:• Ionische Wechselwirkungen → Anziehung zwischen entgegengesetzt geladenen Ionen• Wasserstoffbrückenbindungen → schwache Bindungen zwischen H-Atom und elektronegativen Atomen (z. B. O, N)• Van-der-Waals-Kräfte → sehr schwache temporäre Anziehungskräfte zwischen Molekülen→ Zusammen stabilisieren sie Proteinstrukturen und Biomolekül-Interaktionen.` },
  { id:'anki_b04_36', vl:'b04', cat:'Anki', source:'anki', q:`Was sind ionische Wechselwirkungen?`, a:`Ionische Wechselwirkungen sind elektrostatische Anziehungskräfte zwischen entgegengesetzt geladenen Ionen oder Molekülgruppen.→ Sie tragen zur Stabilisierung von Proteinstrukturen und Biomolekülen bei.` },
  { id:'anki_b04_37', vl:'b04', cat:'Anki', source:'anki', q:`Was sind Wasserstoffbrückenbindungen?`, a:`Wasserstoffbrückenbindungen sind schwache Wechselwirkungen zwischen einem positiv polarisierten Wasserstoffatom (δ⁺) und einem freien Elektronenpaar eines elektronegativen Atoms (z. B. O oder N).→ Sie sind wichtig für die Stabilisierung von Proteinstrukturen und der DNA-Doppelhelix.` },
  { id:'anki_b04_38', vl:'b04', cat:'Anki', source:'anki', q:`Was sind Van-der-Waals-Kräfte?`, a:`Van-der-Waals-Kräfte sind sehr schwache Wechselwirkungen zwischen temporären oder induzierten Dipolen.→ Sie entstehen durch kurzzeitige Ladungsverschiebungen und tragen zur Stabilisierung von Molekülen und Proteinstrukturen bei.` },
  { id:'anki_b04_39', vl:'b04', cat:'Anki', source:'anki', q:`Wie lassen sich nicht-kovalente Wechselwirkungen nach ihrer Stärke ordnen?`, a:`Nicht-kovalente Wechselwirkungen lassen sich (von stark nach schwach) wie folgt ordnen:• Ionische Wechselwirkungen (stärkste)• Wasserstoffbrückenbindungen• Van-der-Waals-Kräfte (schwächste)→ Trotz ihrer einzelnen Schwäche können sie zusammen sehr starke Stabilität erzeugen (z. B. in Proteinen).` },
  { id:'anki_b04_40', vl:'b04', cat:'Anki', source:'anki', q:`Welche Rolle spielen Wasserstoffbrückenbindungen in Proteinen?`, a:`Wasserstoffbrückenbindungen stabilisieren die Sekundärstruktur von Proteinen, insbesondere:• α-Helix• β-Faltblatt→ Sie sorgen für die korrekte Faltung und Stabilität der Proteinstruktur.` },
  { id:'anki_b04_41', vl:'b04', cat:'Anki', source:'anki', q:`Warum sind nicht-kovalente Wechselwirkungen für biologische Systeme wichtig?`, a:`Nicht-kovalente Wechselwirkungen sind entscheidend, weil sie reversibel und flexibel sind.→ Sie ermöglichen:• Proteinfaltung und -stabilität• Stabilisierung der DNA-Struktur• Bildung von Makromolekülkomplexen• Signalübertragung und molekulare Erkennung→ Ohne sie wären dynamische biologische Prozesse nicht möglich.` },
  { id:'anki_b03_42', vl:'b03', cat:'Anki', source:'anki', q:`Was versteht man unter Isomerie?`, a:`Isomerie bezeichnet das Auftreten von Verbindungen mit gleicher Summenformel, aber unterschiedlicher Struktur oder räumlicher Anordnung der Atome.→ Dadurch können Isomere unterschiedliche chemische und biologische Eigenschaften besitzen.` },
  { id:'anki_b08_43', vl:'b08', cat:'Anki', source:'anki', q:`Wie ist die stoffliche Zusammensetzung einer typischen tierischen Zelle?`, a:`Eine typische tierische Zelle besteht hauptsächlich aus:Wasser: ca. 80–85 %Proteine: ca. 10–15 %Lipide: ca. 2–5 %Nukleinsäuren: ca. 1 %Polysaccharide: ca. 0,1–1 %Ionen: ca. 1,5 %Wasser stellt den größten Anteil dar und dient als Lösungsmittel und Reaktionsmedium für viele biochemische Prozesse in der Zelle.` },
  { id:'anki_b08_44', vl:'b08', cat:'Anki', source:'anki', q:`Was versteht man unter Monomeren und Polymeren?`, a:`Monomere sind kleine Moleküle, die als Bausteine dienen.Polymere sind große Moleküle, die aus vielen miteinander verknüpften Monomeren aufgebaut sind.Beispiele:Aminosäuren → ProteineNukleotide → Nukleinsäuren (DNA/RNA)Monosaccharide → Polysaccharide` },
  { id:'anki_b08_45', vl:'b08', cat:'Anki', source:'anki', q:`Wie erfolgt die Bildung von Polymeren?`, a:`Die Bildung von Polymeren erfolgt durch Kondensationsreaktionen. Dabei werden Monomere kovalent miteinander verknüpft, wobei ein Molekül Wasser (H₂O) abgespalten wird.` },
  { id:'anki_b08_46', vl:'b08', cat:'Anki', source:'anki', q:`Wie erfolgt die Spaltung von Polymeren?`, a:`Die Spaltung von Polymeren erfolgt durch Hydrolyse. Dabei wird eine kovalente Bindung durch Addition von Wasser (H₂O) gespalten, sodass Monomere oder kleinere Einheiten entstehen.` },
  { id:'anki_b08_47', vl:'b08', cat:'Anki', source:'anki', q:`Was sind Aminosäuren?`, a:`Aminosäuren sind die Bausteine der Proteine.Sie besitzen eine charakteristische Grundstruktur mit:Aminogruppe (–NH₂)Carboxylgruppe (–COOH)Wasserstoffatom (–H)variabler Seitenkette (R-Gruppe)Diese Gruppen sind an ein zentrales α-Kohlenstoffatom gebunden.Die R-Gruppe bestimmt die jeweiligen chemischen Eigenschaften der Aminosäure.` },
  { id:'anki_b08_48', vl:'b08', cat:'Anki', source:'anki', q:`Wie ist die allgemeine Struktur einer Aminosäure aufgebaut?`, a:`Eine Aminosäure besitzt ein zentrales α-Kohlenstoffatom (Cα).An dieses sind vier Gruppen gebunden:Aminogruppe (–NH₂)Carboxylgruppe (–COOH)Wasserstoffatom (–H)variable Seitenkette (R-Gruppe)Die R-Gruppe unterscheidet die einzelnen Aminosäuren und bestimmt ihre chemischen Eigenschaften.` },
  { id:'anki_b08_49', vl:'b08', cat:'Anki', source:'anki', q:`Was bestimmt die Eigenschaften einer Aminosäure?`, a:`Die R-Gruppe (Seitenkette) bestimmt die Eigenschaften einer Aminosäure.Sie beeinflusst vor allem Polarität, Ladung und chemische Reaktivität und damit auch das Verhalten der Aminosäure in Proteinen.` },
  { id:'anki_b08_50', vl:'b08', cat:'Anki', source:'anki', q:`Welche Gruppen von Aminosäuren gibt es?`, a:`Aminosäuren werden nach den Eigenschaften ihrer Seitenkette (R-Gruppe) eingeteilt in:unpolare Aminosäurenpolare ungeladene Aminosäurensaure Aminosäuren (negativ geladen)basische Aminosäuren (positiv geladen)` },
  { id:'anki_b08_51', vl:'b08', cat:'Anki', source:'anki', q:`Was sind essentielle Aminosäuren?`, a:`Essentielle Aminosäuren sind Aminosäuren, die der Körper nicht selbst synthetisieren kann und daher über die Nahrung aufgenommen werden müssen.` },
  { id:'anki_b08_52', vl:'b08', cat:'Anki', source:'anki', q:`Was sind nicht-proteinogene Aminosäuren?`, a:`Nicht-proteinogene Aminosäuren sind Aminosäuren, die nicht in Proteine eingebaut werden.Sie erfüllen jedoch andere biologische Funktionen, z. B. als Stoffwechselintermediate oder Neurotransmittervorstufen.` },
  { id:'anki_b08_53', vl:'b08', cat:'Anki', source:'anki', q:`Was ist ein Zwitterion?`, a:`Ein Zwitterion ist ein Molekül, das gleichzeitig eine positive und eine negative Ladung trägt, insgesamt jedoch elektrisch neutral ist.Bei Aminosäuren liegt bei physiologischem pH meist die protonierte Aminogruppe (–NH₃⁺) und die deprotonierte Carboxylgruppe (–COO⁻) vor.` },
  { id:'anki_b08_54', vl:'b08', cat:'Anki', source:'anki', q:`Was ist der isoelektrische Punkt (pI)?`, a:`Der isoelektrische Punkt (pI) ist der pH-Wert, bei dem eine Aminosäure oder ein Protein keine Nettoladung besitzt.In diesem Zustand liegt das Molekül überwiegend als Zwitterion vor.` },
  { id:'anki_b08_55', vl:'b08', cat:'Anki', source:'anki', q:`Was ist eine Peptidbindung?`, a:`Eine Peptidbindung ist eine Amidbindung zwischen der Carboxylgruppe (–COOH) einer Aminosäure und der Aminogruppe (–NH₂) einer anderen Aminosäure.Sie entsteht durch eine Kondensationsreaktion, bei der Wasser (H₂O) abgespalten wird, und verbindet Aminosäuren zu Peptiden bzw. Proteinen.` },
  { id:'anki_b08_56', vl:'b08', cat:'Anki', source:'anki', q:`Wie entstehen Polypeptide?`, a:`Polypeptide entstehen durch die wiederholte Bildung von Peptidbindungen zwischen vielen Aminosäuren.Dabei werden die Aminosäuren zu einer linearen Kette verknüpft, die die Primärstruktur eines Proteins bildet.` },
  { id:'anki_b08_57', vl:'b08', cat:'Anki', source:'anki', q:`Was ist der N-Terminus eines Proteins?`, a:`Der N-Terminus ist das Ende einer Polypeptidkette, an dem eine freie Aminogruppe (–NH₃⁺) vorliegt.Er markiert den Anfang der Aminosäuresequenz eines Proteins.` },
  { id:'anki_b08_58', vl:'b08', cat:'Anki', source:'anki', q:`Was ist der C-Terminus eines Proteins?`, a:`Der C-Terminus ist das Ende einer Polypeptidkette, an dem eine freie Carboxylgruppe (–COO⁻) vorliegt.Er markiert das Ende der Aminosäuresequenz eines Proteins.` },
  { id:'anki_b08_59', vl:'b08', cat:'Anki', source:'anki', q:`Was ist die Primärstruktur eines Proteins?`, a:`Die Primärstruktur eines Proteins ist die lineare Reihenfolge der Aminosäuren in einer Polypeptidkette.Die Aminosäuren sind dabei durch Peptidbindungen miteinander verbunden.` },
  { id:'anki_b08_60', vl:'b08', cat:'Anki', source:'anki', q:`Was ist die Sekundärstruktur eines Proteins?`, a:`Die Sekundärstruktur beschreibt lokale, regelmäßige Faltungen der Polypeptidkette, vor allem α-Helix und β-Faltblatt.Sie wird hauptsächlich durch Wasserstoffbrückenbindungen zwischen den Peptidbindungen stabilisiert.` },
  { id:'anki_b08_61', vl:'b08', cat:'Anki', source:'anki', q:`Was stabilisiert die Sekundärstruktur?`, a:`Die Sekundärstruktur wird durch Wasserstoffbrückenbindungen zwischen den Peptidgruppen der Polypeptidkette stabilisiert.Diese entstehen zwischen dem Carbonylsauerstoff (C=O) und dem Amidwasserstoff (N–H) der Peptidbindungen.` },
  { id:'anki_b08_62', vl:'b08', cat:'Anki', source:'anki', q:`Was ist die Tertiärstruktur eines Proteins?`, a:`Die Tertiärstruktur beschreibt die dreidimensionale Gesamtfaltung einer einzelnen Polypeptidkette.Sie entsteht durch Wechselwirkungen zwischen den Seitenketten (R-Gruppen) der Aminosäuren, z. B.:WasserstoffbrückenbindungenIonenbindungen (Salzbrücken)hydrophobe WechselwirkungenDisulfidbrücken` },
  { id:'anki_b08_63', vl:'b08', cat:'Anki', source:'anki', q:`Was stabilisiert die Tertiärstruktur?`, a:`Die Tertiärstruktur wird durch Wechselwirkungen zwischen den Seitenketten (R-Gruppen) der Aminosäuren stabilisiert, insbesondere durch:Wasserstoffbrückenbindungenionische Bindungen (Salzbrücken)hydrophobe WechselwirkungenDisulfidbrücken (kovalente Bindungen zwischen Cysteinresten)` },
  { id:'anki_b08_64', vl:'b08', cat:'Anki', source:'anki', q:`Was ist eine Disulfidbrücke?`, a:`Eine Disulfidbrücke ist eine kovalente Bindung zwischen zwei Cysteinresten.Sie entsteht durch Oxidation der Sulfhydrylgruppen (–SH) zweier Cysteinmoleküle zu einer Disulfidbindung (–S–S–) und trägt zur Stabilisierung der Tertiär- oder Quartärstruktur von Proteinen bei.` },
  { id:'anki_b08_65', vl:'b08', cat:'Anki', source:'anki', q:`Was versteht man unter der Denaturierung von Proteinen?`, a:`Die Denaturierung ist der Verlust der nativen (dreidimensionalen) Proteinstruktur durch äußere Einflüsse wie Hitze, extreme pH-Werte oder Chemikalien.Dabei werden vor allem Sekundär-, Tertiär- und Quartärstruktur zerstört, während die Primärstruktur (Peptidbindungen) meist erhalten bleibt.` },
  { id:'anki_b08_66', vl:'b08', cat:'Anki', source:'anki', q:`Warum bestimmt die Struktur die Funktion eines Proteins?`, a:`Die spezifische dreidimensionale Struktur (3D-Struktur) eines Proteins bestimmt seine biologische Funktion.Nur eine korrekt gefaltete Struktur ermöglicht die spezifische Bindung an Substrate oder andere Moleküle und damit die richtige Funktion des Proteins.` },
  { id:'anki_b10_67', vl:'b10', cat:'Anki', source:'anki', q:`Was sind Kohlenhydrate?`, a:`Kohlenhydrate sind organische Verbindungen aus Kohlenstoff (C), Wasserstoff (H) und Sauerstoff (O).Viele Kohlenhydrate besitzen näherungsweise die Summenformel Cₙ(H₂O)ₙ.Sie dienen vor allem als Energiequelle und Energiespeicher sowie als Strukturbausteine in Zellen.` },
  { id:'anki_b10_68', vl:'b10', cat:'Anki', source:'anki', q:`Welche Klassen von Kohlenhydraten gibt es?`, a:`Kohlenhydrate werden nach der Anzahl der miteinander verknüpften Zuckerbausteine eingeteilt in:Monosaccharide – einfache Zucker (z. B. Glucose)Disaccharide – aus zwei Monosacchariden aufgebaut (z. B. Saccharose)Oligosaccharide – aus wenigen Monosacchariden (ca. 3–10) aufgebautPolysaccharide – lange Ketten aus vielen Monosacchariden (z. B. Stärke, Glykogen)` },
  { id:'anki_b10_69', vl:'b10', cat:'Anki', source:'anki', q:`Was sind Monosaccharide?`, a:`Monosaccharide sind die einfachsten Kohlenhydrate (Einfachzucker).Sie können nicht weiter durch Hydrolyse in kleinere Zucker gespalten werden und dienen als Bausteine für komplexere Kohlenhydrate.` },
  { id:'anki_b10_70', vl:'b10', cat:'Anki', source:'anki', q:`Welche wichtigen Monosaccharide gibt es?`, a:`Zu den wichtigsten Monosacchariden gehören:Glukose (Traubenzucker)Fruktose (Fruchtzucker)GalaktoseSie sind Hexosen (C₆-Zucker) und spielen eine zentrale Rolle im Energie- und Kohlenhydratstoffwechsel.` },
  { id:'anki_b10_71', vl:'b10', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Aldosen und Ketosen?`, a:`Der Unterschied liegt in der funktionellen Gruppe des Zuckers:Aldosen besitzen eine Aldehydgruppe (–CHO).Ketosen besitzen eine Ketogruppe (C=O).Beispiele:Glukose ist eine Aldose.Fruktose ist eine Ketose.` },
  { id:'anki_b10_72', vl:'b10', cat:'Anki', source:'anki', q:`Was ist die Fischer-Projektion?`, a:`Die Fischer-Projektion ist eine vereinfachte Darstellungsform für die räumliche Struktur von Zuckern in linearer Form.Dabei gilt:Horizontale Linien zeigen Bindungen, die zum Betrachter hin ragen.Vertikale Linien zeigen Bindungen, die vom Betrachter weg zeigen.` },
  { id:'anki_b10_73', vl:'b10', cat:'Anki', source:'anki', q:`Was ist die Haworth-Projektion?`, a:`Die Haworth-Projektion ist eine Darstellungsform für die Ringstruktur von Monosacchariden.Sie zeigt, wie sich Zucker in zyklischer (Ring-)Form anordnen, die durch eine intramolekulare Reaktion zwischen Carbonylgruppe und Hydroxylgruppe entsteht.` },
  { id:'anki_b10_74', vl:'b10', cat:'Anki', source:'anki', q:`Wie entsteht die Ringform von Zuckern?`, a:`Die Ringform entsteht durch eine intramolekulare Reaktion zwischen der Carbonylgruppe (Aldehyd- oder Ketogruppe) und einer Hydroxylgruppe (–OH) desselben Moleküls.Dabei bildet sich ein Halbacetal (bei Aldosen) bzw. ein Halbketal (bei Ketosen), wodurch der Zucker eine Ringstruktur annimmt.` },
  { id:'anki_b10_75', vl:'b10', cat:'Anki', source:'anki', q:`Was sind Anomere?`, a:`Anomere sind Isomere von Zuckern, die sich nur in der Konfiguration am anomeren Kohlenstoffatom unterscheiden.Dieses entsteht bei der Ringbildung eines Monosaccharids aus dem Carbonylkohlenstoff.Man unterscheidet:α-Anomerβ-Anomer` },
  { id:'anki_b10_76', vl:'b10', cat:'Anki', source:'anki', q:`Was ist eine glykosidische Bindung?`, a:`Eine glykosidische Bindung ist eine kovalente Bindung zwischen zwei Zuckermolekülen (Monosacchariden).Sie entsteht durch eine Kondensationsreaktion, bei der Wasser (H₂O) abgespalten wird, und verbindet die Zucker zu Di-, Oligo- oder Polysacchariden.` },
  { id:'anki_b10_77', vl:'b10', cat:'Anki', source:'anki', q:`Was ist ein reduzierender Zucker?`, a:`Ein reduzierender Zucker ist ein Zucker mit einer freien anomeren Hydroxylgruppe (–OH).Dadurch kann er Elektronen abgeben und somit andere Stoffe reduzieren (z. B. in der Fehling- oder Benedict-Reaktion).` },
  { id:'anki_b10_78', vl:'b10', cat:'Anki', source:'anki', q:`Was ist Mutarotation?`, a:`Mutarotation ist die Umwandlung zwischen dem α- und β-Anomer eines Zuckers in wässriger Lösung.Sie erfolgt über die kurzzeitige Öffnung der Ringform zur linearen Form und anschließende erneute Ringbildung.` },
  { id:'anki_b10_79', vl:'b10', cat:'Anki', source:'anki', q:`Was sind Disaccharide?`, a:`Disaccharide sind Kohlenhydrate, die aus zwei Monosacchariden bestehen.Die beiden Zuckerbausteine sind durch eine glykosidische Bindung miteinander verbunden.` },
  { id:'anki_b10_80', vl:'b10', cat:'Anki', source:'anki', q:`Woraus besteht Saccharose?`, a:`Saccharose besteht aus den beiden Monosacchariden Glukose und Fruktose, die durch eine glykosidische Bindung miteinander verbunden sind.` },
  { id:'anki_b10_81', vl:'b10', cat:'Anki', source:'anki', q:`Woraus besteht Laktose?`, a:`Laktose besteht aus den beiden Monosacchariden Glukose und Galaktose, die durch eine β-1,4-glykosidische Bindung miteinander verbunden sind.` },
  { id:'anki_b10_82', vl:'b10', cat:'Anki', source:'anki', q:`Woraus besteht Maltose?`, a:`Maltose besteht aus zwei Glukosemolekülen, die durch eine α-1,4-glykosidische Bindung miteinander verbunden sind.` },
  { id:'anki_b10_83', vl:'b10', cat:'Anki', source:'anki', q:`Was ist Laktoseintoleranz?`, a:`Laktoseintoleranz ist eine Unverträglichkeit von Milchzucker (Laktose) aufgrund eines Mangels an Laktase.Dadurch kann Laktose im Dünndarm nicht in Glukose und Galaktose gespalten werden und gelangt in den Dickdarm, wo sie zu Verdauungsbeschwerden führen kann.` },
  { id:'anki_b10_84', vl:'b10', cat:'Anki', source:'anki', q:`Was ist Stärke?`, a:`Stärke ist ein pflanzliches Speicherpolysaccharid, das aus vielen Glukoseeinheiten aufgebaut ist.Sie dient Pflanzen als Energiespeicher und besteht hauptsächlich aus Amylose und Amylopektin.` },
  { id:'anki_b10_85', vl:'b10', cat:'Anki', source:'anki', q:`Woraus besteht Stärke?`, a:`Stärke besteht aus zwei Polysacchariden:Amylose – lineare Ketten aus α-1,4-glykosidisch verknüpften GlukoseeinheitenAmylopektin – verzweigtes Polysaccharid mit α-1,4- und α-1,6-glykosidischen Bindungen` },
  { id:'anki_b10_86', vl:'b10', cat:'Anki', source:'anki', q:`Was ist Glykogen?`, a:`Glykogen ist die Speicherform von Glukose im menschlichen Körper.Es wird vor allem in Leber und Muskulatur gespeichert und dient als schnell verfügbarer Energiespeicher.` },
  { id:'anki_b10_87', vl:'b10', cat:'Anki', source:'anki', q:`Warum ist Glykogen gut als Energiespeicher geeignet?`, a:`Glykogen ist stark verzweigt (α-1,4- und α-1,6-glykosidische Bindungen).Durch die vielen Verzweigungsstellen kann Glukose schnell gleichzeitig an vielen Enden abgespalten werden, wodurch Energie rasch bereitgestellt wird.` },
  { id:'anki_b10_88', vl:'b10', cat:'Anki', source:'anki', q:`Was ist Cellulose?`, a:`Cellulose ist ein Strukturpolysaccharid der Pflanzenzellwand.Sie besteht aus β-1,4-glykosidisch verknüpften Glukoseeinheiten und verleiht Pflanzenzellen Stabilität und Festigkeit.` },
  { id:'anki_b10_89', vl:'b10', cat:'Anki', source:'anki', q:`Warum kann der Mensch Cellulose nicht verdauen?`, a:`Der Mensch kann Cellulose nicht verdauen, weil ihm die Enzyme zur Spaltung der β-1,4-glykosidischen Bindungen fehlen.Diese Bindungen verbinden die Glukoseeinheiten der Cellulose.` },
  { id:'anki_b10_90', vl:'b10', cat:'Anki', source:'anki', q:`Was ist die Glykokalix?`, a:`Die Glykokalix ist eine kohlenhydratreiche Schicht auf der äußeren Oberfläche der Zellmembran.Sie besteht aus Zuckerketten von Glykoproteinen und Glykolipiden und spielt eine wichtige Rolle bei Zell-Zell-Erkennung, Zelladhäsion und Schutz der Zelloberfläche.` },
  { id:'anki_b10_91', vl:'b10', cat:'Anki', source:'anki', q:`Welche Funktionen hat die Glykokalix?`, a:`Die Glykokalix erfüllt mehrere wichtige Funktionen:Zell-Zell-ErkennungSchutz der ZelloberflächeBeteiligung an der Signalübertragung` },
  { id:'anki_b09_92', vl:'b09', cat:'Anki', source:'anki', q:`Was sind Nukleinsäuren?`, a:`Nukleinsäuren sind biologische Makromoleküle, die aus Nukleotiden aufgebaut sind.Sie dienen der Speicherung und Übertragung genetischer Information.Die wichtigsten Nukleinsäuren sind DNA und RNA.` },
  { id:'anki_b09_93', vl:'b09', cat:'Anki', source:'anki', q:`Welche zwei Haupttypen von Nukleinsäuren gibt es?`, a:`Es gibt zwei Haupttypen von Nukleinsäuren:DNA (Desoxyribonukleinsäure) – speichert die genetische Information.RNA (Ribonukleinsäure) – beteiligt an der Umsetzung der genetischen Information in Proteine.` },
  { id:'anki_b09_94', vl:'b09', cat:'Anki', source:'anki', q:`Welche Bausteine bilden ein Nukleotid?`, a:`Ein Nukleotid besteht aus drei Komponenten:StickstoffbasePentosezucker (Ribose oder Desoxyribose)Phosphatgruppe` },
  { id:'anki_b09_95', vl:'b09', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Nukleosid und Nukleotid?`, a:`Nukleosid: besteht aus Stickstoffbase + Pentosezucker.Nukleotid: besteht aus Stickstoffbase + Pentosezucker + Phosphatgruppe.` },
  { id:'anki_b09_96', vl:'b09', cat:'Anki', source:'anki', q:`Welche Stickstoffbasen kommen in DNA vor?`, a:`In der DNA kommen vier Stickstoffbasen vor:Adenin (A)Guanin (G)Cytosin (C)Thymin (T)` },
  { id:'anki_b09_97', vl:'b09', cat:'Anki', source:'anki', q:`Welche Stickstoffbase kommt nur in RNA vor?`, a:`In der RNA kommt Uracil (U) vor.Es ersetzt das Thymin, das nur in der DNA vorkommt.` },
  { id:'anki_b09_98', vl:'b09', cat:'Anki', source:'anki', q:`Welche zwei Klassen von Stickstoffbasen gibt es?`, a:`Es gibt zwei Klassen von Basen:Purine – Adenin und GuaninPyrimidine – Cytosin, Thymin und Uracil` },
  { id:'anki_b09_99', vl:'b09', cat:'Anki', source:'anki', q:`Welche Basen gehören zu den Purinen?`, a:`Zu den Purinen gehören:Adenin (A)Guanin (G)Sie besitzen eine zweiringige Ringstruktur.` },
  { id:'anki_b09_100', vl:'b09', cat:'Anki', source:'anki', q:`Welche Basen gehören zu den Pyrimidinen?`, a:`Zu den Pyrimidinen gehören:Cytosin (C)Thymin (T)Uracil (U)Sie besitzen eine einringige Ringstruktur.` },
  { id:'anki_b09_101', vl:'b09', cat:'Anki', source:'anki', q:`Welcher Zucker kommt in DNA vor?`, a:`In der DNA kommt der Zucker Desoxyribose vor.Sie ist eine Pentose (C₅-Zucker) und unterscheidet sich von der Ribose durch ein fehlendes Sauerstoffatom am C2-Atom.` },
  { id:'anki_b09_102', vl:'b09', cat:'Anki', source:'anki', q:`Welcher Zucker kommt in RNA vor?`, a:`In der RNA kommt der Zucker Ribose vor.Sie ist eine Pentose (C₅-Zucker) und besitzt am C2-Atom eine Hydroxylgruppe (–OH).` },
  { id:'anki_b09_103', vl:'b09', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Ribose und Desoxyribose?`, a:`Der Unterschied liegt am 2’-Kohlenstoffatom des Zuckers:Ribose besitzt am 2’-C-Atom eine Hydroxylgruppe (–OH).Desoxyribose besitzt dort nur ein Wasserstoffatom (–H).Dadurch hat die Desoxyribose ein Sauerstoffatom weniger als die Ribose.` },
  { id:'anki_b09_104', vl:'b09', cat:'Anki', source:'anki', q:`Wie sind Nukleotide in Nukleinsäuren miteinander verbunden?`, a:`Nukleotide sind durch Phosphodiesterbindungen miteinander verbunden.Dabei verknüpft eine Phosphatgruppe das 3’-C-Atom eines Zuckers mit dem 5’-C-Atom des nächsten Zuckers, wodurch das Zucker-Phosphat-Rückgrat der Nukleinsäure entsteht.` },
  { id:'anki_b09_105', vl:'b09', cat:'Anki', source:'anki', q:`Was ist eine Phosphodiesterbindung?`, a:`Eine Phosphodiesterbindung ist die kovalente Bindung, die zwei Nukleotide miteinander verbindet.Dabei reagiert die 3’-OH-Gruppe eines Zuckers mit der 5’-Phosphatgruppe des nächsten Nukleotids.So entsteht das Zucker-Phosphat-Rückgrat der DNA oder RNA.` },
  { id:'anki_b09_106', vl:'b09', cat:'Anki', source:'anki', q:`Was bedeutet Direktionalität bei Nukleinsäuren?`, a:`DNA und RNA besitzen eine Richtung (Polarität) der Kette.Sie verläuft vom 5’-Ende zum 3’-Ende.5’-Ende: freie Phosphatgruppe3’-Ende: freie Hydroxylgruppe (–OH)Die Synthese von Nukleinsäuren erfolgt immer in 5’ → 3’-Richtung.` },
  { id:'anki_b09_107', vl:'b09', cat:'Anki', source:'anki', q:`Was bezeichnet das 5\'-Ende einer Nukleinsäure?`, a:`Das 5’-Ende ist das Ende einer Nukleinsäurekette, an dem sich eine freie Phosphatgruppe am 5’-Kohlenstoffatom des Zuckers befindet.` },
  { id:'anki_b09_108', vl:'b09', cat:'Anki', source:'anki', q:`Was bezeichnet das 3\'-Ende einer Nukleinsäure?`, a:`Das 3’-Ende ist das Ende einer Nukleinsäurekette, an dem sich eine freie Hydroxylgruppe (–OH) am 3’-Kohlenstoffatom des Zuckers befindet.` },
  { id:'anki_b09_109', vl:'b09', cat:'Anki', source:'anki', q:`Wie ist die DNA strukturell aufgebaut? (Bild/Abbildung ansehen)`, a:`Die DNA besteht aus zwei Polynukleotidsträngen, die sich zu einer Doppelhelix winden.Die Stränge verlaufen antiparallel (5’ → 3’ und 3’ → 5’) und werden durch komplementäre Basenpaarung zusammengehalten.` },
  { id:'anki_b09_110', vl:'b09', cat:'Anki', source:'anki', q:`Wie sind die beiden DNA-Stränge orientiert?`, a:`Die beiden DNA-Stränge verlaufen antiparallel, das heißt:ein Strang verläuft 5’ → 3’der andere 3’ → 5’Diese entgegengesetzte Orientierung ermöglicht die komplementäre Basenpaarung.` },
  { id:'anki_b09_111', vl:'b09', cat:'Anki', source:'anki', q:`Was bedeutet antiparallel bei DNA-Strängen?`, a:`Antiparallel bedeutet, dass die beiden DNA-Stränge in entgegengesetzte Richtungen verlaufen:ein Strang verläuft 5’ → 3’der andere 3’ → 5’.` },
  { id:'anki_b09_112', vl:'b09', cat:'Anki', source:'anki', q:`Welche Basen paaren sich in der DNA?`, a:`In der DNA erfolgt die komplementäre Basenpaarung:Adenin (A) paart mit Thymin (T)Guanin (G) paart mit Cytosin (C)Die Basen werden durch Wasserstoffbrückenbindungen zusammengehalten.` },
  { id:'anki_b09_113', vl:'b09', cat:'Anki', source:'anki', q:`Wie viele Wasserstoffbrücken hat ein A-T Basenpaar?`, a:`Ein Adenin–Thymin-Basenpaar (A–T) wird durch 2 Wasserstoffbrückenbindungen zusammengehalten.` },
  { id:'anki_b09_114', vl:'b09', cat:'Anki', source:'anki', q:`Wie viele Wasserstoffbrückenbindungen hat ein G–C-Basenpaar?`, a:`Ein Guanin–Cytosin-Basenpaar (G–C) wird durch 3 Wasserstoffbrückenbindungen zusammengehalten.` },
  { id:'anki_b09_115', vl:'b09', cat:'Anki', source:'anki', q:`Warum ist ein G–C-Basenpaar stabiler als ein A–T-Basenpaar?`, a:`Ein Guanin–Cytosin-Basenpaar bildet 3 Wasserstoffbrückenbindungen, während ein Adenin–Thymin-Basenpaar nur 2 Wasserstoffbrückenbindungen besitzt.Dadurch ist die G–C-Paarung stabiler.` },
  { id:'anki_b09_116', vl:'b09', cat:'Anki', source:'anki', q:`Was versteht man unter semikonservativer Replikation?`, a:`Bei der semikonservativen Replikation besteht jeder neu gebildete DNA-Doppelstrang aus einem ursprünglichen (alten) Strang und einem neu synthetisierten Strang.` },
  { id:'anki_b09_117', vl:'b09', cat:'Anki', source:'anki', q:`Warum ist die semikonservative Replikation wichtig?`, a:`Die semikonservative Replikation ermöglicht eine präzise Weitergabe der genetischen Information an die Tochterzellen, da jeder neue DNA-Doppelstrang einen ursprünglichen Strang als Vorlage enthält.` },
  { id:'anki_b09_118', vl:'b09', cat:'Anki', source:'anki', q:`Welche Arten von RNA gibt es?`, a:`Es gibt drei Haupttypen von RNA:mRNA (messenger RNA) – überträgt die genetische Information von der DNA zu den Ribosomen.tRNA (transfer RNA) – bringt Aminosäuren zu den Ribosomen während der Proteinsynthese.rRNA (ribosomale RNA) – ist Bestandteil der Ribosomen und beteiligt an der Proteinbiosynthese.` },
  { id:'anki_b09_119', vl:'b09', cat:'Anki', source:'anki', q:`Was ist die Funktion der mRNA?`, a:`Die mRNA (messenger RNA) transportiert die genetische Information von der DNA zu den Ribosomen, wo sie als Vorlage für die Proteinsynthese dient.` },
  { id:'anki_b09_120', vl:'b09', cat:'Anki', source:'anki', q:`Was ist die Funktion der tRNA?`, a:`Die tRNA (transfer RNA) transportiert Aminosäuren zum Ribosom und sorgt dafür, dass die passende Aminosäure entsprechend dem Codon der mRNA eingebaut wird.` },
  { id:'anki_b09_121', vl:'b09', cat:'Anki', source:'anki', q:`Was ist die Funktion der rRNA?`, a:`Die rRNA (ribosomale RNA) ist ein struktureller und funktioneller Bestandteil der Ribosomen und spielt eine zentrale Rolle bei der Proteinbiosynthese, insbesondere bei der Bildung der Peptidbindungen.` },
  { id:'anki_b09_122', vl:'b09', cat:'Anki', source:'anki', q:`Welche weiteren RNA-Typen gibt es?`, a:`Weitere wichtige RNA-Typen sind:miRNA (microRNA) – reguliert die Genexpression, indem sie die Translation von mRNA hemmt.siRNA (small interfering RNA) – beteiligt an der RNA-Interferenz und führt zum Abbau bestimmter mRNA-Moleküle.snRNA (small nuclear RNA) – beteiligt am Spleißen der prä-mRNA im Zellkern.` },
  { id:'anki_b09_123', vl:'b09', cat:'Anki', source:'anki', q:`Was ist ATP?`, a:`ATP (Adenosintriphosphat) ist der wichtigste Energieträger der Zelle.Es speichert Energie in seinen Phosphatbindungen, die bei der Hydrolyse zu ADP und Phosphat freigesetzt wird und für viele zelluläre Prozesse genutzt werden kann.` },
  { id:'anki_b09_124', vl:'b09', cat:'Anki', source:'anki', q:`Woraus besteht ATP?`, a:`ATP (Adenosintriphosphat) besteht aus drei Komponenten:Adenin (Stickstoffbase)Ribose (Pentosezucker)drei PhosphatgruppenDie Phosphatgruppen sind energiereich miteinander verbunden und speichern die chemische Energie des ATP.` },
  { id:'anki_b09_125', vl:'b09', cat:'Anki', source:'anki', q:`Warum kann ATP Energie liefern?`, a:`ATP kann Energie liefern, weil bei der Hydrolyse einer Phosphatbindung (ATP → ADP + Phosphat) Energie freigesetzt wird.Diese Energie wird von der Zelle für verschiedene Stoffwechselprozesse genutzt.` },
  { id:'anki_b09_126', vl:'b09', cat:'Anki', source:'anki', q:`Was ist NAD⁺?`, a:`NAD⁺ (Nicotinamidadenindinukleotid) ist ein Redox-Coenzym, das im Stoffwechsel Elektronen und Protonen aufnimmt und überträgt.Dabei wird NAD⁺ zu NADH reduziert und dient als Elektronenträger in vielen Stoffwechselreaktionen.` },
  { id:'anki_b09_127', vl:'b09', cat:'Anki', source:'anki', q:`Was ist FAD?`, a:`FAD (Flavinadenindinukleotid) ist ein Redox-Coenzym, das im Energiestoffwechsel Elektronen und Protonen überträgt.Dabei wird FAD zu FADH₂ reduziert und fungiert als Elektronenträger in verschiedenen Stoffwechselreaktionen.` },
  { id:'anki_b09_128', vl:'b09', cat:'Anki', source:'anki', q:`Welche Rolle spielen Nukleotide in der Signalübertragung?`, a:`Einige Nukleotide können als Second Messenger wirken.Sie übertragen Signale innerhalb der Zelle, die durch äußere Reize ausgelöst wurden, und regulieren dadurch verschiedene zelluläre Prozesse.` },
  { id:'anki_b09_129', vl:'b09', cat:'Anki', source:'anki', q:`Was ist cAMP?`, a:`cAMP (cyclisches Adenosinmonophosphat) ist ein wichtiger intrazellulärer Second Messenger.Es entsteht aus ATP durch das Enzym Adenylatcyclase und überträgt Signale innerhalb der Zelle, z. B. bei hormonellen Signalwegen.` },
  { id:'anki_b09_130', vl:'b09', cat:'Anki', source:'anki', q:`Welche Rolle spielen Nukleotide im Energiestoffwechsel?`, a:`Nukleotide können als Energieüberträger dienen.Ein wichtiges Beispiel ist ATP, das Energie in Phosphatbindungen speichert und diese bei der Hydrolyse für zelluläre Prozesse bereitstellt.` },
  { id:'anki_b09_131', vl:'b09', cat:'Anki', source:'anki', q:`Was sind Nukleotidanaloga?`, a:`Nukleotidanaloga sind Moleküle mit einer ähnlichen Struktur wie natürliche Nukleotide.Sie können in DNA oder RNA eingebaut werden und dadurch biologische Prozesse wie DNA-Replikation oder Transkription beeinflussen.Viele Nukleotidanaloga werden als Medikamente, z. B. in der Virus- oder Krebstherapie, eingesetzt.` },
  { id:'anki_b09_132', vl:'b09', cat:'Anki', source:'anki', q:`Wie wirken viele Nukleotidanaloga?`, a:`Viele Nukleotidanaloga werden in DNA oder RNA eingebaut und blockieren dadurch die DNA- oder RNA-Synthese, z. B. durch Kettenabbruch während der Nukleinsäuresynthese.` },
  { id:'anki_b09_133', vl:'b09', cat:'Anki', source:'anki', q:`Wo werden Nukleotidanaloga medizinisch eingesetzt?`, a:`Nukleotidanaloga werden vor allem in der Krebstherapie und in der antiviralen Therapie eingesetzt.Sie wirken, indem sie die Synthese von DNA oder RNA hemmen und dadurch die Vermehrung von Tumor- oder Viruszellen verhindern.` },
  { id:'anki_b09_134', vl:'b09', cat:'Anki', source:'anki', q:`Warum können Nukleotidanaloga Virusreplikation stoppen?`, a:`Sie werden in die **virale DNA eingebaut und verhindern die Verlängerung**.` },
  { id:'anki_b09_135', vl:'b09', cat:'Anki', source:'anki', q:`Warum sind Nukleinsäuren essenziell für alle Zellen?`, a:`Nukleinsäuren sind essenziell, weil sie die genetische Information speichern und übertragen.Diese Information dient als Bauplan für Proteine und ist entscheidend für Struktur, Funktion und Vermehrung der Zelle.` },
  { id:'anki_b09_136', vl:'b09', cat:'Anki', source:'anki', q:`Welche Funktionen erfüllen Nukleotide außer als Bausteine von DNA und RNA?`, a:`Nukleotide haben mehrere wichtige Funktionen im Stoffwechsel:Energieübertragung (z. B. ATP)Signaltransduktion als Second Messenger (z. B. cAMP)Bestandteil von Coenzymen (z. B. NAD⁺, FAD)` },
  { id:'anki_b09_137', vl:'b09', cat:'Anki', source:'anki', q:`Warum ist die DNA-Struktur für ihre Funktion geeignet?`, a:`Die Doppelhelixstruktur schützt die genetische Information im Inneren des Moleküls.Gleichzeitig ermöglicht die komplementäre Basenpaarung eine präzise Replikation und Weitergabe der genetischen Information.` },
  { id:'anki_b09_138', vl:'b09', cat:'Anki', source:'anki', q:`Welche Bedeutung hat die Basenpaarung für die Replikation?`, a:`Die komplementäre Basenpaarung (A–T und G–C) ermöglicht, dass jeder DNA-Strang als Vorlage für einen neuen Strang dient.Dadurch kann eine exakte, komplementäre Kopie der DNA gebildet werden.` },
  { id:'anki_b09_139', vl:'b09', cat:'Anki', source:'anki', q:`Was ist ein Gen?`, a:`Ein Gen ist ein Abschnitt der DNA, der die Information für ein funktionelles Produkt enthält, meist ein Protein oder eine funktionelle RNA.` },
  { id:'anki_b09_140', vl:'b09', cat:'Anki', source:'anki', q:`Wie hängt DNA mit Proteinsynthese zusammen?`, a:`Die in der DNA gespeicherte genetische Information wird zuerst durch Transkription in mRNA umgeschrieben.Anschließend wird diese Information bei der Translation in die Aminosäuresequenz eines Proteins umgesetzt.` },
  { id:'anki_b12_141', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Lipide?`, a:`Lipide sind hydrophobe oder amphiphile Biomoleküle, die sich schlecht in Wasser, aber gut in organischen Lösungsmitteln lösen.Sie erfüllen wichtige Funktionen als Energiespeicher, Membranbestandteile und Signalmoleküle.` },
  { id:'anki_b12_142', vl:'b12', cat:'Anki', source:'anki', q:`Welche Eigenschaften sind typisch für Lipide?`, a:`Typische Eigenschaften von Lipiden sind:hydrophob oder amphiphilschlecht in Wasser löslich, aber gut in organischen Lösungsmittelnenergiereich und daher wichtige Energiespeicher in Zellen.` },
  { id:'anki_b12_143', vl:'b12', cat:'Anki', source:'anki', q:`Welche Hauptklassen von Lipiden gibt es?`, a:`Wichtige Klassen von Lipiden sind:• Fettsäuren• Triacylglycerole (Fette/Öle)• Phospholipide• Glykolipide• Steroide.` },
  { id:'anki_b12_144', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Fettsäuren?`, a:`Fettsäuren sind langkettige Carbonsäuren, die aus einer hydrophoben Kohlenwasserstoffkette und einer Carboxylgruppe (-COOH) bestehen.` },
  { id:'anki_b12_145', vl:'b12', cat:'Anki', source:'anki', q:`Aus welchen zwei Teilen besteht eine Fettsäure?`, a:`Eine Fettsäure besteht aus:• einer Carboxylgruppe (-COOH)• einer Kohlenwasserstoffkette.` },
  { id:'anki_b12_146', vl:'b12', cat:'Anki', source:'anki', q:`Was sind gesättigte Fettsäuren?`, a:`Gesättigte Fettsäuren sind Fettsäuren, bei denen zwischen den Kohlenstoffatomen nur Einfachbindungen vorkommen.` },
  { id:'anki_b12_147', vl:'b12', cat:'Anki', source:'anki', q:`Was sind ungesättigte Fettsäuren?`, a:`Ungesättigte Fettsäuren sind Fettsäuren mit einer oder mehreren Doppelbindungen zwischen den Kohlenstoffatomen.` },
  { id:'anki_b12_148', vl:'b12', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen einfach und mehrfach ungesättigten Fettsäuren?`, a:`Einfach ungesättigte Fettsäuren: besitzen eine Doppelbindung.Mehrfach ungesättigte Fettsäuren: besitzen mehrere Doppelbindungen.` },
  { id:'anki_b12_149', vl:'b12', cat:'Anki', source:'anki', q:`Welche Konfiguration haben Doppelbindungen in natürlichen Fettsäuren meist?`, a:`Doppelbindungen in natürlichen Fettsäuren liegen meist in cis-Konfiguration vor.` },
  { id:'anki_b12_150', vl:'b12', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen cis- und trans-Fettsäuren? (Bild/Abbildung ansehen)`, a:`cis: Die Wasserstoffatome liegen auf derselben Seite der Doppelbindung.trans: Die Wasserstoffatome liegen auf gegenüberliegenden Seiten der Doppelbindung.` },
  { id:'anki_b12_151', vl:'b12', cat:'Anki', source:'anki', q:`Wie beeinflussen Doppelbindungen die Struktur von Fettsäuren?`, a:`Doppelbindungen verursachen Knicke in der Kohlenwasserstoffkette der Fettsäure.` },
  { id:'anki_b12_152', vl:'b12', cat:'Anki', source:'anki', q:`Welche Bedeutung haben ungesättigte Fettsäuren für Membranen?`, a:`Ungesättigte Fettsäuren erhöhen die Membranfluidität, da ihre Doppelbindungen Knicke in den Fettsäureketten verursachen und dadurch eine dichtere Packung der Lipide verhindern.` },
  { id:'anki_b12_153', vl:'b12', cat:'Anki', source:'anki', q:`Was sind essentielle Fettsäuren?`, a:`Essentielle Fettsäuren sind Fettsäuren, die der Körper nicht selbst synthetisieren kann und daher über die Nahrung aufgenommen werden müssen.` },
  { id:'anki_b12_154', vl:'b12', cat:'Anki', source:'anki', q:`Nenne Beispiele für essentielle Fettsäuren.`, a:`Beispiele für essentielle Fettsäuren sind:• Linolsäure• α-Linolensäure.` },
  { id:'anki_b12_155', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Triacylglycerole?`, a:`Triacylglycerole sind Lipide, die aus Glycerin und drei Fettsäuren aufgebaut sind.` },
  { id:'anki_b12_156', vl:'b12', cat:'Anki', source:'anki', q:`Welche Funktion haben Triacylglycerole?`, a:`Triacylglycerole dienen vor allem als Energiespeicher im Körper.` },
  { id:'anki_b12_157', vl:'b12', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen Fett und Öl?`, a:`Fette sind bei Raumtemperatur fest,Öle sind bei Raumtemperatur flüssig.` },
  { id:'anki_b12_158', vl:'b12', cat:'Anki', source:'anki', q:`Wovon hängt der Aggregatzustand von Fetten ab?`, a:`Vom Längen der Fettsäureketten und von der Anzahl der Doppelbindungen.` },
  { id:'anki_b12_159', vl:'b12', cat:'Anki', source:'anki', q:`Was ist Glycerin?`, a:`Glycerin ist ein dreiwertiger Alkohol (mit drei OH-Gruppen) und ein Bestandteil vieler Lipide, z. B. Triacylglycerole und Phospholipide.` },
  { id:'anki_b12_160', vl:'b12', cat:'Anki', source:'anki', q:`Wie entsteht ein Triacylglycerol?`, a:`Ein Triacylglycerol entsteht durch Veresterung von Glycerin mit drei Fettsäuren.` },
  { id:'anki_b12_161', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Phospholipide?`, a:`Phospholipide sind Lipide mit einer Phosphatgruppe, die wichtige Bestandteile von Zellmembranen sind.` },
  { id:'anki_b12_162', vl:'b12', cat:'Anki', source:'anki', q:`Wie ist ein Phospholipid aufgebaut? (Bild/Abbildung ansehen)`, a:`Ein Phospholipid besteht aus:• Glycerin• zwei Fettsäuren• Phosphatgruppe• polarer Kopfgruppe.` },
  { id:'anki_b12_163', vl:'b12', cat:'Anki', source:'anki', q:`Warum sind Phospholipide amphiphil?`, a:`Phospholipide sind amphiphil, weil sie einen hydrophilen (wasserliebenden) Kopf und hydrophobe Fettsäureketten (wasserabweisend) besitzen.` },
  { id:'anki_b12_164', vl:'b12', cat:'Anki', source:'anki', q:`Was ist eine Lipiddoppelschicht? (Bild/Abbildung ansehen)`, a:`Eine Lipiddoppelschicht ist eine Anordnung von Phospholipiden, bei der die hydrophoben Fettsäureketten nach innen und die hydrophilen Köpfe nach außen zum Wasser zeigen.Sie bildet die Grundstruktur biologischer Membranen.` },
  { id:'anki_b12_165', vl:'b12', cat:'Anki', source:'anki', q:`Warum bilden Phospholipide spontan Lipiddoppelschichten?`, a:`Aufgrund des hydrophoben Effekts: Die hydrophoben Fettsäureketten meiden Wasser, während die hydrophilen Köpfe mit Wasser wechselwirken, wodurch sich automatisch eine Doppelschicht bildet.` },
  { id:'anki_b12_166', vl:'b12', cat:'Anki', source:'anki', q:`Welche Bedeutung hat die Lipiddoppelschicht?`, a:`Die Lipiddoppelschicht bildet die Grundstruktur biologischer Membranen.` },
  { id:'anki_b12_167', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Glykolipide?`, a:`Glykolipide sind Lipide mit gebundenen Kohlenhydratgruppen.` },
  { id:'anki_b12_168', vl:'b12', cat:'Anki', source:'anki', q:`Wo kommen Glykolipide besonders häufig vor?`, a:`Vor allem in der äußeren Schicht der Zellmembran.` },
  { id:'anki_b12_169', vl:'b12', cat:'Anki', source:'anki', q:`Welche Funktion haben Glykolipide?`, a:`Glykolipide spielen eine wichtige Rolle bei der Zell-Zell-Erkennung.` },
  { id:'anki_b12_170', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Steroide?`, a:`Steroide sind eine Klasse von Lipiden, die durch ein charakteristisches Ringsystem aus vier miteinander verbundenen Kohlenstoffringen (Sterangerüst) gekennzeichnet sind.Zu den wichtigen Steroiden gehören z. B. Cholesterin, Steroidhormone und Gallensäuren.` },
  { id:'anki_b12_171', vl:'b12', cat:'Anki', source:'anki', q:`Welches wichtige Steroid kommt in Zellmembranen vor?`, a:`Cholesterin ist ein wichtiges Steroid der Zellmembran.Es stabilisiert die Membranstruktur und reguliert die Membranfluidität, indem es die Beweglichkeit der Phospholipide beeinflusst.` },
  { id:'anki_b12_172', vl:'b12', cat:'Anki', source:'anki', q:`Welche Funktion hat Cholesterin in Membranen?`, a:`Es reguliert die **Membranfluidität**.` },
  { id:'anki_b12_173', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Isoprenoide?`, a:`Isoprenoide (Terpenoide) sind eine große Gruppe von Lipiden, die aus Isopren-Einheiten (C₅-Bausteinen) aufgebaut sind.Sie erfüllen viele biologische Funktionen, z. B. als Bestandteile von Membranen, Elektronenträger im Stoffwechsel oder Vorstufen von Hormonen und Vitaminen (z. B. Vitamin A, E, K, Coenzym Q).` },
  { id:'anki_b12_174', vl:'b12', cat:'Anki', source:'anki', q:`Nenne Beispiele für Isoprenoide.`, a:`Beispiele für Isoprenoide sind:• Cholesterin – wichtiges Membranlipid und Vorstufe von Steroidhormonen• Ubichinon (Coenzym Q) – Elektronenträger in der Atmungskette• Dolichol – beteiligt am Transport von Zuckern bei der Protein-Glykosylierung.` },
  { id:'anki_b12_175', vl:'b12', cat:'Anki', source:'anki', q:`Welche Rolle spielen Isoprenoide im Stoffwechsel?`, a:`Isoprenoide sind wichtige Bestandteile von Membranlipiden und Coenzymen und spielen daher eine zentrale Rolle im Stoffwechsel, z. B. beim Elektronentransport und bei Biosyntheseprozessen.` },
  { id:'anki_b12_176', vl:'b12', cat:'Anki', source:'anki', q:`Was ist Ubichinon (Coenzym Q)?`, a:`Ubichinon (Coenzym Q) ist ein lipophiler Elektronentransporter der mitochondrialen Atmungskette.Es überträgt Elektronen zwischen den Komplexen der Atmungskette und trägt damit zur ATP-Produktion bei.` },
  { id:'anki_b12_177', vl:'b12', cat:'Anki', source:'anki', q:`Was ist Dolichol?`, a:`Dolichol ist ein Isoprenoid-Lipid, das bei der Synthese von Glykoproteinen eine wichtige Rolle spielt.Es dient als Trägermolekül für Zuckerreste im endoplasmatischen Retikulum, die anschließend auf Proteine übertragen werden (Glykosylierung).` },
  { id:'anki_b12_178', vl:'b12', cat:'Anki', source:'anki', q:`Welche Lipide kommen in Zellmembranen vor?`, a:`Wichtige Membranlipide sind:• Phospholipide – bilden die Lipiddoppelschicht der Membran• Glykolipide – tragen Kohlenhydratgruppen und sind wichtig für Zell-Zell-Erkennung• Cholesterin – stabilisiert die Membran und reguliert die Membranfluidität.` },
  { id:'anki_b12_179', vl:'b12', cat:'Anki', source:'anki', q:`Welche Funktion haben Membranlipide?`, a:`Membranlipide erfüllen mehrere wichtige Funktionen:• Strukturfunktion – bilden die Lipiddoppelschicht der Zellmembran• Barrierefunktion – trennen das Zellinnere von der Umgebung und kontrollieren den Stoffaustausch• Signalübertragung – dienen als Plattform für Signalprozesse und können selbst Signalmoleküle sein.` },
  { id:'anki_b12_180', vl:'b12', cat:'Anki', source:'anki', q:`Warum sind Membranlipide wichtig für Zellen?`, a:`Membranlipide ermöglichen die Kompartimentierung der Zelle.Durch die Bildung von Membranen entstehen abgegrenzte Reaktionsräume (Organellen), in denen verschiedene Stoffwechselprozesse getrennt und effizient ablaufen können.` },
  { id:'anki_b12_181', vl:'b12', cat:'Anki', source:'anki', q:`Was bedeutet Membranfluidität?`, a:`Membranfluidität beschreibt die Beweglichkeit der Lipidmoleküle innerhalb der Zellmembran.Die Lipide können sich seitlich in der Membranebene bewegen, wodurch die Membran flexibel und dynamisch bleibt.` },
  { id:'anki_b12_182', vl:'b12', cat:'Anki', source:'anki', q:`Wovon hängt die Membranfluidität ab?`, a:`Die Membranfluidität wird durch mehrere Faktoren beeinflusst:• Fettsäurezusammensetzung (Anzahl der Doppelbindungen)• Cholesterinanteil in der Membran• Temperatur.` },
  { id:'anki_b12_183', vl:'b12', cat:'Anki', source:'anki', q:`Warum sind Lipide energiereiche Moleküle?`, a:`Lipide sind energiereich, weil sie viele reduzierte Kohlenstoffbindungen (C–H-Bindungen) enthalten.Bei deren Oxidation im Stoffwechsel wird viel Energie freigesetzt, weshalb Lipide besonders gut als Energiespeicher geeignet sind.` },
  { id:'anki_b12_184', vl:'b12', cat:'Anki', source:'anki', q:`Welche Rolle spielen Lipide im Energiestoffwechsel?`, a:`Lipide dienen als Langzeitspeicher von Energie.Sie werden vor allem in Form von Triacylglycerolen im Fettgewebe gespeichert und können bei Bedarf abgebaut werden, um Energie für den Stoffwechsel bereitzustellen.` },
  { id:'anki_b12_185', vl:'b12', cat:'Anki', source:'anki', q:`Welche Rolle spielen Lipide im Körper?`, a:`Lipide erfüllen mehrere wichtige Funktionen im Körper:• Energiespeicher (z. B. als Triacylglycerole im Fettgewebe)• Bestandteile biologischer Membranen (z. B. Phospholipide und Cholesterin)• Signalstoffe (z. B. Steroidhormone und andere Lipidmediatoren).` },
  { id:'anki_b12_186', vl:'b12', cat:'Anki', source:'anki', q:`Was sind Eicosanoide?`, a:`Eicosanoide sind biologisch aktive Signalmoleküle, die aus mehrfach ungesättigten Fettsäuren (vor allem Arachidonsäure) gebildet werden.Sie wirken meist lokal und sind wichtig bei Entzündungsreaktionen, Schmerz, Blutgerinnung und Regulation des Gefäßtonus.` },
  { id:'anki_b12_187', vl:'b12', cat:'Anki', source:'anki', q:`Nenne Beispiele für Eicosanoide.`, a:`Wichtige Eicosanoide sind:• Prostaglandine – beteiligt an Entzündung, Schmerz und Fieber• Thromboxane – wichtig für die Blutgerinnung und Thrombozytenaggregation• Leukotriene – spielen eine Rolle bei Entzündungsreaktionen und allergischen Reaktionen.` },
  { id:'anki_b12_188', vl:'b12', cat:'Anki', source:'anki', q:`Welche Funktion haben Eicosanoide?`, a:`Eicosanoide wirken als lokale Signalmoleküle und regulieren wichtige Prozesse wie Entzündungsreaktionen, Schmerz, Blutgerinnung und verschiedene Signalprozesse im Körper.` },
  { id:'anki_b12_189', vl:'b12', cat:'Anki', source:'anki', q:`Warum sind Fettsäuren wichtige Biomoleküle?`, a:`Fettsäuren sind wichtige Biomoleküle, weil sie mehrere zentrale Funktionen erfüllen:Sie dienen als Energiequelle, sind Bestandteile von Membranlipiden und können als Vorstufen von Signalmolekülen (z. B. Eicosanoiden) wirken.` },
  { id:'anki_b12_190', vl:'b12', cat:'Anki', source:'anki', q:`Welche Bedeutung haben Lipide für Zellmembranen?`, a:`Lipide sind zentrale Bestandteile der Zellmembran und bestimmen deren Struktur, Fluidität und Funktion.Die Lipiddoppelschicht bildet die Grundstruktur der Membran, während verschiedene Lipidtypen die Beweglichkeit, Stabilität und Signalprozesse der Membran beeinflussen.` },
  { id:'anki_b12_191', vl:'b12', cat:'Anki', source:'anki', q:`Warum ist die Struktur von Lipiden entscheidend für ihre Funktion?`, a:`Die chemische Struktur von Lipiden bestimmt ihre physikalischen Eigenschaften (z. B. Löslichkeit und Membranfluidität) und damit auch ihre biologischen Funktionen, z. B. als Membranbestandteile, Energiespeicher oder Signalmoleküle.` },
  { id:'anki_b13_192', vl:'b13', cat:'Anki', source:'anki', q:`Wie könnten die ersten Biomoleküle auf der Erde entstanden sein?`, a:`Die ersten Biomoleküle könnten durch chemische Evolution entstanden sein.Dabei bildeten sich aus einfachen anorganischen Molekülen unter geeigneten Bedingungen der frühen Erde komplexe organische Moleküle, die später die Grundlage für biologische Makromoleküle und Leben bildeten.` },
  { id:'anki_b13_193', vl:'b13', cat:'Anki', source:'anki', q:`Was sind Protocellen (Urzellen)?`, a:`Protocellen sind einfache, membranumhüllte Strukturen, die als Vorläufer heutiger Zellen gelten.Sie konnten bereits Biomoleküle einschließen und einfache chemische Reaktionen ermöglichen, hatten aber noch keine vollständige Zellorganisation wie moderne Zellen.` },
  { id:'anki_b13_194', vl:'b13', cat:'Anki', source:'anki', q:`Wie wird der Stammbaum des Lebens grundlegend eingeteilt?`, a:`Der Stammbaum des Lebens wird in drei Domänen eingeteilt:• Bacteria – klassische Bakterien (Prokaryoten)• Archaea – prokaryotische Mikroorganismen mit besonderen Stoffwechsel- und Membraneigenschaften• Eukarya – Organismen mit Zellkern, z. B. Tiere, Pflanzen, Pilze und Protisten.` },
  { id:'anki_b13_195', vl:'b13', cat:'Anki', source:'anki', q:`Was ist der wichtigste Unterschied zwischen Prokaryoten und Eukaryoten?`, a:`Eukaryoten besitzen einen Zellkern und membranbegrenzte Organellen (z. B. Mitochondrien, ER).Prokaryoten haben keinen Zellkern und keine membranumhüllten Organellen.` },
  { id:'anki_b13_196', vl:'b13', cat:'Anki', source:'anki', q:`Wie groß sind typische prokaryotische Zellen?`, a:`Typische prokaryotische Zellen sind meist etwa 1–5 µm groß und damit deutlich kleiner als eukaryotische Zellen.` },
  { id:'anki_b13_197', vl:'b13', cat:'Anki', source:'anki', q:`Wie groß sind typische eukaryotische Zellen?`, a:`Typische eukaryotische Zellen sind meist etwa 10–100 µm groß und damit deutlich größer als prokaryotische Zellen.` },
  { id:'anki_b13_198', vl:'b13', cat:'Anki', source:'anki', q:`Was ist der Zellkern?`, a:`Der Zellkern (Nucleus) ist ein membranumhülltes Organell, das die DNA der Zelle enthält und damit das genetische Informationszentrum der Zelle darstellt.Er steuert wichtige Prozesse wie Genexpression, DNA-Replikation und Zellteilung.` },
  { id:'anki_b13_199', vl:'b13', cat:'Anki', source:'anki', q:`Welche Funktion hat der Zellkern?`, a:`Der Zellkern dient der Speicherung der genetischen Information (DNA) und der Regulation der Genexpression.Damit steuert er zentrale Prozesse der Zelle wie Proteinbiosynthese, Zellwachstum und Zellteilung.` },
  { id:'anki_b13_200', vl:'b13', cat:'Anki', source:'anki', q:`Was sind Ribosomen?`, a:`Ribosomen sind kleine Zellstrukturen aus rRNA und Proteinen, an denen die Proteinsynthese (Translation) stattfindet.Sie lesen die Information der mRNA und setzen sie mithilfe von tRNA und Aminosäuren in eine Polypeptidkette (Protein) um.Ribosomen können frei im Cytoplasma vorkommen oder an das raue endoplasmatische Retikulum gebunden sein.` },
  { id:'anki_b13_201', vl:'b13', cat:'Anki', source:'anki', q:`Wo befinden sich Ribosomen in der Zelle?`, a:`Ribosomen kommen in der Zelle an zwei Orten vor:• frei im Cytosol – hier werden meist Proteine für das Cytoplasma oder den Zellkern synthetisiert.• gebunden am rauen endoplasmatischen Retikulum (rER) – hier entstehen vor allem sekretorische Proteine, Membranproteine oder Proteine für Organellen.` },
  { id:'anki_b13_202', vl:'b13', cat:'Anki', source:'anki', q:`Was ist das endoplasmatische Retikulum (ER)?`, a:`Das endoplasmatische Retikulum (ER) ist ein verzweigtes Membransystem in eukaryotischen Zellen, das eine wichtige Rolle bei der Synthese und Verarbeitung von Proteinen und Lipiden spielt.Man unterscheidet zwei Formen:• Raues ER (rER): mit Ribosomen besetzt, wichtig für die Synthese von Membran- und sekretorischen Proteinen.• Glattes ER (sER): ohne Ribosomen, beteiligt an der Lipidsynthese, Entgiftung und Calcium-Speicherung.` },
  { id:'anki_b13_203', vl:'b13', cat:'Anki', source:'anki', q:`Was ist der Unterschied zwischen rauem und glattem endoplasmatischem Retikulum (ER)?`, a:`Der Unterschied liegt vor allem in Aufbau und Funktion:• Raues ER (rER): mit Ribosomen auf der Oberfläche; Ort der Synthese von Membranproteinen und sekretorischen Proteinen.• Glattes ER (sER): ohne Ribosomen; beteiligt an der Lipidsynthese, Entgiftungsreaktionen und der Speicherung von Calciumionen.` },
  { id:'anki_b13_204', vl:'b13', cat:'Anki', source:'anki', q:`Was ist der Golgi-Apparat?`, a:`Der Golgi-Apparat ist ein membranbegrenztes Organell, das aus mehreren gestapelten Membransäckchen (Zisternen) besteht.Er übernimmt die Modifikation, Sortierung und Verpackung von Proteinen und Lipiden, die zuvor im endoplasmatischen Retikulum gebildet wurden.Anschließend werden diese Moleküle in Transportvesikel verpackt und zu ihrem Bestimmungsort in der Zelle oder zur Sekretion nach außen weitergeleitet.` },
  { id:'anki_b13_205', vl:'b13', cat:'Anki', source:'anki', q:`Welche Funktion haben Mitochondrien?`, a:`Mitochondrien sind die Energiezentren der Zelle.In ihnen findet die Zellatmung statt, bei der aus Nährstoffen ATP (Adenosintriphosphat) gebildet wird, der wichtigste Energieträger der Zelle.Dabei laufen wichtige Prozesse wie Citratzyklus und Atmungskette ab, durch die chemische Energie effizient in ATP umgewandelt wird.` },
  { id:'anki_b13_206', vl:'b13', cat:'Anki', source:'anki', q:`Warum werden Mitochondrien als „Kraftwerke der Zelle“ bezeichnet?`, a:`Mitochondrien werden so genannt, weil sie den größten Teil des zellulären ATP produzieren.Durch Zellatmung (Citratzyklus und Atmungskette) wird Energie aus Nährstoffen gewonnen und in ATP, den wichtigsten Energieträger der Zelle, umgewandelt.` },
  { id:'anki_b13_207', vl:'b13', cat:'Anki', source:'anki', q:`Welche besondere Eigenschaft besitzen Mitochondrien?`, a:`Mitochondrien besitzen eine eigene ringförmige DNA (mtDNA) und eigene Ribosomen.Dadurch können sie einen Teil ihrer Proteine selbst synthetisieren und sich unabhängig von der Zellteilung vermehren.Diese Eigenschaft unterstützt die Endosymbiontentheorie, nach der Mitochondrien ursprünglich von Bakterien abstammen.` },
  { id:'anki_b13_208', vl:'b13', cat:'Anki', source:'anki', q:`Was sind Lysosomen?`, a:`Lysosomen sind membranumhüllte Organellen, die für den Abbau und das Recycling zellulärer Bestandteile verantwortlich sind.Sie enthalten viele hydrolytische Enzyme, die Proteine, Lipide, Kohlenhydrate und Nukleinsäuren spalten können.Damit spielen Lysosomen eine wichtige Rolle bei Verdauungsprozessen innerhalb der Zelle, beim Abbau alter Organellen und bei der Verwertung von aufgenommenem Material.` },
  { id:'anki_b13_209', vl:'b13', cat:'Anki', source:'anki', q:`Welche Enzyme enthalten Lysosomen?`, a:`Lysosomen enthalten zahlreiche hydrolytische Enzyme, die verschiedene Biomoleküle abbauen können.Dazu gehören z. B. Proteasen, Nukleasen, Lipasen und Glycosidasen.Diese Enzyme arbeiten optimal in einem sauren Milieu und ermöglichen den Abbau und das Recycling von zellulären Bestandteilen.` },
  { id:'anki_b13_210', vl:'b13', cat:'Anki', source:'anki', q:`Was sind Peroxisomen?`, a:`Peroxisomen sind membranumhüllte Organellen, die an oxidativen Stoffwechselreaktionen beteiligt sind.Sie enthalten Enzyme wie Oxidasen und Katalase, die reaktive Sauerstoffverbindungen (z. B. Wasserstoffperoxid) bilden und abbauen.Peroxisomen spielen eine wichtige Rolle bei der Entgiftung von Stoffen, dem Abbau von Fettsäuren und im zellulären Stoffwechsel.` },
  { id:'anki_b13_211', vl:'b13', cat:'Anki', source:'anki', q:`Welche wichtige Funktion haben Peroxisomen?`, a:`Peroxisomen sind wichtig für den Abbau bestimmter Fettsäuren (vor allem sehr langkettiger Fettsäuren) und für Entgiftungsreaktionen in der Zelle.Dabei entstehen reaktive Sauerstoffverbindungen, die durch Enzyme wie Katalase wieder abgebaut werden.` },
  { id:'anki_b13_212', vl:'b13', cat:'Anki', source:'anki', q:`Was ist das Cytoskelett?`, a:`Antwort:Das Cytoskelett ist ein dynamisches Netzwerk aus Proteinfilamenten im Cytoplasma der Zelle.Es sorgt für Stabilität und Form der Zelle und ermöglicht außerdem Bewegung, intrazellulären Transport und Zellteilung.Zu den wichtigsten Bestandteilen gehören:• Mikrofilamente (Aktinfilamente)• Intermediärfilamente• Mikrotubuli.` },
  { id:'anki_b13_213', vl:'b13', cat:'Anki', source:'anki', q:`Welche Komponenten gehören zum Cytoskelett?`, a:`Das Cytoskelett besteht aus drei Hauptkomponenten:• Mikrofilamente (Aktinfilamente) – dünne Filamente, wichtig für Zellform und Zellbewegung• Intermediärfilamente – sorgen vor allem für mechanische Stabilität der Zelle• Mikrotubuli – röhrenförmige Strukturen aus Tubulin, wichtig für intrazellulären Transport, Zellteilung und Aufbau des Spindelapparates.` },
  { id:'anki_b13_214', vl:'b13', cat:'Anki', source:'anki', q:`Was ist der Zellzyklus?`, a:`Der Zellzyklus ist die Abfolge von Phasen, die eine Zelle durchläuft, von einer Zellteilung bis zur nächsten.Er umfasst die Interphase (Wachstum und DNA-Verdopplung) und die Mitose mit anschließender Cytokinese, bei der sich die Zelle in zwei Tochterzellen teilt.` },
  { id:'anki_b13_215', vl:'b13', cat:'Anki', source:'anki', q:`Welche Hauptphasen hat der Zellzyklus?`, a:`Der Zellzyklus besteht aus zwei Hauptphasen:• Interphase – Phase des Zellwachstums und der DNA-Replikation (unterteilt in G1-, S- und G2-Phase).• Mitose – Phase der Kernteilung, bei der die verdoppelte DNA gleichmäßig auf zwei Tochterzellen verteilt wird; anschließend erfolgt die Cytokinese.` },
  { id:'anki_b13_216', vl:'b13', cat:'Anki', source:'anki', q:`Was passiert während der Interphase?`, a:`Während der Interphase wächst die Zelle, betreibt intensiven Stoffwechsel und bereitet sich auf die Zellteilung vor.Ein zentraler Schritt ist die DNA-Replikation, bei der das genetische Material verdoppelt wird, sodass später zwei identische Tochterzellen entstehen können.` },
  { id:'anki_b13_217', vl:'b13', cat:'Anki', source:'anki', q:`Was passiert während der Mitose?`, a:`Während der Mitose wird der Zellkern geteilt und die verdoppelten Chromosomen gleichmäßig auf zwei Tochterkerne verteilt.Dieser Prozess stellt sicher, dass beide entstehenden Zellen die gleiche genetische Information erhalten.Die Mitose umfasst mehrere Phasen wie Prophase, Metaphase, Anaphase und Telophase, anschließend folgt die Cytokinese.` },
  { id:'anki_b13_218', vl:'b13', cat:'Anki', source:'anki', q:`Was sind Stammzellen?`, a:`Stammzellen sind undifferenzierte Zellen, die zwei wichtige Eigenschaften besitzen:• Selbsterneuerung – sie können sich immer wieder teilen und neue Stammzellen bilden.• Differenzierung – sie können sich zu verschiedenen spezialisierten Zelltypen des Körpers entwickeln.Dadurch spielen Stammzellen eine zentrale Rolle bei Entwicklung, Wachstum und Geweberegeneration.` },
  { id:'anki_b13_219', vl:'b13', cat:'Anki', source:'anki', q:`Was ist programmierter Zelltod (Apoptose)?`, a:`Apoptose ist ein kontrollierter, genetisch regulierter Prozess, bei dem eine Zelle gezielt abgebaut und entfernt wird.Dabei wird die Zelle in kleine Bestandteile zerlegt, ohne eine Entzündungsreaktion auszulösen.Apoptose ist wichtig für Entwicklung, Gewebeerneuerung und die Entfernung beschädigter oder überflüssiger Zellen.` },
  { id:'anki_b13_220', vl:'b13', cat:'Anki', source:'anki', q:`Warum ist Apoptose wichtig?`, a:`Apoptose ist wichtig, weil sie beschädigte, infizierte oder überflüssige Zellen kontrolliert entfernt.Sie spielt eine zentrale Rolle bei der Entwicklung von Geweben und Organen, der Aufrechterhaltung der Gewebehomöostase und beim Schutz vor Krankheiten, z. B. durch die Eliminierung potenziell tumorartiger Zellen.` },
  { id:'anki_b13_221', vl:'b13', cat:'Anki', source:'anki', q:`Welche Ebenen biologischer Organisation gibt es?`, a:`Die biologische Organisation des Lebens kann in mehrere Ebenen eingeteilt werden:• Moleküle – z. B. Proteine, Lipide, Kohlenhydrate und Nukleinsäuren• Zellen – kleinste lebende Einheit des Körpers• Gewebe – Verbände ähnlicher Zellen mit gemeinsamer Funktion• Organe – Strukturen aus mehreren Geweben mit spezifischer Aufgabe• Organismen – vollständige lebende Systeme, die aus vielen Organen bestehen.` },
  { id:'anki_b11_222', vl:'b11', cat:'Anki', source:'anki', q:`Was ist ein offenes System?`, a:`Ein offenes System ist ein System, das sowohl Energie als auch Materie mit seiner Umgebung austauschen kann.Biologische Systeme wie Zellen und Organismen sind typische Beispiele, da sie Nährstoffe aufnehmen, Stoffwechselprodukte abgeben und Energie umwandeln.` },
  { id:'anki_b11_223', vl:'b11', cat:'Anki', source:'anki', q:`Was ist ein geschlossenes System?`, a:`Ein geschlossenes System kann Energie mit der Umgebung austauschen, aber keine Materie.Das bedeutet, dass Wärme oder Arbeit übertragen werden können, während die Masse des Systems konstant bleibt.` },
  { id:'anki_b11_224', vl:'b11', cat:'Anki', source:'anki', q:`Was ist ein isoliertes System?`, a:`Ein isoliertes System ist ein System, das weder Energie noch Materie mit seiner Umgebung austauscht.Solche Systeme sind idealisiert und kommen in der Realität kaum vollständig vor; sie werden vor allem in der Thermodynamik als Modell verwendet.` },
  { id:'anki_b11_225', vl:'b11', cat:'Anki', source:'anki', q:`Welcher Systemtyp beschreibt lebende Zellen?`, a:`Lebende Zellen sind offene Systeme, weil sie ständig Materie und Energie mit ihrer Umgebung austauschen.Sie nehmen Nährstoffe und Energie auf und geben Stoffwechselprodukte sowie Wärme wieder ab.` },
  { id:'anki_b11_226', vl:'b11', cat:'Anki', source:'anki', q:`Was besagt der erste Hauptsatz der Thermodynamik?`, a:`Der erste Hauptsatz der Thermodynamik besagt, dass Energie weder erzeugt noch vernichtet werden kann, sondern nur von einer Form in eine andere umgewandelt wird.In biologischen Systemen bedeutet das, dass die Energie aus Nährstoffen z. B. in ATP, Wärme oder mechanische Arbeit umgewandelt wird.` },
  { id:'anki_b11_227', vl:'b11', cat:'Anki', source:'anki', q:`Welche Bedeutung hat der erste Hauptsatz der Thermodynamik für biologische Systeme?`, a:`Der erste Hauptsatz bedeutet für biologische Systeme, dass Zellen keine Energie erzeugen können, sondern sie aus Nährstoffen aufnehmen und in andere Energieformen umwandeln müssen.Diese Energie wird z. B. für ATP-Bildung, Stoffwechselprozesse, Transportvorgänge und mechanische Arbeit genutzt.` },
  { id:'anki_b11_228', vl:'b11', cat:'Anki', source:'anki', q:`Was besagt der zweite Hauptsatz der Thermodynamik?`, a:`Der zweite Hauptsatz der Thermodynamik besagt, dass bei jedem Energieumwandlungsprozess die Entropie (Unordnung) eines Systems und seiner Umgebung zunimmt.Das bedeutet, dass Energieumwandlungen nie vollständig effizient sind und ein Teil der Energie als Wärme verloren geht.` },
  { id:'anki_b11_229', vl:'b11', cat:'Anki', source:'anki', q:`Was versteht man unter Entropie?`, a:`Entropie ist ein Maß für die Unordnung oder Zufälligkeit eines Systems.Je höher die Entropie, desto größer ist die Unordnung und die Zahl möglicher Zustände eines Systems.In natürlichen Prozessen tendieren Systeme dazu, in einen Zustand höherer Entropie überzugehen.` },
  { id:'anki_b11_230', vl:'b11', cat:'Anki', source:'anki', q:`Warum nimmt die Entropie in natürlichen Prozessen zu?`, a:`Die Entropie nimmt zu, weil sich Energie spontan verteilt und Systeme in energetisch günstigere, ungeordnetere Zustände übergehen.Dabei wird Energie häufig in Form von Wärme abgegeben, wodurch die Gesamtentropie von System und Umgebung steigt.` },
  { id:'anki_b11_231', vl:'b11', cat:'Anki', source:'anki', q:`Was versteht man unter Energie in biologischen Systemen?`, a:`In biologischen Systemen bezeichnet Energie die Fähigkeit eines Systems, Arbeit zu verrichten oder Veränderungen hervorzurufen.Zellen nutzen Energie z. B. für Stoffwechselreaktionen, Transportprozesse, Bewegung und Biosynthesen.Ein wichtiger Energieträger der Zelle ist ATP.` },
  { id:'anki_b11_232', vl:'b11', cat:'Anki', source:'anki', q:`Was ist Enthalpie (H)?`, a:`Die Enthalpie (H) beschreibt den Wärmeinhalt eines Systems bei konstantem Druck.Sie gibt an, wie viel Wärmeenergie bei einer chemischen Reaktion aufgenommen oder abgegeben wird.Änderungen der Enthalpie werden als ΔH angegeben:• ΔH < 0: exotherme Reaktion (Wärme wird frei)• ΔH > 0: endotherme Reaktion (Wärme wird aufgenommen).` },
  { id:'anki_b11_233', vl:'b11', cat:'Anki', source:'anki', q:`Was versteht man unter freier Energie (G)?`, a:`Die freie Energie (G) – auch Gibbs-Energie – ist der Anteil der Energie eines Systems, der für Arbeit genutzt werden kann.Sie berücksichtigt sowohl die Enthalpie (H) als auch die Entropie (S) eines Systems und bestimmt, ob eine chemische Reaktion spontan ablaufen kann.Die Änderung wird als ΔG angegeben.` },
  { id:'anki_b11_234', vl:'b11', cat:'Anki', source:'anki', q:`Was bedeutet ΔG in einer chemischen Reaktion?`, a:`ΔG bezeichnet die Änderung der freien Gibbs-Energie während einer chemischen Reaktion.Sie zeigt an, ob eine Reaktion spontan ablaufen kann:• ΔG < 0: Reaktion läuft spontan ab (exergon)• ΔG > 0: Reaktion benötigt Energiezufuhr (endergon)• ΔG = 0: System befindet sich im Gleichgewicht.` },
  { id:'anki_b11_235', vl:'b11', cat:'Anki', source:'anki', q:`Was versteht man unter thermodynamischem Gleichgewicht?`, a:`Ein thermodynamisches Gleichgewicht ist ein Zustand, in dem Hin- und Rückreaktion gleich schnell ablaufen.Dadurch kommt es zu keiner Nettoänderung der Konzentrationen der Reaktionspartner, obwohl die Reaktionen weiterhin stattfinden.` },
  { id:'anki_b11_236', vl:'b11', cat:'Anki', source:'anki', q:`Was ist ein Fließgleichgewicht in biologischen Systemen?`, a:`Ein Fließgleichgewicht ist ein Zustand, in dem Stoffwechselreaktionen kontinuierlich ablaufen, während die Konzentrationen der beteiligten Stoffe weitgehend konstant bleiben.Dies ist möglich, weil in offenen biologischen Systemen ständig Stoffe zugeführt und Produkte abgeführt werden.` },
  { id:'anki_b11_237', vl:'b11', cat:'Anki', source:'anki', q:`Warum befinden sich lebende Zellen nicht im thermodynamischen Gleichgewicht?`, a:`Lebende Zellen befinden sich nicht im thermodynamischen Gleichgewicht, weil sie ständig Energie aufnehmen, Stoffe umsetzen und Stoffwechselreaktionen durchführen.Dadurch bleiben sie in einem dynamischen Fließgleichgewicht, das für Wachstum, Erhaltung und Funktion der Zelle notwendig ist.` },
  { id:'anki_b11_238', vl:'b11', cat:'Anki', source:'anki', q:`Was ist ATP?`, a:`ATP (Adenosintriphosphat) ist der wichtigste Energieträger der Zelle.Es besteht aus Adenin, Ribose und drei Phosphatgruppen.Bei der Abspaltung einer Phosphatgruppe (ATP → ADP + Pi) wird Energie frei, die von der Zelle für Stoffwechselreaktionen, Transportprozesse und Bewegung genutzt wird.` },
  { id:'anki_b11_239', vl:'b11', cat:'Anki', source:'anki', q:`Woraus besteht ATP?`, a:`ATP (Adenosintriphosphat) besteht aus drei Bausteinen:• Adenin (Stickstoffbase)• Ribose (Pentosezucker)• drei PhosphatgruppenDie Phosphatgruppen sind über energiereiche Bindungen verbunden, deren Spaltung Energie für zelluläre Prozesse liefert.` },
  { id:'anki_b11_240', vl:'b11', cat:'Anki', source:'anki', q:`Warum enthält ATP viel Energie?`, a:`ATP enthält viel Energie, weil die Bindungen zwischen den Phosphatgruppen energiereich sind.Bei der Abspaltung einer Phosphatgruppe (ATP → ADP + Pi) wird Energie frei, die von der Zelle für biologische Arbeit wie Stoffwechsel, Transport und Bewegung genutzt werden kann.` },
  { id:'anki_b11_241', vl:'b11', cat:'Anki', source:'anki', q:`Was entsteht bei der Hydrolyse von ATP?`, a:`Bei der Hydrolyse von ATP (Adenosintriphosphat) wird eine Phosphatgruppe abgespalten.Dabei entstehen:• ADP (Adenosindiphosphat)• anorganisches Phosphat (Pi)• Energie, die für zelluläre Prozesse genutzt werden kann (z. B. Stoffwechsel, Transport oder Bewegung).` },
  { id:'anki_b11_242', vl:'b11', cat:'Anki', source:'anki', q:`Welche Rolle spielt ATP im Stoffwechsel?`, a:`ATP fungiert als zentrale Energiewährung der Zelle.Es koppelt energieliefernde Reaktionen (z. B. Abbau von Nährstoffen) mit energieverbrauchenden Prozessen wie Biosynthese, aktivem Transport oder Muskelarbeit.Dabei wird ATP zu ADP + Pi gespalten, wodurch Energie für zelluläre Prozesse bereitgestellt wird.` },
