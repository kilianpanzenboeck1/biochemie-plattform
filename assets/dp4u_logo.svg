<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="22" fill="#C9A84C"/>

  <!-- Outer D shape -->
  <rect x="10" y="20" width="4" height="60" fill="white"/>
  <path d="M14 20 L28 20 Q48 20 48 50 Q48 80 28 80 L14 80"
        fill="none" stroke="white" stroke-width="4" stroke-linejoin="miter"/>

  <!-- Inner D shape (offset inward) -->
  <rect x="19" y="27" width="3" height="46" fill="white"/>
  <path d="M22 27 L32 27 Q41 27 41 50 Q41 73 32 73 L22 73"
        fill="none" stroke="white" stroke-width="3" stroke-linejoin="miter"/>

  <!-- P vertical stem -->
  <rect x="50" y="17" width="4" height="66" fill="white"/>
  <!-- P bowl -->
  <path d="M54 20 L64 20 Q74 20 74 32 Q74 44 64 44 L54 44"
        fill="none" stroke="white" stroke-width="4" stroke-linejoin="miter"/>

  <!-- 4: slanted left stroke, horizontal bar, vertical right stroke -->
  <line x1="72" y1="32" x2="63" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="square"/>
  <line x1="62" y1="56" x2="80" y2="56" stroke="white" stroke-width="3.5" stroke-linecap="square"/>
  <line x1="76" y1="30" x2="76" y2="72" stroke="white" stroke-width="3.5" stroke-linecap="square"/>

  <!-- U: two verticals + bottom arc -->
  <path d="M83 30 L83 58 Q83 72 90 72 Q97 72 97 58 L97 30"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
